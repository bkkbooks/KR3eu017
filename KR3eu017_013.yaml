body:
  text: 卷十三辨痙濕暍病脈證并治篇經云諸痙項强皆屬於濕又云諸暴强直皆屬於風論曰太陽病發汗太多因成痙夫六氣皆足以致痙不專在濕也六經皆有痙證亦不專在太陽一經也蓋身以後屬太陽凡頭項强急項背𠘧𠘧脊强反張腰似折髀不可以曲膕如結皆太陽痙也身以前屬陽明頭面動搖口噤齒齘缺盆紐痛腳攣急皆陽明痙也身之側屬少陽口眼喎邪手足牽引兩脅拘急半身不遂皆少陽痙也至若腹內拘急因吐利後而四肢攣急者未嘗非太陰痙也惡寒蜷臥尻以代踵脊以代頭俯而不能仰者未嘗非少陰痙也睪丸上升宗筋下注少腹裏急陰中拘攣膝脛拘急者未嘗非厥陰痙也大抵痙以狀名而痙因筋急故凡六經筋病皆得以痙稱之其因於風寒者必發熱惡寒而無汗其脈浮緊其狀身强直而口噤即經所云諸病强直皆屬於風者也其勢徑急故名曰剛痙其因於風濕者發熱汗出不惡寒其脈浮緩其狀項强𠘧𠘧而身不强直即經所云諸痙項强皆屬於濕者也其勢濡弱故名曰柔痙若夫因誤汗亡陽津竭無以養筋而致痙者即本論所云太陽病發汗太多而成痙又非因濕因風而却因燥者也蓋痙之始本非正病多雜於他病之中如婦人之脫血跌撲之破傷俱能致痙今見患此者悉指為風殊非確論學者當於證中審察風寒濕燥內外虛實之因分別施治庶不致誤慎勿概指為風也傷寒所致太陽病痙濕暍此三種宜應別論以為與傷寒相似故此見之按傷寒所致四字甚無所謂衍文也注傷寒太陽經中之一病非謂太陽經惟病傷寒也蓋以六氣外感之邪人中傷之者未有不由太陽之表而入者也痙風邪也濕濕邪也暍暑邪也夫風寒暑濕之病固皆統屬太陽然痙濕暍三種雖與傷寒形證相似但其為病傳變不同故曰宜應別論也集注方有執曰痙濕暍三者皆風寒之變證既成變證則當別為立論然自風寒變來本屬太陽猶有風寒涉似之疑須當併為辨論病身熱足寒頸項强急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也注病人身熱惡寒太陽證也頸項强急面赤目赤陽明證也頭熱陽鬱於上也足寒陰凝於下也太陽之脈循背上頭陽明之筋上挾於口風寒客於二經則有頭搖口噤反張拘强之證故名痙病也集注方有執曰此以痙之具證言身熱頭熱面赤目脈赤陽邪發於陽也足寒陰邪逆於陰也獨頭面搖風行陽而動於上也卒忽然也噤寒而口閉也言忽然唇口吻合噤急而飲食不通也背反張者太陽之脈挾背寒則筋急而拘攣熱則筋緩而縱馳也然剛柔二痙則各見證之一偏惟風寒俱有而致證者則具見也鄭重光曰此總論痙之經俞皆病氣血並傷而為强急反張之證也風濕俱有故為痙之具證也太陽病發熱脈沉而細者名曰痙注太陽病發熱脈當浮大脈若沉細兼少陰也今發熱脈沉細而名曰痙者何也以其已病痙證而得沉細脈不可名太陽少陰傷寒之脈當名太陽風濕痙病之脈也因風邪鬱於陽故病發熱也濕邪凝於陰故脈沉細也此承上條痙病得沉細脈之義非謂太陽病發熱脈沉細即名之曰痙病也集注方有執曰發熱太陽未除也沉寒也細濕也程知曰脈沉細法宜救裏而痙又為燥熱之病故金匱謂難治謂未可輕同於太陽發熱脈反沉之例也張璐曰發熱脈當浮數而反沉細知邪風為濕氣所著所以身雖發熱而脈不能浮數是陽證見陰脈故金匱指為難治也程應旄曰痙病有同有獨固以其獨者名之矣然脈在太陽更有獨而無同以頭面搖口噤背反張之證合沉細之脈雖有太陽發熱等證不致為傷寒所溷乃可定其名曰痙也太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙按反惡寒之反字衍文也剛痙證應惡寒非反也注痙病既屬太陽當以太陽虛實例之故曰太陽病發熱無汗惡寒為實邪名曰剛痙發熱汗出不惡寒為虛邪名曰柔痙此詳申上二條痙病虛實非謂太陽病發熱無汗惡寒汗出不惡寒即名之曰剛柔痙病之證也集注程知曰太陽病發熱無汗惡寒為傷寒發熱汗出惡風為傷風發熱汗出不惡寒為溫熱以證有頸項强急甚則反張故不謂之風寒溫熱病而謂之痙也張璐曰金匱云太陽病無汗而小便反少氣上衝胸口噤不能言欲作剛痙葛根湯主之即是申明此條之義而補其治法也無汗而小便少者以太陽陽明二經之熱聚於胸中延傷肺金清肅之氣內外不能宣通故也又云太陽病其證備身體强𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之即是申明此條之義而補其治法也其證備則發熱汗出等證金匱已詳不必贅矣太陽病項背强𠘧𠘧無汗惡風葛根湯主之注此略其證脈單舉痙之頸項强急者以明其治也太陽脈下項循肩挾脊陽明脈循喉嚨入缺盆貫膈下乳內廉太陽主後前合陽明陽明主前後合太陽今邪壅於二經之中故有𠘧𠘧拘强之貌也太陽之强不過頸項强此痙之强則不能俯仰項連胸背而俱强故曰項背强𠘧𠘧也無汗惡風實邪也宜葛根湯發之即桂枝湯加麻黃葛根兩解太陽陽明之邪也集注方有執曰𠘧𠘧鳥之短羽者動則引頸𠘧𠘧然形容病人之頸項俱病者俯仰不能自如之貌太陽病項背强𠘧𠘧反汗出惡風者桂枝加葛根湯主之注太陽病項背强𠘧𠘧無汗惡風者實邪也今反汗出惡風者虛邪也宜桂枝加葛根湯解太陽之風發陽明之汗也集注汪琥曰太陽病項背强矣復𠘧𠘧然頸不得舒頸之經屬陽明項背與頸𠘧𠘧然其狀當無汗今反汗出惡風仲景法太陽病汗出惡風者桂枝湯主之今因其𠘧𠘧然故加葛根於桂枝湯中以兼祛陽明經之風也桂枝加葛根湯方於桂枝湯內加葛根三兩餘依桂枝湯法太陽病發汗太多因致痙注以上論痙皆外感風寒濕而為病也若太陽病發汗太多津液大亡表氣不固邪風乘虛而入因成痙者乃內虛之所致也不可以柔痙剛痙例之宜以桂枝加附子湯以固表祛風為主治由此推之凡病出汗過多新産亡血過多而變生此證者皆類此也集注程應旄曰即此一端推之則知此病得之亡津亡血而因虛致寒因虛致燥者不少蓋陽氣者柔則養筋發汗太多則亡其陽而損其經脈之血液故也濕家之為病一身盡疼發熱身色如似熏黃注濕家謂病濕之人濕之為病或因外受濕氣則一身盡痛或因內生濕病則發熱身黃若內外同病則一身盡痛發熱身色如熏黃也熏黃者濕盛之發黃屬脾之瘀濕故其色暗如煙熏也不似傷寒熱盛之發黃屬陽明之鬱熱故其色明如橘子色也集注張璐曰濕證發黃須分陰陽表裏陽濕在裏茵陳蒿湯在表麻黃連軺赤小豆湯陰濕在裏白朮附子湯在表麻黃白朮湯此陰濕在表而發黃也金匱有云濕家身煩痛可與麻黃加朮湯蓋寒與濕合不宜大汗故加白朮以麻黃得朮則汗不致於驟發白朮得麻黃則濕滯得以宣通也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈注此申上條詳其證出其脈以別其治也濕家病身上疼痛發熱面黃而喘此內生外受之濕病也外宜羌活勝濕湯內宜茵陳五苓散喘甚大陷胸丸若更頭痛鼻塞而煩其脈大證類傷寒但其人裏和能食知非傷寒不可發汗乃濕邪之病在頭故頭痛鼻塞惟宜納藥鼻中取黃水從涕出自可愈也所納之藥即瓜蒂散類也集注鄭重光曰身上疼痛發熱面黃而喘頭痛鼻塞則寒濕之邪客於上焦經曰因於濕首如裹是也用瓜蒂散吹鼻此在上者因而越之之法也太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便注濕家脈浮細濕在外也當汗之今太陽病關節疼痛而煩小便不利大便反快脈不浮細而沉細是濕邪內盛而為濕痹不通之候也故但當利其小便使濕從小便而去乃濕淫於內之正治也集注成無己曰濕盛則濡泄小便不利大便反快者濕氣內流也但當利其小便以宣泄腹中濕氣古云治濕不利小便非其治也方有執曰此以濕之入裏者言也關節疼痛者寒濕之氣走注內滲所以脈沉而細也痹以疼痛言小便不利大便反快者濕即水水不外滲則橫流不遵故道利其小便者導其遵故道而行也張志聰曰關節者腰背肘膝之大關大筋之所統屬不同於骨節也濕流關節大筋不和故疼痛痹閉也濕傷太陽筋脈澀滯故名濕痹利其小便則水道行而決瀆無愆濕邪去而筋脈調和矣濕家其人但頭汗出背强欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也注濕家但頭汗出乃濕氣上淫之汗非陽明之熱不得越也濕家背强乃濕氣澀滯之重强非痙病之拘强也欲得覆被向火非外惡寒乃濕盛生內寒也若誤以濕淫之頭汗為陽明瘀熱之頭汗而下之寒濕之氣乘虛入胸則胸滿入胃則噦矣寒濕不化故小便不利胸中有寒故舌上滑白如苔丹田有熱故口燥渴欲得水而不能飲由胸中有寒濕故也集注成無己曰傷寒則無汗濕家雖有汗而不能周身故但頭汗出也程應旋曰雖渴欲得水似熱而不能飲可辨則只是口燥煩而實非胸中燥煩可知證同病別也濕家下之額上汗出微喘小便利者死若下利不止者亦死注此承上條濕家誤下之逆也濕家誤下胸滿而噦小便不利舌上如苔口燥渴不能飲已屬逆矣尚在可治此誤下後額汗不已微喘不止是陽脫於上也小便反利下利不止是陰脫於下也陰陽相離故死也集注方有執曰治濕當利其小便而以小便利主死何也誤治而陰陽散亡也程知曰濕之中人陰先受之故本經濕證多從助陽溫散為治若妄下則陽虛陰盛而不可救矣額上汗出微喘虛陽欲上脫也二便不禁盛陰欲下脫也陰陽離決死矣病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也注病者謂一身盡痛之病人也濕家一身盡痛風濕亦一身盡痛然濕家之痛則重著不能轉側風濕之痛則輕掣不可屈伸此痛之有別者也至於發熱濕家之熱早暮不分微甚風濕之熱則日晡必劇此得之於汗出當風或久傷濕復受風冷所致也集注張志聰曰汗出當風則為風濕久傷取冷則為寒濕張錫駒曰發熱日晡所劇者日晡而陽氣衰陰氣盛濕為陰邪故主旺時而甚也問曰風濕相摶一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也注此詳風濕相摶一身盡痛不惟不可下即發汗亦不可失其宜也風陽邪濕陰邪風濕相摶陰陽受邪故一身盡痛也法當汗出而解值天陰雨不止則濕氣盛雖發其汗汗大出而病不愈者但以風氣去濕氣在是故不愈也以其值濕盛之時發其汗大汗出此汗之不如法所以不解也若治風濕者必俟天氣晴明發其汗但令其汗微微似欲出狀則風與濕俱去而病自解矣集注方有執曰陰雨不止則濕不除所以益當發汗也然風濕本由汗出當風而得則汗之大出者必反濕轉加甚微微似欲汗出而不見出則濕消而風散矣此發汗之微機後之人動輒以大汗為言者去道遠矣張璐曰風濕相摶法當汗出而解合用桂枝加朮使微微蒸發表裏氣和風濕皆去正如濕家身煩痛可與麻黃湯加朮同義程應旄曰濕家不惟不可誤下即汗亦不可誤汗風濕相摶一證一身盡疼痛雖是微挾表邪然其脈不浮終是汗難大汗治風兼治濕但使微微似欲汗出者是其法也傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之注此承上條詳申脈證以明其治也傷寒八九日不嘔不渴是無傷寒裏病之證也脈浮虛澀是無傷寒表病之脈也脈浮虛主在表虛風也澀者主在經寒濕也身體疼煩屬風也不能轉側屬濕也乃風濕相摶之證非傷寒也與桂枝附子湯溫散其風濕使從表而解也若脈浮實者則又當以麻黃加朮湯大發其風濕也如其人有是證雖大便硬小便自利而不議下者以其非邪熱入裏之硬乃風燥濕去之硬故仍以桂枝附子湯去桂枝以大便硬小便自利不欲其發汗再奪津液也加白朮以身重著濕在肉分用以佐附子逐濕氣於肌也集注成無己曰煩者風也身疼不能自轉側者濕也經曰風則浮虛脈經曰脈來澀者為病寒濕也桂枝附子去桂枝加白朮湯方附子炮去皮破三枚白朮四兩生薑切三兩大棗擘十二枚甘草炙二兩上五味以水六升煮取二升去滓分溫三服初一服其人身如痹半日許復服之三服都盡其人如冒狀勿怪此以附子朮並走皮內逐水氣未得除故使之耳法當加桂四兩此本一方二法以大便硬小便自利去桂也以大便不硬小便不利當加桂附子三枚恐多也虛弱家及産婦宜減服之風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之注風濕相摶骨節疼煩重著不能轉側濕勝風也掣痛不可屈伸風勝濕也今掣痛不可屈伸近之則痛劇汗出短氣惡風不欲去衣皆風邪壅盛傷肌表也小便不利濕內蓄也身微腫者濕外薄也以甘草附子湯微汗之祛風為主除濕次之也以上二條皆詳風濕之義以明風濕之治也集注方有執曰摶捏聚也言風與濕捏合摶聚共為一家之病也煩風也痛濕也風淫則掣濕淫則痛風濕之邪注經絡流關節滲骨髓身體所以煩痛掣痛而不利也近之則痛劇者外邪客於內忤之則逆也短氣者汗多亡陽而氣傷也惡風不欲去衣者以重傷故惡甚也甘草益氣和中附子溫經散濕朮能勝濕燥脾桂枝祛風固衛此四物者所以為風濕相摶之的藥也吳人駒曰必脈之沉而細者若浮大而盛則風多而濕少附子須在審之甘草附子湯方甘草炙二兩附子炮去皮破二枚桂枝四兩白朮二兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗止復煩者服五合恐一升多者宜服六七合為妙方解風濕之治用甘草附子湯即桂枝附子湯去薑棗加白朮也去薑棗者畏助汗也加白朮者燥中濕也日三服初服一升不得汗解則仍服一升若微得汗則解解則能食是解已徹也可止再服若汗出而復煩者是解未徹也仍當服之但不可更服一升恐已經汗多服而過汗也服五合可也如不解再服六七合為妙似此服法總是示人不可盡劑之意學者於理有未解處即於本文中求之自得矣太陽中熱者暍是也其人汗出惡寒身熱而渴也注中暑熱病亦由太陽表入故曰太陽中熱者暍是也其人汗出惡寒身熱而渴頗似太陽溫熱之病但溫熱無惡寒以熱從內發故雖汗出而不惡寒中暍惡寒者以暑由外入故汗出而惡寒也究之於脈溫熱之浮必浮而實中暍之浮必浮而虛以暑熱傷氣也究之於渴溫熱之渴初病不過欲飲水中暍之渴一病即大渴引飲也溫熱則傳經變病不一中暍則不傳不愈即死也雖同為太陽經中之病而虛實施治不同宜以人參白虎湯主治之集注方有執曰蒸熱謂之暑傷暑謂之暍汗出惡寒者太陽表不固也身熱者暑邪傷陽也渴者亡津液而內燥也程知曰此辨暑熱脈證也太陽中熱者謂是太陽表證而屬中熱也均是太陽表病汗出惡寒身熱而不渴者為中風汗出身熱而渴不惡寒者為溫病今汗出惡寒身熱而渴則是中暍暍者暑熱之氣也不言暍而言熱以其胃熱為獨重也裏有熱故身熱而渴暑傷氣故汗出惡寒吳人駒曰不可因惡寒而用辛溫又不可因汗出而固表惟宜甘寒以解其暑熱可也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚注此申上條詳出證脈戒人不可妄行汗下溫針也太陽中暍無汗身重疼痛者似傷寒也但脈弦細芤遲非傷寒脈也且有小便已而灑灑然惡寒毛聳之證乃太陽膀胱表氣為暑所傷而然也手足逆冷者乃暑傷氣氣傷不能達四肢則寒也小有勞身即發熱口開前板齒燥者乃勞則動熱暑熱益烈傷陰液也此皆中暍危證若以發熱無汗惡寒身痛誤為傷寒之表妄行發汗則表氣愈虛惡寒更甚也若以手足逆冷誤為陽虛妄加溫針則暑邪愈盛發熱更熾也若以壯熱齒乾誤為胃火而數下則水源竭澀尿淋窘甚也凡此之證皆中暍妄行汗下溫針致變惟宜以白虎加人參湯主之或人參湯調辰砂六一散亦可也集注成無己曰經云因於暑汗煩則喘喝口開謂喘喝也喘喝不止故前板齒燥程知曰人身之陽以汗而外泄人身之陰以熱而內竭故暍證禁用汗下溫針謂汗則傷陽下則傷陰溫針則引火內入也張錫駒曰灑灑者惡寒之象也毛聳者毫毛豎起也太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也注太陽中暍之證身熱疼重者暑傷形也脈微弱者暑傷氣也以此證脈揆之亦其人夏月盛暑喜貪風涼過飲冷水水氣輸行於皮中表為邪束不得汗泄所致也此時即以香薷飲大順散汗之可立愈也若因循不治則水氣既不得外泄於表而作腫勢必內攻於裏而喘脹矣是又當以葶藶大棗湯或瓜蒂一物散下之也上條戒人不可汗下此條示人宜當汗下仲景之法多是如此蓋恐人固執失宜也集注方有執曰身熱疼重而曰夏月傷冷水水行皮中所致者土主肌肉而惡濕水滲土而蒸發也脈微弱者熱則血乾而氣耗也然夏月飲水人之常事而曰傷何哉良由暑迫飲之過多或得之冷水澡洗暑反內入也張璐曰按論暍三條首言動而得之之病謂中暍屬外因次言靜而得之之病雖曰中暍實暑病也屬內因末言因熱傷冷之病乃中暍之變證屬不內外因不得以三者混稱也程應旄曰可見中暍之病大都陽氣在表而胃中虛冷所以身熱疼重而脈微弱夏月飲冷水裏陰鬱住表陽水氣不得宣泄而行於皮中多有此證此則開鬱宣陽又為暍證中增一義也
