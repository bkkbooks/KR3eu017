body:
  text: 卷九辨合病併病脈證并治篇傷寒有六經之證有六經之脈證脈井然不雜則可直指為某經之病若兩經三經陰陽混淆不可以一經名者或一經未罷又傳一經二經三經同病不歸併一經者則名曰合病或二經三經同病其後歸併一經自病者則名曰並病論中所著合病並病雖單舉陽經未及陰經然陽經既有合病並病則陰經亦必有之可知矣如太陽病脈反沉少陰病反發熱是少陰太陽合病也陽明病脈遲太陰病大實痛是太陽陽明合病也少陽病脈細而厥厥陰病嘔而發熱是厥陰少陽合病也少陽病脈細而厥厥陰病嘔而發熱是厥陰少陽合病也是雖無合病之名而確有合病之實且三陽皆有發熱證三陰皆有下利證如發熱而下利是陰陽合病也陰陽合病若陽盛者屬陽經則下利為實熱即論中所謂太陽陽明陽明少陽太陽少陽合病者是也陰盛者屬陰經則下利為虛寒即論中所謂少陰下利反發熱不死少陰下利清穀裏寒外熱不惡寒而面赤者是也蓋陽與陽合不合於陰為三陽合病則不下利而自汗出乃白虎湯證也陰與陰合不合於陽為三陰合病則不發熱而吐利厥逆乃四逆湯證也誠以人之藏府互根陰陽相合三陽既有合併之病則三陰亦有合併之病不待言矣太陽與陽明合病者必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之注一經未罷又傳一經二經三經同病而不歸併一經者謂之合病太陽與陽明合病者謂太陽之發熱惡寒無汗與陽明之煩熱不得眠等證同時均病表裏之氣升降失常故不下利則上嘔也治法只須先解太陽之表表解而陽明之裏自和矣若利則宜葛根湯表而升之利自可止嘔則加半夏表而降之嘔自可除也集注成無己曰邪氣外盛陽不主裏則裏氣不和裏氣下而不上者但利而不嘔裏氣上逆而不下者但嘔而不利故以葛根湯以散表邪加半夏以下逆氣也葛根湯方葛根四兩麻黃去節三兩桂枝二兩芍藥二兩甘草炙二兩生薑切三兩大棗擘十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌葛根加半夏湯方於葛根湯內加半夏半升餘依葛根湯法方解是方即桂枝湯加麻黃葛根也麻黃佐桂枝發太陽榮衛之汗葛根君桂枝解陽明肌表之邪不曰桂枝湯加麻黃葛根而以葛根命名者其意重在陽明以嘔利多屬陽明也二陽表急非溫服覆而取汗其表未易解也或嘔或利裏已失和雖啜粥而胃亦不能輸精於皮毛故不須啜粥也集解柯琴曰李杲定為陽明經藥潔古云未入陽明者不可便服豈二子未讀仲景書耶要之葛根桂枝俱是解肌和裏之劑故有汗無汗下利不下利俱可用與麻黃之專於發表者不同也汪琥曰外臺方議問曰經云下利不可發汗發汗則脹滿今此下利又發汗者何也答曰少陰病下利清穀者為裏虛若更發汗則脾虛而脹今太陽病未罷或有頭痛惡風寒等證尚在於表其脈尚帶浮便傳入陽明而有口渴身熱等證又自下利必須此方發散太陽之表以中有葛根能除陽明之邪也故諸證但發熱兼有裏而脈浮者此方最善太陽與陽明合病喘而胸滿者不可下宜麻黃湯注太陽陽明合病不利不嘔者是裏氣實不受邪也若喘而胸滿是表邪盛氣壅於胸肺間也邪在高分之表非結胸也故不可下以麻黃湯發表通肺喘滿自愈矣集注喻昌曰兩經合病當用兩經之藥何得專用麻黃湯耶蓋太陽陽明兩邪相合邪攻其胃不嘔則利故用葛根湯今邪攻其肺所以喘而胸滿麻黃杏仁者肺氣喘逆之專藥也魏荔彤曰二經合病獨見證於胸肺之間喘而作滿此正二經之表邪為患不可誤認胸膈屬裏妄施攻下如大小陷胸之類也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之注太陽與少陽合病謂太陽發熱惡寒與少陽寒熱往來等證並見也若表邪盛肢節煩疼則宜與柴胡桂枝湯兩解其表矣今裏熱盛而自下利則當與黃芩湯清之以和其裏也若嘔者更加半夏生薑是清和之中兼降法也集注程知曰言太陽少陽合病下利宜用和法也曰太陽則尚有表證也然已見下利則入裏之熱已明故不解外而清內成無己云太陽陽明合病下利為在表當與葛根湯陽明少陽合病下利為在裏可與承氣湯此太陽少陽合病下利為在半表半裏非汗下所宜故與黃芩芍藥以和解之嘔者邪上逆也故加半夏生薑以散逆氣汪琥曰太少合病而至下利而在表之寒邪悉入而為裏熱矣裏熱不實故與黃芩湯以清裏熱使裏熱清而在表之邪自和矣所以此條病不但太陽桂枝在所當禁並少陽柴胡亦不須用也黃芩湯方黃芩三兩甘草炙二兩芍藥二兩大棗擘十二枚上四味以水一斗煮取三升去滓溫服一升日再服夜一服黃芩加半夏生薑湯方於黃芩湯方內加半夏半升生薑三兩餘依黃芩湯法方解裏熱不和故自下利用黃芩清熱甘草和中得芍藥大棗其功倍焉熱清裏和而利可止集解柯琴云因熱不在半表故不用柴胡熱已入半裏故入黃芩加芍藥也非微弱胃虛不須人參若兼嘔者仍加半夏生薑可也陽明少陽合病必下利其脈不負者為順也負者失也互相尅賊名為負也脈滑而數者有宿食也當下之宜大承氣湯注陽明屬土少陽屬土二經偏裏故合病必下利也陽明脈大少陽脈弦脈得大弦是為本脈宜黃芩湯清熱和土兼瀉木邪利自止矣若脈單大不弦則為土不受邪其病易愈名為順也單弦不大則為木來尅土其病難治名為負也今脈不大弦而滑數則知非木土為害乃宿食為病之熱利也故不用黃芩湯而以大承氣湯下之也太陽陽明合病下利表證居多故以葛根湯發之陽明少陽合病下利裏證居多故以大承氣湯攻之太陽少陽合病下利半表半裏居多故以黃芩湯和之若非合病則桂枝湯麻黃湯分主太陽之表五苓散抵當湯分主太陽之裏葛根湯主陽明之表三承氣湯主陽明之裏小柴胡湯主少陽之表大柴胡湯主少陽之裏是各有專司也集注張兼善曰凡合病皆下利各從外證以別焉夫太陽病頭項痛腰脊强陽明病目痛鼻乾不得臥少陽病胸脅痛耳聾凡遇兩經病證齊見而下利者曰合病也然兩經但各見一二證便是不必悉具林瀾曰此節是三證在內大承氣只治得脈滑而數有宿食之證非並治上兩證也其脈不負者雖下利而脈未至純弦也不言治法陶華謂嘗以小柴胡加葛根白芍治之取效如拾芥是也負者脈純弦也土敗但見鬼賊之脈不必治矣蓋雖同是陽明之合病而有入經在府之殊安可以在經之際概歸之承氣乎三陽合病脈浮大上關上但欲眠睡目合則汗按浮大上之上字當是弦字始合論中三陽合病之脈若是上字則經論中從無兩寸脈主三陽病之理注脈浮大弦三陽合病之脈也浮大弦皆見於關上知三陽之熱邪皆聚於陽明也熱聚陽明則當煩不得眠今但欲眠睡是熱盛神昏之昏睡也昏睡自然目合熱蒸則汗自出也若施治得宜使邪還於表而解否則未可卜也宜以柴胡桂枝白虎三湯酌其所當合而用之可也集注方有執曰太陽脈浮陽明脈大關上乃少陽之部位故曰三陽合病魏荔彤曰診其脈浮為太陽大為陽明其長上於關上則弦可知矣弦又為少陽是三陽之經同受邪所以三陽之脈同見病如此再諦之於證但欲眠睡非少陰也乃陽盛神昏之睡也及目合則汗出是陽勝爭於陰中之汗出也三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之注此承上條復詳其證以明其治也三陽合病者太陽陽明少陽合而為病也必太陽之頭痛發熱陽明之惡熱不眠少陽之耳聾寒熱等證皆具也太陽主背陽明主腹少陽主側今一身盡為三陽熱邪所困故身重難以轉側也胃之竅出於口熱邪上攻故口不仁也陽明主面熱邪蒸越故面垢也熱結於裏則腹滿熱盛於胃故譫語也熱迫膀胱則遺尿熱蒸肌腠故自汗出證雖屬於三陽而熱皆聚胃中故當從陽明熱證主治也若從太陽之表發汗則津液愈竭而胃熱愈深必更增譫語若從陽明之裏下之則陰益傷而陽無依則散故額汗肢冷也要當審其未經汗下而身熱自汗出者始為陽明的證宜主以白虎湯大清胃熱急救津液以存其陰可也集注汪琥曰或問白虎湯何以能解三陽之熱答云病至自汗出則太少之邪總歸陽明矣安得不從陽明而專治之耶鄭重光曰三陽合病表裏俱傷也發汗偏攻太陽則邪並於陽明而譫語益甚攻下偏治陽明則額上生汗汗出不流手足厥冷必成亡陽之證然則既不宜於汗下惟有白虎一湯兩解陽明表裏之熱若無自汗表猶未解尚不可用此條當與暍證參治也二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也按當解之下熏之二字當是以汗二字始與上下文義相屬注一經未罷又傳一經同病而後歸併一經自病者名曰並病二陽者太陽陽明也太陽初得病時發汗汗出不徹未盡之邪因而轉屬陽明若續自微微汗出不惡寒反惡熱始為陽明可下之證若不微微汗出而惡寒者則是太陽之表猶未罷不可下也下之為逆矣如已經發汗尚有未盡之表宜仍與麻桂各半湯或桂枝二越婢一湯小小發汗以和其表自可解也緣緣接連不已也正赤不雜他色也謂滿面接連赤色不已也此由於汗出不徹故陽氣怫鬱不得宣越所以其人煩躁短氣脈澀不知痛處乍在腹中乍在四肢求之而不可得也是皆邪氣壅甚於經漫無出路但坐經汗出不徹之故耳當更用大青龍湯或葛根湯發其汗則愈矣按面赤一證勞損顴紅發於午後者骨蒸陰虛也格陽浮赤兼厥利脈微者陽虛也赤色深重潮熱便硬裏實也赤色淺淡惡寒無汗表實也短氣脈澀內因多氣血虛若外因短氣必氣粗是汗出不徹邪氣壅促胸中不能布息之短氣非過汗傷氣氣乏不足續息之短氣也外因脈澀必有力是汗出不徹邪氣壅滯榮衛不能流通之脈澀非過汗傷液液少不滋脈道之脈澀也集注王肯堂曰因病太陽故當汗因病陽明故當小汗先字最有次第乃仲景之樞機也下之以大小承氣汗之以麻黃等湯程應旄曰太陽既轉屬陽明宜從陽明治矣然恐轉遞之處表邪去尚未盡裏邪乘其未深兩邪相持而前後互見是曰並病縱使表少裏多終是帶表之陽明也太陽不應有腹痛以邪無出路意欲內攻故乍在仍不知其處林瀾曰汗不徹者脈必澀非再汗邪奚自去乎是知未汗則為並病已汗即為轉屬陽明未汗則為陽氣怫鬱在表已汗則為汗出不徹汗不徹者必更汗之轉屬者必下除之未汗者可小發汗怫鬱者可解之以汗邪由不同為病自不同故施治亦不同耳二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯注二陽並病太陽陽明同病也太陽證罷盡歸併於陽明所以但發潮熱手足漐漐汗出大便難而譫語也是皆陽明胃實之證故下之則愈宜大承氣湯集注喻昌曰並病二條皆是太陽陽明上條初入陽明太陽之邪未徹故仍宜汗之此條已入陽明太陽證罷而盡歸併陽明故宜下之程知曰並病者一經證多一經證少有歸併之勢也太陽證罷而歸併陽明但手足漐漐汗出是大便已硬也與大承氣湯以下胃熱可也太陽與少陽並病頭項强痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門注太陽與少陽並病故見頭項强痛或眩冒時如結胸心下痞硬之證而曰或曰時如者謂兩陽歸併未定之病狀也病狀未定不可以藥當刺肺俞以瀉太陽以太陽與肺通也當刺肝俞以瀉少陽以肝與膽合也故刺而俟之以待其機也苟不知此而以頭項强痛為太陽之邪目眩胸滿為少陽之邪發其汗兩陽之邪乘燥入胃則發譫語設脈長大則猶為順可以下之今脈不大而弦五六日譫語不止是土病而見木脈也名曰負負者克賊也慎不可下當刺期門以直瀉其肝可也集注方有執曰並猶合也彼此相兼合而有輕重多寡之不同謂之並蓋少陽間隔陽明去太陽遠故但兼併也喻昌曰少陽之脈絡脅肋間併入太陽之邪則與結胸證似是而實非也肝與膽合刺肝俞所以瀉膽也膀胱不與肺合然肺主氣刺肺俞以通其氣斯膀胱之氣化行而邪自不能留矣發汗則譫語與合病木盛尅土之意同脈弦亦即合病內少陽勝而陽明負之互詞刺期門以瀉木邪之盛也林瀾曰大椎即百勞穴一椎上陷中主瀉胸中諸熱氣第一間疑即商陽在手食指內側主胸中氣滿熱病汗不出肝俞在九椎下肺俞在三椎下各去脊中二寸二穴並主瀉五藏之熱期門在乳根二肋端主傷寒胸中煩熱過經汗不出太陽少陽並病心下硬頸項强而眩者當刺大椎肺俞肝俞慎勿下之注此承上條戒不可下之義也太陽少陽並病心下硬而眩者少陽也頸項强者太陽也當刺肺俞肝俞以瀉太陽少陽之邪慎不可下也若以心下硬而誤下之必變逆候矣集注成無己曰慎勿下之攻少陽之邪太陽之邪乘虛入裏必作結胸經曰太陽少陽並病而反下之成結胸程知曰上言不可汗此言不可下也不可汗恐其譫語不可下恐其結胸也程應旄曰此並病心下硬居首頸項强而眩次之似尚可下不知少陽三法有禁只可刺而慎勿下也汪琥曰大椎一穴實合太少而齊瀉諸家注皆不明用針之理竟置大椎而不論大誤之極太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩注此承上條而言誤下之變也太陽少陽並病不刺肺俞肝俞而反下之兩陽之邪乘虛陷裏則時如結胸竟成結胸矣心下硬變為下利不止水漿不入矣上不入而下常出則中空無物其人心煩忙亂而變成壞證雖有前條刺法亦無所用矣集注程知曰此二陽並病誤下之變也太陽表邪乘虛入裏則為結胸心下硬少陽半裏之邪乘虛入裏則為下利不止上下俱病而陽明之居中者遂至水漿不入而心煩也喻昌曰並病即不誤用汗下已如結胸心下痞硬矣況又誤下乎故比太陽一經誤下之變殆有甚焉其人心煩似不了之語然經謂結胸證具躁煩者死意此亦謂其人心煩者死乎汪琥曰太陽病在經者不可下少陽病下亦在所當禁故以下之為反也
