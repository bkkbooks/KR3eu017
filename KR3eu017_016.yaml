body:
  text: 卷十六平脈法平脈者平人不病之脈也如四時平脈五藏平脈陰陽同等平脈之類是也人病則脈不得其平矣如四時太過不及陰陽藏府相乘相侮及百病相錯生死不平之脈之類是也平者又準之謂也言診者誠能以諸平脈準諸不平之脈則凡太過不及之差呼吸尺寸之乖莫不了然於心手之間而無少差謬然後可以傷寒之脈準諸壞病亦可以諸壞病之脈準之傷寒誠所謂一以貫之而余者已問曰脈有三部陰陽相乘營衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關營衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降漏刻周旋水下二刻一周循環當復寸口虛實見焉變化相乘陰陽相干風則浮虛寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見終必有姦審察表裏三焦別焉知其所舍消息診看料度藏府獨見若神為子條記傳與賢人注此總敘平脈之根源借問答以示其法也脈者血之府氣血流行之動會也三部者寸為上部關為中部尺為下部也三部既定陰陽屬焉上部為陽下部為陰陰陽平則相易陰陽偏則相乘相易則和相乘則病人之體躬衛統氣而行脈外營統血而行脈中故凡呼吸出入上下於中莫不因息以遊布於四體隨津液而流通於周身故隨時動作而效象夫脈之形容也察色察五藏之色也肝青心赤肺白腎黑脾黃各以其色合乎藏然四藏又皆以黃色為主他色為兼以土寄旺於四季也觀脈觀五藏之脈也肝弦心洪肺浮腎沉脾緩各以其脈主乎藏然四藏又皆以緩脈為本蓋人以胃氣為本也其間色或參差相錯脈或大小相乖一時之間變無常經病輒改易或存或亡無定象也師曰子之所問脈為醫道之根源當以平旦復會於寸口之時診之而虛實見焉寸口脈浮無力為虛為風牢堅有力為實為寒脈沉為水滀脈弦為支飲脈動為痛脈數為熱設或病脈不應則於其三部太過不及陰陽變化相乘之理消息診看料度藏府則順逆吉凶自然獨見若神也師曰呼吸者脈之頭也注人一呼脈再動一吸脈再動呼吸定息脈四動乃平人不病之緩脈也閏以太息故五動亦為平脈非呼吸不能定其至數持脈時必從此始故曰呼吸者脈之頭也集注方有執曰呼者氣之出脈之來也吸者氣之入脈之去也頭頭緒也脈隨氣之出入來去名狀雖多呼吸則其源頭也然脈有二此以尺寸之脈言若以周身言之則循環無端渾然不斷無頭尾之可言學者當識之也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也注此初持脈以來去疾遲而診表裏虛實法也來脈出來陽也故以候表去脈入去陰也故以候裏疾脈數疾有餘也故以候實遲脈徐遲不足也故以候虛言脈若出來疾入去遲為表實裏虛故名曰內虛外實也脈若出來遲入去疾為表虛裏實故名曰內實外虛也集注方有執曰來者自骨肉之分而出於皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之間氣之降而下也出呼而來也入吸而去也經曰來者為陽去者為陰疾為陽太過也遲為陰不及也內虛外實者陰不及而陽太過也內實外虛者陰太過而陽不及也故來去出入者脈之大關鍵也內外虛實者病之大綱領也知內外之陰陽而辨其孰為虛孰為實者診家之切要也假令脈來微去大故名反病在裏也脈來頭小本大故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死按脈來頭小本大者當是脈來大去小上微頭小者當是上微小者為陰盛下微本大者當是下微小者為陽盛始與上下之義相屬注上以脈之來去疾遲候內外虛實之診此以脈之來去大小診表裏盛衰之病脈上來微小下去反大反之象也故名曰反脈上來益大下去微小覆之象也故名曰覆反者病在裏為陰盛覆者病在表為陽盛陽盛則病格陰盛則病關陰陽盛極不相交通則病關格頭無汗者陽未離陰故可治有汗則陽以上脫故曰死也寸口衛氣盛名曰高營氣盛名曰章高章相搏名曰綱衛氣弱名曰惵營氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩營氣和名曰遲遲緩相搏名曰沉按名曰沉之沉字當是強字玩下文自知注此詳上條脈之來去盛衰之狀也寸口通指寸關尺而言也衛主氣為陽以候表營主血為陰以候裏脈隨指有力上來衛氣盛也謂之高脈隨指有力下去營氣盛也謂之章高者長盛也章者分明也高章相合名曰綱綱者以營衛俱有餘有總攬之意也脈隨指無力上來衛氣弱也謂之惵脈隨指無力下去營氣弱也謂之卑惵者恍惚也卑者縮下也惵卑相合名曰損損者以營衛俱不足有消縮之意也若高章惵卑之脈與不疾不徐緩遲之脈同見則為盛者不過弱者不衰皆名和脈強者即下文所著是也寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱營衛俱行剛柔相得名曰強也按薄鮮硬三字不成句應是衍文當刪之注此承上條以釋強字之義言凡人稟陽氣盛則得高章之盛稟陰氣盛則得惵卑之弱此平人之常若能兼見緩遲平脈斯為陰陽相抱營衛相和始名曰強強者即色鮮顏光血滿肉緊之謂也集注方有執曰緩以候胃遲以候脾陽氣長者言胃氣有餘也顏色聲音毛髮皆陽也鮮麗也光輝也商清也長美也形容胃陽之有餘也陰氣盛者言脾氣充足也骨髓生血脈滿肌肉緊骨髓血肉皆陰也形容脾陰之充足也相抱言和洽也俱行言周流也相搏言合一也極言二氣得其和平皆由脾胃盈餘之所致必如此則其人之健旺而強壯可知故曰強也師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之注上條以脈之盛衰候人之強弱此條以脈之浮中沉分人之皮脈肉筋骨以候五藏之診法也心肺俱浮肝腎俱沉以皮之浮脈之浮而別心肺之浮也以筋之沉骨之沉而別肝腎之沉也脾主肌肉在浮沉之間故候中也肥人肌膚厚脈當沉瘦人肌膚薄脈當浮今肥人脈反浮瘦人脈反沉故當責其病在何藏也集注方有執曰責求也肥人當沉者肌膚厚其脈深也故求其病於浮瘦人當浮者肌膚薄其脈淺也故求其病於沉問曰經説脈有三菽六菽重者何謂也師曰脈人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治注此承上條詳言皮脈肉筋骨各有所主以候五藏之病也菽豆也約略輕重言之非謂有其形也難經曰如三菽之重與皮毛相得者肺部也六菽之重與血脈相得者心部也九菽之重與肌肉相等者脾部也十二菽之重與筋平者肝部也按之至骨舉之來疾者腎部也各隨所主之部以候藏氣也至於寸口關上尺中亦各有所主之位以候藏氣左寸心也右寸肺也左關肝也右關脾也尺中腎也今特舉腎藏之部例之以概其餘也假令下利而甚元氣暴奪於中寸口關上尺中全不見脈法當死其不死者必是尺中時有一小見之脈也再舉頭者謂一呼再起頭一吸再起頭合為四至也夫尺中時一小見之脈四至則是腎間生氣之源未絶即下利未止尚為易治若一息二至名曰損脈是氣衰無胃故為難治也集注程知曰難經三菽六菽之説蓋言下指輕重有差等以候五藏氣也又云下利寸口關上尺中悉不見脈者是胃之陽氣已絶也難經以損脈為陽氣下脫之脈故曰損脈至為難治也寸口脈浮為在表沉為在裏數為在府遲為在藏假令脈遲此為在藏也注寸口通指三部言也此以浮沉遲數候人表裏藏府之診法也浮者皮膚取而得之脈也浮主表故曰浮為在表沉者筋骨取而得之脈也沉主裏故曰沉為在裏數者一息六至之脈也數主陽府屬陽故曰數為在府遲者一息三至之脈也遲主陰藏屬陰故曰遲為在藏假令診其人脈遲此為病在藏假令診其人脈遲此為病在藏舉一遲脈以例其餘也集注程知曰軀殼之外營衛為表軀殼之內藏府為裏故以浮沉別之諸陽雖皆屬府諸陰雖皆屬藏當以遲數別之然傷寒中之傳變亦有數而入藏遲而入府者熟讀經文自知也張璐曰此以浮沉遲數定表裏藏府而全重於遲為在藏句故重申以明之設脈見浮遲雖有表證只以小建中和之終非麻黃青龍所宜以藏氣本虛也陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也注此以陰陽同等發明平人和緩之脈也陽脈浮大而濡陰脈浮大而濡謂浮中沉陰陽同等也名曰緩者謂和緩之脈也然緩脈有二義和緩之緩脈有力濡柔不大不小以形狀之緩驗二氣之和也至數之緩脈來四至從容不徐不疾以至數之緩驗胃氣之和也集注方有執曰緩有二義此以相兼言蓋謂氣血和平也程知曰緩有和緩之義寬緩之義與浮大相類不與遲相類故經謂之浮大而濡不曰浮大而遲也蓋脈之遲數以至數言緩急以形狀言耳張璐曰脈雖浮大而濡按之仍不絶者為緩若按之即無是虛脈非緩脈也問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也假令得純弦脈者死何以知之以其脈如弦直此是肝藏傷故知死也注此已下四時五藏平脈病脈死脈之診法也東方屬木主春令風在天為風在地為木在人為肝故曰肝者木也名足厥陰經其脈當弦若得微弦濡弱而長此弦而有胃是肝平脈也病自易愈也若得微弦而長而少濡弱和緩為弦多胃少肝病脈也若得純弦而直無濡弱和緩為但弦無胃是肝死脈也下三藏雖無純洪純浮純沉之文省文也當仿此集注方有執曰微非脈名蓋微微之弦有胃氣之謂也魏荔彤曰微弦不甚弦且帶濡弱如短促亦非木之本性又必兼長脈是象木之柔和而修長此肝之本脈肝脈見此肝藏平脈如有微疾亦易愈也假令純弦如樹木將枯枝幹乾硬故知死也問曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木脈應濡弱反得毛浮脈者是肺脈也肺屬金金來尅木故知至秋死他皆仿此注二月春令也毛浮秋脈也春得秋脈何以斷言至秋當死蓋春肝木旺秋肺金旺二月肝旺之時尚得毛浮肺脈其衰可知至秋金氣愈旺金乘木木愈受克則絶故知至秋當死也餘藏皆仿此集注方有執曰此以四時脈氣屬五行生尅應病以主吉凶生死之理揭一以例其餘所以示人持診之要法也南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也注南方屬火主夏令熱在天為火在地為熱在人為心故曰心者火也名手少陰經其脈當洪若得洪大和緩此洪而有胃是心平脈也雖有心病自易愈也若得洪大而少和緩此洪多胃少是心病脈也若得洪大而無和緩此但洪無胃是心死脈也集注方有執曰其脈洪大而長應萬物盛長之象也立夏得洪大脈是其本位其人病身體苦疼重者須發其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此注凡四時之病當以四時之脈期之期之者期其愈不愈也立夏之日得洪大脈是其本位應得之脈其人病身體苦疼重者須發其汗若明日身不疼不重雖脈仍洪大必非邪脈乃時脈也不須再汗謂已解也設若本日汗濈濈然自出者此解兆已見雖脈洪大不須發汗明日便自解矣何以言之立夏得洪大脈是得其時脈故也四時仿此集注方有執曰此言脈得應時而旺則病有當解之時舉夏以例其餘示人推仿之意程知曰春弦夏洪秋毛冬石當其時得之則為平脈雖外感寒邪但微汗出自愈耳重則治之輕則不必治也內經曰脈得四時之順者此也程應旄曰洪大為夏令之脈亦為邪盛之脈有病則從邪無病則從令解不解不須另辨西方肺脈其形何似師曰肺者金也名太陰其脈毛浮也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫為難治也注西方屬金主秋令燥在天為燥在地為金在人為肺故曰肺者金也名手太陰經其脈當浮若得毛浮緩遲此浮而有胃是肺平脈也雖有肺病自易愈也若得毛浮而少緩遲此浮多胃少是肺病脈也若得毛浮而無緩遲此但浮無胃是肺死脈也若得毛浮而數則為病劇何以知之數者南方火也火克西方金法當發癰腫而難治也集注方有執曰肺主皮毛上為華蓋故脈毛浮緩遲者脾土之脈也兼得緩遲為愈者肺金得土為逢生也法當癰膿者金逢火化也北方腎脈其形何似師曰腎者水也名曰少陰其脈沉滑是腎脈也腎病自得沉滑而濡者愈也按東南西方皆有其文惟缺北方仿經文補之注北方屬水主冬令寒在天為寒在地為水在人為腎故曰腎者水也名足少陰經其脈當沉若得沉滑而濡此沉而有胃是腎平脈也雖有腎病自易愈也若得沉滑而少濡和此為沉多胃少是腎病脈也若得沉而無滑濡此但沉無胃是腎死脈也問曰翕奄沉名曰滑何謂也師曰沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也按滑者緊之浮名也此為陰實二句與上下之義不屬當是錯簡注此冬月之平脈也若陽明關脈微沉而不滑是失正陽為胃不和故其人食飲僅自可也若少陰尺脈微滑而不濡是失純陰為腎不和故其人汗出陰下濕也問曰脈有相乘有縱有橫有逆有順何謂也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也注此以人之五脈候人五藏不平之診法也人之五藏法天五行肝木心火脾土肺金腎水此相屬也木生火火生土土生金金生水水生木此相生也木尅土土尅水水尅火火尅金金尅木此相尅也相生者生相尅者死人之藏氣亦然故其脈有相乘有縱有橫有逆有順也水乘火金乘木乘其所勝是相尅也名曰縱火乘水木乘金乘所不勝是反侮也名曰橫水乘金火乘木子乘其母是倒施也名曰逆金乘水木乘火母乘其子是相生也名曰順五藏之脈肝弦心洪脾緩肺浮腎沉五藏各見本脈自無病也若見他脈以此推之縱者病甚橫者病微逆者病虛順者病實也集注方有執曰乘猶乘舟車之乘縱直也橫者縱之對順從也逆者順之反程知曰非其時而得之則為相乘縱橫為患最重順逆猶無大害也問曰何以知乘府何以知乘藏師曰諸陽浮數為乘府諸陰遲澀為乘藏也注上條發明五藏相乘縱橫順逆之脈此條發明陰陽相乘各從其類之診府陽也浮數陽也藏陰也遲澀陰也陽乘陽陰乘陰各從其類而相乘也其陰邪乘陽陽邪乘陰府邪乘藏藏邪乘府各以脈證錯綜參之可類推矣集注方有執曰浮數陽也以陽部而見陽脈故知乘府也遲澀陰也以陰部而見陰脈故知乘藏也問曰濡弱何以反適十一頭師曰五藏六府相乘故令十一注此承上條發明五藏六府不平相乘之脈也適者至也頭者數也凡人若見濡弱之脈而相乘者是因我虛而彼乘及之也越人只曰一脈輒為十變何以至十一數也越人遺包絡三焦故十也今五藏六府相乘故十一也然陰乘陽陽乘陰府乘藏藏乘府錯而綜之豈止十一耶集注程知曰此總揭脈之大要言脈得濡弱則可以和適五藏六府也經曰呼吸者脈之頭濡弱者軟和以滑內經謂之有胃氣也五藏六府之邪不能不相乘如金邪乘木木邪乘火之類惟諸相乘中有軟和以滑之意則為易愈故濡弱可以和適十一藏脈氣也問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰尺脈弱名曰陰不足陽氣下陷於陰中則發熱也注此以寸尺發明陰陽相乘為病之脈也若脈緊無汗灑淅惡寒發熱者是傷寒也脈緩有汗灑淅惡寒發熱者是中風也今寸脈微灑淅惡寒者是陽不足陰氣上乘入於陽中也尺脈弱發熱者是陰不足陽氣下陷入於陰中也此內傷不足陰陽相乘有休止之惡寒發熱非外感有餘風寒中傷營衛無休止之惡寒發熱也集注方有執曰陽先乎陰以陷入也故曰從諱之也陰隨於陽以上入也故曰乘傷之也惡寒者陽不足以勝陰而與陰俱化也發熱者陰不足以勝陽而從陽之化也程知曰此辨陰陽相乘之脈也往來則陰陽之氣更盛更虛陰並則寒陽並則熱矣凡瘧與往來寒熱之脈皆然也問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇注上條以脈之寸尺微弱辨陰陽不足此條以脈之浮沉有力別陰陽結實為病之診法也脈浮大而數藹藹如車蓋者陽結實脈也脈沉石而遲纍纍如循長竿者陰結實脈也夫脈既可以別陰陽之結實又不可不以陰結陽結之證而合陰結陽結之脈相參看也陽結證身輕能食陽能消穀也不大便期十七日當劇者陽體終燥故遲三日也陰結證身重不能食陰不能消穀也不大便期十四日當劇者陰體終濡故早三日也劇者謂不大便裏急下重且滿且痛不可再待時日宜早圖之也故或潤竅以導之軟堅以下之不致臨期燥屎巨硬穀道難出窘苦萬狀也凡病後傷液多有此證閲歷深者自知之也集注程應旄曰不曰病有而曰脈有二氣所稟有偏勝也陽結者偏於陽而無陰以生液陰結者偏於陰而無陽以化液皆於脈之浮而數沉而遲辨之也陽脈浮陰脈弱者則血虛血虛則筋急也其脈沉者營氣微也其脈浮而汗出如流珠者衛氣衰也按陽脈浮其脈浮之二浮字當是濡字若是浮字則與衛衰汗出如流珠之義不屬其脈沉之沉字當是弱字若是沉字則與血虛營氣微之義不屬注此以浮沉別陰陽不足為病之診法也陽脈濡浮而無力脈也陰脈弱沉而無力脈也其脈弱者營氣微也營微則血虛故不止於發熱而且筋急也其脈濡者衛氣衰也衛衰則表不固故不止於惡寒而且汗出如流珠也集注方有執曰沉以候裏榮行脈中故衰微可知浮以候表衛行脈外汗出如流珠則表不固故衰備可知脈藹藹如車蓋者名曰陽結也注藹藹如車蓋形容脈之浮大有力即前陽結浮數之脈也因其有力而盛故名曰陽結也集注程應旄曰脈藹藹如車蓋者形容其浮數中有擁上之象脈纍纍如循長竿者名曰陰結也注纍纍如循長竿者形容脈之沉石有力即前陰結沉遲之脈也因其有力而盛故名曰陰結也集注程知曰纍纍如循長竿直引強硬之貌為陰氣固結陽不得而和之前言陰結陽結蓋指便硬一證言之此則專言脈象也脈瞥瞥如羹上肥者陽氣微也注瞥瞥如羹上肥者形容脈之浮而無力即前衛氣衰之濡脈故曰陽氣微也脈綿綿如瀉漆之絶者亡其血也注綿綿如瀉漆之絶者形容脈之沉而無力即前營氣微之弱脈故曰亡其血也集注成無己曰綿綿者連綿而軟也如瀉漆之絶者前大而後細也脈縈縈如蜘蛛絲者陽氣衰也注縈縈如蜘蛛絲者形容脈之細小難於尋按而浮中沉似有似無即前陽不足之微脈故曰陽氣衰也集注方有執曰縈縈如蛛絲牽惹旁旋微細欲絶之狀師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命生死之期期以月節克之也注此以上發明平脈已下皆死候之脈也寸關尺三部脈之上下以候陰陽五藏升降也寸位乎上候心肺之陽主升升極而降降不至關是為孤陽故曰寸脈下不至關為陽絶也尺位乎下候肝腎之陰主降降極而升升不至關是為獨陰故曰尺脈上不至關為陰絶也關位乎中以候脾界乎寸尺所以升降出入者也今上下不至關是升降出入息矣故曰此皆不治決死也若陰陽已離胃氣未絶尚可計余命之期期以月節克之如經曰陰勝則陽絶能夏不能冬陽勝則陰絶能冬不能夏肝死於秋心死於冬脾死於春肺死於夏腎死於長夏之類是也推之於日於時亦然又未知何藏陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也注經曰人有兩死而無兩生有兩死者謂陰陽皆可死也無兩生者謂陰陽不能獨生也故陽先絶陰後竭死則身青而冷陰先絶陽後竭死則身赤而溫也集注成無己曰陽主熱而色赤陰主寒而色青其人死已身色青則陰未離乎體故知陰氣後竭也身色赤腋下溫心下熱則陽未離乎體故知陽氣後竭也程知曰陽氣前絶寒病陰氣前絶熱病也寒熱之治法一誤雖死尚有徵驗誠可畏也師曰脈病人不病名曰行尸以無旺氣卒眩仆不識人者短命則死人病脈不病名曰內虛以無穀神雖困無苦注脈者人之根本也脈病人不病者謂外形不病而見真藏病脈其內本已絶雖生猶死不過尸居餘氣耳故曰行尸也餘氣者未盡五藏生旺之餘氣也若旺氣一退即卒然眩仆不識人而死矣若良工早察於旺氣未退之先而圖之未必無所補也人病脈不病謂外形羸瘦似病其脈自和以根本尚固不過穀氣不充名曰內虛非行尸可比雖困無害胃氣復穀氣充自然安矣穀神即穀氣也集注方有執曰周氏云形體之中覺見憔悴精神昏憒食不欣美而脈得四時之從無過不及之偏是人病脈不病也形體安和而脈息乍大乍小或至或損弦緊浮滑沉澀不一殘賊沖和之氣是脈息不與形相應乃脈病人不病也張錫駒曰穀神乃水穀所化之神人賴此以資生也內虛食少穀氣不充即無穀神矣故曰無害若無本然之胃神安得謂之無害耶未知何藏先受其災若汗出發潤喘不休者此為肺先絶也注此申上條不知何藏先絶而詳言其證也肺主皮毛肺絶汗出不流故發潤也肺主氣肺絶張口氣出不能復還也故曰為肺先絶也集注成無己曰肺為氣之主為津液之帥汗出發潤者津脫也喘不休者氣脫也脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也注身汗如油液外亡也喘而不休氣上脫也水漿不下胃氣絶也形體不仁營衛敗也乍靜乍亂精神散也此皆命絶之候由此推之脈雖浮洪必然無根是為真藏孤陽飛越之診也集注王肯堂曰火之將滅也必明脈來浮洪涌盛此將去人體之兆也然又必兼下一二證始可斷其命絶陽反獨留形體如煙熏直視搖頭者此心絶也注心絶陰盡惟陽獨留故身體大熱形如煙熏從火化也心藏神直視神去也頭屬陽陽無所依故搖頭也集注成無己曰心脈俠咽系目直視者心經絶也頭為諸陽之會搖頭者陰絶而陽無根也脣吻反青四肢漐習者此為肝絶也注脣吻之色當赤而黃反見青色者木土相尅也四肢汗出漐漐不已此為肝絶也集注成無己曰脣吻者脾之候肝色青肝絶則真色見於所勝之部也四肢者脾所主肝主筋肝絶則筋脈引急發於所勝也方有執曰口脣邊曰吻四肢手足也漐汗出貌習鳥數飛也言手足顫搖如鳥之習飛奮振而不已也環口黧黑柔汗發黃者此為脾絶也注脾之華在脣四白環口黧黑其華萎矣冷汗陰黃皆脾絶也集注方有執曰口為脾之竅黧黑者熏黃黑暗土敗之色也柔汗俗謂冷汗是也張錫駒曰脾主四白環口黧黑土敗而水侮也柔汗者柔軟而膩脾之真液黃者脾之真色真液泄而真色見故為脾絶也溲便遺失狂言目反直視者此為腎絶也注腎司二便溲便遺失腎絶也腎藏精與志狂言直視精志俱敗也集注方有執曰溲便遺尿也腎司闔闢闔闢廢故二便皆無禁約也經曰腎藏志狂言者是失志矣失志者死腎主骨骨之精為瞳子目反直視者骨之精不上榮於瞳子而不能轉也問曰上工望而知之中工問而知之下工脈而知之原聞其説師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其差也何以知之若表有病者脈當浮大今脈反沉遲故知愈也注此下皆詳望問而知之之類也望謂觀其形之盛衰色之深淺問謂詢其情之苦欲病之根因脈謂診其脈之陰陽合乎形色也設病家人來請告以病者苦發熱身體疼師到病人自臥診其脈沉而遲知其差也何以知之表有病脈當浮大今反沉遲而無表脈且無表證故知愈也集注張錫駒曰有問發熱身疼脈反沉遲是陽病而見陰脈何以説得愈也答曰是必望其有恬然嗜臥之狀問其有熱除身輕之意而後合脈以斷其愈也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其差也何以知之若裏有病者脈當沉而細今脈浮大故知愈也注病家人來請告以病者腹內卒痛醫師到病人自坐無苦容診其脈浮而大知其差也何以言之裏有病脈當沉細今反浮大而無裏脈且無裏證故知愈也師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈按不和當是自和若不和如何言愈注此申上二條之義也病家人來言病者發熱煩極師未即去明日到病人向壁靜臥此熱已去因知其差假令脈不和緩未可言愈必和緩而始可斷其已愈也推之腹痛亦然此篇首所云設有不應消息診看消息者謂今日之望異於昨日之問聞也假令向壁臥聞師到不驚起而盼視若三言三止脈之咽唾者此詐病也假令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈注此設治詐病之法也蓋仲景不欲人售其欺亦不欲醫為其欺而妄治也醫者玩此而揣摩之則彼不敢欺而我不妄治矣集注程知曰彼以詐病我以詐治非良工不能具是巧也師持脈病人欠者無病也脈之呻者病也言遲者風也搖頭言者裏痛也行遲者表強也坐而伏者短氣也坐而下一腳者腰痛也裏實護腹如懷卵物者心痛也注陰陽相引故欠欠者先引氣入而後呵之故謂之呵欠陰陽不相引則病相引則和故曰欠者無病也診脈時有呻吟病苦之聲故曰呻者病也言遲者語言謇澀故曰言遲者風也搖頭言者痛極艱於發聲搖頭以意示緩故曰搖頭言者裏痛也行遲者風病筋絡不利故曰行遲者表強也坐而伏者氣不能接故曰坐而伏者短氣也凡腰痛者皆不能坐即略坐非伸足依倚不可故曰坐而下一腳者腰痛也凡心痛者皆傴僂護其痛處故曰裏實護腹如懷卵物者心痛也集注方有執曰舌強則言遲經絡牽急則舌強筋攣則經絡拘急肝屬木其合筋其主風頭屬陽裏屬陰頭搖者陰不與陽和也短氣者裏不足也此條八者皆望而知之之事也張志聰曰師持脈者猶言師但持脈而不問也八條皆察人之神情得人之病機所謂望而知之者問曰人恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也注人病恐怖者陽神不足也陽不足則恐神不足則怖恐則血隨氣下故面白脫色不潤澤也怖則氣隨神亂故脈形如循絲纍纍然而亂也集注方有執曰恐怖惶懼也循理治也絲言細也纍纍聯絡貌脫色猶言失色也蓋內氣餒者則外色奪所以有卒然之變也程應旄曰此示人察色合脈之法恐則氣下神被奪矣故脈細而且不定面色白而且脫也問曰人不飲其脈何類師曰脈自澀脣口乾燥也注津液少則脈澀脣口因以乾燥此因不飲而然非由此而不飲也集注程應旄曰不飲如與人彆氣至二三日湯水不沾脣之類肺失遊溢精氣故脈澀而脣口乾燥也問曰人愧者其脈何類師曰脈浮而面色乍白乍赤注愧者羞也羞則神色蕩而不定故脈浮而面色乍白乍赤也此皆察色合脈以意消息而知之之類也集注程應旄曰以上數條不論有病無病凡人有所負於中輒復形之色與脈也於此推之以意消息則諸病之情無不可即外以徵內矣問矣脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳注脈有災怪謂因藥而變災怪也假令人病太陽病得太陽脈脈證相應因為作太陽病湯藥與服之比還如食頃病人乃大吐下利腹中痛師問曰我先來不見此證今乃災變怪異緣何作此吐利病者答曰或有舊時服藥今乃發作故為此災怪耳望問固醫家之事亦須病人毫無隱諱方能盡醫所長仲景為病家服藥未告於醫醫失問先服何藥故出此條以示戒耳集注成無己曰醫以脈證與藥相對而反變異為其災可怪故名災怪張志聰曰脈得太陽與形證相應者如太陽病脈浮頭項強痛而惡寒此脈與形證相應也或有舊時服藥今乃發作者言送湯如食頃所投之藥未周於經必舊時服藥之故也辨脈法辨者別也辨脈者辨別諸脈之名也法者諸脈部位至數形狀相類相反別之各有其法也脈名者也如浮沉遲數滑澀諸脈之名是也部位者如浮中沉上下之部位是也至數者如遲三至數六至之至數是也形狀者如滑流澀滯之形狀是也相類者如弦與緊滑與動之類是也相反者如浮與沉虛與實之反是也皮膚取而得之謂之浮筋骨取而得之謂之沉此以脈之上下部位而得名也是則凡脈因部位而得名皆統乎浮沉矣如浮而無力謂之濡沉而無力謂之弱浮而極有力謂之革沉而極有力謂之牢浮中沉俱有力按之且大謂之實浮中沉俱無力按之且大謂之虛浮中沉極無力按之且小似有似無謂之微浮中沉極無力按之且大渙散不收謂之散浮沉有力中取無力謂之芤按之至骨推尋始得謂之伏此皆以部位兼形狀相反而得名者也一息三至謂之遲一息六至謂之數此以脈之至數而得名者也是則凡脈因至數而得名者皆統乎遲數矣如一息四至謂之緩一息七至謂之疾數時一止謂之促緩時一止謂之結至數不乖動而中止不能自還須臾復動謂之代此皆以至數兼相類而得名者也流利如珠謂之滑進退艱難滯澀謂之澀此以脈之形狀而得名也是則凡脈因形狀而得名者皆統乎滑澀矣如脈形粗大謂之大脈形細小謂之小來去迢迢謂之長來去縮縮謂之短來盛去衰謂之洪其形如豆動搖不移謂之動狀類弓弦按之端直且徑謂之弦較弦則粗按之左右彈指謂之緊此皆以形狀兼相類相反而得名者也此辨脈之大概也診者於此能詳審而擴充之則進乎法矣今以浮沉遲數滑澀六脈別之以為綱以大小虛實諸脈辨之以為目務使陰陽標本虛實寒熱心中有據指下無差庶心手相得而辨證處方自無錯謬矣問曰脈有陰陽何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死注此以脈之陰陽辨病之陰陽生死法也浮大數動滑五者比之諸脈為有餘陽道有餘故曰陽也沉澀弱弦微五者比之諸脈為不及陰道不及故曰陰也陰病謂陰寒病也見陽脈謂見陽熱脈也陽熱脈即浮大數動滑類也以陰病得陰脈證脈相應死難必也陰病若得陽脈猶冬盡春生萬物雖未即生然日進生機故曰生也陽病謂陽熱病也見陰脈謂見陰寒脈也陰寒脈即沉澀弱弦微類也以陽病得陽脈證脈相應生可卜也陽病若得陰脈如暑去秋來萬物雖未即死然日趨死候故曰死也蓋天人無二理春夏為陽秋冬為陰陽主生陰主殺故也集注方有執曰陰陽者通藏府血氣表裏虛實風寒寒熱而總言之也程知曰陰病見陽脈而主生者邪氣自裏之表欲汗而解也陽病見陰脈而主死者邪氣自表入裏正虛邪盛也故正氣實者多見陽脈正氣虛者多見陰脈脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈注緩四至脈也緩時一止復來者名曰結脈數六至脈也數時一止復來者名曰促脈陽盛則促陰盛則結陰陽偏勝則病故曰此皆病脈也脈按之來緩時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動者名曰代陰也得此脈者必難治按脈按之來緩時一止至名曰結陰也數語文義不順且前論促結之脈已明當是衍文注脈來至數不乖而中止不能自還因而復動名曰代乃一藏無氣求他藏以代續之故也凡病得此代脈者必為難治蓋以促結之止如急行而蹶雖然中止即能自還非代脈之止可比也陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也按素問曰陽加於陰謂之汗陽加於陽豈有汗出之理陽動則汗出二字當是發熱二字陰動則發熱二字當是汗出二字注動者躁動也謂陰陽互相鼓擊而不寧也動陽脈也寸為陽陽乘擊於陽故陽動發熱也尺為陰陰乘擊於陰故陰動汗出也關界乎陰陽則陰陽互相乘擊故發熱汗出同見也此為動而有力陽盛之候若按之不鼓是為陽衰之診則必形冷而不發熱汗出而必惡寒非摶擊陽盛之動乃擾亂陽虛之動也由三焦之陽氣傷則不能外溫肉分故有是證也動脈之狀頗似數脈惟上下無頭尾如豆大厥厥動搖故名曰動也厥厥者謂似有根之搖動動而不移非若滑脈之流動動而不居也集注方有執曰陰陽相搏之陰陽以二氣言陽動陰動之陰陽以部位言下言動脈之定位與其形狀厥厥舉發貌程知曰陽升陰降交通上下往來於尺寸之間則沖和安靜惟陽欲升而陰不足以和之使降則兩相搏擊其脈必數而厥厥搖動見於關上也脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也注脈浮而緊者名曰弦也此非謂浮緊即弦脈乃謂浮而徑緊弦之狀也弦緊相類惟恐人將弦作緊將緊作弦故並舉相形以別之也弦者狀如弓弦按之不移即所謂端直也緊者如轉索無常即所謂不端直也端直則不能如轉索轉索則不能似端直其為徑急則同所以相類也集注方有執曰此明弦緊之辨按之不移言如弦之張於弓一定而不可動移也轉索無常言左右旋轉而不可拘也程知曰緊為寒邪方盛直細中有轉動急疾之意故謂如轉索也張錫駒曰弦緊之分在移與不移耳脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名為革婦人則半産漏下男子則亡血失精注脈形粗大有力謂之大浮沉有力中取無力狀如蔥管謂之芤沉而且大按之徑急有力謂之牢浮而且大舉之徑急有力謂之革革脈者以鼓革而得名外急中空之象也弦則為徑減其中取之徑外急象也大則為實小其中取之實中空象也此以弦減芤虛二脈形容革脈也女子得之半産漏下男子得之亡血失精寒虛相摶故也集注程知曰言弦而虛大之脈也弦則為減謂陽氣減少而寒也大則為芤謂似革中空而虛也虛寒相摶則精血漏失故有革象也問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六脈名曰殘賊能為諸脈作病也注此下皆殘賊為病之診也相乘之脈為正氣虛隨我所虛而乘及之之謂也殘賊之脈為邪氣實恃彼之強而虐及之之謂也此六脈者名曰殘賊殘則明傷賊則暗襲脈中有此當屬實邪不論何部但本脈中兼見此脈輒防邪至也集注方有執曰諸脈謂各部之脈也作起也言六者若見於各部之脈中則皆能於其部生起病端張錫駒曰殘傷殘賊賊害也言此六者之脈足以暗傷人之經脈血氣如賊之害人而不覺故曰能為諸脈作病也寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛裏氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便尿妄出表氣微虛裏氣微急三焦相溷內外不通上焦怫鬱藏氣相熏口爛食齦也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若衛氣前通者小便赤黃與熱相摶因熱作使遊於經絡出入藏府熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣入內嚏而出之聲嗢咽塞寒厥相追為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全注寸口陰陽俱緊者謂六脈浮沉俱緊也浮脈緊則霧露之邪中於上焦沉脈緊則寒邪中於下焦上焦指太陽也下焦指少陰也霧露之邪曰潔曰清清邪中上發熱頭痛項強頸攣腰疼脛酸者霧露之邪中於太陽表也寒邪曰渾曰濁濁邪中下陰氣為栗足脛逆冷便尿妄出者寒邪中於少陰裏也經曰虛邪不能獨傷人必因身形之虛而後客之也蓋因其人表氣虛裏氣不固清濁之邪中傷上下三焦相溷表裏不通以致上焦清氣不宣邪氣怫鬱與藏相熏口爛食齦中焦不治胃氣主下而反上衝脾氣主運而反不轉中焦皆濁營衛不通血凝不流行也若正能勝邪衛氣先通其人必先小便赤黃熱傷之經必血凝肉腐而外發為癰膿也若營氣先通其人必先嚏嗢咽塞熱擁於裏之血凝者自下狀如豚肝也若正不勝邪陰陽俱逆營衛不通脾氣孤弱不能散精五液注下下焦不闔裏急墜痛圊便數窘命將難全也集注沈亮宸曰傷寒之證轉熱即佳故少陰厥陰皆以發熱而愈而凡下膿血與癰膿皆非死證若陰陽俱厥厥者必利五液注下下焦不闔命將難全也方有執曰清指風濁指寒曰潔曰渾以天地之偏氣言也陰中於邪已下至濁邪中下一節是釋上文陰即下焦陽即上焦也陰氣為栗已下至血凝不流是言證若衛氣前通已下言變癰膿之故若陰氣前通已下言變膿血利之故衛氣既陽氣營氣即陰氣乃承上營衛不通而言而清濁之所以為病在其中矣陰陽俱厥已下言證並於裏而加重故曰命將難全也脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也注此承上條互詳其證戒人臨此陰陽混淆之病慎勿妄治也此條之蜷臥足冷即上條之濁邪中下也此條之鼻涕舌苔即上條之清邪中上也此條之唇口乾燥即上條之口爛蝕齦也此條之反大發熱即上條之癰膿下血也此條之腹中痛即上條之下重湫痛也此條之惡寒即上條之必內栗也脈陰陽俱緊傷寒脈也口中氣出唇口乾燥胃經熱也蜷臥足冷少陰寒也鼻中涕出表傷風也舌上苔滑裏無熱也似此表裏陰陽寒熱虛實雜揉未定之病慎勿妄治則當審其孰輕孰重孰緩孰急先後施治可也到七日以來其人微發熱手足漸溫者此陰退陽復為欲解也若到八日以上反大發熱煮乃邪盛正衰此為難治也設使惡寒知尚在表若嘔必欲入裏也腹內痛者知邪已入裏內攻必欲下利也集注方有執曰微發熱邪退也大發熱邪盛也惡寒尚在表也腹內痛已入裏也脈陰陽俱緊至於吐利其脈獨不解緊去入安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解按緊去入安之入字當是人字人安謂不吐利也必是傳寫之訛此為晚發水停故也二句與上下文義不屬當是衍文注此發明脈陰陽俱緊內外寒甚至於吐利解不解之義也吐利後脈仍緊為邪未盡不解也緊去脈緩為邪盡人安欲解也若緊去脈遲至六七日不欲食者則胃未和為未解也若欲食者則胃已和雖脈遲亦為欲解也集注成無己曰脈陰陽俱緊為寒氣甚於上下至於吐利之後緊脈不罷者為其脈獨不解緊去則人安為欲解也寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆注平脈以脈內外候關格此以脈尺寸候關格於此推之凡陰陽盛極皆病關格而不必定在內外尺寸也寸口脈浮而大浮為正氣虛大為邪氣實在尺則陰邪實關閉正氣不能宣名曰關關則不得小便也在寸則陽邪實格拒正氣不能化名曰格格則吐逆也集注張錫駒曰浮大之脈在於尺則為關陰陰氣不能施化故不得小便浮大之脈在於寸則為格陽陽氣不能宣通故吐逆脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治注浮為陽滑為實陽實相搏其脈行於脈外者數且疾矣衛氣行疾營氣行遲營衛不相輔而行故曰失度浮滑數疾有餘之脈見發熱無汗有餘之證脈證相合則為可治若見發熱汗出不足之證脈證不合不治明矣集注成無己曰浮滑數疾之脈發熱汗出解者邪氣退也若不解者正氣脫也必不可治經曰脈陰陽俱盛大汗出不解者死脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也按數為虛之虛字當是熱字風為熱虛為寒二句當是衍文風虛相搏之虛字亦當是熱字注風寒在表則脈浮緊風熱在表則脈浮數表受風邪故灑淅惡寒也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也注諸脈浮數謂寸關尺六脈俱浮數也浮則為風數則為熱風熱遏鬱於表則當發熱而灑淅惡寒也若有隱痛之處飲食如常者非表邪之診乃內癰蓄積有膿之診於此知浮數之脈不可概為風熱集注王肯堂曰人身有焮腫痛楚處未有不自覺者此條所言必是內癰故曰蓄積有膿也如胃脘癰肺癰腸癰皆各有辨而胃癰之脈人迎反盛未有不誤以為傷寒者故宜察之程應旄曰脈證似傷寒若不於若有痛處飲食如常之證參酌而誤以辛溫發散助其陽熱否則誤以寒涼徹熱遏住邪氣滋害深矣張璐曰若有焮腫為熱壅經絡若無腫處必邪留藏府隨內外而發癰膿也脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩注六脈俱浮而大浮為風虛大為氣強強者熱也風熱相搏必成癮疹也身體為癢癢者肌虛熱氣外薄故也名為泄風若久不愈則成痂癩痂癩疥癬癘癩之類是也集注成無己曰痂癩者癘風也眉少發稀身有干瘡而腥臭經云脈風成癘是也朱震亨曰經云諸癢為虛血燥不榮肌腠所以癢也方有執曰經云外在腠理則為泄風寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也按濡浮而無力候陽虛也豈有亡血之理弱沉而無力候陰虛也豈止發熱而已諸濡亡血當是諸濡衛虛諸弱發熱當是諸弱營虛注寸口者指寸關尺三部而言也諸微謂凡病見微脈皆亡陽也諸濡謂凡病見濡脈皆衛虛也諸弱謂凡病見弱脈皆營虛也諸緊謂凡病見緊脈皆為寒也諸乘寒者謂諸微濡弱脈亡陽營衛不足之人一病即見殘賊緊脈則為寒乘病厥也厥於中者鬱冒昏迷不知痛癢厥於經者戰栗口噤不能言語以平日胃虛損穀脾虛不運中虛不勝外邪也集注程知曰諸乘寒者則以陽極虛而陰寒直乘之也故為厥逆其所以昏冒不知人強直而無覺者則以胃無穀氣脾不流通故使口噤不能言外戰內栗而厥也問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裏寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也注此詳申上條諸亡陽營衛不足之人而見緊脈之義也曾為人所難問緊脈為寒實之診虛冷亦見緊脈是從何而來也師曰假令其人亡汗表虛若吐胸虛下利裏虛寒邪乘虛為病或外感寒邪或內飲冷水或中寒陰化皆令脈緊也若與浮同見無汗則為傷寒實邪有汗則為亡陽虛邪與沉同見腹痛不便則為中寒實邪腹痛下利則為中寒虛邪由此推之凡諸實脈從虛化者即未可謂之實矣集注程應旄曰緊則為寒稱曰乘脈今復列之殘賊何義曰虛則為人乘實則乘人凡脈皆然不獨緊也寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也注上條以浮沉見微緊此條以寸尺見微緊皆陰盛陽亡之診故曰知陰常在絶不見陽也只曰虛損多汗者略言之也集注程知曰言寸微尺緊為虛損多汗之證也寸微弱為亡陽尺緊疾為陰勝陰勝於內陽絶於外故為虛損多汗師曰病人脈微弱澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗使陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裏胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也按又陰脈遲澀故知血亡也二句與上文義不屬非有闕文即是衍文注病人脈微而澀詢之為醫大發其汗又數大下之所以致此病也其人亡血略辭也謂亡其血氣也氣亡則陽微陽微則惡寒血亡則陰弱陰弱則發熱陽微陰弱故病當惡寒後乃發熱也輕者邪不留連遇所不勝時則愈重者無休止時即遇所不勝尤甚也然惡寒雖遇夏月盛熱欲著復衣所以然者五月之時陽氣在外胃中虛冷大發其汗令陽氣微故不勝寒也發熱雖遇冬月盛寒欲裸其身所以然者十一月之時陽氣在內胃中煩熱又數下之令陰氣弱故不能勝熱也此即論中所謂熱在骨髓寒在皮膚寒在骨髓熱在皮膚沉痼寒熱之病也集注王肯堂曰非必遇夏乃寒遇冬乃熱也此但立其例論其理耳寸口脈微而緩微者衛氣疏疏則其膚空緩則胃氣實實則穀消而水化也穀入於胃脈道乃行水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩注寸口脈微而緩微者衛氣疏疏則其表空虛也緩者胃氣實實則消化水穀也穀入於胃脈道之氣乃行水入於經脈絡之血乃成今榮愈盛而衛愈疏血愈多而氣愈少氣血失其經常之道故曰三焦絶經氣不能制血血不能歸經故血妄行而崩也集注成無己曰衛氣者溫分肉肥腠理衛氣既疏皮膚不得溫肥則空虛也經曰緩者胃氣有餘有餘為實故云緩者胃氣實內經曰食入於胃淫精於脈是穀入於胃脈道乃行也針經曰飲而液滲於絡合和於血是水入於經其血乃成也經常也三焦者氣之道路衛氣疏則氣不循常度故三焦絶其常度也方有執疏言不能固護實猶言強也穀入於胃至其血乃成乃承上文穀消而水化也陰血大下而曰崩者言其不能止靜如山壞之勢也寸口脈微而澀微者衛氣不行澀者榮氣不逮榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲注凡經脈內外榮衛也藏府內外三焦也故經曰榮行脈中衛行脈外上焦心肺主之中焦脾胃主之下焦肝腎主之分而言之榮也衛也三焦也合而言之皆本乎一氣之流行隨其所在而得名也脈微而澀榮衛不足不足則榮衛不能相將而行三焦無所仰賴故身體周痹不仁榮氣不足故身煩疼口難言語衛氣不足故惡寒數欠也上焦司降降者清中之濁下焦司升升者濁中之清中焦司升降清者令其上升濁者令其下降今榮衛不相將而行三焦無所仰賴故不能各歸其部而失其職矣上焦不歸則濁氣不降噫氣而吞酸中焦不歸則升降相違故不能消穀引食下焦不歸則清氣不升故不能約束而遺溲也寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯稿而寒粟咳逆唾腥吐涎沫也注此詳申榮衛上焦之證也面色黃青榮衛不足之色也惡寒而栗咳嗽唾腥吐痰涎沫肺損之證也肺主皮毛皮毛者榮衛之所居故肺損則皮聚而毛落榮衛枯稿也集注成無己曰榮行脈中為根衛行脈外為葉根葉俱微則陰陽之氣衰也寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也按條末心內飢飢而虛滿不能食句此是論脾胃不關營衛故弱者衛氣微當是陽氣微遲者營中寒當是脾中寒上下文義始屬營為血血寒則發熱豈有血寒發熱之理乎衛為氣氣微者當是陽氣微脾中寒者心內飢閲下條言胃氣有餘自知注此詳申營衛中焦之證也緩以候胃遲以候脾胃主納穀脾主化穀故能食者胃也能化者脾也今陽微中寒脾胃俱病所以心內雖飢飢而虛滿不能食也集注方有執曰飢而虛滿者陽主化穀衛陽衰微不化穀故虛滿而不能食也寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也注此又詳申中焦之證也寸口脈弱而緩弱者陽氣不足緩者胃氣有餘不足則脾失健運有餘則胃強能食此胃強脾弱所以雖能食而不能消化也故使吞酸而噫食卒不化氣填脹悶於膈中也集注方有執曰陽氣以胃中之陽氣言不足則不能化穀胃氣以胃中穀氣言有餘言有宿食也有宿食則鬱而生熱故噫飽而吞酸此蓋以飲食之內傷者言也趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也注此以下辨趺陽之脈少陰之脈也趺陽一名衝陽在腳背上去陷骨三寸脈動處乃是陽明胃經之動脈也少陰一名太溪在足內踝後跟骨上脈動處乃足少陰腎經之動脈也趺陽少陰乃古診法越人以十二經雖皆有動脈獨取寸口以決死生者以寸口乃脈之大要會也然此法不行久矣設有危急之病寸口脈不見診此以決死生可也若在平時總不如以關脈為趺陽尺脈為少陰更為愈也如趺陽胃脈遲而和緩是胃氣不病如經脈也今趺陽脈浮而數按之無力浮以候府浮而無力則為傷胃沉以候藏數而無力則為傷脾詢之病者特為醫下之所為以致營衛之氣內陷其先數脈變微為脾弱也浮脈仍浮反甚為胃強也胃強則邪氣獨留故大便硬潮熱發渴也脾弱則脾氣不運故邪熱不能殺穀雖飢不食氣噫而快也醫者前後施治如法而浮數之脈自當遲緩如經則飢欲食病者愈也若施治失宜數脈終始不退則生惡瘡也集注方有執曰惡瘡與尿膿雖不同其為血熱則皆然也程知曰此言趺陽脈遲緩妄下則有浮數之變也趺陽脈浮而澀少陰脈如經者其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也按若脈浮大者氣實血虛也二句與上文義不屬當是衍文少陰脈弦而浮豈可謂如經乎當改沉而滑字注脾腎皆病下利今趺陽胃脈浮澀少陰腎脈如常是病在脾不在腎也何以知之浮為陽以候胃澀為陰以候脾浮與澀合故知脾氣不足胃氣虛也以少陰脈見沉而滑故稱如經也若沉滑而數者是陽邪傷陰故知當屎膿血也集注程知曰水穀之下利屬於脾胃而膿血之下利屬於腎此可診趺陽太溪而辨之也趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格按水穀不化之化字當是入字若是化字是能食也何名曰格食不得入當是不得小便若有小便是水道通也何名曰關必是傳寫之誤注前論以浮沉尺寸候關格此以趺陽候關格之診法也趺陽者胃脈也脈伏而澀伏則尺寸之陰陽停升降也澀則三焦之元氣不流通也不升降流通故上則吐逆下則不得小便病名曰關格也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也注趺陽之脈以候脾胃脈當和緩今反滑而緊者以滑為胃氣實緊為脾氣強滑緊並見如持實以擊強故主急痛痛還自傷脾胃也以手把刃而成瘡者猶之操刃自割而貽其害也集注方有執曰滑為食故在胃則主穀氣實緊為寒故在脾則主邪氣強持實擊強言胃實脾強兩相搏擊而為病譬如以手把刃而自傷蓋謂非由藏府而傳變也趺陽脈沉而數沉為實數消穀緊者病難治注胃脈沉而數沉主裏數主熱沉數為裏實熱則能消穀凡裏病得此脈者皆易治也若不沉數而沉緊沉緊為裏寒則為殘傷胃氣之診故曰難治也集注方有執曰沉以候裏故在脾胃為土實穀氣實也數為熱陽也緊為寒陰也言趺陽主脾胃脾胃主穀穀氣實若脈見數而陽熱勝陽能化穀雖病不足為害若脈得緊而陰寒勝陰不化穀故為難治程知曰言趺陽沉數為消穀之病也沉為實沉主裏也數消穀數為熱也緊盛為邪勝故為難治也趺陽脈大而緊者當即下利為難治注下利者不論寒熱皆中虛之病故脈宜小宜緩為病脈相宜則易治也今趺陽胃脈大而緊為病虛脈實則不相宜故為難治也集注成無己曰大為虛緊為寒胃中虛寒當即下利下利脈亦微小今反大緊邪盛也故曰難治經曰下利脈大者為未止張璐曰趺陽脈緊為寒邪傷胃故必下利下利脈大為邪盛故難治也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣注脈見浮微而沉緊虛寒之診也趺陽胃脈似有似無為陽虛重按似緊為中寒胃陽虛寒則氣短矣緊脈主痛而不痛者以緊兼微雖緊不徑故不痛也集注程知曰言趺陽微緊則中氣虛寒為短氣之證也趺陽脈不出脾不上下身冷膚硬注趺陽脈伏不出則中焦陽虛脾胃不能上下輸布衛氣不得故病通身膚冷而硬也集注程知曰身冷者衛氣不溫也膚硬者營血不濡也趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶注胃脈浮芤浮者胃脈衰芤者營氣傷衛氣衰故身體瘦也營氣傷故肌肉甲錯也浮芤相搏日久而宗氣衰微生氣少矣四屬斷絶謂皮肉脂髓四者俱竭故一身枯瘦失滋養矣集注程應旄曰衛以營為根營以衛為護而營衛之統於宗氣者又以趺陽胃為根也趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉即氣動膈氣乃下少陰脈不出其陰腫大而虛也按陰腫大而虛之虛字當是痛字細玩可知注外感六脈浮緊寒氣在外故骨節煩痛內傷胃脈浮緊寒氣在內故腹滿絞痛寒氣相搏腸鳴而轉轉則膈中寒氣下趨洞泄也若少陰脈浮不出則下焦陽虛寒氣聚於陰器不得發泄故病疝陰腫大而痛也集注方有執曰趺陽之土敗而少陰所以無制也少陰負趺陽者為順也注此少陰負趺陽大旨蓋少陰腎屬水趺陽胃屬土雜病惡土尅水而傷寒少陰病惟恐土不能制水水一泛溢則嘔吐下利無所不至若趺陽脈和胃土有權則水有制而少陰負則為順矣順者土不為水侮也集注方有執曰萬物資生於土而百骸藉養於胃水土平成物阜人安非天下之至順乎古今謂趺陽有脈者不死有以哉汪琥曰趺陽脈圖經原名衝陽脈在足跗中指端上行五寸去陷谷穴三寸足陽明脈之所過也為原故一名會原診法病重者切之以決死生傷寒以胃氣為本趺陽之脈不衰知胃氣尚在病雖危猶可治也少陰脈弱而澀弱者微煩澀者厥逆注少陰脈弱而澀弱者腎陰虛故微煩也澀者脈道滯故肢冷也集注方有執曰弱為虛損不足脈陰虛生內熱所以煩然屬虛煩故雖煩亦微也澀為少血而不滑不能上與陽相順接所以厥而逆冷也程知曰言腎脈微澀之病也少陰腎動脈也在足內踝後跟骨上陷中也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕注少陰脈不至是腎氣衰微精血少也腎者陰中藏陽者也腎陰虛竭不能藏陽陽氣上奔迫促胸膈宗氣反為所阻聚而不行血結心下陽氣既奔於上極必退下退下則陰股間熱與陰相動所必然也雖令知覺冥身不仁而不死此為尸厥也當刺期門以通結血刺巨闕以行宗氣庶厥回而復蘇也
