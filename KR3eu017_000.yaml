body:
  text: 凡例一傷寒論與金匱要略原是一書自林億校刊遂分為二殊失先賢之意後趙開美仍合為一書今復其舊使後學知傷寒與雜證原非有二也一全書經文諸家舊本或字有增減或節有分合或重出不書衍文或正誤各不相同是集則以仲景全書為準而參之各家以昭畫一一傷寒論金匱要略法律本自井然但系千載遺書錯誤頗多雖經歷代注家編次詮解然各執己見位置無常難以為法茲集傷寒分經仍依方有執條辨而次序先後則更為變通金匱門類悉照林億校本而綱領條目則詳為分別並不拘泥前人惟在啓發後學足裨實用一經中凡錯簡遺誤文義不屬應改補刪移者審辨精核皆詳於本條經文之下其有全節文義不相符合絶難意解者雖勉加注釋終屬牽强然其中不無可採之句故另匯二帙一曰正誤一曰存疑附之卷末以備參考金匱要略仿此一書中辭精義奧注釋誠難若徒尚辭華必支離蔓衍何以闡發微言是注惟期簡易明顯發揮經旨間或旁參互證亦惟援引本經不事虛文用滋眩惑一傷寒論自成無己創注以來踵之者百餘家金匱要略自趙良衍義後繼之者十餘人各有精義羽翼經文然或涉浮泛或近隱晦醇疵並見難以適從茲汰其重復刪其冗沓取其精確實有發明者集注於上用資考證一上古有法無方自仲景始有法有方其規矩變化之妙立法成方之旨各有精義皆當明晰茲於每方必審究其立方主治之理君臣佐使之相輔功能性味之相合一一解於其後即方中用水之甘瀾麻沸火之宜文宜武煎之緩急漬之遲速服之頻頓莫不各有適病之宜前人或置而不論者必備録而詳解之一是集傷寒則首六經次合病並病次差後勞復食復陰陽易次壞病溫病痙濕暍霍亂次可汗不可汗可吐不可吐可下不可下次平脈辨脈法此一書之次第也首綱領次具證次出方次因誤致變次因逆成壞此一篇之次第也首經文次注釋次集注次方藥次方解集解其經文有缺誤者則加辨論於經文之下以按字冒之其與本條互相發明而非專論本條者加辨論於本注之後亦以按字冒之此逐條之次第也俾後學了然心目易於融會貫通金匱要略序法仿此一金匱二十五章內有與傷寒文同者十之一二雖為重出然亦間有義別之處今將傷寒論中已有專注者則不復贅釋其與本經切要者必重加發明以闡揚其旨一古人姓氏有傳記詳明者昭昭可考若僅書其字則無從知其名矣夫以其人竭慮殫精久而泯其跡所不忍也故於無考者書其字可考者書其名以示不沒其善之意
