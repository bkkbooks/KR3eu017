body:
  text: 卷五辨少陽病脈證并治全篇少陽主春其氣半出地外半在地中人身之氣亦如之故主半表半裏也半表者謂在外之太陽也半裏者謂在內之太陰也邪入其間陰陽相移寒熱交作邪正相持進退互拒此際汗吐下三法俱在所禁故立小柴胡湯和解法加減施治然小柴胡加減法中又有口不渴身有微熱者加桂枝以取汗及下後胸脅滿微結小便不利渴而不嘔頭汗出往來寒熱者用柴胡桂枝乾薑湯汗之又有柴胡證具而反下之心下滿而硬痛者此為結胸也大陷胸湯主之及柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之更有本柴胡證醫以丸藥下之微利胸脅滿而嘔日晡潮熱者小柴胡加芒硝湯下之等法是仲景亦有汗下之法惟在臨證詳察因病施治不可執一也少陽之為病口苦咽乾目眩也註少陽者膽經也其脈起於目銳眥從耳後入耳中挾咽出頤頷中邪傷其經故口苦咽乾目眩也口苦者熱蒸膽氣上溢也咽乾者熱耗其津液也目眩者熱熏眼發黑也此揭中風傷寒邪傳少陽之總綱凡篇中稱少陽中風傷寒者即具此證之謂也集註林瀾曰論中言少陽病胸脅痛耳聾往來寒熱心煩喜嘔胸脅痞硬半表半裏之證詳矣此何以曰口苦咽乾目眩也大抵病於經絡者此篇諸條已悉之矣若膽熱府自病則又必有此證也沈明宗曰此雖少陽總證然偏裏矣少陽主膽其脈循脅絡於耳故胸脅痛而耳聾仲景另出手眼以補口苦咽乾目眩之裏證乃括少陽風傷衛寒傷榮風寒兩傷而言也吳人駒曰少陽者一陽也少陽之上相火主之若從火化火盛則干故口苦咽乾也少陽屬木木主肝肝主目故病則目眩也魏荔彤曰膽府與少陽經為表裏而非半表半裏之謂半表者對太陽之全表言半裏者對太陰之全裏言故少陽在半表半裏之間總以經絡之界為言又曰經中所謂不必悉具者指或中餘證而少陽經膽府之主病未有不悉具而遽可指為少陽病成者少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚註少陽即首條口苦咽乾目眩之謂也中風謂此少陽病是從中風之邪傳來也少陽之脈起目銳眥從耳後入耳中其支者會缺盆下胸中循脅表邪傳其經故目赤耳聾胸中滿而煩也然此乃少陽半表半裏之胸滿而煩非太陽證具之邪陷胸滿而煩者比故不可吐下若吐下則虛其中神志虛怯則悸而驚也此揭中風邪傳少陽之大綱也集註程知曰少陽惟宜和解若吐之則虛其陽而悸下之則虛其陰而驚汪琥曰少陽有吐下之禁只因煩滿故誤行吐下之法成註謂吐則傷氣氣虛者悸下則亡血血虛者驚不知驚悸皆主於心誤吐且下則津液衰耗神志虛怯故悸而驚也沈明宗曰胸中煩滿似乎可吐但在少陽其邪已下胸循脅吐之徒傷胸中之氣使邪內並逼迫神明則悸而驚也魏荔彤曰此條論仲景不出方小柴胡條中有心煩心下悸之證想可無事他求也汗吐下三法既不可行則當和解之小柴胡為少陽對證之藥斯用之宜決耳傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸註不曰少陽傷寒而曰傷寒略言之也謂此少陽病是從傷寒之邪傳來也脈弦細少陽之脈也上條不言脈此言脈者補言之也頭痛發熱無汗傷寒之證也又兼見口苦咽乾目眩少陽之證故曰屬少陽也蓋少陽之病已屬半裏故不可發汗若發汗則益傷其津而助其熱必發譫語既發譫語則是轉屬胃矣若其人津液素充胃能自和則或可愈否則津乾熱結胃不能和不但譫語且更煩而悸矣此揭傷寒邪傳少陽之大綱也集註王肯堂曰凡頭痛發熱俱為在表惟此頭痛發熱為少陽者何也以其脈弦細故知邪入少陽之界也喻昌曰少陽傷寒禁發汗少陽中風禁吐下二義互舉其旨益嚴蓋傷寒之頭痛發熱宜於發汗者尚不可汗則傷風之不可汗更不待言矣傷風之胸滿而煩似可吐下者尚不可吐下則傷寒之不可吐下更不待言矣脈弦細者邪欲入裏其在胃之津液已為熱耗重復發汗而驅其津液外出安得不譫語乎汪琥曰誤發其汗譫語者奪其津液而胃干故言亂也此少陽之邪已轉屬胃胃和則愈者言當用藥以下胃中之熱而使之和平也胃不和不但譫語更加煩擾忪悸此言胃熱上犯於心故藏神不自寧也傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之註此承上三條互詳其證以明其治也傷寒中風三四日見口苦咽乾目眩之證與弦細之脈知邪已傳少陽矣若兼見耳聾目赤胸滿而煩者則知是從中風傳來也若兼見頭痛發熱無汗者則知是從傷寒傳來也今五六日更見往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔則知是中風傷寒兼見俱有之證也少陽之邪進可傳太陰之裏退可還太陽之表中處於半表半裏之間其邪外並於表半表不解則作寒內並於裏半裏不和則作熱或表或裏無常故往來寒熱不定也少陽之脈下胸循脅邪湊其經故胸脅苦滿也少陽邪近乎陰故默默也少陽木邪病則妨土故不欲飲食也邪在胸脅火無從泄上逼於心故心煩也邪欲入裏裏氣外拒故嘔嘔則木氣舒故喜之也此皆柴胡應有之證也其餘諸證時或有之總宜以小柴胡湯主之各隨見證以加減治之可耳然既分中風傷寒之傳而不分其治者何也蓋以太陽有營衛之分故風寒之辨宜嚴及傳陽明少陽則無營衛之分且其邪皆化熱故同歸一致也集註成無己曰邪在表裏之間謂之半表半裏傷寒中風者是或傷寒或中風非傷寒再中風中風復傷寒也五六日邪自表傳裏之時邪在表則寒在裏則熱今在半表半裏之間未有定處故往來寒熱也邪在表心腹不滿邪在裏則心腹脹滿今言胸脅苦滿亦是在表裏之間也邪在表呻吟不安邪在裏則內煩經云陽入之陰則靜默默由邪方自表之裏在表裏之間也邪在表則能食邪在裏不能食不欲食者未至於必不能食故亦為在表裏之間也邪在表則不煩不嘔邪在裏則煩滿而嘔煩而喜嘔者邪在表方傳裏也邪初入裏未有定處所傳不一故有或見之證也方有執曰五六日大約言也往來寒熱者邪入軀殼之裏藏府之外兩界之隙地所謂半表半裏乃少陽所主之部位也故入而並於陰則寒出而並於陽則熱出入無常故寒熱間作也太陽一經有營衛之不同所以風寒異治陽明切近太陽營衛之道在邇風寒之辨尚嚴少陽一經越陽明去太陽遠矣風寒無異治經以傷寒中風五六日往來寒熱交互為文者發明風寒至此同歸於一致也小柴胡湯方柴胡半斤黃芩三兩人參三兩半夏洗半升甘草炙三兩生薑切三兩大棗擘十二枚上七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩温服微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩方解邪傳太陽陽明曰汗曰吐曰下邪傳少陽惟宜和解汗吐下三法皆在所禁以其邪在半表半裏而角於軀殼之內界在半表者是客邪為病也在半裏者是主氣受病也邪正在兩界之間各無進退而相持故立和解一法既以柴胡解少陽在經之表寒黃芩解少陽在府之裏熱猶恐在裏之太陰正氣一虛在經之少陽邪氣乘之故以薑棗人參和中而預壯裏氣使裏不受邪而和還表以作解也世俗不審邪之所據果在半表半裏之間與所以應否和解之宜及陰陽疑似之辨總以小柴胡為套劑醫家幸其自處無過病者喜其藥味平和殊不知因循誤人實為不淺故凡治病者當識其未然圖機於早也集解程應旄曰方以小柴胡名者取配乎少陽之義也至於制方之旨及加減法則所云上焦得通津液得下胃氣因和盡之矣方中以柴胡疏木使半表之邪得從外宣黃芩清火使半裏之邪得從內徹半夏豁痰飲降裏氣之逆人參補內虛助生發之氣甘草佐柴芩調和內外薑棗佐參夏通達營衛相須相濟使邪不至內向而外解也至若煩而不嘔者火氣燥實逼胸也故去人參半夏加栝蔞實也渴者燥已耗液逼肺也故去半夏加栝蔞根也腹中痛者木氣散入土中胃陽受困故去黃芩以安土加芍藥以戢木也脅下痞硬者邪既留則木氣實故去大棗之甘而緩加牡蠣之咸而軟也心下悸小便不利者水邪侵乎心故去黃芩之苦寒加茯苓之淡滲也不渴身有微熱者半表之寒尚滯於肌故去人參加桂枝以解之也咳者半表之寒湊入於肺故去參棗加五味子易生薑為乾薑以温之雖肺寒不減黃芩恐乾薑助熱也總之邪在少陽是半表半裏之熱鬱而不升故以小柴胡治之所謂升降浮沉則順之也傷寒中風有柴胡證但見一證便是不必悉具註此承上而言無論傷寒中風邪傳少陽病在半表半裏有柴胡證但見一證便以小柴胡隨證加減治之不必待其悉具也集註方有執曰此承上條辨認少陽一經為病之大旨鄭重光曰有柴胡證但見一證便是不必悉具者言往來寒熱是柴胡證此外兼見胸脅滿硬心煩喜嘔及諸證中凡有一證者即是半表半裏故曰嘔而發熱者小柴胡湯主之因柴胡為樞機之劑風寒不全在表未全入裏者皆可用故證不必悉具而方有加減法也至若柴胡有疑似證不可不審者如脅下滿痛本渴而飲水嘔者柴胡不中與也及但欲嘔胸中痛微溏者亦非柴胡證此等又當細為詳辨者也傷寒三日少陽脈小者欲已也註傷寒該中風而言也其邪三日少陽受之脈若大者為邪盛欲傳今脈小為邪衰欲自已也集註程應旄曰脈小則陽得陰以和是邪盡退而正來復矣張錫駒曰三日乃少陽主氣之期脈小則病退也傷寒四五日身熱惡風頸項强脅下滿手足温而渴者小柴胡湯主之註傷寒四五日邪在三陽之時身熱惡風太陽證也頸項强太陽陽明證也脅下滿手足温而渴陽明少陽證也此為三陽合病之始固當權其孰緩孰急以施其治然其人脅下滿手足温而渴是已露去表入裏歸併少陽之機故獨從少陽以為治也主以小柴胡湯者和解其表裏也此三陽合病不必悉俱柴胡證而當用柴胡之一法也集註方有執曰三陽俱見病而獨從少陽小柴胡以為治者太陽陽明之邪微少陽近裏而裏證見故從少陽一於和而三善備也喻昌曰本當從三陽合併病之例而用表法但手足温而加渴是外邪逼湊於少陽向裏之機已著更用辛甘發散則重增其熱而大耗其津矣故從小柴胡之和法便陽邪罷而陰津不傷一舉而兩得也小柴胡湯當從加減法不嘔而渴者去半夏加栝蔞根為是張志聰曰手足温者手足不冷也非病人自覺其温乃診者按之而得也不然何以既曰身熱而復云手足温耶汪琥曰此條系三陽經齊病而少陽之邪居多也太陽傷寒已至四五日之時不曰發熱惡風只曰身熱者此太陽之邪漸衰也其兼陽明證不曰鼻乾不得臥而只曰頸項强者此陽明之邪亦將衰也惟脅下滿為少陽經之專證況兼手足温而又渴此為邪將傳裏之機已著也陽明病發潮熱大便溏小便自可胸脅滿不去者與小柴胡湯註陽明病發潮熱當大便硬小便數也今大便溏小便如常非陽明入府之潮熱可知矣況有胸脅滿不去之少陽證乎故不從陽明治而從少陽與小柴胡湯主之也集註王肯堂曰陽明為病胃家實也今便溏而言陽明病者謂有陽明外證身熱汗出不惡寒反惡熱也程應旄曰如得陽明病而發潮熱似乎胃實之徵矣但胃實必大便硬而小便數今大便溏小便自可是熱非入府之熱也再以胸脅徵之則主以小柴胡湯無疑矣陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解註陽明病不大便脅下硬滿而嘔是陽明傳少陽病也若舌上黃苔澀者為陽明之熱未盡則當與大柴胡湯兩解之今舌上白苔滑者是已傳少陽故可與小柴胡湯和解之俾上焦得通則嘔可止津液得下則便可通胃氣因和而硬滿除則身心濈然汗出而解矣集註程知曰此言陽明兼少陽宜用小柴胡也不但大便溏為胃未實即使不大便而嘔亦為邪未入裏硬滿在脅而不在腹舌苔白而不黃皆少陽之見證多故當從小柴胡分解陰陽則上下通和濈然汗出而表裏之邪為之一撤矣程應旄曰脅下硬滿不大便而嘔是大柴胡湯證也其用小柴胡湯者以舌上白苔猶帶表寒故也若苔不滑而澀則所謂舌上乾燥而煩欲飲水數升謂裏熱已耗及津液此湯不可主矣又曰上焦得通照脅下硬滿言津液得下照舌苔與嘔言胃氣因和照不大便言上條陽明病從潮熱上見此條陽明病從不大便上見凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振却發熱汗出而解註凡柴胡湯病證不與柴胡湯而反下之不變他病柴胡證仍在者可復與柴胡湯則解但以誤下其證必虛故解必蒸蒸而熱振振而寒邪正交爭然後汗出而解也集註方有執曰蒸蒸而振作戰汗也必如此而後解者以下後裏虛故也程知曰邪氣還表故蒸蒸而熱下後正虛故振振而動得病六七日脈遲浮弱惡風寒手足温醫二三下之不能食而脅下滿痛面目及身黃頸項强小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食穀者噦按食穀者噦四字衍文食穀嘔者有之從無噦者註得病六七日少陽入太陰之時也脈遲太陰脈也浮弱太陽脈也惡風寒太陽證也手足温太陰證也醫不以柴胡桂枝湯解而和之反二三下之表裏兩失矣今不能食脅下滿痛雖似少陽之證而實非少陽也面目及身發黃太陰之證已具也頸項强則陽明之邪未已也小便難者數下奪津之候也此皆由醫之誤下以致表裏雜揉陰陽同病若更以有少陽脅下滿痛之一證不必悉具而又誤與柴胡湯則後必下重是使邪更進於太陰也雖有渴證乃係數下奪津之渴其飲水即嘔亦非少陽本證之嘔緣誤下所致故柴胡湯不中與也集註程知曰前言柴胡證但見一證便是此更言脅下滿痛亦有不宜柴胡者以為戒也程應旄曰以一渴證辨之前條之手足温而渴者熱在裏未經數下自能消水今本渴而飲水則嘔知其渴為膈燥津亡之渴數下中虛不能消水究於胃陽無涉然則柴胡湯之於少陽豈可云但見一證便是乎又豈可云下之而柴胡證不罷者復與柴胡湯乎傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之註傷寒六七日發熱微惡寒支節煩疼微嘔心下支結者是太陽之邪傳少陽也故取桂枝之半以散太陽未盡之邪取柴胡之半以散少陽嘔結之實病而不名桂枝柴胡湯者以太陽外證雖未去而病機已見於少陽裏也故以柴胡冠桂枝之上意在解少陽為主而散太陽為兼也支者側也小也支結者即心下側之小結也集註方有執曰支節四肢骨節也支結言支飲摶聚而結也發熱至微嘔太陽之表也故曰外證未去程知曰此邪入少陽而太陽證未去者也發熱惡寒支節煩疼太陽證也乃惡寒而微但支節煩痛而不頭項强痛則太陽證亦稍減矣嘔而支結少陽證也乃嘔逆而微但結於心下之偏旁而不結於兩脅之間則少陽亦尚淺也若此者惟當以柴胡湯和解少陽而加以桂枝湯發散太陽此不易之法也柴胡桂枝湯方柴胡四兩桂枝一兩半人參一兩半甘草炙一兩半夏洗二合半黃芩一兩半芍藥一兩半大棗擘六枚生薑切一兩半上九味以水七升煮取三升去滓温服一升集解柯琴曰仲景書中最重柴桂二方以桂枝解太陽肌表又可以調諸經之肌表小柴胡解少陽半表亦可以和三陽之半表故於六經病外獨有桂枝證柴胡證之稱見二方之任重不拘於經也如陽浮陰弱條是仲景自為桂枝證之註釋血弱氣盡條是仲景自為柴胡證之註釋桂枝有壞病柴胡亦有壞病桂枝有疑似證柴胡亦有疑似證如病似桂枝證腳攣急與胸中痞硬者及病似柴胡證本渴而飲水嘔與但欲嘔胸中痛者是已此條言傷寒六七日寒熱當退之時反見發熱惡寒諸表證更見心下支結諸裏證表裏不解法當表裏雙解之矣然惡寒微則發熱亦微可知支節煩疼則一身骨節不疼可知微嘔心下亦微結故謂之支結是表證雖不去而已輕裏證雖已見而未甚故取桂枝之半以散太陽未盡之邪取柴胡之半以解少陽微結之證口不渴身有微熱者法當去人參以六七日邪雖未解而正已虛故仍用之外證雖在而病機已見於裏故方以柴胡冠桂枝之上為雙解兩陽之輕劑也傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之註傷寒五六日已發其汗表未解而復下之若邪陷入陽明之裏則必作結胸痞硬協熱下利等證今邪陷入少陽之裏故令胸脅滿微結也小便不利渴而不嘔者非停水之故乃汗下損其津液也論中有身無汗獨頭汗出發熱不惡寒心煩者乃陽明表熱鬱而不得外越之頭汗也今但頭汗出往來寒熱心煩者無陽明證知為少陽表熱鬱而不和上蒸之頭汗也此為少陽表裏未解之證故主柴胡桂枝乾薑湯以專解半表之邪兼散半裏之結也集註林瀾曰五六日已經汗下之後則邪當解今胸脅滿微結寒熱心煩者是邪猶在半表半裏之間也小便不利而渴乃汗下後亡津液內燥也若有熱飲其人必嘔今渴而不嘔知非飲熱也傷寒汗出則和今但頭汗出余處無汗者津液不足而未和也與柴胡桂枝乾薑湯以解表裏而復津液也汪琥曰傷寒頭汗出者乃陽鬱於表非陽虛於上也柴胡桂枝乾薑湯方柴胡半斤桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩甘草炙二兩上七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服初服微煩復服汗出便愈方解少陽表裏未解故以柴胡桂枝合劑而主之即小柴胡湯之變法也去人參者因其正氣不虛減半夏者以其不嘔恐助燥也加栝蔞根以其能止渴兼生津液也倍柴胡加桂枝以主少陽之表加牡蠣以軟少陽之結乾薑佐桂枝以散往來之寒黃芩佐柴胡以除往來之熱且可制乾薑不益心煩也諸藥寒温不一必需甘草以和之初服微煩藥力未及復服汗出即愈者可知此證非汗出不解也服柴胡湯已渴者屬陽明以法治之註風寒之邪從陽明而傳少陽起初不渴今服柴胡湯已反渴者是少陽轉屬陽明也以法治之謂當分其經府見證而治之也葛根白虎調胃間各從其宜而用之可耳集註方有執曰已畢也服柴胡湯已畢而渴則非暫渴其為熱已入胃亡津液而渴可知故曰屬陽明也沈明宗曰服柴胡湯已渴者乃少陽之邪不傳三陰而轉入陽明矣即當隨陽明現證而治故謂以法治之鄭重光曰少陽陽明之病機在嘔渴中分渴則轉屬陽明嘔則仍在少陽如嘔多雖有陽明證不可攻之因病未離少陽也服柴胡湯渴當止若服柴胡湯已加渴者是熱入胃府耗津消水此屬陽明胃病也傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解按脈細當是脈沉細觀本條下文脈沉亦在裏也之亦字自知脈雖沉緊之緊字當是細字本條上文並無緊字如何說脈雖沉緊雖字何所謂耶必是傳寫之誤註傷寒五六日雖表有頭汗出微惡寒之陽邪未罷裏有心下滿口不欲食大便硬之陽結已形但手足冷脈沉細則陽邪所結殊微也故曰此為陽微結必有表復有裏也然脈沉細似乎裏陰盛而頭汗出則為表陽鬱也假令純陰結則不得復有頭汗出之外證始合悉入在裏之純陰結矣夫既非悉入在裏之純陰結此必為半在裏半在表之陽微結也故脈雖沉細不得為少陰病所以然者三陰不得有汗今頭汗出故知非少陰也可與小柴胡湯者和其不通身汗出微惡寒也設不了了者必大便之硬未除自宜利其大便使得屎而解也集註喻昌曰陽微結者陽邪微結未盡散也舊註作陽氣衰微故邪氣結聚大差果爾則頭汗出為亡陽之證非半表半裏之證矣果爾則陰結又是陰氣衰微矣玩本文假令純陰結及陽邪若不微結是純陰邪內結則不得復有外證等語其義甚明程知曰此言少陽病有似少陰者當細辨其脈證也程應旄曰凡脈細脈沉皆陰脈也今與陽證同見則為陽熱鬱結之診無關少陰也可見陽氣一經鬱結不但陽證似陰並陽脈亦似陰矣沈明宗曰得屎而解當用大柴胡之法也吳人駒曰此證嘗見有誤作陰寒而施温熱以致大逆者蓋因其惡寒手足冷脈細而沉不究其證之始末由來也周揚俊曰此條惡寒肢冷不欲食脈細或沉有似乎陰最難辨晰仲景特出陽微結三字昭示千古以頭汗出為陽陰不得有汗也至五六日頭痛發熱證原屬陽也故縱見少陰之脈不得為少陰之病然獨未見少陽一證何遽得為少陽病耶此仲景所以又明言半在表半在裏也爾時裏證既多不得純以表藥汗之外證似陰不得復以裏藥温之故取小柴胡提出其邪於表裏之半而大便硬不了了者則當下之得屎無疑也仲景恐人未明自為詳辨然後知手足冷微惡寒者正因陽邪鬱結不外通於肢體故獨頭汗出也傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之註傷寒脈得浮澀營衛不足也脈得沉弦木入土中也營衛不足則表虛木入土中則裏急惟表虛裏急腹中急痛所以先用小建中湯以其能補營衛兼緩中急則痛可差也或不差必邪尚滯於表知澀為營衛不通弦為少陽本脈故與小柴胡湯按法施治也成無己去黃芩加芍藥疏外調中其說亦是集註汪琥曰弦脈不除痛猶未止者為不差此為少陽經有留邪也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之註傷寒未解欲嘔吐者胸中有熱邪上逆也腹中痛者胃中有寒邪內攻也此熱邪在胸寒邪在胃陰陽之氣不和失其升降之常故用黃連湯寒温互用甘苦並施以調理陰陽而和解之也然此屬外因上下寒熱之邪故有如是之證若內因雜病嘔吐而腹痛者多因宿食由此推之外因內因證同而情異概可知矣集註程知曰陰邪在腹則陽不得入而和陰為腹痛陽邪在上則陰不得入而和陽為欲嘔逆汪琥曰尚論篇皆以風寒二邪分陰陽寒熱殊不知風之初來未必非寒寒之既入亦能化熱不可拘也鄭重光曰此熱邪中於上焦寒邪中於下焦陰陽不相入失其上下升降之常也黃連湯方黃連三兩甘草炙三兩乾薑三兩人參二兩桂枝三兩半夏洗半升大棗擘十二枚上七味以水一斗煮取六升去滓温服晝三夜二方解傷寒邪氣入裏因人藏氣素有之寒熱而化病如陽明病硬滿不大便而嘔舌上白苔者以小柴胡湯及太陽病下之裏虛懊憹舌上如苔者以梔子豉湯之類是隨胸中有寒丹田有熱化者也此則隨胃中有寒胸中有熱而化腹中痛欲嘔吐故以是方主之君黃連以清胃中之熱臣乾薑以温胃中之寒半夏降逆佐黃連嘔吐可止人參補中佐乾薑腹痛可除桂枝所以安外大棗所以培中也然此湯寒温不一甘苦並投故必加甘草協和諸藥此為陰陽相格寒熱並施之治法也太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯註太陽病十日以上無他證脈浮細而嗜臥者外邪已解不須藥也設有胸滿脅痛等證則知少陽之外邪未解故與小柴胡湯和之若脈但浮不細而有頭痛發熱惡寒無汗等證則仍是太陽之外邪未解當與麻黃湯汗之按論中脈浮細太陽少陽脈也脈弦細少陽脈也脈沉細少陰脈也脈浮細身熱嗜臥者陽也脈沉細身無熱嗜臥者陰也脈緩細身和嗜臥者已解也是皆不可不察也集註王肯堂曰此條當是太陽少陽合病胸滿雖同而脈浮細嗜臥則為表邪已解脅痛為少陽有邪故與小柴胡湯若脈但浮者又當先治太陽也故與麻黃湯此是設為變通之言非為服柴胡而脈浮也傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之按下利之下字當是不字若是下字豈有上吐下利而以大柴胡湯下之之理乎註傷寒發熱汗出不解表尚未已也心中痞硬大便不利裏病又急矣嘔吐少陽陽明兼有之證也少陽陽明兩急心中熱結成痞故以大柴胡湯外解少陽發熱未盡之表內攻陽明成實痞硬之裏也按太陽病發熱汗出不解心下痞硬下利不嘔吐者此表裏俱虛桂枝人參湯證也若嘔吐不利者此表裏俱實大柴胡湯證也彼則脈微弱此則脈必有力也太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈註太陽病傳過三陽之經十餘日醫不隨經施治反二三下之未致變逆後四五日惟見少陽寒熱往來之柴胡證仍在者宜先與小柴胡湯解表和裏如或不愈其嘔不止心下滿急鬱鬱微煩此為少陽表裏均未解也與大柴胡湯下之攻裏和表自可愈也集註方有執曰過經與壞病同不知何逆而二三下之適所以致逆故曰反也下而又下陽明雖未傷而少陽亦未除故曰柴胡證仍在也嘔不止鬱鬱微煩乃邪擾二陽故曰未解也程知曰此言過經誤下有用大小柴胡兩解法也蓋其人之邪因屢下而深入若表證未罷必先用小柴胡和其半表而後可兼攻其裏也程應旄曰此條與陽明經嘔多雖有陽明證不可下之條細細酌量陽明證嘔在上而邪亦在膈之上未入府故不可下此條嘔不止心下急乃邪在膈之下已屬胃乃可下也可下不可下此等處最不容誤也林瀾曰嘔不止則半表裏證猶在然心下急鬱鬱微煩必中有燥屎也非下除之不可故以大柴胡兼而行之大柴胡湯方柴胡半斤黃芩三兩半夏洗半升芍藥三兩枳實炙四枚大黃二兩生薑切五兩大棗擘十二枚上八味以水一斗二升煮取六升去滓再煎温服一升日三服按許叔微曰大柴胡湯一方無大黃一方有大黃此方用大黃者以大黃有蕩滌蘊熱之功為傷寒中要藥王叔和云若不用大黃恐不名大柴胡湯且經文明言下之則愈若無大黃將何以下心下之急乎應從叔和為是方解柴胡證在又復有裏故立少陽兩解之法以小柴胡湯加枳實芍藥者解其外以和其內也去參草者以裏不虛也少加大黃所以瀉結熱也倍生薑者因嘔不止也太陽病過經十餘日心中温温欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也按王肯堂曰温温當是嗢嗢又云以嘔之下當有闕文註太陽病過經十餘日曾經吐下不解者以極吐則虛其胸邪熱乘虛入胸故心下嗢嗢欲吐而胸中痛也極下則虛其裏邪熱乘虛入裏故大便反溏腹微滿鬱鬱微煩也詢知先時若果經極吐下則為在表之邪熱悉陷胸腹而所見者皆是裏證未和故宜與調胃承氣湯下而和之若不爾者謂不因極吐極下而有斯證則又不可與是湯也夫但欲嘔者少陽也胸中痛者太陽也微溏者太陽少陽合病之利也並無心中嗢嗢鬱鬱腹滿煩熱等證固不可與承氣湯矣然此亦非柴胡證故柴胡湯亦不可與也須從太陽少陽合病下利若嘔者與黃芩加半夏生薑湯可也集註方有執曰胸中痛邪在膈也若曾極吐則應有心下嗢嗢欲吐之狀何也以胃口已被吐傷邪熱上摶於膈故欲吐而不得吐也腹微滿鬱鬱微煩邪在胃也若曾極下則應大便微溏何也以下則胃虛邪雖實於胃大便反不能結硬也故曰先此時自極吐下者與調胃承氣湯言當蕩其熱以和其胃也不爾言未經極吐下也但欲嘔至末申明上文之意喻昌曰太陽病過經十餘日心下嗢嗢欲吐而不吐其人胸中痛大便反溏腹微滿鬱鬱微煩者此有二辨若曾經大吐大下者表邪從吐解且已入裏可用調胃承氣之法若未經極吐下但欲嘔不嘔胸中痛微溏者是痛非吐所傷溏非下所致調胃之法不可用矣程知曰過經者謂病過七八日至十三日經氣已周猶不解也豈惟十三日且有二十餘日者矣蓋過經不解病必皆在陽經留連若在陰經則又豈能若是之持久耶久持且不能安望其生乎程應旄曰大便溏則氣得下泄腹不應滿煩不應鬱鬱今仍腹微滿鬱鬱微煩必胃有阻留而下後仍不快暢也病屬陽明證反無陽明而只有少陽其中必有所誤故直窮其所以致證之由而後可從證上認病傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之註凡傷寒過經不解熱邪轉屬胃府者多皆當下之今傷寒十三日不解過經胸脅滿而嘔日晡所發潮熱已而微利此本大柴胡證也下之而不通利今反利者詢知為醫以丸藥迅下之非其治也迅下則水雖去而燥者仍存恐醫以下後之利為虛故復指曰潮熱者實也是可再下者也但胸脅之邪未已故先宜小柴胡湯以解少陽之外復以小柴胡湯加芒硝以下少陽之裏不用大黃而加芒硝者因裏不急且經迅下惟欲其軟堅潤燥耳是又下中兼和之意也集註內臺方議曰潮熱者實也何不用大柴胡大小承氣下之却用芒硝何也蓋潮熱雖屬實然已先用丸藥傷動藏府若再用大黃下之則脾氣傷而成壞證矣只用芒硝潤燥以取利也方有執曰十三日過經也不解壞證也非其治也以上乃原其壞由於醫之誤以下至末救誤之治也柴胡加芒硝湯方於小柴胡湯方內加芒硝六兩餘依前法服不解更服傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之註此承上條互發其義以詳其治也傷寒十三日不解過經譫語者以有熱也當以湯藥下其熱但上條潮熱之熱熱在表裏當大便不硬此條譫語之熱熱歸胃府法當大便硬若小便利者大便當硬今大便不硬而反下利脈調和者知為醫以丸藥下之之利非其治也如未經丸藥下之自下利者則為內虛內虛之利脈當微弱而厥今反和而不微厥此為內實有熱非內虛有寒也雖下利乃熱利也仍當下其熱故以調胃承氣湯主之傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也註傷寒之邪一日太陽受之二日陽明受之三日少陽受之四日太陰受之五日少陰受之六日厥陰受之此傳經之次第也今傷寒三日三陽表邪為盡三陰當受邪其人當不能食而嘔今反能食而不嘔者此為裏和三陰不受邪也然此乃內經以其大概而言究不可以日數拘也集註成無己曰表邪傳裏裏不和則不能食而嘔今反能食而不嘔是邪不傳陰但在陽也方有執曰陽以表言陰以裏言能食不嘔裏氣和而胃氣回陰不受邪可知矣汪琥曰邪在少陽原嘔不能食今反能食而不嘔可徵裏氣之和而少陽之邪自解也裏既和而少陽之邪解則其不傳三陰斷斷可必故云三陰不受邪也傷寒六七日無大熱其人躁煩者此為陽去入陰故也註傷寒六七日邪欲入裏之時也無大熱表熱微也躁煩者裏熱盛也此為陽去入陰也陽去入陰者謂陽邪去表入裏傳於三陰也集註成無己曰內熱為煩謂心中鬱煩也外熱為躁謂身外熱躁也內熱為有根之火故但煩不躁及先煩後躁者皆可治外熱為無根之火故但躁不煩及先躁後煩者皆不可治方有執曰去往也言表邪去而入於裏所以外無他熱而內則煩躁也婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之註婦人中風發熱惡寒表病也若經水不來熱必無由傳於血室今經水適來得之七八日脈遲熱除身涼似乎表欲解矣若復見胸脅下滿如結胸狀譫語之證則知非表解入裏乃表邪之熱因經水適來乘虛而入於血室也法當刺期門期門為肝之穴肝為藏血之所今邪入血室故刺期門隨其血分之實熱而瀉之也集註方有執曰血室為營血停留之所經血集會之處即衝脈所謂血海是也其脈起於氣衝並少陰之經夾臍上行至胸中而散故熱入而病作其證則如是也期門二穴在不容兩傍各去同身寸之一寸五分肝之募也肝納血故刺期門所以瀉血分之實熱也汪琥曰邪傳少陽熱入血室故作譫語等證仲景恐人誤認為陽明府實證輕用三承氣以伐胃氣故特出一刺期門法以療之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之註婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室血與熱摶其血必結然雖結而無胸脅滿如結胸譫語等證是為結而未實也尚有如瘧狀之寒熱發作有時乃為邪在少陽半表半裏也故用小柴胡湯以和表裏熱自解也集註方有執曰前經水適來者因熱入血室血出而熱遂遺也此適斷者熱乘血來而遂入之與後血相摶俱留而不出故曰其血必結也程知曰前證經水來而胸脅滿結譫語是邪實於藏也故用刺以瀉之此證因血結而寒熱如瘧是邪發於經也故用小柴胡湯和之婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈註上二條發明風邪熱入血室之證此條發明寒邪熱入血室之證婦人傷寒發熱無汗經水適來則必熱入血室故晝則明了知邪不在陽也暮則譫語如見鬼狀者是為邪在陰也無犯胃氣及上二焦者通謂三焦也蓋禁人汗吐下三法皆不可輕用當俟其經行必熱隨血去而愈也集註方有執曰必自愈者言俟其經行血下則邪熱得以隨血而俱出猶之鼻衄紅汗故自愈也蓋警人勿妄攻以致變亂之意林瀾曰傷寒發熱者寒已成熱也經水適來則血室空虛邪熱乘虛入於血室若晝日譫語為邪客於府與陽爭也此晝日明了暮則譫語如見鬼狀者是邪不入府而入於血室與陰爭也陽盛譫語宜下此不可下者犯胃氣也彼熱入血結寒熱者與小柴胡湯散邪發汗此雖熱入血室而不留結不可與發汗藥犯其上焦也若熱入胸脅滿如結胸者可刺期門此雖熱入血室而無滿結不可刺期門以犯其中焦也必自愈者以經行則熱隨血去血下則邪熱悉除而愈矣血弱氣盡腠理開邪氣因入與正氣相摶結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也一云藏府相連其病必下脅膈中痛小柴胡湯主之註此詳申上三條婦人中風傷寒經水適來過多以致血弱氣盡腠理不密邪熱之氣乘虛入於血室邪與正相摶結於少陽之界故邪結於脅下也邪正相爭爭於陽則熱爭於陰則寒故往來寒熱也爭已必衰衰則止故休作有時也少陽病已入半裏將近厥陰故默默不欲飲食也少陽膽與厥陰肝相為表裏故曰藏府相連也少陽之脈下胸中循脅表厥陰之脈抵少腹循脅裏故其痛必及於脅下也少陽之邪從胸而下脅因胸而病及於脅故曰邪高痛下也邪從胸循脅入裏裏氣上拒故使嘔也仲景重出此條仍主之以小柴胡湯者使知法不外少陽不必另從厥陰血室中求治也集註喻昌曰四條皆互文見意也一云經水適來一云經水適斷一云七八日熱除而脈遲身涼一云七八日續得寒熱發作有時一云胸脅下滿一云邪氣因入與正氣相摶結於脅下一云如結胸狀一云邪高痛下一云譫語一云晝日明了暮則譫語如見鬼狀一云如瘧狀一云往來寒熱休作有時一云刺期門一云用小柴胡湯一云毋犯胃氣及上二焦皆互文以明大意而自為註腳也學者試因此而細繹全書思過半矣如結胸狀四字仲景尚恐形容不盡重以藏府相連邪高痛下之語暢發病情蓋血室者衝脈也下居腹內厥陰肝之所主也而少陽之膽與肝相連府邪在上藏邪在下胃口逼處二邪之界所以默默不欲飲食而但喜嘔耳期門者肝之募也隨其實而瀉之瀉肝之實也又刺期門之註腳也小柴胡湯治少陽正法也毋犯胃氣及上二焦則舍期門小柴胡湯更無他法矣嘔而發熱者小柴胡湯主之衍文已見太陽中篇半夏瀉心湯條上少陽病欲解時從寅至辰上註寅卯辰木旺之時也經云陽中之少陽通於春氣故少陽之病每乘氣旺之時而解經氣之復理固然也集註魏荔彤曰病在少陽乘其正旺如法治之何病不已
