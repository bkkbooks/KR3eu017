body:
  text: 卷十五辨可汗病脈證篇夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也注夫以疾病至急倉卒尋求治法難得其要者汗吐下也故重集汗吐下諸可與不可與之法比之三陰三陽篇中則易見也又時有不止是三陰三陽篇中者亦出在諸可與不可與中也大法春夏宜發汗注春夏陽氣舒暢故宜發汗醫治常道此大法也集注程應旄曰春夏宜發汗者發汗有助宣陽氣之功等於春夏發生長育之義今人多以麻桂二湯作春夏之禁藥其輕於畔經者由其未明天道也凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水淋漓若病不解當重發汗汗多者必亡陽陽虛不得重發汗也注凡發汗令手足俱周時出是欲汗緩出周遍則邪氣悉丟正氣不傷也以漐漐然不得令如水淋漓為度不欲汗急出過多也若急出過多則邪氣不盡正氣反傷矣倘若病不解當重發汗但前汗已多更汗必亡其陽陽虛即病不解故不敢再發其汗也集注成無己曰汗緩緩出則表裏之邪悉去汗大出則邪氣不除但亡陽也陽虛為無津液故不可重發汗方有執曰此叮嚀發汗之節度也張錫駒曰汗乃津液汗多則亡津液何以又謂亡陽也經云上焦開發腠理熏膚充身澤毛若霧露之溉蓋汗雖津液必借陽氣之熏蒸宣發而後出故汗多亡津液而陽亦隨之俱亡也凡服湯發汗中病即止不必盡劑也注服湯發汗汗出病解便可止再服不必定然盡劑集注程應旄曰中病即止亦麻黃桂枝互舉之詞示撙節於中字所以嚴不中之禁也凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗注凡云可發汗無湯者一時倉卒無湯以丸散代之亦可要不過以汗出為解耳然丸散乃定劑不如湯可隨證而進其驗甚準故曰良也集注程應旄曰丸散僅可從權隨證則不如湯夫病脈浮大問病者言但便硬耳設利者為大逆硬為實汗出而解何以故脈浮當以汗解注脈浮大屬表未解雖有便硬裏實亦不可利下何以故因脈浮也當先解其外表解熱除內外和諧而大便自通矣設用利藥是為大逆也集注成無己曰結胸雖急脈浮大尤不可下下之即死況此便硬乎論中有云本發汗而復下之此為逆若先發汗治不為逆此之謂也辨不可汗病脈證篇脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠注浮而無力濡脈也沉而無力弱脈也浮中沉俱無力似有似無微脈也滯而不流利澀脈也巔謂浮也上謂寸也下謂尺也脈濡而弱弱反在關濡反在巔微反在上澀反在下謂關脈浮濡沉弱寸脈微尺脈澀陽虛則寸脈微血少則尺脈澀此陽虛血少不可汗之脈也陽虛當汗出惡寒血少當心煩發熱此陽虛血少不可汗之證也若誤認為太陽中風而發其汗必致陰陽相失而兩亡則反煩躁不眠厥而且寒矣脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒粟不能自還注此謂關脈浮濡沉弱寸脈弦尺脈微也弦為少陽熱邪之診微為少陰寒邪之診故曰上實下虛也然微弦同見虛實未審惟察其人意欲得溫則非惡寒在表而是畏寒在裏也故不可發汗若誤發其汗則陰愈盛而生寒栗陽愈衰而不能自還矣諸脈得數動微弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相像根本異源注凡諸病得數動脈者有餘診也可發汗若按之微弱者是外假實而內真虛也不可發汗若誤發其汗傷其津液則腹中乾大便難胃燥而煩其形似胃實熱結之陽明究其根本實由發虛家汗致成津枯虛燥之陽明也故曰其形相像根本異源也集注程知曰動數為熱微弱為虛發汗動津液則便難腹干胃燥而煩此與陽明裏熱之證雖曰其形相似而根本則有虛實之不同也張志聰曰數動陽脈也微弱陰脈也諸脈得動數微弱者猶言左右三部或得動數之脈而按之微弱者皆不可發汗發汗則津液內竭故大便難水氣外泄故腹中乾火熱上蒸故胃燥而煩其形相像者汗後而燥證相同也根本異源者動數之脈屬乎陽微弱之脈屬乎陰有陰有陽有虛有實也厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前注可發汗之脈必陰陽俱緊今厥而脈緊乃少陰之緊非太陽之緊也若發其汗則傷少陰之氣聲亂咽嘶舌萎聲不得前之證作矣集注成無己曰厥而脈緊則少陰傷寒也法當溫裏而反發汗則損少陰之氣其脈不能入肺中循喉嚨挾舌本故聲亂咽嘶舌萎聲微言語不得高也魏荔彤曰此段就厥證論脈知陽虛禁汗因明諸逆發汗之貽誤也厥也凡厥有冷厥熱厥蛔厥寒熱相勝之厥但見緊脈無論何厥病皆在陰若發汗反攻其陽則氣散血竭夫舌根於腎聲出於肺聲亂咽嘶肺氣欲絶也舌萎即萎不為用也聲不得前本氣不振也皆由於發汗散亡其腎肺二藏真氣也動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦痛目暈惡寒食則反吐穀不得前注動氣者築築然氣跳動也臍之上下左右四藏之位也四藏之氣不安其位故動也緣素為客邪所據本藏之氣已失其守尚賴中州胃氣為主即有表邪不可發汗恐胃中之氣液兩傷本藏失養則所不勝之邪因而同病也動氣在右肺氣不治心不恆德若誤汗之則心氣愈熱血脈沸騰故衄而渴苦煩也肺失治節不能通調水道故飲即吐水也動氣在左肝氣不治肺不恆德若誤汗之則肝虛失升故頭眩也若汗出不止津液失養筋肉故惕瞤也動氣在上心氣不治腎不恆德若誤汗之則心氣虛故腎氣上衝正在心端也動氣在下腎氣不治脾不恆德若誤汗之腎水虛竭故骨痛惡寒無汗心煩目暈也脾土過燥不守常化故食則反吐穀不得近也集注程知曰此言動氣不可發汗也蓋正氣內虛藏氣不治故氣築築然動動氣為裏虛故不可發汗程應旄曰藏氣不安其位故動因素有邪據本藏之氣反在依附之間最易離經所恃奠定之者全賴胃氣為之主發汗虛其胃氣則四藏失所養反被邪攻各見離經之象病雖左右上下之不同要其失於建中之義則一也咽中閉塞不可發汗發汗則吐血氣微絶手足厥冷欲得蜷臥不能自溫注少陰之脈循喉嚨系舌本咽中閉塞少陰之氣不能上通也若强發少陰汗陽微不能作汗必動其血故吐血氣微絶蜷臥厥冷不能自溫也集注程知曰咽中閉塞不可發汗蓋陰邪盛也强發其汗必動其血至於吐血氣欲絶則並腎中之微陽不能自存故遂手足厥冷欲得蜷臥不能自溫夫下厥上竭蜷臥厥冷在少陰皆危證也程應旄曰汗劑為陽施於陰經則逆咽中閉塞由少陰液少腎氣不能上通也發少陰汗則下厥上竭故見證如此咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿腹中復堅注咳者則劇咳之甚也數吐涎沫肺傷液耗矣故咽乾小便不利心中飢煩也晬時周時也謂周時一發其形似瘧有寒無熱中虛而生寒栗也若誤以為形寒之咳而發其汗則肺氣既虛而衛陽又亡陽氣兩傷不能溫及中下陰氣凝於內外自蜷而苦滿腹中復堅矣集注程知曰此承上言濡弱弦微之脈其有咳者則病劇而不可汗也咳則數吐涎沫其咽中必干小便必不利膈中陽虛必心中飢而煩衛氣一日夜五十度周於身陽虛不能自衛故晬時寒栗如瘧但有寒無熱此而發汗則陽氣愈虛陰寒益盛必蜷而苦滿腹中轉堅也咳而小便利若失小便者不可發汗汗出則四肢厥而逆注咳多飲病小便應不利若小便利知無飲也今咳而遺失小便是不但無飲且系下焦陽虛膀胱不固之咳也故不可發汗汗出則陽氣愈衰四肢逆冷矣集注程知曰內經謂腎咳不已膀胱受之膀胱咳狀咳而遺尿故咳而小便利若失小便者是腎中陽虛也發汗則陽氣益亡故厥冷諸逆發汗病微者難差劇者言亂目眩者死命將難全注不當汗而汗當汗而過汗皆致逆故曰諸逆也發汗致逆之病病微者難差病劇者則死劇者謂陽脫見鬼則言亂陰脫目盲則目眩也集注程應旄曰諸逆屬少陰居多陰寒極矣發汗是重奪其陽雖有微劇不同皆關於死明乎陽為人命之根也傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心懊憹如飢發汗則致痙身强難以屈伸熏之則發黃不得小便灸則發咳唾注頭痛翕翕發熱汗出則嘔形相中風者當以桂枝湯解肌若下之重則變結胸痞硬輕則為心中益煩懊憹如飢不以桂枝湯解肌而以麻黃湯發汗表虛風入則致痙故身强難以屈伸也或以火熏蒸劫汗則不得小便熱從濕化而發黃也灸則火邪傷肺故發咳唾不已也集注成無己曰若反下之邪熱乘虛流於胸中為虛煩心中懊憹如飢若發汗則虛表熱歸經絡熱甚生風故身强直而成痙若熏之則火熱相合消爍津液故小便不利而發黃肺惡火灸則火熱傷肺必發嗽而咳唾也高士宗曰汗下火熏施治各異損正則一故舉下之熏之與發汗而並論之也魏荔彤曰此申明雖有表證宜汗亦當詳察知禁也似中風頭痛翕翕發熱桂枝證也嘔則仍是水飲內蓄矣誤下益煩懊憹如飢則未下時已煩可知此特更甚耳若再誤汗表虛風入故身强難以屈伸火熏逼汗熱入於裏故小便不得蓋小便利者不成黃證發黃則小便為濕邪所阻熱邪所耗可知灸則熱上衝故咳唾膿血也辨可吐病脈證篇大法春宜吐注汗吐下治病之大法謂春宜於吐者是象天之春氣上升以立法也然凡病有當吐者則吐之又不可一概而論也集注程應旄曰吐法從升有發陳之義故曰春宜吐凡用吐湯中病便止不必盡劑也注凡用吐湯原以去上焦之邪中病即止若病去而過用之反傷中氣所以不必盡劑也集注程應旄曰吐以去上焦之邪上焦為清陽之分吐之過劑則邪去而所傷者膻中之陽陽固不可不寶惜也病胸上諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈惟滑此可吐之吐之利則止注胸上諸實謂或痰或熱或寒之類也諸實為病故胸中鬱鬱而痛不能食也欲使人按之不但痛不能減而反有涎唾知邪在胸中盛滿得按而上溢也經曰下利脈遲而滑者內實也今下利日十餘行其脈反遲寸口惟滑知寒實在上水不下輸膀胱而走大腸也故但吐之利自止也集注張璐曰痛不得食按之反有涎唾者知有寒痰在胸中也下利脈遲寸口惟滑者為膈上實故吐之則利自止也病手足逆冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之注病人手足厥冷脈乍結者以寒邪結氣結在胸中陽氣不能四達也心下滿而煩者實結則滿陽鬱則煩也欲食不能食者是客氣病在胸中故當吐之也集注成無己曰此與瓜蒂散證同彼云脈乍緊此云脈乍結惟此有異緊為內實乍緊則邪在胸中實而未深也結為結實乍結則邪在胸中結而未深也雖所治俱同但輕之重之不無別也程知曰脈來緩時一止復來曰結結者痰氣結滯之名此與瓜蒂散證同但彼云脈乍緊則為寒邪盛此云脈乍結則為痰氣實也張錫駒曰病人手足厥冷者氣機內結不能外達於四肢也心下滿而煩者邪實則滿正傷則煩也魏荔彤曰脈乍結非脈之本然乃有形之邪阻礙其胸中宗氣故榮衛之氣不能暢行非同於氣血虛微不能流布之結也宿食在上脘者當吐之注胃有三脘宿食在上脘者痛在胸膈痛則欲吐可吐不可下也在中脘者痛在心口痛欲吐或不吐可吐可下也在下脘者痛在臍上痛不欲吐不可吐可下也故曰宿食在上脘者當吐之此詳凡在上者皆可吐也集注成無己曰宿食在中下脘則宜下宿食在上脘則當吐內經曰其高者因而越之其下者引而竭之方有執曰上脘謂胃府之口也張志聰曰胃為水穀之海有上脘中脘下脘之分上主納中主化今食在上脘不得腐化故為宿食當吐之程應旄曰宗氣聚於胸中升降呼吸出焉清陽之分豈容濁物留滯吐以宣之使無障礙也若屬表邪傳入無形而有形則痞滿結胸另有治法均非宜矣辨不可吐病脈證篇具見六經中辨可下病脈證篇大法秋宜下注天至秋則氣降物至秋則成實實則宜下凡邪在下者俱宜取法乎此義也凡可下者用湯勝丸散中病便止不必盡劑也注湯者蕩也丸者緩也下藥貴速故凡服下藥用湯所以勝丸也中病即止不必盡劑者恐盡劑反傷其正氣也集注程應旄曰用湯勝丸貴活法也中病即止示節制也下利三部脈皆平按之心下硬者急下之宜大承氣湯注下利心下硬者諸瀉心湯證也若寸關尺三部脈平實有力雖下利仍宜攻其硬也集注方有執曰三部脈皆平血氣和可知矣心下硬實也所以急下之也張錫駒曰本經云若自下利者脈當微厥今反和者此為內實也宜下之下利脈遲而滑者內實也利未欲止當下之宜大承氣湯注脈遲不能兼滑惟浮取之遲沉取之滑則有之矣今下利脈遲而滑謂浮遲而沉滑也浮遲則外和沉滑則內實欲止內實之下利仍當下之使積去則利自止宜大承氣湯集注程應旄曰遲而滑滑在下而遲在上知為物阻之遲非寒陰之遲故但下其所阻則內實去而利自止矣問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯按尺中微字當是大字若是微字斷無當下之理注寸口脈浮而大按之反澀謂按之且大且澀且有力也關上尺中亦然大澀有力為實而不利之診故知有宿食也當下之宜大承氣湯集注程知曰滑為有食結滯經宿則脈澀矣尺以候內沉以候裏故宿食之脈按之反澀尺中亦大而澀也下利不欲食者以有宿食故也當下之宜大承氣湯注初下利不欲食者是傷食惡食故不欲食也若久下利不欲食者是傷脾食後飽脹不欲食也今初下利即不欲食故知有宿食也當下之宜大承氣湯無疑也集注程應旄曰傷食惡食故不欲食與不能食者自別下利有此更無別樣虛證知非三陰之下利而為宿食之下利也故當下之下利差至其年月日時復發者以病不盡故也當下之宜大承氣湯注下利差後至其年月日時而復發其利者此宿食積病攻之不盡故也若其人形氣不衰飲食尚强當攻其未盡自不復發矣宜大承氣湯集注方有執曰其期也謂周其一年之月日期也程應旄曰下利差後而餘邪之棲於腸胃回折處者未盡是為伏邪凡得其候而伏者仍應其候而伸下則搜而盡之矣下利脈反滑當有所去下乃愈宜大承氣湯注此承上條互發其義以詳其脈也下利脈反滑是證虛脈實不相宜也若其人形氣如常飲食如故乃有當去之積未去也下之乃愈宜大承氣湯集注程應旄曰滑為實故可行通因通用之法病腹中滿痛者此為實也當下之宜大承氣湯注腹中不滿而痛者病或屬虛若滿而痛則為實矣當下之宜大承氣湯集注張璐曰腹中既滿且痛為實結無疑急須下之程應旄曰病腹中滿痛雖在陰經亦可下不必其為陽明矣傷寒後脈沉沉者內實也下之解宜大柴胡湯注傷寒後不解脈沉沉而有力者內實也宜以下解然其人必午後小有潮熱故取大柴胡兩解之也脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜大承氣湯注雙弦謂左關右關皆見脈弦也左關脈弦肝本脈也右關脈弦木刑土也弦者飲也遲者寒也心下硬者是肝邪挾寒飲而傷胃故不可下乃生薑瀉心湯證也若脈大按之緊是陽有餘而陰亦實也乃有餘之硬非胃傷者比故可下之宜大承氣湯也辨不可下病脈證篇脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微則不可下下之則心下痞硬注此即前不可發汗之條所謂關脈浮濡沉弱寸脈微尺脈澀陽虛血少之診也汗既不可下亦不可均為陽虛故也若誤下之則寒虛內竭心下痞硬必成太陰誤下下利之痞硬矣集注程應旄曰誤汗亡陽分之陽誤下亡陰分之陽無陽則陰獨而地氣得以上居故心下痞硬脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也注此亦前不可發汗之條所謂關脈浮濡沉弱寸脈弦尺脈微上實下虛之診也微弦為虛既不可汗亦不可下下虛故也集注成無己曰虛家下之是為重虛脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為無血浮為虛數生熱浮為虛自汗出而惡寒數為痛振而寒栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋漓少腹甚硬小便則尿血也注此謂關脈浮濡沉弱寸脈浮尺脈數也關濡弱為中氣虛乏寸浮無力為陽虛尺數無力為血虛陽虛故汗自出而惡寒血虛故身痛振寒而栗中氣虛乏故胸膈氣急喘汗而不得呼吸呼吸之中痛引於脅也振寒相搏形如瘧狀裏邪不實表邪未解醫反下之虛陽未罷之表盡陷於裏故令脈虛數無倫發熱狂走見鬼心下為痞少腹甚硬小便淋漓尿血也集注張璐曰寸口浮濡而關弱尺數者以其人陽氣本虛虛陽陷於陰分也若誤下傷血必致狂走痞滿尿血也魏荔彤曰前虛寒之忌下易知此虛而兼熱之忌下難知故兩條相映互言以示禁也脈濡而緊濡則衛氣微緊則營中寒陽微衛中風發熱而惡寒營緊衛氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裏俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱因時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還注脈濡而緊謂浮濡而沉緊也濡則衛表微緊則營裏寒外有發熱汗出惡寒之表內有微嘔心煩之裏醫為有熱解肌發汗表陽愈虛而生煩躁裏寒更急心下痞硬表虛裏冷故卒起頭眩悵怏不眠若徒以客熱在膚不知中寒在裏而以冷水灌身雖客熱因而時罷但栗栗振寒不容不重被而覆之汗出必眩惕振厥逆下利清穀煩躁不安而死以中外之陽兩亡不能復還也集注張錫駒曰汗出而冒巔者汗出則陽氣外亡頭昏冒而目不明故曰冒巔小便為微難陽亡而氣不施化也清穀不容間不利清穀無間隙之時也嘔變者嘔出之味變也腸出者下利而廣腸脫出也脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射營竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汚泥而死注脈浮而大謂脈浮取有力按之大而無力乃革脈象也浮為氣實外急大為血虛中空血虛甚則亡陰陰亡則陽無偶也故曰孤陽獨下陰部謂衛陽下就其陰小便當赤而難以胞中虛竭也若陽不下就其陰則小便反利而大汗出是衛陽表虛邪陽內入無陰以化故反更實致津液四射營竭血盡肉消胃干煩不得眠也醫不知此乃以中空暴液之陽明誤為胃實復以峻藥攻之則為虛虛胃陽之去可期必下汚穢如泥而死也集注程知曰此言氣實血虛之脈小便利而大汗出者不可下也程應旄曰無陰而孤陽獨下陰部倘得小便赤而難則胞中不虛僅為陽摶陽未離則陰得滯而未散今反小便利而大汗出則衛氣更微矣其反更實者非衛陽之實而客陽之實也衛陽猶或抱陰客陽則專於攻陰故津液四射而為小便利為大汗出熱甚逼陰所以營竭血盡干煩而不得眠血薄肉消而成暴液暴液云者點滴皆火氣煎熬而出也毒藥攻胃則土敗而四藏無生下如汚泥而死矣傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清穀熱多便膿血若熏之則身發黃若尉之則咽燥若小便利者可救之若小便難者為危殆注傷寒脈陰陽俱緊惡寒發熱太陽表證也則脈欲厥謂浮緊之脈初大漸小知為欲厥之脈也初來大陽為之也故發熱漸漸小陰為之也故發厥更大更熱更小更厥是其候也如此者當以寒熱別其厥惡寒甚翕翕汗出咽中痛是少陰寒厥也發熱多目赤脈多睛不了了是陽明熱厥也寒甚熱多之厥而誤發之則咽痛似傷而誤下之則兩目多閉凡厥者必下利寒厥之利下利清穀也熱厥之利下利膿血也此又以利辨厥之寒熱也若以熏蒸取汗則發身黃濕熱合也若以火尉取汗則咽燥火甚傷津也若小便利者則陰未亡故可救之小便難者則陰已亡為危殆也集注程知曰言外傷於寒為濕熱之病不可汗下熏尉也張璐曰脈來厥者知厥逆之寒熱交勝也初來大者為邪氣鼓動漸漸小為正氣受傷更來漸漸大為邪氣復進也蓋因其人正氣本虛不能主持隨邪氣進退故其脈亦隨邪氣進退忽大忽小也小便利者津液未竭小便難者津液已絶為危殆也傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則目閉貪水者若下之其脈必厥其聲嚶咽喉塞若發汗則戰栗陰陽俱虛惡水者若下之則裏冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩躁脈數實不大便六七日後必便血若發汗則小便自利也注傷寒發熱口中勃勃氣盛而出頭痛目黃將欲作衄衄不可制以陽邪盛故衄之甚也貪水者水與熱搏故嘔也惡水者裏陰寒盛故厥也傷寒發熱口中出氣盛者若下之熱邪入淺咽中生瘡入深下重膿血頭痛目黃者若下之則兩目閉液傷乾澀也貪水者若下之熱去水停故肢厥聲嚶咽喉塞也若發汗過多亡陽故戰栗表裏俱虛也惡水者若下之裏寒更甚故不嗜食下利完穀也若發汗動其虛陽故口中瘡舌上白苔煩躁也若脈數有力不大便而惡水熱在於陰故六七日後必便血也若更發其汗陰陽俱虛故小便自利也集注程知曰傷寒發熱熱在表也口中勃勃氣出熱在裏也頭痛目黃衄不可制所感之寒與所鬱之熱共蒸於上也此當以貪水惡水辨之貪水者陰虛而熱勝水入而熱與之拒故嘔也惡水者陽虛而寒勝水入而陽氣不任故厥也蓋熱氣挾寒邪上蒸法當辨寒熱多寡而用清解設不知而妄下之是强抑之而邪不服必至咽瘡若手足溫而不厥者其熱為勝必以下而致便膿血也頭痛目黃者下之則熱內陷而目閉若貪水者陰虛為寒下所抑其脈必厥其聲必如嚶兒餲塞不揚也此而更發其汗則亡陽戰栗陽亦與陰俱虛矣若惡水者陽虛加之寒下則有裏冷不嗜食大便完穀出之變也此而更發其汗則虛陽外發必口爛舌白苔而煩躁也脈數實不大便者至六七日後當便血此當下之若更發其汗則非惟大便不行並小便亦為之不利矣微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲囓粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前注陽盛為痰陽虛為飲咳而脈微為陽虛之咳故咳則吐涎飲也若脈實下之可也今脈微下之寒虛更甚故咳雖止而利因不休也胸中如蟲囓是胃寒蟲動故粥入則出也下利上吐中寒也小便不利停飲也兩脅拘急喘息為難頸背相引臂則不仁此皆中外寒飲之證比之少陰停飲此無身痛彼無項背相引臂則不仁也若極寒而甚則反汗出身冷如冰目睛不慧語言不休而死也以如是之證而穀氣多入此為除中口雖欲言舌短難伸亦死也集注張璐曰誤下之下利不止胃中空虛而反暴食為除中少陰虛寒而反冷汗為外脫及口雖欲言舌萎不能前等死證皆起誤下之害如是脈數者久數不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得脈數者不可下下之必煩利不止注脈數者謂久數不止有熱之人也若脈數動時一止熱仍不退是邪氣結正氣不能復正氣結於藏邪氣浮於外故也脈雖數促不可下也若誤下之則邪熱乘虛入裏必煩利不止也脈浮大應發汗醫反下之此為大逆注脈浮大此為表實之脈應發其汗若醫誤以大為裏實而反下之此為大逆也集注程應旄曰脈大與脈浮而大差別盛實純在表也雖有裏證仍宜從表發汗下之則為大逆動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也注動氣在右肺失治矣下之則肺先虛津液內竭故咽燥鼻乾頭眩心悸也動氣在左肝失治矣下之則肝氣益急故食不下腹內拘急動氣更劇表實未減裏虛益甚故雖有身熱臥則欲蜷也動氣在上心失治矣下之則陰液益傷心火更甚故掌心握熱煩熱汗出欲得水澆即有身上浮冷亦火盛格陰使然也動氣在下腎失治矣下之則寒虛內甚而腹脹滿故卒起頭眩心下痞滿食則下利清穀也集注程應旄曰動氣誤下是為犯藏左右上下隨其經氣而致逆故禁同汗例咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行注咽中閉塞燥乾腫痛者少陰陽邪也宜下之今不燥乾不腫痛者少陰陰邪也不可下下之則陽愈衰陰愈盛故曰上輕下重也水漿不入臥欲蜷身急痛下利日數十行中外陽虛也集注張璐曰言初病咽乾閉塞以其人少陰之真陽素虧故汗下俱禁若下之則少陰虛寒諸證蜂起矣程應旄曰腎邪上逆故有咽中閉塞之證下之陽氣益虛陰氣益甚故有上輕下重等證諸外實者不可下下之則發微熱亡脈厥者當臍握熱注諸外實者裏必虛即有不大便無所苦之裏亦不可下若下之外發之熱雖微內虛之寒則盛若無脈而厥當臍握熱始暖亦寒之甚也集注方有執曰諸外實指一切之邪在表而言也發微熱邪入裏也無脈陽內陷也程知曰下之則表邪內陷外不熱而內發微熱也其亡脈而厥者則寒氣內深惟當臍一握熱耳太陽病有外證未解不可下下之為逆注此重出以申叮嚀告戒之意集注程應旄曰未解較不解稍異勢雖欲下仍須俟之病欲吐者不可下嘔多雖有陽明證不可攻之注欲吐者邪在膈上可吐之證也嘔多者邪在少陽可和之證也雖具裏證戒人不可先攻下也夫病陽多者熱下之則硬注陽病裏熱多者宜乎下表熱多者宜乎汗若表裏熱多當兩解也若單下之表不解則裏虛表熱內陷因作硬也集注張璐曰陽熱證多即有陽明證見亦屬經證不可下也不當下而誤下之則陽邪乘虛內陷不作結胸則為痞硬也程應旄曰陽病謂表裏熱俱多下之則胃中水竭其硬也非轉屬陽明之硬也無陽陰强大便硬者下之必清穀腹滿注亡陽陰盛燥而無熱雖大便硬者此乃不大便無所苦之硬也下之則中寒猶盛故必利清穀腹滿矣集注成無己曰無陽者亡津液也陰多者寒多也大便硬則為陰結下之虛胃陰寒內甚故清穀腹滿方有執曰陰以寒言强猶言多也清穀陰不能化也腹滿陰寒凝滯而內脹也傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背强加溫針則衄注傷寒發熱頭痛背强微汗出若不惡寒非溫病即邪傳陽明也若誤發汗不成風溫外熱如灼必成陽明熱甚神昏不識人也以火熏溫針劫之火氣入裏壅塞於胸則喘於腹則滿也火傷衛分津液則不得小便火傷營分血脈則必作衄也若下之則中氣傷故氣短津液傷故小便難也集注程應旄曰此證近於溫有熱無寒汗下溫針均在所禁也下利脈大者虛也以强下之故也設脈浮革因爾腸鳴者屬當歸四逆湯注下利脈大裏虛也以其不當下而强下之故也設脈浮革者謂脈浮大按之空虛表急裏虛因爾腸鳴屬當歸四逆湯和其表而溫其裏也集注成無己曰浮為虛革為寒寒虛相搏則腸鳴與當歸四逆湯
