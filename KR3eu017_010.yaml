body:
  text: 卷十辨差後勞復食復陰陽易病脈證并治篇傷寒新愈起居作勞因而復病謂之勞復強食穀食因而復病謂之食復男女交接復而自病謂之房勞復男女交接相易為病謂之陰陽易謂男傳不病之女女傳不病之男有如交易也蓋因其人新差餘邪伏於藏府未經悉解故犯之輒復也學者於臨證時審其脈證而詳辨之則施治自無誤矣大病差後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子五六枚注大病差後謂傷寒病新差後也勞復者謂起居作勞復病非房勞復也宜枳實梔子豉湯主之溫覆令微似汗自愈不取其涌者以熱不在胸而在經也若因過食復病者謂之食復以有宿食也宜枳實梔子豉湯加大黃下之集注成無己曰勞復則熱氣浮越與枳實梔子豉湯以解之食復則胃有宿積加大黃以下之王肯堂曰傷寒之邪自外入勞復之邪自內發枳實梔子豉湯方枳實炙三枚梔子擘十四枚豉綿裹一升上三味以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗方解是方也用清漿水七升空煮至四升者是欲水之熟而趨下不欲上涌作吐也下豉煮五六沸即去滓者取其清腐之氣走表易於取汗也太陽用之以作吐勞復用之以作汗仲景用方之妙藥品雖同煎法各異故施用不同也於此可類推矣集解方有執曰大邪初退血氣新虛起居作勞復生餘熱乃用苦寒以發其微汗者以勞傷之復熱與初病之實熱不同倫也方中用清漿水七升空煮至四升全是欲水之熟而趨下不至上涌作吐與太陽中篇下後身熱取吐之法不同所以覆令微似汗也傷寒差已後更發熱小柴胡湯主之脈浮者以汗解之脈沉實者以下解之注此承上條詳言證脈以別其治也傷寒差已後更復發熱者雖有勞復食復之別然須分或宜和或宜汗或宜下之不同如脈浮有表當以汗解者用枳實梔子豉湯汗之脈沉有裏者當以下解者用枳實梔子豉加大黃湯下之若無表裏證當和解之者用小柴胡湯和之對證施治斯為合法集注方有執曰此示病後不謹調理致復之大法脈浮有所重感者也脈沉飲食失節也魏荔彤曰大病後不宜大汗喻注謂用枳實梔豉湯以微汗是也大病後不宜大下喻注謂枳實梔豉湯加大黃以微下是也然亦有不能盡該者凡於汗下之中留心其為大病之後庶治復病而不礙於大病後也大病差後從腰以下有水氣者牡蠣澤瀉散主之注傷寒病差後從腰以下腫者是有水氣也宜牡蠣澤瀉散峻逐水氣恐緩則水盛必上犯陽部也集注成無己曰大病差後脾胃氣虛不能制約腎水水溢下焦故腰以下為腫也金匱要略云腰以下腫當利小便與牡蠣澤瀉散利小便而散水可也牡蠣澤瀉散方牡蠣熬澤瀉栝蔞根蜀漆暖水洗去腥商陸根熬海藻洗去咸苦葶藶熬各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕日三服小便利止後服方解水停於內外泛作腫腰以上者當汗之小青龍越婢是也腰以下者當利小便此方是也以牡蠣破水之堅澤瀉利水之蓄海藻散水之泛栝蔞根消水之腫又以蜀漆苦葶藶商陸根辛苦有毒之品直搗其巢峻逐水氣使從大小二便而出然此方施之於形氣實者其腫可隨愈也若病後土虛不能制水腎虛不能行水則又當別論慎不可服也大病差後喜唾久不了了胸上有寒當以丸藥溫之宜理中丸注大病差後喜唾久不了了者胃中虛寒不能運化津液聚而成唾故唾日久無已時也宜理中丸以溫補其胃自可已也集注程知曰病後陽氣不足胃中虛寒不內津液故喜唾不了了前牡蠣澤瀉用散者欲其戀肺而下水也此理中用丸者欲其溫胃而收唾也喻昌曰身中津液因胃寒凝結而成濁唾久而不清其人必消瘦索澤故不用湯藥蕩滌而用丸藥緩圖也張璐曰傷寒差後體虛每有遺熱故禁溫補即間有素稟虛寒者只宜理中丸調理未嘗輕用桂附也傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之注傷寒解後虛羸寒傷形也少氣熱傷氣也氣逆欲吐餘邪挾飲犯胃也故宜竹葉石膏湯益虛清熱以降逆氣也集注方有執曰病後虛羸少氣脾胃未強飲食難化則痰飲易生飲停氣逆故欲吐也程知曰傷寒解後津液不足則虛羸餘熱不盡則傷氣與竹葉石膏湯以調胃而去虛熱蓋前條是治病後虛寒此條是治病後虛熱也竹葉石膏湯方竹葉二把石膏一斤半夏洗半升人參二兩甘草炙二兩粳米半升麥冬去心一升上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服方解是方也即白虎湯去知母加人參麥冬半夏竹葉也以大寒之劑易為清補之方此仲景白虎變方也經曰形不足者溫之以氣精不足者補之以味故用人參粳米補形氣也佐竹葉石膏清胃熱也加麥冬生津半夏降逆更逐痰飲甘草補中且以調和諸藥也病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈注病人脈已解謂病脈悉解也惟日西微煩者以病新差強食穀早胃氣尚弱不能消穀故令微煩不須藥也損穀自愈集注方有執曰強與穀謂強其進食也損者言當節減之也喻昌曰注家牽引日暮為陽明之旺時故以損穀為當小下不知此論差後之證非論六經轉陽明之證也日暮即內經日西而陽氣已衰之意所以不能消穀也不可引前條宿食輕用大黃重傷脾胃也王鶴田曰此言差後強食而為虛中之實證也病後起居坐臥俱宜聽其自然不可勉強強則非其所欲反逆其性而不安矣不特一食也傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之注傷寒新愈之後男女不謹偶犯餘事發熱復病者謂之房勞復男以六味地黃湯主之女以四物湯主之隨證加減治之可也若犯餘事男病傳女女病傳男相易為病謂之陰陽易其證身重少氣少腹急痛牽引陰中膝脛拘急或熱氣衝胸頭重不欲舉眼中生花等證皆餘毒乘虛傳易也當以燒褌散主之集注王肯堂曰房勞復病謂新差之後或尚未愈而男婦相交接復病者若同陰陽易證則從陰陽易治亦有寒熱多汗頭重目眩腹中拘急百節解離經脈緩弱筋骨痿軟不能動移精髓空虛心神恍惚遷延歲月方死者宜當歸四逆湯厥者加附子寒者加吳茱萸生薑以治之按差後男女交合而病者若無陰陽易證而有表證則不可從陰陽易治當從房事後犯風寒治汗吐下法皆不可輕用即有應汗應吐之證汗則以補中益氣湯加麻桂微汗之厥者加炮附子吐則以補中益氣湯加淡豆豉探吐之適可即止總當識此為新病之後也方有執曰傷寒包中風而言也易猶交易變易之易言大病新差血氣未復強合陰陽則二氣交感互相換易而為病也身體重少氣真元虧竭而困倦也少腹裏急或引陰中拘攣者所易之氣內攻也熱上衝胸頭不欲舉眼中生花者虛陽生熱而上蒸也膝脛拘急者脈亂而筋傷也褌襠近陰處陰陽二氣之氣聚也男女易用物各歸本也喻昌曰病傷寒之人熱毒藏於氣血中者漸從表裏解散惟熱毒藏於骨髓之中者無曲發泄故差後與不病之體交接男病傳不病之女女病傳不病之男所以名為陰陽易即交易之義也燒褌散方婦人中褌近隱處取燒作灰上一味水服方寸匕日三服小便即利陰頭微腫此為愈矣婦人病取男子褌燒服方解男女褌襠濁敗之物也燒灰用者取其通散亦同氣相求之義耳服後或汗出或小便利則愈陰頭微腫者是所易之毒從陰竅而出故腫也
