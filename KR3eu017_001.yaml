body:
  text: 卷一傷寒論後漢張機所著發明內經奧旨者也並不引古經一語皆出心裁理無不該法無不備蓋古經皆有法無方自此始有法有方啓萬世之法程誠醫門之聖書但世遠殘闕多編次傳寫之誤今博集諸家注釋採其精粹正其錯訛刪其駁雜補其闕漏發其餘蘊於以行之天下則大法微言益昭諸萬世矣辨太陽病脈證并治上篇太陽主表為一身之外藩總六經而統榮衛凡外因百病之襲人必先於表表氣壯則衛固榮守邪由何人經曰雖有大風苛毒勿之能害是也若表氣虛則榮衛之氣不能御外故邪得而乘之經曰虛邪不能獨傷人必因身形之虛而後客之也衛陽也榮陰也風陽邪也寒陰邪也邪之害人各從其類故中風則衛受之傷寒則榮受之衛分受邪則有汗為虛邪桂枝證也榮分受邪則無汗為實邪麻黃證也榮衛俱受邪均無汗皆為實邪大青龍證也大綱三法用之得當其邪立解用違其法變病百出緣風為百病之長故以風中衛列為上篇寒傷榮與風寒兩傷列為中下二篇其條目俱詳於本篇之下俾讀者開卷了然有所遵循也太陽之為病脈浮頭項强痛而惡寒注太陽膀胱經也太陽之為病謂太陽膀胱經之所為病也太陽主表表統榮衛風邪中衛寒邪傷榮均表病也脈浮表病脈也頭項强痛惡寒表病證也太陽經脈上額交巔入絡腦還出別下項連風府故邪客其經必令頭項强痛也惡寒者因風寒所傷故惡之也首揭此條為太陽病之提綱凡上中下三篇內稱太陽病者皆指此脈證而言也按榮衛二者皆胃中後天之穀氣所生其氣之清者為榮濁者為衛衛即氣中之剽悍者也營即血中之精粹者也以其定位之體而言則曰氣血以其流行之用而言則曰營衛營行脈中故屬於陰也衛行脈外故屬於陽也然營衛之所以流行者皆本乎腎中先天之一氣故又皆以氣言曰營氣衛氣也集注滑壽曰脈在肉上行主表也方有執曰表即皮膚榮衛麗焉故脈見尺寸俱浮知病在太陽表也項頸後也惡寒者該風而言也風寒初襲而鬱於表不能再勝風寒之外忤故畏惡之程應旄曰太陽經之見證莫確於頭痛惡寒故首揭之吳人駒曰頭為三陽之通位項為太陽之專位有所障礙不得如常之柔和是為强痛太陽病發熱汗出惡風脈緩者名為中風注太陽病即首條脈浮頭項强痛而惡寒之謂也衛為表陽風屬陽邪風邪中人則衛受之從其類也風中於衛即發熱者以風衛皆陽其性本熱故變熱甚捷不似傷寒待其閉鬱而始熱也衛病不能固表又為陽邪所蒸故腠理疏而汗出也汗出表虛為風所忤故惡風也風性柔軟故脈緩也此承上條言太陽病又兼見此脈證者名曰中風以為中風病之提綱後凡稱中風者皆指此脈證而言也集注方有執曰脈緩即下文陽浮而陰弱之謂言既有如首條所揭之太陽病加之發熱汗出惡風而脈緩者則其病乃是觸犯於風所致故名中風汪琥曰中風非東垣所云中府中藏中血脈之謂蓋中字與傷字同義仲景論中不直言傷風者恐後學不察以咳嗽鼻塞聲重之傷風混同立論故以中字別之也脈緩當作浮緩看浮是太陽病脈緩是中風脈中篇緊脈亦當仿此太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之注太陽中風即上二條合而言之又詳舉其證以出其治也後凡稱太陽中風者皆指此脈此證也陰陽指榮衛而言非指尺寸浮沉也陽浮即越人曰三菽之浮肺之浮也肺主皮毛取之而得者即衛分之浮也六菽之浮心之浮也心主血脈取之而得者即營分之浮也營分之浮較之衛分之浮則無力而弱故曰陽浮而陰弱也衛為風客則衛邪强而發熱矣故曰陽浮者熱自發營受邪蒸則營不固而汗出矣故曰陰弱者汗自出營衛不和則肌表疏緩故有嗇嗇之惡寒淅淅之惡風翕翕之發熱也然在皮膚之表非若傷寒之壯熱無汗惡寒雖近烈火而不減惡風雖處密室而仍畏也皮毛內合於肺皮毛不固風邪侵肺則氣壅而鼻鳴矣胸中者陽氣之本衛陽為風邪所干不能敷布則氣上逆而為乾嘔矣故宜桂枝湯解肌固表調和營衛也集注程應旄曰嗇嗇惡寒者肌被寒侵怯而斂也淅淅惡風者肌因風灑疏難御也翕翕發熱者肌得熱蒸合欲揚也嗇嗇淅淅翕翕字俱從皮毛上形容較之傷寒之見證自有浮沉淺深之別桂枝湯方桂枝三兩芍藥三兩甘草炙二兩生薑切三兩大棗擘十二枚上五味㕮咀三味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服當小促其間半日許令三服盡若病重者一日一夜周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉麵五辛酒酪臭惡等物按桂枝湯方桂枝下有去皮二字夫桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功宜刪此二字後仿此方解名曰桂枝湯者君以桂枝也桂枝辛溫辛能發散溫通衛陽芍藥酸寒酸能收斂寒走陰營桂枝君芍藥是於發汗中寓斂汗之旨芍藥臣桂枝是於和營中有調衛之功生薑之辛佐桂枝以解表大棗之甘佐芍藥以和中甘草甘平有安內攘外之能用以調和中氣即以調和表裏且以調和諸藥以桂芍之相須薑棗之相得藉甘草之調和陽表陰裏氣衛血營並行而不悖是剛柔相濟以相和也而精義在服後須臾啜稀粥以助藥力蓋穀氣內充不但易為釀汗更使已入之邪不能少留將來之邪不得復入也又妙在溫覆令一時許漐漐微似有汗是授人以微汗之法也不可令如水流漓病必不除是禁人以不可過汗之意也此方為仲景群方之冠乃解肌發汗調和營衛之第一方也凡中風傷寒脈浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻葛青龍發汗諸劑咸用之也若汗不出麻黃證也脈浮緊麻黃脈也固不可與桂枝湯然初起無汗已用麻黃發汗汗解後復煩脈浮數者與下後脈仍浮氣上衝者及下後下利止而身痛不休者經中皆用此以解外誠以此時表雖未解腠理已疏邪不在皮毛而在肌肉且經汗下津液已傷故脈證雖同麻黃而主治當屬桂枝也粗工妄謂桂枝湯專治中風不治傷寒使人疑而不用又謂專走肌表不治他病不知此湯倍芍藥生薑加人參名桂枝新加湯用以治榮表虛寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裏虛心悸腹中急痛再加黃耆名黃耆建中湯用以治虛損虛熱自汗盜汗因知仲景之方可通治百病也適寒溫服啜熱稀粥以助藥力欲使穀氣內充易為釀汗也溫覆令一時許微似有汗不令如水流漓謂不可過汗也蓋取汗在不緩不急不多不少緩則邪必留連急則邪反不盡汗多則亡其陽汗少則病必不除若一服汗出病差謂病輕者初服一升病即解也停後服不必盡劑謂不可再服第二升恐其過也若不汗更服依前法謂初服不汗出未解再服一升依前法也又不汗後服謂病仍不解後服第三升也小促其間半日許令三服盡謂服此第三升當小促其服亦不可太緩以半日三時許為度令三服盡始適中其服之宜也若病重者初服一劑三升盡病不解再服一劑病猶不解乃更服三劑以一日一夜周十二時為度務期汗出病解而後已後凡有曰依服桂枝湯法者即此之謂也太陽病發熱汗出者此為榮弱衛强故使汗出欲救邪風者宜桂枝湯注此釋上條陽浮陰弱之義也經曰邪氣盛則實精氣奪則虛衛為風入則發熱邪氣因之而實故為衛强是衛中之邪氣强也營受邪蒸則汗出精氣因之而虛故為營弱是營中之陰氣弱也所以使發熱汗出也欲救邪風者宜桂枝湯集注方有執曰上言陽浮而陰弱此言營弱衛强衛强即陽浮營弱即陰弱彼此互言而互相發明者也救者解救救護之謂不曰風邪而曰邪風者以本體言也病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯注此釋上條榮衛不和之證而又就其時發熱汗出者以明其治也藏裏也無他病謂裏無他病也有時發熱有時不熱有時汗出有時不汗出其表病流連而不愈者非榮不和是衛强不與榮和也當於未熱未汗之時預用桂枝湯解肌發汗迎而奪之以遏其勢則熱退汗斂而病自愈矣集注方有執曰時以暫言衛氣不和者表有邪風而不和也先其時者言於未發熱之先也程知曰陰虛諸病亦時發熱自汗若裏無他病而時熱自汗則為衛受風邪未得解散宜於將發之時先用桂枝湯乘其欲動而擊之程應旄曰桂枝為解肌之劑而有時云發汗者何也以其能助衛氣升騰使正氣得宣而汗出與麻黃湯逐邪氣使汗從外泄者不同汪琥曰及其發熱自汗之時用桂枝湯發汗則愈苟失其時則風邪入裏病熱必深桂枝湯非所宜矣病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行脈中衛生脈外復發其汗榮衛和則愈宜桂枝湯注此又釋上條榮衛所以不和之義也言病有時常自出汗者此為榮氣已和也榮氣和而熱仍不解者則是衛外之氣猶不諧而不與榮氣共和諧也所以榮氣雖和而時時自汗出病猶不解也蓋以榮行脈中衛行脈外衛不和則榮雖和而病不解故復發其汗以抑衛而和榮榮衛和而病自愈矣亦宜桂枝湯集注方有執曰此與上條同上以暫言此言常者謂無時不然也上言藏藏為陰而主裏此言榮榮亦陰而主裏以暫言故其詞略以常言故其詞詳兩相互發義不殊也喻昌曰此明衛受邪風榮自汗出之理凡汗出榮和而發熱不解是衛强不與榮和也復發其汗伸風邪從肌竅外出斯衛不强而與榮和矣正如中酒發狂酒去其人帖然也榮受寒邪不與衛和宜麻黃湯亦然吳人駒曰上條發作有時此則無時而不自汗出但熱不解者亦屬榮衛不和蓋榮衛相得之為和而榮不得獨為之和也張錫駒曰衛氣者所以肥腠理司開闔衛外而為固也今受邪風不能衛外故常自汗出而熱不解此為榮氣和而衛不和也魏荔彤曰前以桂枝解肌者和其衛而時發熱之熱止此以桂枝發汗者和其衛而常自汗之汗止蓋發其表而熱解矣故總結之曰榮衛和則愈太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈注太陽病服桂枝湯外證不解者可更作服今初服不惟不解而反加煩是表邪太盛若遽與桂枝恐更生煩熱故宜先行刺法疏其在經邪熱然後却與桂枝發其肌腠風邪俾外內調和自然汗出而解矣集注方有執曰桂枝全在服法發汗切要如經若服不如法汗不如經病必不除所以反煩反者轉也言轉加熱悶也風池穴在耳後陷者中按之引於耳中手足少陽脈之會刺可入同身寸之四分風府穴在項上入髮際同身寸之一寸大筋內宛宛中督脈陽維二經之會刺可入同身寸之四分張志聰曰風池風府雖非太陽穴道乃屬太陽經脈所循之部故刺之以衰太陽之病勢魏荔彤曰恐誤認此為已傳之躁煩故標出以示人言不解則太陽之證俱在但添一煩知其非傳裏之煩而仍為表未解之煩也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也注汗之不解而煩太陽證仍在者是表邪盛也有陽明證者是裏熱盛也然亦有欲自解而未解先煩者則又為邪正相爭作汗之兆也當其煩時解與不解固不可定但診其六脈俱浮則知邪欲還表當汗出而解矣集注程知曰天地鬱蒸而雨作人身煩悶而汗作當以脈浮決之設脈不浮則煩又為入裏之候矣程應旄曰如診得脈浮即是邪還於表之兆切勿妄治其煩使汗却而當解者反不解也沈明宗曰夫自解證有從衄解有從下血而解有從下利而解有從小便暗除而解者此即太陽戰汗之一端或從脈辨或從證參仲景妙義散見諸篇務必合參則備病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也注病至六七日手足陰陽三部脈皆至而浮忽然大煩口噤不能言躁擾不寧者此邪正俱實爭勝作汗之象故曰必欲解也集注成無己曰手足三部脈皆至為正氣盛邪氣雖甚必欲解也著脈和其人大煩目重臉內際黃者此欲解也按臉字當是瞼字瞼眼弦也作臉字非注脈和而大煩者其解未可卜也若其人目重瞼者是瞼覆下垂目欲合也為陰來濟陽之兆內際黃者為胃氣來復之徵故曰此欲解也問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈注脈偏勝則病脈和平則愈今寸口關上尺中三部脈俱見浮沉遲數大小同等陰陽和平之象即有寒熱不解之病雖劇亦當愈也集注內經曰寸口人迎兩者相應若引繩大小齊等者名曰平人程知曰大小浮沉遲數同等謂三部九候無相失也蓋大不甚大小不甚小浮不甚浮沉不甚沉遲不甚遲數不甚數為沖和平等之象也病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也注病謂中風傷寒也有初病即發熱而惡寒者是謂中風之病發於衛陽者也有初病不發熱而惡寒者是謂傷寒之病發於榮陰者也發於陽者七日愈發於陰者六日愈以陽合七數陰合六數也集注方有執曰此推原中風傷寒之所以始以要其所以終之意凡在太陽皆惡寒也發起也愈瘳也程知曰此辨太陽病有發熱有不發熱之故也風陽也衛亦陽也寒陰也榮亦陰也中風傷寒均為表證而風入衛則邪發於陽而為熱寒入榮則邪發於陰而不即熱陽行速故常過經而遲愈一日陰行遲故常循經而早愈一日觀此則風寒之辨了然矣魏荔彤曰風傷衛寒傷榮既在太陽則未有不發熱者但遲速有間耳至於惡寒則同也發於陽發於陰之義不過就風為陽衛亦陽寒為陰榮亦陰而言殊未及於三陰也問曰凡病欲知何時得何時愈答曰假令夜半得病者明日日中愈日中得病者夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也注凡病之起不外乎陰陽以為病非陽勝陰即陰勝陽凡病之愈亦不外乎陰陽以為和非陽得陰解即陰得陽解陽得陰解者謂日中得病今日夜半愈也陰得陽解者謂夜半得病明日日中愈也集注方有執曰日中夜半以大略言余時可仿此意而推也太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈注太陽病頭痛至七日以上自愈者以行其經盡故也謂太陽受病其邪傳行六日三陽三陰經盡至七日以上三陽三陰之病日衰大邪皆去此不作再經故自愈也再者再傳陽明經也謂其邪已傳經盡熱盛不衰欲再轉屬陽明故也針足陽明以泄其熱使其邪不再傳則愈矣集注方有執曰七日以上者該六日而言也魏荔彤曰方有執謂針以遏其邪喻昌謂針以竭其邪言遏言竭皆言泄之也凡針刺者泄其盛氣也故前言刺風池風府亦主泄其風邪暴甚之意因刺法乃治熱之善策不欲人妄施汗下溫三法也言足陽明自是胃之經穴必有實欲再傳之勢方可刺之閔芝慶曰太陽受病以次而終於厥陰為傳經盡諸經受病至七日以上自愈者為行其經盡故也今有自太陽再傳之說若果傳遍六經厥陰再傳太陽太陽再傳陽明則何不於厥陰未傳太陽之前預針太陽而必待傳陽明然後針陽明哉於此可知三陰從無再傳太陽之病但轉屬陽明耳風家表解而不了了者十二日愈注風家謂太陽中風也表解謂用桂枝湯病已解也不了了者不清楚也言用桂枝湯其表已解而猶不清楚者在經餘邪未盡耳十二日經盡之時餘邪盡自然愈也集注魏荔彤曰此條申明太陽中風病愈後風邪留滯之證應聽其自愈也太陽病頭痛發熱汗出惡風者桂枝湯主之重出衍文桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也注夫桂枝湯本為解肌中風表虛之藥也若其人脈浮緊發熱汗不出者乃傷寒表實之病不可與也常須識此為麻黃湯證勿令誤與桂枝湯也集注程應旄曰可與不可與在毫釐疑似之間誤多失之於倉卒須常將營衛之分別處兩兩互勘陰陽不悖虛實了然不以桂枝誤治脈浮緊汗不出之傷寒自不致以麻黃誤治脈浮緩汗自出之中風矣若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也注酒客謂好飲之人也酒客病謂過飲而病也其病之狀頭痛發熱汗出嘔吐乃濕熱熏蒸使然非風邪也若誤與桂枝湯服之則嘔以酒客不喜甘故也集注成無己曰酒客內熱喜辛而惡甘桂枝湯甘酒客得之則中煩而嘔凡服桂枝湯吐者其後必吐膿血也注凡酒客得桂枝湯而嘔者以辛甘之品能動熱助涌故也若其人內熱素盛服桂枝湯又不即時嘔出則益助其熱所以其後必吐膿血也然亦有不吐膿血者則是所傷者輕而熱不甚也集注劉宏璧曰桂枝氣味甚薄酒客不可與者舉一以例其餘也庸工不得其解每遇熱盛之人但去桂枝於甘辛極熱之類全無顧忌仲景豈意後人如此之愚哉即如産後不宜寒冷所以舉一白芍之味酸微寒者以示戒今只知除去白芍於三黃寒涼等藥反恣用無忌殊不知聖人一語該括無窮味薄者尚不可與其味厚者可知微寒者既在宜禁而大寒者尤所當戒世俗不能引伸觸類徒以鹵莽滅裂為事可見上古醫書非精詳玩味烏能有得耶太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之注太陽中風本當解肌若大發其汗如水流漓因而遂漏不止其人必腠理大開表陽不固故惡風也液傷於內膀胱津少故小便難也液傷於外復加風襲故四肢微急難以屈伸也宜桂枝加附子湯主之服依桂枝湯法者是於固陽斂液中和營衛解風邪也集注方有執曰此太陽中風誤汗之變證小便難者以汗漏不止必亡陽亡津液亡陽則氣不足亡津液則水道枯竭且小便者膀胱所司也膀胱本太陽經而為諸陽主氣氣不足則化不行矣程知曰此陽氣與陰液兩亡復加外風襲人與真武證微細有別真武湯是救裏寒亡陽之失急於回陽者桂枝加附子湯是救表寒漏風之失急於溫經者桂枝加附子湯方於桂枝湯方內加附子一枚餘依桂枝湯法集解柯琴曰是方以附子加入桂枝湯中大補表陽也表陽密則漏汗自止惡風自罷矣汗止津回則小便自利四肢自柔矣汗漏不止與大汗出同而從化變病則異服桂枝麻黃湯大汗出後而大煩渴是陽陷於裏急當救陰故用白虎加人參湯服桂枝麻黃湯發汗遂漏不止而不煩渴是亡陽於外急當救陽故用桂枝加附子湯要之發汗之劑用桂枝不當則陽陷於裏者多用麻黃不當則陽亡於外者多因桂枝湯有芍藥而無麻黃故雖汗大出而元府尚能自閉多不致亡陽於外耳服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之注大煩渴陽明證也洪大陽明脈也中風之邪服桂枝湯大汗出後不解大煩渴脈洪大者是邪已入陽明津液為大汗所傷胃中乾燥故也宜與白虎加人參湯清熱生津而煩渴自除矣集注張璐曰白虎湯實解內蒸之熱非治外經之熱也昔人以石膏辛涼能解利陽明風熱若不佐以麻葛之品何以走外此說似是而實非蓋陽明在經之邪縱使有大熱而不煩渴自有葛根湯桂枝加葛根湯等治法並無藉於石膏也白虎加人參湯方見陽明篇太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之注太陽病三日發汗後熱不解若仍陳陳發熱有汗而不解者是太陽表證未罷也則當以桂枝湯和之今蒸蒸發熱有汗而不解者乃屬陽明裏證不和也故用調胃承氣湯集注程應旄曰太陽病三日經期尚未深也何以發汗不解便屬胃也蓋以胃燥素盛故他表證雖罷而汗與熱仍不解也第徵其熱如炊籠蒸蒸而盛則知其汗必連綿濈濈而來此即大便已硬之徵故曰屬胃也熱雖聚於胃而未見潮熱譫語等證主以調胃承氣湯者於下法內從乎中治以其為日未深故也汪琥曰言太陽病不可拘以日數但見屬胃之證即可下也病方三日曾經汗矣其熱自內騰達於外非表邪不解乃太陽之邪轉屬於胃病熱不能解也調胃承氣湯方見陽明篇太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之注太陽病發汗後或大汗出皆令人津液內竭胃中干煩躁不得眠欲得飲水當少少與之以滋胃燥令胃氣和則可愈也倘與之飲胃仍不和若脈浮小便不利微熱消渴者則是太陽表邪未罷膀胱裏飲已成也經曰膀胱者津液之府氣化則能出矣今邪熱熏灼燥其現有之津飲水不化絶其未生之液津液告匱求水自救所以水入即消渴而不止也用五苓散者以其能外解表熱內輸水府則氣化津生熱渴止而小便利矣集注張兼善曰白虎治表證已解邪傳裏而煩渴者今脈浮身有微熱而渴乃表邪未得全解故用五苓藉桂枝之辛散和肌表以解微熱也朮澤二苓之淡滲化水生津以止燥渴也喻昌曰脈浮當用桂枝何以變用五苓耶蓋熱邪得水雖不全解勢必衰其大半所以熱微兼小便不利證成消渴則蓄飲證具故不從單解而從兩解也凡飲水多而小便少謂之消渴裏熱飲盛不可單用桂枝解肌故兼以利水惟五苓有全功耳程應旄曰微熱字對下條發熱字看彼以發熱在表則知犯本未深故邪熱蓄而拒水此曰微熱則表熱犯本已深故熱邪結而耗液所以不惟與水與五苓主治有別而前五苓後五苓主治亦俱有別也中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之注中風發熱六七日不解而煩者是有表證也渴欲飲水水入則吐者是有裏證也若渴欲飲水水入即消如前條之胃干少少與飲令胃和則愈今渴欲飲水水入不消上逆而吐故名曰水逆原其所以吐之之由則因邪熱入裏與飲相摶三焦失其蒸化而不能通調水道下輸膀胱以致飲熱相格於上水無去路於下故水入則吐小便必不利也宜五苓散辛甘淡滲之品外解內利多服暖水令其汗出尿通則表裏兩解矣集注方有執曰中風發熱必自汗出六七日不解而煩者汗出過多亡津液而內燥也表以外證未罷言裏以煩渴屬府言欲飲水者燥甚而渴希救故也水入則吐者伏飲內作故外水不得入也蓋飲亦水也以水得水湧溢而為格拒所以謂之水逆與五苓散兩解表裏汗出而愈也喻昌曰傷風證原有汗以其有汗也延至日久不行解肌之法汗出雖多徒傷津液表終不解轉增煩渴邪入於府飲水則吐名曰水逆乃熱邪挾積飲上逆故外水格而不入也服五苓飲熱湯得汗則表裏俱解是一舉而兩得也五苓散方豬苓去黑皮十八銖茯苓十八銖澤瀉一兩六株白朮十八銖桂半兩上五味為散更於臼中杵之白飲和方寸匕服之日三服多飲暖水汗出愈方解是方也乃太陽邪熱入府水氣不化膀胱表裏藥也一治水逆水入則吐一治消渴水入則消夫膀胱者津液之府氣化則能出矣邪熱入之與水合化為病若水盛於熱則水壅不化水蓄於上故水入則吐乃膀胱之氣化不行致小便不行也若熱盛於水則水為熱灼水耗於上故水入則消乃膀胱之津液告竭致小便無出也二證皆小便不利故均得而主之若小便自利者不可用恐重傷津液以其屬陽明之裏故不可用也由此可知五苓散非治水熱之專劑乃治水熱小便不利之主方也君澤瀉之鹹寒鹹走水府寒勝熱邪佐二苓之淡滲通調水道下輸膀胱則水熱並瀉也用白朮之燥濕健脾助土為之堤防以制水也用桂之辛溫宣通陽氣蒸化三焦以行水也澤瀉得二苓下降利水之功倍則小便利而水不蓄矣白朮藉桂上升通陽之效捷則氣騰津化渴自止也若發熱不解以桂易桂枝服後多服暖水令汗出愈是知此方不止治停水小便不利之裏而猶解停水發熱之表也加人參名春澤湯其意專在助氣化以生津加茵陳名茵陳五苓散治濕熱發黃表裏不實小便不利者無不效也集解程應旄曰太陽為標膀胱為本中風發熱標受邪也六七日不解標邪轉入膀胱矣是謂犯本五苓散與麻黃桂枝二湯雖同為太陽經之藥一則解肌而治表一則利小便而治裏表與本所主各有別矣按此條謂有表裏證者非發熱有汗口乾煩渴水入則消小便自利太陽陽明之表裏證也乃發熱無汗口潤煩渴水入則吐小便不利太陽膀胱之表裏證也此病雖未發明無汗小便不利之證若汗出小便利則渴飲之水得從外越下出必無水逆之證仲景用五苓散多服暖水令汗出愈其意在利水發汗故知必有無汗小便不利之證也太陽病小便利者以飲水多必心下悸小便少者必苦裏急也注太陽初病不欲飲水將傳陽明則欲飲水此其常也今太陽初病即飲水多必其人平素胃燥可知設胃陽不衰則所飲之水亦可以敷布於外作汗而解今飲水多而胃陽不充即使小便利亦必停中焦而為心下悸若更小便少則水停下焦必苦裏急矣集注方有執曰飲水多而心下悸者心為火藏水多則受制也小便少則水停所以裏急也汪琥曰太陽病小便利者是膀胱之府無邪熱也若其人飲水多此熱在上焦心火亢甚小便雖利而渴飲水多則水停犯火必心下悸若其人飲水多而小便少此熱在下焦為太陽邪熱隨經入府水積不行膀胱之裏必苦急也發汗後飲水多必喘以水灌之亦喘注上條未發汗飲水多胃熱津少也此條發汗後飲水多津亡胃干也而不病心下悸苦裏急者蓋以水不停於中焦下焦而停於上焦所以攻肺必作喘也水灌者以水澆洗也飲水多者必喘是飲冷冷傷於內也以水灌之亦喘者是形寒寒傷於外也均傷肺故俱喘集注魏荔彤曰此申明本條喘急一證有因水而成者蓋渴而飲水多之喘與不渴而灌之亦喘其由雖不同而致病則一也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯注太陽病下之後微喘者表未解也當以桂枝加厚朴杏仁湯解太陽肌表而治其喘也太陽病桂枝證醫反下之下利脈促汗出而喘表未解得當以葛根黃連黃芩湯解陽明之肌熱而治其喘也今太陽病發汗後汗出而喘身無大熱而不惡寒者知邪已不在太陽之表且汗出而不惡熱知邪亦不在陽明之裏其所以汗出而喘既無大熱又不惡寒是邪獨在太陰肺經故不可更行桂枝湯可與麻黃杏子甘草石膏湯發散肺邪而汗喘自止矣麻黃杏仁甘草石膏湯方麻黃去節四兩杏仁去皮尖五十枚甘草炙二兩石膏綿裹碎半斤上四味以水七升先煮麻黃減二升去白沫納諸藥煮取三升去滓溫服一升集注柯琴曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以召禍故青龍以無汗煩躁得薑桂以宣衛外之陽白虎以有汗煩渴須粳米以存胃中之液今但內熱而無外寒故不用薑桂喘不在胃而在肺故不需粳米其意重在存陰不慮其亡陽也故於麻黃湯去桂枝之監制取麻黃之專開杏仁之降甘草之和倍石膏之寒除內蘊之實熱斯溱溱之汗出而內外之煩熱與喘悉除矣下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯注此詳上條受病兩途同乎一治之法也又有下後身無大熱汗出而喘者知邪亦不在表而在肺故亦不可更行桂枝湯可與麻黃杏仁甘草石膏湯以治肺也彼之汗後喘此之下後喘雖其致病之因不同而其所見之證不異所以從其證不從其因均用此湯亦喘家急則治其標之法也集注方有執曰汗與下雖殊其為反誤致變之喘則一惟其喘一故同歸一治也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之按下利之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟其大便不利痞硬滿痛始屬裏病小便不利嘔逆短氣始屬飲病乃可攻也發作之作字當是熱字若無熱汗出乃少陰陰邪寒飲真武湯證也且作字與上下句文義皆不相屬注太陽中風表邪也不利嘔逆裏飲也表邪解者乃可攻裏飲也審其人微汗漐漐不輟發熱有時頭痛若仍惡寒是表未解尚不可攻若不惡寒則為表已解矣而更見裏未和之心下痞硬滿引脅下痛乾嘔短氣水蓄無所從出之急證故徑以十棗湯峻劑直攻水之巢穴而不疑也按傷寒表未解水停心下嘔逆者是寒束於外水氣不得宣越也宜小青龍湯汗而散之中風表未解水停心下而吐者是飲格於中水氣不得輸泄也宜五苓散散而利之此皆表未解不可攻裏之飲證也至如十棗湯與下篇之桂枝去芍藥加白朮茯苓湯二方皆治飲家有表裏證者十棗湯治頭痛發熱汗出不惡寒之表已解而有痞硬滿痛之裏未和故專主攻裏也桂枝去芍藥加白朮茯苓湯治頭痛發熱無汗之表未解而兼有心下滿微痛之裏不和故不主攻裏當先解表也然其心下硬滿痛之微甚亦有別矣集注杜任曰十棗湯惟壯實者宜之不宜輕用方有執乃可攻之以上喻人勿妄下早之意漐漐汗出至短氣言證雖有裏猶未可下直至汗出不惡寒方是承上起下言當下以出其治也喻昌曰此證與結胸頗同但結胸者邪結於胸其位高此在心下及脅其位卑然必表解乃可攻之亦與攻結胸之戒不殊也藥用十棗亦與陷胸湯相仿因傷寒下法多為胃實而設胃實者邪熱內盛不得不用硝黃以蕩滌之今證在胸脅而不在胃則蕩滌之藥無所用故取蠲熱逐飲於胸脅之間以為下法張志聰曰頭痛表證也然亦有在裏者如傷寒不大便五六日頭痛有熱者與承氣湯與此節之汗出不惡寒而頭痛為表解裏有飲用十棗湯則凡遇風寒頭痛表未解之證當審別矣程應旄曰所可惑者頭痛外惟身汗一證表裏難辨汗出發熱惡寒則微有表若汗出發熱不惡寒則只從不惡寒處認證知表已解裏氣為飲邪摶結不和雖頭痛亦屬裏邪上攻非關表也魏荔彤曰太陽之邪既入裏宜下矣又有不下胸膈不下腸胃而下心與脅下者較下結胸部位稍卑較下胃實部位又稍高此下中之又一法也須認明同一下也證不同而法自別蓋太陽陽明之交必辨表裏而施汗下彼之在裏應下乃邪熱挾食物為胃實此之在裏應下乃邪熱挾水飲為飲實二者俱必待表解而後下此大同也十棗湯方芫花熬甘遂大戟大棗擘十枚上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納藥末强人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養方解仲景治水之方種種不同此其最峻者也凡水氣為患或喘或咳或悸或噎或吐或利病在一處而止此則水邪留結於中心腹脅下痞滿硬痛三焦升降之氣阻隔難通此時表邪已罷非汗散之法所宜裏飲實盛又非淡滲之品所能勝非選逐水至峻之品以直折之則中氣不支束手待斃矣甘遂芫花大戟三味皆辛苦氣寒而稟性最毒並舉而用之氣味相濟相須故可直攻水邪之巢穴決其瀆而大下之一舉而患可平也然邪之所湊其氣必虛以毒藥攻邪必傷及脾胃使無沖和甘緩之品為主宰則邪氣盡而大命亦隨之矣然此藥最毒至峻參朮所不能君甘草又與之反故選十棗之大而肥者以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣內充一以使邪不復作此仲景用毒攻病之法盡美又盡善也昧者惑於甘能中滿之說而不敢用豈知承制之理乎太陽病外證未解不可下也下之為逆欲解外者宜桂枝湯注太陽病外證未解者謂桂枝湯之表證未解也凡表證未解無論已汗未汗雖有可下之證而非在急下之例者均不可下下之為逆也欲解外者仍宜桂枝湯主之集注王肯堂曰但有一毫頭痛惡寒即為表證未解不可下也程應旄曰若下後外證未解者仍當解外有是證用是藥不可以既下而遂謂桂枝湯不中與也汪琥曰下之為逆逆者為病在外而反攻其內於治法為不順也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯注太陽病先發汗表未解仍宜汗之而復下之治失其宜矣脈浮者不愈蓋以脈浮邪在外而反下之故令不愈也今誤下未成逆脈仍浮故知邪尚在外仍宜桂枝湯解外則愈也集注程應旄曰愈不愈辨之於脈其愈者必其脈不浮而離於表也若脈浮者知尚在表則前此之下自是誤下故令不愈從前之誤不必計較只據目前目前之證不必計較只據其脈脈若浮知尚在外雖日久尚須解外則愈有是脈用是藥亦不以既下而遂以桂枝湯為不中與也本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆注立治逆之法不外乎表裏而表裏之治不外乎汗下病有表裏證者當審其汗下何先先後得宜為順失宜為逆若表急於裏本應先汗而反下之此為逆也若先汗而後下治不為逆也若裏急於表本應先下而反汗之此為逆也若先下而後汗治不為逆也集注程知曰言汗下有先後緩急不得倒行逆施汪琥曰治傷寒之法表證急者即宜汗裏證急者即宜下不可拘拘於先汗而後下也汗下得宜治不為逆太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血按脈促當是脈浮始與不結胸為欲解之文義相屬脈浮當是脈促始與論中結胸胸滿同義脈緊當是脈細數脈細數當是脈緊始合論中二經本脈脈浮滑當是脈數滑浮滑是論中白虎湯證之脈數滑是論中下膿血之脈細玩諸篇自知注病在太陽誤下為變不同者皆因人之藏氣不一各從所入而化故不同也誤下邪陷當作結胸反不結胸其脈浮此裏和而不受邪邪仍在表為欲解也若脈促者為陽結實邪之脈故必結胸也脈細數少陰邪熱之脈咽痛少陰邪熱之證誤下邪陷少陰法當從少陰治也脈弦少陽之脈兩脅拘急少陽之證誤下邪陷少陽法當從少陽治也脈緊太陽脈頭痛太陽證誤下邪仍在表法當從太陽治也脈沉緊寒邪入裏之脈欲嘔胃陽格拒之證有表誤下邪陷在胃法當從陽明治也脈沉滑宿食脈有表誤下協熱入裏下利法當從協熱下利治也脈數滑積熱脈有表誤下邪陷入陰傷營下血法當從下膿血治也按脈促固陽脈也若促而有力為實則為結胸實邪之診若促而無力為虛則為胸滿虛邪之診故論中有脈促結胸頭汗小潮熱者用陷胸湯攻之脈促胸滿汗出微惡寒者用桂枝去芍藥加附子湯溫之觀此促脈虛實治法則可以類推矣按咽痛少陰寒熱俱有之證也咽乾腫痛者為熱不乾不腫而痛者為寒故少陰論中有甘桔湯通脈四逆湯二治法也集注方有執曰凡在太陽皆表證也誤下則變證雜出而不可以一途拘之程知曰不宜下而下之諸變不可勝數此之謂也今咽痛脅急欲嘔是寒邪入裏之變頭痛熱利下血是風邪入裏之變所以然者脈浮滑數為陽沉弦緊細為陰也程應旄曰據脈見證各著一必字見勢所必然考其源頭總在太陽病下之而來故雖有已成壞病未成壞病之分但宜以活法治之不得據脈治脈據證治證也太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也按四日復下之之字當是利字上文利未止豈有復下之理乎細玩自知是必傳寫之誤注太陽病謂頭項强痛而惡寒也二三日見不得臥但欲起之證謂已傳陽明也心下胃之分也必結謂胃分必有結也若脈實大乃胃分有熱而結也則當下之今脈微弱是胃分有寒而結也法不當下不當下而下之謂之反下二三日正當解太陽陽明之表反下之表熱乘虛入裏必自利設利自止是其入胃實而同燥化必作結胸矣今利未止四日仍復下利是其人胃虛而同濕化故必作協熱利也集注程知曰此表證誤下有結胸熱利之變不可不慎也脈既微弱則是寒結心下法當溫散醫見心下結而下之使利是治之反也汪琥曰太陽病二三日不臥欲起心下熱結似乎可下然脈微弱其人本有寒分豈可下乎太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之注此承上條脈微弱協熱利互詳其證以明其治也外證未除謂太陽病未除而數下之是下非一次也裏因數下而虛遂協表熱而利利下不止裏虛不固也心下痞硬裏虛而邪結也外證既未除是表不解也故用桂枝以解表利下痞硬裏因下虛而從寒化也其脈必如上文之微弱故用參朮薑草以溫裏此溫補中兩解表裏法也若其脈有力者又當從甘草瀉心湯之法矣集注喻昌曰誤下而致裏虛外熱乘之變而為利不止者裏虛不守也痞硬者正虛邪實中成滯礙痞塞而不通也以表未除故用桂枝以解之以裏適虛故用理中以和之此方即理中加桂枝而易其名乃治虛痞下利之法也李中梓曰經云桂枝證醫反下之利遂不止與葛根黃芩黃連湯此則又與桂枝人參湯何用藥有溫涼之異耶蓋彼證但曰下之此則曰數下之彼證但曰利下此則曰利不止合兩論味之自有虛實之分矣程知曰表證誤下下利不止喘而汗出者治以葛根芩連心下痞硬者治以桂枝參朮一救其表邪入裏之實熱一救其表邪入裏之虛寒皆表裏兩解法也程應旄曰協熱而利向來俱作陽邪陷於下焦果爾安得用理中耶蓋不知利有寒熱二證也桂枝人參湯方桂枝四兩甘草炙四兩白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升納桂更煮取三升去滓溫服一升日再服夜一服太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之注此承上條又言協熱利之脈促者以別其治也太陽病桂枝證宜以桂枝解肌而醫反下之利遂不止者是誤下遂協表熱陷入而利不止也若表未解而脈緩無力即有下利而喘之裏證法當從桂枝人參湯以治利或從桂枝加杏子厚朴湯以治喘矣今下利不止脈促有力汗出而喘表雖未解而不惡寒是熱已陷陽明即有桂枝之表亦當從葛根黃芩黃連湯主治也方中四倍葛根以為君芩連甘草為之佐其意專解陽明之肌表兼清胃中之裏熱此清解中兼解表裏法也若脈沉遲或脈微弱則為裏寒且虛又當用理中湯加桂枝矣於此可見上條之協熱利利不止心下痞硬表裏不解者脈不微弱必沉遲也按協熱利二證以脈之陰陽分虛實主治固當矣然不可不辨其下利之黏穢鴨溏小便或白或赤脈之有力無力也集注成無己曰病有汗出而喘者謂自汗出而喘也是邪氣外甚所致若喘而汗出者謂因喘而汗出也是裏熱氣逆所致故與葛根黃芩黃連湯散表邪除裏熱也方有執曰利與上條同而上條用理中者以痞硬脈弱屬寒也此用芩連者以喘汗脈促屬熱也喻昌曰太陽病原無下法當用桂枝解外醫反下之則邪熱之在太陽者未傳陽明之表已入陽明之裏所以其脈促急其汗外越其熱上奔則喘下奔則泄故舍桂枝而用葛根以專主陽明之表加芩連以清裏熱則不治喘而喘止不治利而利止此又太陽陽明兩解表裏之變法也汪琥曰誤下虛其腸胃為熱所乘遂利不止此非腸胃真虛證乃胃有邪熱下通於腸而作泄也脈促者脈來數時一止復來也此為陽獨盛之脈也脈促見陽知表未解此表乃陽明經病非猶太陽桂枝之表證也喘而汗出者亦陽明胃府裏熱氣逆所致非太陽風邪氣壅之喘亦非桂枝湯汗出之證也故當解陽明表邪清胃府裏熱也葛根黃芩黃連湯方葛根半斤黃芩三兩黃連三兩甘草炙二兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服集解柯琴曰外熱不除是表不解下利不止是裏未和誤下致利病因則同一則脈微弱心下痞硬是脈不足而證有餘也一則脈促而喘反汗自出是脈有餘而證不足也表裏虛實當從脈辨況弱脈見於數下後則痞硬為虛更可知也故用理中之辛甘溫補止下利化痞硬又加桂枝以解表先煮四味後內桂枝和中之力饒而解肌之氣鋭是於兩解中寓權宜法也桂枝證本脈緩誤下後而反促陽氣內盛邪蒸於外故汗出也熱暴於內火逆上衝故為喘也暴注下迫故為利也故君清輕升發之葛根以解肌而止利佐苦寒清肅之芩連以止汗而定喘又加甘草以和中先煮葛根後內諸藥解肌之力純而清中之氣鋭又與補中逐邪者殊法矣太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之按若微惡寒者當是汗出微惡寒方合若無汗出二字乃表未解無取乎加附子也注太陽病表未解而下之胸實邪陷則為胸滿氣上衝咽喉不得息瓜蒂散證也胸虛邪陷則為氣上衝桂枝湯證也今下之後邪陷胸中胸滿脈促似乎胸實而無沖喉不得息之證似乎胸虛又見胸滿之證故不用瓜蒂散以治實亦不用桂枝湯以治虛惟用桂枝之甘辛以和太陽之表去芍藥之酸收以避胸中之滿若汗出微惡寒去芍藥方中加附子主之者以防亡陽之變也按上條脈促喘而汗出不惡寒下利不止云屬實熱此條脈促胸滿汗出微惡寒不喘不下利反屬虛寒者何也上條是裏熱蒸越之汗故汗出不惡寒陽實也喘而下利皆為熱也此條乃表陽不固之汗故汗出微惡寒陽虛也即不喘利亦為寒也要知仲景立法每在極微處設辨恐人微處易忽也今以微惡寒發其義却不在汗出上辨寒熱而在汗出惡寒不惡寒上辨寒熱不在脈促上辨寒熱而在脈促之有力無力辨寒熱於此又可知不惟在胸滿上辨虛實而當在胸滿之時滿時不滿常常滿而不減上辨虛實矣集注喻昌曰此條之微惡寒合上條觀之則脈促胸滿喘而汗出之內原伏有虛陽欲脫之機故仲景於此條特以微惡寒三字發其義可見陽虛則惡寒矣又可見汗不出之惡寒即非陽虛矣程應旄曰有陽盛而見促脈亦有陽虛而見促脈者當辨之於有力無力仍須辨之於外證也沈明宗曰誤下擾亂陰陽之氣則脈促邪入胸膈幾成結胸但結滿而未痛耳故以桂枝湯單提胸膈之邪使從表解去芍藥者惡其酸收引邪內入故也若脈促胸滿而微惡寒乃虛而局踖陽氣欲脫又非陽實之比所以加附子固護真陽也然傷風下後之惡寒與未下之惡寒迥然用別而汗後之惡寒與未汗之惡寒亦殊桂枝去芍藥湯方於桂枝湯內去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子一枚炮去皮破八片餘依前法太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之喘家作桂枝湯加厚朴杏子佳注太陽病當汗而反下之下利脈促喘而汗出不惡寒者乃邪陷於裏熱在陽明葛根黃芩黃連湯證也今太陽病當汗而反下之不下利而微喘是邪陷於胸未入於胃表仍未解也故仍用桂枝湯以解肌表加厚朴杏子以降逆定喘也喘家謂素有喘病之人遇中風而喘者桂枝湯皆宜用之加厚朴杏子為佳也集注方有執曰喘者氣逆於上故呼吸不順而聲息不利也微者聲息緩不似大喘之氣急也以表尚在不解其表則喘不可定故用桂枝解表加厚朴利氣杏仁下氣所以為定喘之要藥喻昌曰此風邪誤下作喘治法之大要其寒邪誤下作喘當用麻黃杏仁石膏甘草即此可推又曰微喘表未解則是表邪因誤下上逆與虛證不同程應旄曰喘之一證有表有裏不可不辨下後汗出而喘其喘必盛屬裏熱壅逆火炎故也下後微喘汗必不大出屬表邪閉遏氣逆故也仍用桂枝湯解表內加朴杏以下逆氣魏荔彤曰凡病人素有喘證每感外邪勢必作喘故謂之喘家桂枝加厚朴杏仁湯方於桂枝湯方內加厚朴二兩杏仁五十個餘依桂枝湯方按戴原禮曰太陽病有喘咳無汗喘者宜麻杏石甘湯有汗喘者宜桂枝加厚朴杏仁湯無汗咳者宜小青龍湯少陽病無喘有咳咳者宜小柴胡湯加五味乾薑陽明病無咳有喘內實喘者宜大承氣湯下利者宜葛根黃芩黃連湯三陰惟少陰有喘咳喘者宜四逆湯加五味乾薑咳者陰邪下利宜真武湯加五味乾薑陽邪下利宜豬苓湯然喘皆危候也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之注太陽病表未解而下之裏實者邪陷則為結胸大陷胸湯證也裏虛者邪陷則為下利桂枝人參湯證也胸實者邪陷則為胸中痞硬氣上衝咽喉不得息瓜蒂散證也今胸虛邪陷於胸故但為氣上衝是表尚未罷然無壅滿不得息痞硬之證故不可吐下仍當解表可與桂枝湯如法汗之使陷胸之邪不受外束胸中之氣得以四達自不致內壅而上衝矣若不上衝者不可與也集注方有執曰氣上衝者陽主氣而上升風屬陽邪下後入裏乘虛而上衝也若不上衝則非陽邪可知故不可與病如桂枝證頭不痛項不强寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散注病如桂枝證乃頭項强痛發熱汗出惡風脈浮緩也今頭不痛項不强是桂枝證不悉具也寸脈微浮是邪去表未遠已離其表也胸中痞硬氣上衝喉不得息是邪入裏未深而在胸中必胸中素有寒飲之所致也寒飲在胸不在肌腠解肌之法無可用也痞硬在胸而不在心下攻裏之法亦無所施惟有高者越之一法使胸中寒飲一涌而出故宜吐之以瓜蒂散也集注程應旄曰痞硬一證因吐下者為虛不因吐下者為實實邪痰飲填塞心胸中下二焦為之阻絶自不得不從上焦為出路所謂在上者因而越之是也汪琥曰傷寒一病吐法不可不講所以仲景以此條特出之太陽上篇者以吐不宜遲與太陽汗證之法相等當於二三日間審其證而用此法也沈明宗曰素有痰飲內積稍涉風寒引動其痰即外如桂枝湯證但無頭痛項强知非風邪中表矣張錫駒曰氣上衝咽喉不得息者邪挾寒飲從太陽之氣而上越也瓜蒂散方瓜蒂熬黃一分赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香鼓一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加服得快吐乃止諸亡血虛家不可與瓜蒂散方解胸中者清陽之府諸邪入胸府阻遏陽氣不得宣達以致胸滿痞硬熱氣上衝燥渴心煩嗢嗢欲吐脈數促者此熱鬱結也胸滿痞硬氣上衝咽喉不得息手足寒冷欲吐不能吐脈遲緊者此寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧泄之品因而越之上焦得通陽氣得復痞硬可消胸中可和也瓜蒂極苦赤豆味酸相須相益能疏胸中實邪為吐劑中第一品也而佐香豉汁合服者藉穀氣以保胃氣也服之不吐少少加服得快吐即止者恐傷胸中元氣也此方奏功之捷勝於汗下所謂汗吐下三大法也今人不知仲景子和之精義置之不用可勝惜哉然諸亡血虛家胸中氣液已虧不可輕與特為申禁病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞也所以成結胸者以下之太早故也注此總釋結胸與痞硬之因也中風陽邪故曰病發於陽也不汗而反下之熱邪乘虛陷入因作結胸傷寒陰邪故曰病發於陰也不汗而反下之熱邪乘虛陷入因作痞硬所以成結胸與痞硬者以表未解而下之太早故也病發於陰不言熱入者省文耳然病發於陽而誤下者未嘗無痞硬病發於陰而誤下之亦時成結胸良由人之氣體不同或從實化或從虛化也集注張兼善曰風邪入裏則結胸寒邪入裏則為痞然此皆太陽病之所由來非別陰證陽證也太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗躋頸而還小便不利身必發黃按數則為虛句疑是衍文注太陽病脈浮而動數浮則為風邪脈也數則為熱邪脈也動則為諸痛脈也頭痛發熱太陽證也熱蒸於陽陽虛則自汗出熱蒸於陰陰虛則盜汗出陰虛當惡熱今反惡寒故知此非陰虛之盜汗乃表未解之盜汗微微而出也表未解當解表醫反下之遂使動數之熱脈變為寒遲蓋動數乃表邪欲傳因下而逆於膈中故不傳而脈亦變也表客陽邪乘胃空虛陷入胸膈而拒痛短氣不能布息煩躁心中懊憹心下因硬徑從實化而為結胸矣法當以大陷胸湯主之若不從實化不成結胸但頭汗出至頸余處無汗則熱不得越也小便不利則濕不得瀉也熱濕合化故身必發黃也集注成無己曰動數變遲而浮脈獨不變者以邪結胸中上焦陽分脈不得而沉也朱震亨曰太陽病表未解而攻裏裏已虛矣雖見浮而動數之陽脈一經誤下則必變為遲陰之脈矣胃中空虛短氣躁煩虛之甚矣借曰陽氣內陷心中因硬而可迅攻之乎大陷胸之力不緩於承氣下而又下寧不畏其重虛耶即陽病實邪下後若胃中空虛客氣動膈心中懊憹者亦以梔子豉湯吐胸中之邪可也況太陽誤下後明有虛證乎按震亨所論治以梔子豉湯吐之亦是未成結胸從胸虛有熱而化者宜也若從胸虛有寒而化者不論已成未成結胸則又當從活人書溫補法矣不可混施也方有執曰太陽之脈本浮動數者亦傳也太陽本自汗而言微盜汗本惡寒而言反惡寒者稽久而然也膈心胸之間也拒格拒也言膈氣與邪氣相格拒而為痛也客氣邪氣也短氣促氣不能布息也懊憹心為邪亂而不寧也陽氣客氣之別名也以本外邪故曰客氣以邪本風故曰陽氣以裏虛因而陷入故曰內陷自若不結胸句至末以變之輕者而言也大陷胸湯方大黃去皮六兩芒硝一升甘遂另碾一錢上三味以水六升先煮大黃取二升去滓納芒硝煮一兩沸內甘遂末溫服一升得快利止後服集解方有執曰上焦有高邪必陷下以平之故曰陷胸湯平邪蕩寇將軍之職也以大黃為君咸能軟堅以芒硝為臣徹上徹下破結逐水以甘遂為佐惟大實者乃為合法如挾虛或脈浮不可輕試太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之注此承上條互發其義以詳其證治也太陽病重發汗而復下之津液傷矣不大便五六日胃府燥矣舌上燥渴胃中干也日晡潮熱胃熱盛也從心下至少腹硬滿而痛不可近者謂胸腹之中上下俱硬結實大痛手不可近故以大陷胸湯主之無疑也集注內臺方議曰日晡所作日晡所發方有執曰此明結胸有陽明內實疑似之辨晡日加申時也小有微覺有也蓋不大便燥渴日晡潮熱從心下至少腹硬滿而痛皆似陽明內熱惟小有潮熱不似陽明大熱之甚所以陽明必以胃家實為主而凡有一毫太陽證在皆不得入陽明例者亦以此也程知曰太陽結胸兼陽明內實故用大陷胸湯由胸脅以及腸胃皆可蕩滌無餘若但下腸胃結熱而遺胸上痰飲則非法矣吳人駒曰一腹之中上下邪氣皆盛證之全實者其脈常沉伏不可生疑畏惟下之而脈自漸出也小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之注大結胸邪重熱深病從心下至少腹硬滿痛不可近脈沉實故宜大陷胸湯以攻其結瀉其熱也小結胸邪淺熱輕病正在心下硬滿按之則痛不按不痛脈浮滑故用小陷胸湯以開其結滌其熱也集注程應旄曰按陷胸條曰心下痛按之石硬又曰心下滿而硬痛此曰病正在心下則知結胸不拘在心下與胸上只在痛不痛上分別故痞證亦有心下硬者但不痛耳張錫駒曰湯有大小之別證有輕重之殊今人多以小陷胸湯治大結胸證皆致不救遂諉結胸為不可治之證不知結胸之不可治只一二節余皆可治者苟不體認經旨必致臨時推諉誤人性命也魏荔彤曰小結胸無實熱之邪但微熱而挾痰飲為患故雖結胸而不能高踞胸巔但正在心下而已不能實力作痛惟按之痛而已診之不沉而深惟浮而輕淺而已不能作石硬惟虛而結阻而已所以大陷胸湯不應用而另設小陷胸湯高下堅軟輕重沉浮之間病機治法昭然已又云痞陰邪結胸陽邪然於陽邪中又有大小之分學者審之於凡寒熱雜合之證無大實大熱俱宜斟酌下法勿孟浪也小陷胸湯方黃連一兩半夏洗半斤栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服方解黃連滌熱半夏導飲栝蔞潤燥下行合之以滌胸膈痰熱開胸膈氣結攻雖不峻亦能突圍而入故名小陷胸湯分溫三服乃緩以治上之法也傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之注傷寒表不解誤下成痞此其常也傷寒或有因誤下而成結胸者乃其變也今傷寒六七日結胸不因誤下而成此熱實之證若脈沉緊裏實脈也心下痛按之石硬裏實證也此為脈病皆實故以大陷胸湯主之也集注喻昌曰熱實二字形容結胸之狀甚明見邪熱填實於胸而不散漫也浮緊主傷寒無汗沉緊主傷寒結胸此與中風之陽邪結胸迥別所以不言浮也又曰陽邪誤下成結胸陰邪誤下成痞然中風間有痞證傷寒間有結胸證又不可不知程應旄曰雖曰陽邪內陷然陰陽二字從虛實寒熱上區別非從中風傷寒上區別表熱盛實轉入胃府則為陽明證表熱盛實不轉入胃府而陷入於膈則為結胸證故不必誤下始成也不因下而成結胸者必其人胸有燥邪以失汗而表邪合之遂成裏實觀此條曰傷寒六七日又曰脈沉而緊則可知矣汪琥曰或問脈沉緊焉知非寒實結胸答曰胸中者陽氣之所聚也邪熱當胸而結直至心下石硬且痛則脈不但沉緊甚至有伏而不見者烏可以脈沉緊為非熱耶大抵辨結胸之法但當憑證最為有準寒實結胸無熱證者與三物小陷胸湯白散亦可服按無熱證之下與三物小陷胸湯當是三物白散小陷胸湯四字必是傳寫之誤桔梗貝母巴豆三物其色皆白有三物白散之義溫而能攻與寒實之理相屬小陷胸湯乃栝蔞黃連皆性寒之品豈可以治寒實結胸之證乎亦可服三字亦衍文也注結胸證身無大熱口不燥渴則為無熱實證乃寒實也與三物白散然此證脈必當沉緊若脈沉遲或證見三陰則又非寒實結胸可比當以枳實理中湯治之矣集注王肯堂曰熱實結胸及寒實結胸活人書不拘寒熱但用陷胸湯不差者用枳實理中丸即應手而愈方有執曰寒以飲言飲本寒也又得水寒兩寒摶結而實於胸中故謂無熱證也程知曰結胸有大小之別寒熱之異不得概用硝黃也鄭重光曰水寒結實在胸則心陽被據自非細故用三物白散下寒而破結皆不得已之兵也三物白散方桔梗三分巴豆去皮心熬黑研如脂一分貝母三分上件二味為末納巴豆更於臼中杵之以白飲和服强人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯方解是方也治寒實水結胸證極峻之藥也君以巴豆極辛極烈攻寒逐水斬關奪門所到之處無不破也佐以貝母開胸之結使以桔梗為之舟楫載巴豆搜逐胸邪悉盡無餘膈上者必吐膈下者必利然惟知任毒以攻邪不量强羸鮮能善其後也故羸者減之不利進熱粥利過進冷粥蓋巴豆性熱得熱則行得冷則止不用水而用粥者藉穀氣以保胃也傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之注傷寒十餘日熱結在裏若胸脅滿硬者此結胸也今不滿硬復往來寒熱者乃少陽表裏病非結胸也當與大柴胡湯兩解之但結胸證亦有水結者水結胸不但表無大熱裏亦無大熱也有結胸狀頭微汗出者此水停於胸為熱氣上蒸使然也故曰水結在胸脅也亦以大陷胸湯主之飲熱並攻也集注方有執曰水即飲也以不實硬故曰水結胸脅亦裏也以熱結不高故曰在裏程知曰此言熱結於裏兼少陽者則不宜陷胸水結於胸者雖無大熱猶宜大陷胸也程應旄曰大柴胡與大陷胸皆能破結大柴胡之破結使表分無留邪大陷胸之破結使裏分無留邪林瀾曰此言水結胸之與熱結在裏不同也十餘日邪深入府之時然熱結在裏而猶有半表半裏之邪作往來寒熱者必以大柴胡兩解之若但胸脅結滿初無大熱收斂入內者此亦不得為大柴胡證必水結胸脅也何以知之水結胸者頭汗出今但頭微汗為水結胸明矣與大陷胸湯結胸者項亦强如柔痙狀下之則和宜大陷胸丸注結胸從心上至少腹硬滿痛不可近則其勢甚於下者治下宜急攻之以大陷胸湯結胸從胸上滿硬項强如柔痙狀則其熱甚於上者治上宜緩攻之以大陷胸丸直攻胸肺之邪煮服倍蜜峻治緩行下而和之以其病勢緩急之形既殊湯丸之制亦異也故知此項强乃結胸之項强下之則和非柔痙之項强也集注成無己曰項强者為邪結胸中胸膈結滿但能仰而不能俯是項强也程知曰項强如柔痙者胸中邪氣緊實項勢常昂有似柔痙之狀然痙病身手俱張此但項强原非痙也借此以驗胸邪十分緊逼耳汪琥曰下之則和者言邪實去胸中和而項自舒之意若不云如柔痙恐醫人認以為太陽經風寒之邪未解反疑其當用發汗之藥殊不知項雖强表證已解裏證甚急治法宜下也大陷胸丸方大黃半斤葶藶子熬半升芒硝半升杏仁去皮尖熬黑半升上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其脈浮大者不可下下之則死注結胸證若脈大是為胃實知結熱已實乃可下下之則愈今其脈浮大是尚在表知熱結未實故不可下若誤下之未盡之表邪復乘虛入裏誤而又誤結而又結病熱彌深正氣愈虛則死矣集注張兼善曰結胸為可下之證若脈浮大心下雖結表邪尚多下之重虛其裏外邪復聚則死矣程知曰結胸亦有不可下者宜審其脈以施治也結胸為邪結上焦之分得寸脈浮關脈沉或沉緊則為在裏可下也若脈浮大則邪猶在表下之是令其結而又結也故死結胸證悉具煩躁者亦死注結胸證悉具謂硬滿而痛結在膈之上下也悉具者謂胸之下少腹之上左右兩脅無不硬滿而痛也較之大結胸為尤甚此時宜急下之或有生者若復遷延必至邪勝正負形氣相離煩躁不寧下亦死不下亦死矣集注方有執曰結胸證全具已主死矣而更加以煩躁即不再下亦主死也程應旄曰結胸證妄下不可失下亦不可總在適當其宜則去邪即所以安正也魏荔彤曰此條乃承上條脈見浮大而言必結胸證具脈兼見浮大而加以煩躁方可卜其死不然煩躁亦結胸證中之一也何遽云死耶問曰病有結胸有藏結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白苔滑者難治注邪結三陽名曰結胸邪結三陰名曰藏結二者皆下後邪氣乘虛入裏所致而其脈與證之狀則不同其硬滿而按之痛結胸證也寸脈浮關脈沉結胸脈也寸浮主胸主表關沉主胃主裏是知其邪由胸表陷入胃裏而結也如結胸狀飲食如故時時下利藏結證也寸脈浮關脈細小沉緊藏結脈也細小沉緊主藏結寒痛是知其邪由胸表陷入藏裏而結也藏結雖硬滿而痛如結胸狀然結胸病屬裏壅塞必不能飲食藏結病屬裏空虛故飲食如故結胸屬實熱故硬痛不大便而脈沉石藏結屬虛寒故硬痛下利而脈細緊也舌上白苔滑者胸中無熱可知藏結陰邪得之為順尚可以理中輩溫之結胸陽邪得之為逆不堪攻之故難治也集注成無己曰氣宜通也以塞故痛邪結陽分則陰氣不得下通邪結陰分則陽氣不得上通故知二者皆按之痛硬也方有執曰此設問答以明結胸藏結之同異藏結之時時下利者陰邪結於陰藏而寒甚也以寒甚故脈小細緊此其所以不同也蓋結胸以陽邪結於陽藏結以陰邪結於陰故也汪琥曰結胸證其人本胃中有飲食下之太早則食去不盡外邪反入結於胸中以故按之則痛不能飲食藏結證其人胃中本無飲食下之太過則藏虛邪入與寒結於陰分所以狀如結胸持之不痛能飲食時下利也魏荔彤曰人知此條為辨結胸非指藏結而論不知正謂藏結與痞有相類而與結胸實有不同蓋結胸陽邪也痞與藏結陰邪也痞則尚有陽浮於上藏結則上下俱無陽是皆誤下誤吐之過也按此條舌上白苔滑者難治句前人舊注皆單指藏結而言未見明晰誤人不少蓋舌苔白滑即結胸證具亦是假實舌苔干黃雖藏結證具每伏真熱藏結陰邪白滑為順尚可溫散結胸陽邪見此為逆不堪攻下故為難治由此可知著書立論必須躬親體驗真知灼見方有濟於用若徒就紙上陳言牽强附會又何異按圖索驥耶病脅下素有痞連在臍旁痛引少腹入陰筋者此名藏結死注病藏結之人若脅下素有痞連在臍旁新舊病合痛引少腹入陰筋者其邪又進厥陰乃屬藏結之死證也集注程知曰宿結之邪與新結之邪交結而不解痞連臍旁脾藏結也痛引少腹腎藏結也自脅入陰筋肝藏結也三陰之藏俱結矣故主死藏結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也注藏結無三陽證不發熱無太陽也不往來寒熱無少陽也其人反靜無陽明也舌苔滑白胸中有寒故可溫不可攻也集注方有執曰苔滑本丹田有熱胸中有寒而成然丹田陰也胸中陽也熱反在陰而寒反在陽所以為不可攻也程知曰經於藏結白苔滑者只言難治未嘗言不可治也只言藏結無熱舌苔滑者不可攻未嘗言藏結有熱舌苔不滑者亦不可攻也意者丹田有熱胸中有寒之證必有和解其熱溫散其寒之法俾內邪潛消外邪漸解者斯則良工之苦心乎病在陽應以汗解之反以冷水潠之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱被却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法注病在陽謂病發於陽而身熱也此應以汗解之而反以冷水潠之灌之則身熱雖被劫而暫却然終不得去故熱煩益甚也水寒外束膚熱乍凝故肉生膚粟熱入不深故意欲飲水反不甚渴也故以文蛤散內疏膚熱若不差與五苓散外解水寒則皮粟身熱當解矣若不解且惡寒引衣自覆是尚有表也當以桂枝湯汗解之假令服桂枝湯汗已出熱粟俱解而腹中增痛又為表已和裏未調也宜與桂枝湯倍加芍藥調裏以和其表若渴欲飲水而不腹痛則不須調太陰裏而仍當調太陽府矣宜仍取乎五苓也文蛤散方文蛤五兩上一味為散沸湯和一錢匕服湯用五合按文蛤即五倍子也
