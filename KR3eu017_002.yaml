body:
  text: 卷二辨太陽病脈證并治中篇太陽統攝之營衛乃風寒始入之兩途風則傷衛寒則傷營衛氣剽疾統氣而行脈外其用疏泄而屬陽邪之犯也易故其犯之也則有汗為虛邪營氣專精統血而行脈中其體固密而屬陰邪之犯也難故其犯之也則無汗為實邪夫冬固寒令也然春月餘寒秋末早寒皆能致病但有無汗實邪證候顯然即可謂之傷寒不必盡屬隆冬也然太陽經也膀胱府也由經視府則經為表而府為裏矣上篇用桂枝湯解肌所以治風傷衛之表也而未及衛分之裏故又立五苓散一方佐桂枝以和衛分之裏焉此篇用麻黃湯發汗所以治寒傷營之表也而未及營分之裏故又立桃核抵當方佐麻黃以攻營分之裏焉至於汗下失宜過之則傷正而虛其陽不及則熱熾而傷其陰虛其陽則從少陰陰化之證多以太陽少陰為表裏也傷其陰則從陽明陽化之證多以太陽陽明遞相傳也此篇中所以又有四逆承氣之治也凡風傷衛之虛邪已列上篇茲以寒傷營之實邪疏為中篇使讀者先會大意於胸中斯臨證處方自不致誤矣太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒注太陽病即上篇首條脈浮頭項強痛惡寒之謂也營表陰也寒陰邪也寒邪傷人則營受之從其類也已發熱者寒邪束於皮毛元府閉密陽氣鬱而為熱也未發熱者寒邪初入尚未鬱而為熱頃之即發熱也惡寒者為寒所傷故惡之也必惡寒者謂不論已熱未熱而必惡寒也寒入其經故體痛也胃中之氣被寒外束不能發越故嘔逆也寒性徑急故脈陰陽俱緊也此承上篇首條言太陽病又兼此脈此證者名曰傷寒以為傷寒病之提綱後凡稱傷寒者皆指此脈證而言也集注方有執曰或者未定之辭必者定然之謂曰或曰必者言發熱早晚不一而惡寒則定然即見也喻昌曰仲景慮惡寒體痛嘔逆又未發熱恐誤認為陰經之證故早於篇首揭明此語以辨之程應旄曰傷寒陰陽俱緊之脈大不同於中風陽浮而陰弱之緩脈矣證與脈兼得其實然後乃得正其名曰此太陽傷寒之病而非中風所能混也魏荔彤曰傷寒中風同一浮脈而彼為浮緩此為浮緊陽邪舒散故緩陰邪徑急故緊同為在表之浮而一緩一緊風寒迥異矣太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之注此承上條而詳言其證以出其治也太陽經脈起於目內眥上額交巔入絡腦還出別下項循肩膊內挾脊抵腰中至足小指出其端寒邪客於其經則營血凝澀所傷之處無不痛也營病者惡寒衛病者惡風今營病而惡風者蓋以風動則寒生惡則皆惡未有惡寒而不惡風惡風而不惡寒者所以仲景於中風傷寒證中每互言之以是知中風傷寒不在惡寒惡風上辨而在微甚中別之也無汗者傷寒實邪腠理閉密雖發熱而汗不出不似中風虛邪發熱而汗自出也陽氣被寒邪所遏故逆而為喘主之以麻黃湯者解表發汗逐邪安正也集注成無己曰寒則傷營頭痛身疼腰痛以致牽連骨節疼痛者太陽經營血不利也程應旄曰頭痛發熱太陽病皆然而身疼腰痛骨節疼痛是寒傷營室若風傷衛則無是也惡風太陽病皆然而無汗而喘是陽被壅遏若風傷衛則無是也得其所同因以別其所異也沈明宗曰太陽之邪從皮毛而入鬱逆肺氣以故作喘且寒主收斂傷營則腠理閉密故用麻黃湯發之麻黃湯方麻黃去節三兩桂枝二兩甘草炙一兩杏仁湯浸去皮尖七十個上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去渣溫服八合覆取微似汗不須啜粥余如桂枝法將息方解名曰麻黃湯者君以麻黃也麻黃性溫味辛而苦其用在迅升桂枝性溫味辛而甘其能在固表證屬有餘故主以麻黃必勝之算也監以桂枝制節之師也杏仁之苦溫佐麻黃逐邪而降逆甘草之甘平佐桂枝和內而拒外飲入於胃行氣於元府輸精於皮毛斯毛脈合精溱溱汗出在表之邪必盡去而不留痛止喘平寒熱頓解不須啜粥而藉汗於穀也必須煮掠去上沫者恐令人煩以其輕浮之氣過於引氣上逆也其不用薑棗者以生薑之性橫散於肌礙麻黃之迅升大棗之性泥滯於膈礙杏仁之速降此欲急於直達少緩則不迅橫散則不升矣然此為純陽之劑過於發汗如單刀直入之將用之若當一戰成功不當則不戢而召禍故可一而不可再如汗後不解便當以桂枝代之此方為仲景開表逐邪發汗第一峻藥也庸工不知其制在溫覆取汗若不溫覆取汗則不峻也遂謂麻黃專能發表不治他病孰知此湯合桂枝湯名麻桂各半湯用以和太陽留連未盡之寒熱去杏仁加石膏合桂枝湯名桂枝二越婢一湯用以解太陽熱多寒少之寒熱若陽盛於內無汗而喘者又有麻黃杏仁甘草石膏湯以解散太陰肺家之邪若陰盛於內而無汗者又有麻黃附子細辛甘草湯以溫散少陰腎家之寒金匱要略以此方去桂枝千金方以此方桂枝易桂皆名還魂湯用以治邪在太陰卒中暴厥口噤氣絶下咽奏效而皆不溫覆取汗因是而知麻黃湯之峻與不峻在溫覆與不溫覆也此仲景用方之心法豈常人之所得而窺耶集解王肯堂曰此方為元氣不虛者設也如挾時氣者宜十神湯挾暑濕者宜正氣湯挾寒者宜五積散挾熱者宜通聖散挾食者宜養胃湯挾痰者宜芎蘇散按肯堂之議誠當矣然必證兼表裏邪因錯雜似傷寒而非傷寒者乃可於諸方中斟酌選用若脈證與麻黃桂枝吻合自當遵仲景之法治之即元氣素虛或平素有熱不宜麻桂者亦必如劉完素張潔古法緩緩消息治之庶不誤人臨病之工宜詳審焉吳綬曰凡傷寒寒邪在表閉其腠理身痛拘急惡寒無汗須用麻黃辛苦之藥開發腠理逐寒邪使汗出而解惟夏月炎暑之時雖有是證宜加涼藥方可用如防風通聖散三黃石膏湯是也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也注傷寒一日太陽受之當脈浮緊或汗或未汗若脈靜如常此人病脈不病為不傳也初病或嘔未止頗欲吐若躁煩脈數急者此外邪不解內熱已成病勢欲傳也宜以大青龍湯發表解熱以殺其勢或表裏有熱證者則當以雙解湯兩解之也集注沈明宗曰此憑脈辨證知邪傳與不傳也脈浮而緊為太陽正脈乃靜是不傳他經矣若頗欲吐或躁煩而脈數急則邪機向裏已著勢必傳經為病也傷寒二三日陽明少陽證不見者為不傳也注傷寒二日陽明受之三日少陽受之此其常也若二三日陽明證之不惡寒反惡熱身熱心煩口渴不眠等證與少陽證之寒熱往來胸脅滿喜嘔口苦耳聾等證不見者此為太陽邪輕熱微不傳陽明少陽也集注程知曰傷寒一二日太陽二三日陽明三四日少陽四五日太陰五六日少陰六七日厥陰此第言其常耳其中變證不一有專經不傳者有越經傳者有傳一二經而即止者有發於陽即入少陰者有直中三陰者有足經冤熱而傳手經者有誤藥而傳變者大抵熱邪乘經之虛即傳若經實即不受邪而不傳陽邪勝則傳陰邪勝多不傳故經謂脈靜為不傳脈數急為欲傳也又曰足經自足上行胸腹頭背主一身之大綱故寒邪入之即見於其經若手經第行於胸手不能主一身之大綱也邪既入足經必傳入手經故感風寒之重者頭項痛肩背肘節亦痛也聖人言足不言手足可該手手不可該足也非不傳手也夫五藏六府十二經氣相輸絡相通豈有傳足而不傳手者哉亦豈有傷足而不傷手者哉虞天民謂熱先手寒先足義亦可互通也程應旄曰傷寒之有六經無非從淺深而定部署以皮膚為太陽所轄故署之太陽肌肉為陽明所轄故署之陽明筋膜為少陽所轄故署之少陽云耳所以華他曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃只就軀殼間約略其淺深而並不署太陽陽明等名然則仲景之分太陽陽明等亦是畫限之意用以轄病也脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯注傷寒脈浮緊者麻黃湯誠為主劑矣今脈浮與浮數似不在發汗之列然視其病皆傷寒無汗之表實則不妨略脈而從證亦可用麻黃湯汗之觀其不曰以麻黃湯發之主之而皆曰可發汗則有商量斟酌之意焉集注方有執曰傷寒脈本緊不緊而浮則邪見還表而欲散可知矣發者拓而出之也麻黃湯者乘其欲散而拓出之也或脈浮而數傷寒之欲傳也而亦宜麻黃湯發汗者言乘寒邪有向表之浮當散其數而不令其至於傳也程應旄曰麻黃湯為寒傷營之主劑然亦當於脈與證之間互參酌之不必泥定緊之一字始為合法也脈浮無緊似不在發汗之列然視其證一一寒傷營之表病則不妨略脈而詳證無汗可發汗定麻黃湯若脈浮數邪勢欲傳於裏亦不妨略證而詳脈無汗可發汗亦宜麻黃湯就此二者之脈與證互參之其有脈見浮緊證具傷寒二者俱符又何麻黃湯之必在禁例哉劉宏璧曰但脈浮不緊何以知其表寒實也必然無汗始可發也脈數何以知其未入裏也以脈兼浮故可汗也太陽病外證未解脈浮弱者當以汗解宜桂枝湯注太陽病外證未解謂太陽病表證未解也若脈浮緊是為傷寒外證未解今脈浮弱是為中風外證未解也故當以桂枝湯汗解之集注方有執曰外證未解謂頭痛項強惡寒等證猶在也浮弱即陽浮而陰弱此言太陽證凡在未傳變者仍當從於解表蓋嚴戒不得早下之意程知曰外證未解脈見浮弱即日久猶當以汗解然只宜桂枝解肌之法不宜誤行大汗之劑至於不可誤下更不待言矣傷寒發汗已解半日許復煩脈浮數者可更發汗宜桂枝湯注傷寒服麻黃湯發汗汗出已熱退身涼解半日許復煩熱而脈浮數者是表邪未盡退而復集也可更發汗其不用麻黃湯者以其津液前已為發汗所傷不堪再任麻黃故宜桂枝更汗可也集注方有執曰傷寒發汗者服麻黃湯以發之之謂也解散也復重復也既解半日許何事而復哉言發汗或不如法或汗後不謹風寒而復煩熱脈轉浮數也故曰可更發汗更改也言當改前法故曰宜桂枝湯喻昌曰用桂枝湯者一以邪重犯衛一以營虛不能復任麻黃也程應旄曰改前發汗之法為解肌則雖主桂枝不為犯傷寒之禁也汪琥曰仲景法脈浮而數者可發汗宜麻黃湯然此條已曾用過麻黃湯矣故當更方以發其汗宜桂枝湯發汗病不解反惡寒者虛故也芍藥甘草附子湯主之按發汗病不解之不字當是衍文蓋發汗病不解則當惡寒今曰反惡寒者正所謂病解之義也病解惡寒始謂之虛注傷寒發汗病不解則當惡寒非表虛也是表邪猶在不解仍當汗也今發汗汗出病已解不當惡寒矣反惡寒者非表邪也乃陽虛不能衛外所致故以芍藥甘草附子湯主之蓋用附子以扶陽芍藥以補陰甘草佐附芍補陰陽而調營衛也集注方有執曰未汗而惡寒邪盛而表實已汗而惡寒邪退而表虛汗出之後大邪退散榮氣衰微衛氣疏慢而但惡寒故曰虛芍藥甘草附子湯方芍藥三兩甘草炙二兩附子炮去皮破八片一枚以上三味以水五升煮取一升五合去滓分溫服集解程應旄曰傷寒發汗一法原為去寒而設若表已解較前反惡寒者非復表邪可知緣汗外泄而表遂虛故主之以芍藥甘草附子湯芍藥得桂枝則發表得附子則補表甘草和中從陰分斂戢其陽陽回而虛者不虛矣發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯注傷寒發汗汗出病解必不惡寒亦不惡熱始可為愈若發汗後惡寒者是陽虛也宜用芍藥甘草附子湯主之今發汗後不惡寒但惡熱則是胃實也故與調胃承氣湯瀉熱以和胃也集注方有執曰發汗後不惡寒其人表氣強也但熱亡津液而胃中干故曰實也當和胃氣以干在胃而實也故曰與調胃承氣湯所以瀉實而甘草則有瀉中調和之義程知曰汗後惡寒則為榮衛俱虛汗後不惡寒但發熱則為津干胃實故有調胃通津之法然曰當曰與則似深有酌量而不肯妄下以重虛其津者調胃承氣湯方見陽明篇脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也注脈浮緊者寒傷榮之脈也身痛者寒傷榮之證也脈證皆表實邪則當發汗宜麻黃湯設若寸關脈浮緊惟尺中遲者則又不可發汗何也以其人平素榮氣不足血少故也由此可知脈陰陽不俱緊不可輕汗也集注方有執曰尺以候陰遲為不足榮主血汗者血之液尺遲不宜汗者嫌奪血也張璐曰尺中脈遲不可用麻黃發汗當頻與小建中湯和之和之而邪解不須發汗設不解不妨多與之覆而汗之可也發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之注發汗後身疼痛脈浮緊或浮數乃發汗未徹表邪未盡也仍當汗之宜桂枝湯今發汗後身雖疼痛脈見沉遲是榮衛虛寒故宜桂枝新加湯以溫補其榮衛也集注成無己曰表邪盛則身疼血虛亦身疼其脈浮緊者邪盛也脈沉遲者血虛也盛者損之則安虛者益之則愈喻昌曰脈沉遲者六部皆然與尺遲大異尺遲乃素虛此為發汗新虛故於桂枝方中倍加芍藥生薑各一兩以去邪加人參三兩以補正名曰新加湯者明非桂枝湯中之舊法也汪琥曰身疼痛脈沉遲焉知非中寒證要知此證乃太陽傷寒發汗後身疼不止脈變沉遲非中寒比也桂枝新加湯方桂枝一兩芍藥四兩甘草二兩人參三兩生薑切四兩大棗擘十二枚上六味以水一斗二升微火煮取三升去滓分溫服如桂枝法方解是方即桂枝湯倍芍藥生薑加人參也汗後身疼痛是榮衛虛而不和也故以桂枝湯調和其榮衛倍生薑者以脈沉遲榮中寒也倍芍藥者以榮不足血少故也加人參者補諸虛也桂枝得人參大氣周流氣血足而百骸理人參得桂枝通行內外補榮陰而益衛陽表虛身疼未有不愈者也病發熱頭痛脈反沉若不差身體疼痛當溫其裏宜四逆湯按身體疼痛之下當有下利清穀四字方合當溫其裏之文觀太陰篇云傷寒醫下之續得下利清穀不止身痛者急當救裏宜四逆湯此雖未下但脈反沉可知裏寒必是脫簡注病發熱頭疼凡太陽表證也脈當浮今反沉是太陽表證而得少陰裏脈也凡太陽少陰表裏皆寒無汗之病均宜以麻黃附子細辛湯發之若不差不下利者更以麻黃附子甘草湯和之若下利清穀即有身體疼痛之表未解不可更汗當溫其裏宜四逆湯防其陽從陰化變厥惕亡陽之逆斷不可謂病在太陽無可溫之理也四逆湯方見少陰篇傷寒若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之按傷寒二字之下當有若汗二字蓋發汗較吐下更傷津液為多也時時惡風當是時汗惡風若非汗字則時時惡風是表不解白虎湯在所禁也論中謂發熱無汗表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之讀者細玩經文自知注傷寒若汗若吐若下後七八日不解以致熱結表裏時汗惡風者結熱在表未解也大渴舌上乾燥而煩欲飲水數升者結熱在裏已彰也故曰表裏俱熱宜白虎加人參湯主之以白虎能外解肌熱內清裏熱也加人參者因汗吐下後津亡氣弱藉此以益氣生津也按大青龍湯治太陽表裏俱熱表多裏少故不渴也白虎湯治陽明表裏俱熱裏多表少故大渴也今大渴燥煩時汗惡風是熱在陽明又兼太陽也而用白虎湯者以陽明裏熱證多太陽表熱證少也若無汗微渴則為太陽表證多即表裏大熱又當用大青龍湯矣集注喻昌曰玩此條本文熱結在裏表裏俱熱已自酌量惟熱結在裏所以表熱不除況加大渴飲水安得不以清熱為急耶程知曰表熱者身熱也裏熱者內熱也以汗吐下後不解故邪氣乘虛結為裏熱惟結熱在裏所以表熱不除有惡風證也大渴引飲裏熱熾盛安得不以白虎急解之石膏辛寒能清裏熱兼散表熱也惟其在汗吐下後故必加人參以顧其正氣也汪琥曰與白虎湯加人參扶正氣以分解內外之邪熱要之此湯惟正氣虛而邪氣微者宜之若邪氣甚者不敢輕加人參也白虎加人參湯方見陽明篇發汗已脈浮數煩渴者五苓散主之按脈浮數之下當有小便不利四字若無此四字則為陽明內熱口燥之煩渴白虎湯證也以其有小便不利煩渴則為太陽水熱瘀結之煩渴五苓散證也況無小便不利證而用五苓散則犯重竭津液之禁矣太陽上篇類此證者數條惟一條水入即吐水不下行故無小便不利之文此條應有小便不利四字注發汗已為太陽病已發過汗也脈浮數知邪仍在表也若小便利而煩渴者是初入陽明胃熱白虎湯證也今小便不利而煩渴是太陽府病膀胱水蓄五苓證也故用五苓散如法服之外疏內利表裏均得解矣集注方有執曰已者言發汗畢非謂表病罷也煩渴者膀胱水蓄不化津液故用四苓以利之浮數者外表未除故憑一桂以和之所以謂五苓能兩解表裏也傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之注此申上條或渴而不煩或煩而不渴者以別其治也傷寒發汗後脈浮數汗出煩渴小便不利者五苓散主之今惟曰汗出者省文也渴而不煩是飲盛於熱故亦以五苓散主之利水以化津也若不煩且不渴者是裏無熱也惟脈浮數汗出小便不利是榮衛不和也故主以茯苓甘草湯和表以利水也集注鄭重光曰傷寒本無汗汗因發而出也上條煩而渴此條但渴不煩裏證較輕治亦不殊若更不渴則內無燥裏病少而表證猶多也故用桂枝湯之三五苓散之一示三表一裏之意易名曰茯苓甘草湯者乃桂枝五苓之變制也茯苓甘草湯方茯苓二兩桂枝二兩生薑切三兩甘草炙一兩上四味以水四升煮取三升去滓分溫三服方解是方乃仿桂枝五苓二方之義小制其法也有脈浮數汗出之表故主以桂枝去大棗芍藥者因有小便不利之裏恐滯斂而有礙於癃閉也五苓去朮澤豬苓者因不渴不煩裏飲無多惟小便一利可愈恐過於燥滲傷陰也集解汪琥曰五苓散茯苓甘草湯二方皆太陽標本齊病表裏兼主之劑何謂標太陽之經是也何謂本膀胱之府是也經在表本在裏五苓散邪已入府表證已微故方中只用桂枝一味以主表其餘四味皆主裏之藥也茯苓甘草證邪猶在經裏證尚少故方中只用茯苓一味以主裏其餘三味皆主表之藥也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便自汗出愈注傷寒未發熱脈多浮緊寒盛也已發熱脈多浮數熱盛也均宜麻黃湯發汗則愈若不發汗而誤下之不成逆壞者必其人裏氣素實也故惟見失汗身重之表誤下心悸之裏則不可復發其汗當待其表裏自和自然汗出而解所以然者因失汗表實誤下裏虛尺中脈微表裏未諧故不即解也須待其裏亦實而與表平平則和和則陽津陰液自相和諧所以便自汗出而愈也使裏實之法即下條用小建中湯法也集注喻昌曰此亦先建中而後發汗之變法要知仲景云尺脈微者不可發汗又云尺微者不可下無非相人津液之奧旨所以誤下之脈雖浮數不改亟宜發汗者亦必當諦其尺脈不可率意徑情有如此者張璐曰誤下身重心悸縱脈仍浮數亦不可復發其汗設尺脈微為裏陰素虛尤宜戒也脈浮而數熱邪已甚將欲作汗今誤下之故身重心悸當與小建中和其津液汗出而愈傷寒二三日心中悸而煩者小建中湯主之注傷寒二三日未經汗下即心悸而煩必其人中氣素虛雖有表證亦不可汗之蓋心悸陽已微心煩陰已弱故以小建中湯先建其中兼調榮衛也集注王肯堂曰傷寒二三日心中悸而煩者小建中湯主之傷寒脈弦細屬少陽不可汗汗之則譫語胃不和則煩而悸大抵先煩而後悸者是熱先悸而後煩者是虛治病必求其本者此也程應旄曰可見陽去入陰必有其先兆善治者急宜杜之於未萌心中悸而煩則裏氣虛而陽為陰襲建中湯補虛和裏保定中州以資氣血為主雖悸與煩皆小柴胡湯中兼見之證而得之二三日裏證未必即具小柴胡湯非所宜也魏荔彤曰建中者治其本也與建中後徐審其在表則仍當發汗以中州既建雖發汗陽亦不致亡矣審其傳裏則應下之以中州既建雖下陽亦不致陷矣所謂急則從標而緩則從本也小建中湯方桂枝三兩芍藥六兩甘草二兩生薑切三兩膠飴一升大棗擘十二枚上六味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也方解是方也即桂枝湯倍芍藥加膠飴也名曰小建中者謂小小建立中氣也蓋中氣雖虛表尚未和不敢大補故仍以桂枝和營衛倍芍藥加膠飴調建中州而不啜稀粥溫覆令汗者其意重在心悸中虛而不在傷寒之表也中州建立營衛自和津液可生汗出乃解悸煩可除矣嘔家不可用謂凡病嘔者不可用恐甜助嘔也傷寒脈結代心動悸炙甘草湯主之注心動悸者謂心下築築惕惕然動而不自安也若因汗下者多虛不因汗下者多熱欲飲水小便不利者屬飲厥而下利者屬寒今病傷寒不因汗下而心動悸又無飲熱寒虛之證但據結代不足之陰脈即主以炙甘草湯者以其人平日血氣衰微不任寒邪故脈不能續行也此時雖有傷寒之表未罷亦在所不顧總以補中生血復脈為急通行營衛為主也集注成無己曰脈之動而中止能自還者名曰結不能自還者名曰代由血氣虛衰不能相續也程知曰此又為議補者立變法也曰傷寒則有邪氣未解也心主血曰脈結代心動悸則是血虛而真氣不相續也故峻補其陰以生血更通其陽以散寒無陽則無以綰攝微陰故方中用桂枝湯去芍藥而漬以清酒所以挽真氣於將絶之候而避中寒於脈弱之時也觀小建中湯而後知傷寒有補陽之方觀炙甘草湯而後知傷寒有補陰之法也程應旄曰此又以脈論邪氣留結曰結正氣虛衰曰代傷寒見此而加以心動悸乃真氣內虛故用炙甘草湯益陰寧血和榮衛以為主又曰太陽變證多屬亡陽少陽變證兼屬亡陰以少陽與厥陰為表裏榮陰被傷故也用炙甘草湯和榮以養陰氣為治也炙甘草湯方甘草炙四兩生薑切三兩桂枝三兩麥門冬半升麻子仁半斤大棗擘十二枚人參二兩阿膠二兩生地黃一斤上九味以清酒七升水八升先煮八味取三升去滓納阿膠煬消盡溫服一升日三服一名復脈湯集解張璐曰津液枯稿之人宜預防二便祕澀之虞麥冬生地溥滋膀胱之化源麻仁阿膠專主大腸之枯約免致陰虛泉竭火燥血枯此仲景救陰退陽之妙法也柯琴曰仲景凡於不足之脈陰弱者用芍藥以益陰陽虛者用桂枝以通陽甚則加人參以生脈未有用麥冬者豈以傷寒之法義重扶陽乎抑陰無驟補之法與此以中虛脈結代用生地黃為君麥冬為臣峻補真陰者是已開後學滋陰之路矣然地黃麥冬味雖甘而氣則寒非發陳蕃秀之品必得人參桂枝以通陽脈生薑大棗以和營衛阿膠補血酸棗安神甘草之緩不使速下清酒之猛捷於上行內外調和悸可寧而脈可復矣酒七升水八升只取三升者久煎之則氣不峻此虛家用酒之法且知地黃麥冬得酒則良此證當用酸棗仁肺痿用麻子仁可也如無真阿膠以龜版膠代之未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此注未持脈時病人叉手自冒其心師因教試令咳而不咳者此必兩耳聾無所聞也其聾與叉手冒心同見則非少陽之邪可知乃重發汗陽虛故致此也集注喻昌曰此示人推測陽虛之一端也陽虛耳聾宜急固其陽與少陽傳經邪盛之耳聾迥別程應旄曰諸陽受氣於胸中而精氣上通於耳今以重發汗而虛其陽陽氣所不到之處精氣亦不復注而通之故聾發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之注此申上條以詳其證而明其治也發汗過多外亡其液內虛其氣氣液兩虛中空無倚故心下悸惕惕然不能自主所以叉手冒心欲得自按以護庇而求定也故用桂枝甘草湯以補陽氣而生津液自可愈矣集注方有執曰汗多則傷血血傷則心虛心虛則動惕而悸故叉手自冒而欲得人按也桂枝走表斂液宅心能固疏漫之表甘草和裏補中益氣能調不足之中合二物以為方蓋斂陰補陽之法也程知曰此汗後心虛補陽法也陽受氣於胸中胸中陽氣衰微故叉手冒心心悸欲按也程應旄曰汗為心液不惟妄汗不同即當汗而失其分數亦不可叉手冒心欲得按者因陽虛不能自主而心下悸也然心悸有心氣虛有水氣乘水乘先因心虛今心下悸者乃陽氣虛惕然自恐欲得按以御之故用桂枝甘草載還上焦之陽使回旋於胸中也魏荔彤曰此條乃發汗過多之禁也風傷衛固不宜汗出如水流漓矣即寒傷營宜發汗亦只汗出表解斯已耳不可聽其大汗不止致有陽虛之變證也仲景言其人叉手自冒心心下悸欲得按者乃形容汗多亡陽之象也桂枝甘草湯方桂枝四兩甘草炙二兩上二味以水三升煮取一升去滓頓服集解柯琴曰汗出多則心液虛中氣餒故悸叉手自冒則外有所衛得按則內有所依如此不堪之狀望之而知其為虛矣桂枝本營分藥得麻黃則令營氣外發而為汗從辛也得芍藥則收斂營氣而止汗從酸也得甘草則補中氣而養血從甘也故此方以桂枝為君獨任甘草為佐以補陽氣生心液甘溫相得斯氣血和而悸自平不須附子者以汗雖多而未至於亡陽不須芍藥者以汗已止而嫌其斂陰也發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之注發汗後心下悸者乃虛其心中之陽本經自病也今發汗後臍下悸欲作奔豚者乃心陽虛而腎水之陰邪乘虛欲上干於心也主之以茯苓桂枝甘草大棗湯者一以扶陽一以補土使水邪不致上干則臍下之悸可安矣集注程知曰發汗後心下悸者心液虛而腎氣將動也腎氣欲上奔故臍下先悸也謂之豚者指腎氣也喻昌曰汗本心之液發汗後臍下悸者心氣虛而腎氣發動也故取茯苓桂枝直趨腎界預伐其邪所謂上兵伐謀也汪琥曰奔豚者腎之積名也發於少腹上至心下若豚狀乃腎氣發動有似乎奔豚之狀非真臍下有積如豚也茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩甘草炙一兩大棗擘十五枚上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之方解此方即苓桂朮甘湯去白朮加大棗倍茯苓也彼治心下逆滿氣上衝胸此治臍下悸欲作奔豚蓋以水停中焦故用白朮水停下焦故倍茯苓臍下悸是邪上干心也其病由汗後而起自不外乎桂枝之法仍以桂枝甘草補陽氣生心液倍加茯苓以君之專伐腎邪用大棗以佐之益培中土以甘瀾水煎取其不助水邪也土強自可制水陽建則能御陰欲作奔豚之病自潛消而默化矣若已作奔豚腎陰邪盛又非此藥所能治則當從事乎桂枝加桂湯法矣服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之按去桂當是去芍藥此方去桂將何以治仍頭項強痛發熱無汗之表乎細玩服此湯曰餘依桂枝湯法煎服其意自見服桂枝湯已溫覆令一時許通身漐漐微似有汗此服桂枝湯法也若去桂則是芍藥甘草茯苓白朮並無辛甘走營衛之品而曰餘依桂枝湯法無所謂也且論中有脈促胸滿汗出惡寒之證用桂枝去芍藥加附子湯主之去芍藥者為胸滿也此條證雖稍異而其滿則同為去芍藥可知矣注此條為汗下後表不解而心下有水氣者立治法也服桂枝湯或下之均非其治矣仍有頭項強痛翕翕發熱無汗之表證心下滿微痛小便不利停飲之裏證設未經汗下則是表不解而心下有水氣當用小青龍湯汗之今已經汗下表裏俱虛小青龍湯非所宜也故用桂枝湯去芍藥之酸收避無汗心下之滿加苓朮之燥滲使表裏兩解則內外諸證自愈矣集注外臺方議問曰心下滿微痛乃是欲成結胸何緣作停飲治之答曰諸證皆似結胸但小便不利一證乃停飲也故此條仲景只作停飲治之喻昌曰服桂枝湯病不解而證變又或下之則邪勢乘虛入裏是益誤矣在表之邪未除而在裏之飲上逆故仿五苓兩解表裏之法也張璐曰此條頗似結胸所以辨為太陽表證尚在者全重在翕翕發熱無汗上林瀾曰頭項強痛經汗下而不解心下滿微痛小便不利此為水飲內蓄故加苓朮得小便利水飲行腹滿減而表證悉愈矣如十棗湯證亦頭痛乃飲熱內蓄表證已解故雖頭痛只用逐飲飲去則病自安也桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂加茯苓白朮各三兩餘依桂枝湯法煎服小便利則愈按去桂去芍之義詳見上條經文下正誤文內方解曰餘依桂枝湯法煎服謂依桂枝湯法取汗也小便利則愈謂飲病必輸水道始愈也此方即苓桂朮甘湯而有生薑大棗其意專在解肌利水次之故用生薑大棗佐桂枝以通津液取汗也苓桂朮甘湯不用生薑大棗而加茯苓其意專在利水扶陽次之故倍加茯苓君桂枝於利水中扶陽也所以方後不曰依服桂枝湯法也傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之注傷寒若過發汗則有心下悸叉手冒心臍下悸欲作奔豚等證今誤吐下則胸虛邪陷故心下逆滿氣上衝胸也若脈浮緊表仍不解無汗當用麻黃湯有汗當用桂枝湯一汗而胸滿氣衝可平矣今脈沉緊是其人必素有寒飲相挾而成若不頭眩以瓜蒂散吐之亦自可除今乃起則頭眩是又為胸中陽氣已虛不惟不可吐亦不可汗也如但以脈之沉緊為實不顧頭眩之虛而誤發其汗則是無故而動經表更致衛外之陽亦虛一身失其所倚故必振振而搖也主之以苓桂朮甘湯者滌飲與扶陽並施調衛與和營共治也茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩白朮二兩甘草炙二兩上四味以水六升煮取三升去滓分溫三服方解身為振振搖者即戰振身搖也身振振欲劈地者即戰振欲墮於地也二者皆為陽虛失其所恃一用此湯一用真武者蓋真武救青龍之誤汗其邪已入少陰故主以附子佐以生薑苓朮是壯裏陽以制水也此湯救麻黃之誤汗其邪尚在太陽故主以桂枝佐以甘草苓朮是扶表陽以滌飲也至於真武湯用芍藥者裏寒陰盛陽衰無依於大溫大散之中若不佐以酸斂之品恐陰極格陽必速其飛越也此湯不用芍藥者裏寒飲盛若佐以酸斂之品恐飲得酸反凝滯不散也發汗若下之而煩熱胸中窒者梔子豉湯主之注發汗表未解若下之表邪入裏既不從實化而為結胸氣衝亦不從虛化而為痞硬下利但作煩熱胸中窒者以表邪輕所陷者淺故只為煩熱胸中不快也梔子苦能涌泄寒能勝熱豆豉輕腐上行佐梔子使邪熱上越於口庶一吐而胸中舒煩熱解矣集注方有執曰窒者邪熱壅滯而窒塞未至於痛較痛為輕也程知曰下之而陽邪內結則以陷胸攻之陰邪內結則以瀉心開之至虛熱上煩則以梔豉湧之未經下而胸中多痰則以瓜蒂吐之已經下而胸中虛煩則以梔豉吐之古人於虛實寒熱之法既明且備如此林瀾曰陽受氣於胸中若汗若下使陽氣不足邪熱客於胸中結而不散煩熱窒塞故宜此湯吐胸中之邪汪琥曰胸中窒者胸中有物也下之而不出以其物在膈上故宜吐之梔子豉湯方梔子擘十四枚香豉綿裹四合上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為二服溫進一服得吐者止後服下利後更煩按之心下濡者為虛煩也宜梔子豉湯注此承上條誤下下利後不見諸逆惟更加煩者而言然按之心下濡而不痞者是虛煩也故亦宜梔子豉湯若按之不濡而痞硬則又為實煩當用大黃黃連瀉心湯矣集注方有執曰更煩本有煩不為利除而轉甚也林瀾曰此利後餘熱之證也曰下利後而利止者必非虛寒之煩乃熱遺於胸中也按之心下濡雖熱而非實熱故用此以清其虛煩程應旄曰熱利則煩若得之利後而心下不硬者此為虛煩乃餘熱乘虛而客於胃中也發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之注未經汗吐下之煩多屬熱謂之熱煩已經汗吐下之煩多屬虛謂之虛煩不得眠者煩不能臥也若劇者較煩尤甚必反覆顛倒心中懊憹也煩心煩也躁身躁也身之反覆顛倒則謂之躁無寧時三陰死證也心之反覆顛倒則謂之懊憹三陽熱證也懊憹者即心中欲吐不吐煩擾不寧之象也因汗吐下後邪熱乘虛客於胸中所致既無可汗之表又無可下之裏故用梔子豉湯順其勢以涌其熱自可愈也有前證若更加少氣者是熱傷其氣也加甘草以扶之若嘔者是熱迫其飲也加生薑以散之集注方有執曰虛煩不得眠者大邪乍退正氣暴虛餘熱悶亂胃中不和也劇極也反覆顛倒心中懊憹者胸膈壅滯不得舒快也所以用梔子豉湯高者因而越之之法也程應旄曰發汗若吐若下或胸中窒或虛煩不得眠或反覆顛倒心中懊憹皆屬三法後遺熱壅遏在上客於心胸是以擾亂不寧也並非汗不出之煩躁大青龍無所用諸法亦無所用惟宜以梔子豉湯主之蓋梔子氣味輕越合以香豉能化濁為清但使湧去客邪則氣升液化而鬱悶得舒矣汪琥曰虛煩證奚堪再吐不知虛者正氣之虛煩者邪氣之實邪熱鬱於胸中是為邪實吐證仍在理宜更用吐法所以虛煩二字不可用真虛看作汗吐下後暴虛看梔子甘草豉湯方於梔子豉湯方內加入甘草二兩餘依前法得吐止後服梔子生薑豉湯方於梔子豉湯方內加生薑五兩餘依前法得吐止後服傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之注論中下後滿而不煩者有二一熱氣入胃之實滿以承氣湯下之一寒氣上逆之虛滿以厚朴生薑甘草半夏人參湯溫之其煩而不滿者亦有二一熱邪入胸之虛煩以竹葉石膏湯清之一懊憹欲吐之心煩以梔子豉湯吐之今既煩且滿滿甚則不能坐煩甚則不能臥故臥起不安也然既無三陽之證實又非三陰之虛證惟熱與氣結壅於胸腹之間故宜梔子枳朴涌其熱氣則胸腹和而煩自去滿自消矣此亦吐中寓和之意也集注程應旄曰凡邪客胸便上下不交此與結胸心下痞相等雖吐下和解各不同法其為交通陰陽則一也沈明宗曰下後微邪內陷而無痰飲摶結故無結胸下利但邪陷胸膈擾亂於上則心煩邪入腹中在下則腹滿兩邪逼湊胸腹所以心煩腹滿用此一涌一瀉亦表裏兩解法也梔子厚朴湯方梔子擘十四枚厚朴薑炙四兩枳實去穰炒四兩以上三味以水三升半煮取一升半去滓分三服溫進一服得吐止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之按梔子乾薑湯當是梔子豉湯梔子豉湯當是梔子乾薑湯斷無煩熱用乾薑結痛用香豉之理注傷寒表邪未解醫以丸藥大下之不至結胸痞硬猶未成逆也然身熱不去表仍未罷也微煩者熱陷於胸也表熱之在胸者既輕且微故不可下亦不可清惟宜以梔子豉湯微涌其熱則微煩可除而吐中有發散之意身熱亦可解矣集注汪琥曰丸藥誤下邪熱不除所以身熱不去邪氣乘虛客於胸中故令微煩也梔子乾薑湯方梔子擘十四枚乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服按此方乾薑當是香豉余義詳前經文下正誤文內傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之按此方香豉當是乾薑餘義亦詳前經文下正誤文內注傷寒五六日邪氣在裏之時也大下之後若身熱去心胸和是為欲解矣今身熱不去邪仍在表也心中結痛過下裏寒也故曰未欲解也但此表熱裏寒之證欲溫其裏既礙表熱欲解其表又礙裏寒故惟以梔子之寒乾薑之熱並舉而涌之則解表溫裏兩得之矣豈尚有身熱結痛而不盡除者哉此仲景立兩難治法其妙如此余可類推矣集注王肯堂曰身熱不去四字宜玩結胸身不熱知熱不在表也今身熱不去惟宜越之而已程應旄曰痛而云結殊類結胸但結胸身無大熱知熱已盡歸於裏為實邪此則身熱不去則所結者因下而結客邪仍在於表故云未欲解也凡用梔子湯病人舊微溏者不可與服之注若汗吐下後懊憹少氣嘔逆煩滿心中結痛者皆宜以梔子等湯吐之以其邪留連於胸胃之間或與熱與虛與飲與氣與寒相結而不實則病勢向上即經所謂在上者因而越之之意也若未經汗吐下而有是證則為實邪非梔子湯輕劑所能治矣又當以瓜蒂散重劑主之也若病人舊微溏者雖有是證但裏既久虛不可與服若與之即使客邪盡去亦必正困難支蓋病勢向下涌之必生他變也本草不言梔子為吐劑仲景用之以為吐者何也梔子本非吐藥以其味苦能吐故用之以涌其熱也按吐藥不止梔子也諸藥皆可為之惟要確審胸胃之邪是寒是熱是食是水是痰是氣因何阻滯使胸胃陽氣不伸遂以當用之藥而吐涌之自可愈也如欲吐寒則以乾薑桂皮之類吐熱則以梔子苦茶之類吐食平胃食鹽之類吐水五苓生薑之類吐痰稀涎橘皮之類吐氣流氣枳朴之類但形氣弱者藥宜少仍當佐以補中益氣等升藥為妥形氣壯者藥宜多更佐以瓜蒂藜蘆等猛藥更效凡煎吐藥湯及調散或用酸米湯或用白湯或用稀米粥須備十餘盅令病者頓服一盅即用指探吐藥出再服一盅亦隨用指探吐藥出再服再吐以順溜快吐為度則頭額身上自有微汗所有病證輕減即為中病不必盡服余藥若過吐之即使病盡除恐損胸中陽氣也近世之醫以吐為古法不可用久矣皆因仲景之道不彰其法失傳無怪乎其不敢用也夫不知其妙而不敢用猶之可也若竟委之曰古法不可用則不可也蓋邪之在上者非吐不愈若如俗工所云使病者畏不敢服因循生變致輕者重重者死夫誰之咎與抑知汗吐下三法用之誠當其證無不立時取效後之業醫者又安可只言汗下兩法而置吐法於不用致使古法淪亡也耶集注程知曰此言服梔子亦有禁忌也病人舊微溏裏虛也又服苦寒則不能上湧而反下泄故禁之張志聰曰此言梔子而不言豉者申明梔子之苦能下泄故病人舊微溏不可與服之也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之按張兼善曰麻黃湯主之五字不當在陽氣重之下豈有衄乃解之後而用麻黃湯之理乎其説甚是況服藥已之上並無所服何藥之文宜將此五字移於其上始合注太陽病脈浮緊無汗發熱身疼痛八九日不解謂傷寒表證仍在當以麻黃湯發其汗也服藥已微除者謂已發汗邪雖微除猶未盡除也仍當汗之若因循失汗則陽邪久鬱營中不得宣泄致熱並於陽而發煩熱鬱於陰而目瞑劇者謂熱極也熱極於營勢必逼脈中之血妄行為衄衄則熱隨血去而解矣所以然者陽氣重故也集注程知曰脈見浮緊表證仍在雖八九日仍當以麻黃汗解服湯已其病微除至於煩瞑劇衄乃熱鬱於營陽氣重盛表散之藥與之相摶而然然至於逼血上衄則熱隨血解矣此言發汗當主以麻黃湯非衄解之後仍用麻黃湯也張璐曰服藥已微除復發煩者餘邪未盡也目瞑煩劇者熱盛於經也故迫血妄行而為衄衄則餘熱隨血而解也以汗後復衄故為陽氣重也或言汗後復衄而熱邪仍未盡重以麻黃湯散其未盡之邪非也若果邪熱不盡則衄乃解三字從何著落太陽病脈浮緊發熱身無汗自衄者愈注太陽病脈浮緊發熱無汗此傷寒脈證也當發其汗若當汗不汗則為失汗失汗則寒閉於衛熱鬱於營初若不從衛分汗出而解久則必從營分衄血而愈也故太陽病凡從外解者惟汗與衄二者而已今既失汗於營則營中血熱妄行自衄熱隨衄解必自愈矣集注方有執曰此承上條復以其證之較輕者言以見亦有不治而自愈者所以曉人勿妄治以致誤之意太陽病脈浮緊發熱身無汗與上條同而無疼痛則比之上條較輕可知矣所以不待攻治得衄自愈也汗本血之液北人謂衄為紅汗即此説耳程知曰言得衄雖無汗必自愈也人之傷於寒而為熱者得衄發越故愈張璐曰衄血成流則邪熱隨血而散奪血則無汗也設不自衄當以麻黃湯發之發之而邪解則不衄矣發之而餘邪未盡必仍衄而解傷寒脈浮緊不發汗因致衄者麻黃湯主之注此承上條以出其治也傷寒脈浮緊法當發汗若不發汗是失汗也失汗則熱鬱於營因而致衄者宜麻黃湯主之若能於未衄之先早用麻黃湯汗之汗出則解必不致衄其或如上條之自衄而解亦無須乎藥也按凡傷寒初起但不甚惡寒便知夾熱後多得衄其熱多寒少者則熱隨衄去繼而汗出表與熱均解也其熱少寒多者縱熱隨衄去繼必不汗出表仍不解誠能用青龍麻黃湯於未衄之先發之則汗衄兩解矣若已經衄後而汗不出表不解即用麻桂之藥以和榮衛亦須少兼芩連犀地清陰涼血之品佐之以護及陰血可也然大衄之後麻黃青龍不可輕用若用之不當則犯衄家不可汗之戒矣集注活人書云衄後脈浮者宜麻黃湯衄後脈微者不可行麻黃湯宜黃芩芍藥湯蓋衄後脈浮表未解也脈微表已解也於此見仲景用麻黃湯於衄後之大旨方有執曰傷寒脈浮緊者寒多風少之謂也上二條皆風多寒少前條以服藥已微除汗發不透而致衄上條以較輕得自衄此以寒多不發汗而致衄三條之所以辨差分也蓋寒多則於法當發汗而不發汗熱鬱血亂所以衄也衄則陽邪之風散麻黃湯者發其尚未散之寒也程知曰此言寒邪不發之衄仍宜溫散也不發汗而致衄是入榮之寒不得泄越而然也寒不盡則衄不止故仍用麻黃不必待其衄也此與上條有寒熱之別程應旄曰大抵傷寒見衄者由其榮分素熱一被寒閉榮不受遏從而上升矣傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯按若頭痛之若字當是苦字苦頭痛方為必衄之證若是若字則凡頭痛皆能致衄矣注傷寒不大便六七日裏已實似可下也頭痛熱未已表未罷可汗也然欲下則有頭痛發熱之表欲汗則有不大便之裏值此兩難之時惟當以小便辨之其小便渾赤是熱已在裏即有頭痛發熱之表亦屬裏熱與承氣湯下之可也若小便清白是熱尚在表也即有不大便之裏仍屬表邪宜以桂枝湯解之然傷寒頭痛不論表裏若苦頭痛者是熱劇於榮故必作衄衄則榮熱解矣方其未衄之時無汗宜麻黃湯有汗宜桂枝湯汗之則不衄而解矣集注汪琥曰頭痛不已者為風寒之邪上壅熱甚於經勢必致衄須乘其未衄之時酌用麻黃湯或桂枝湯以汗解之而驗小便實為仲景妙法魏荔彤曰此條之衄乃意料之辭非已見之證也太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯注太陽病不解當傳陽明若不傳陽明而邪熱隨經瘀於膀胱榮分則其人必如狂如狂者瘀熱內結心為所擾有似於狂也當此之時血若自下下者自愈若不自下或下而未盡則熱與瘀血下蓄膀胱必少腹急結也設外證不解者尚未可攻當先以麻黃湯解外外解已但少腹急結痛者乃可攻之宜桃核承氣湯即調胃承氣加桃核所以攻熱逐血也蓋邪隨太陽經來故又加桂枝以解外而通榮也先食服者謂空腹則藥力下行捷也按太陽病不解不傳陽明邪熱隨經入裏謂之犯本犯本者謂犯膀胱之府也膀胱府之衛為氣分膀胱府之榮為血分熱入而犯氣分氣化不行熱與水結者謂之犯衛分之裏五苓散證也熱入而犯血分血蓄不行熱與血結者謂之犯榮分之裏核核承氣湯證也二者雖皆為犯本之證二方雖皆治犯本之藥而一從前利一從後攻水與血主治各不同也集注喻昌曰桃核承氣湯用桂枝解外與大柴胡湯解外相似益見太陽隨經之熱非桂枝不解也程知曰太陽病不解隨經入府故熱結膀胱其人如狂者瘀熱內結心不安寧有似於狂也若血自下下則熱隨瘀解矣然必外證已解乃可直攻少腹急結之邪於調胃承氣中加桃核者欲其直達血所也加桂枝以通血脈兼以解太陽隨經之邪耳汪琥曰膀胱乃小腹中之物膀胱熱結在衛則尿不利在榮則血不流故作急結之形為下焦蓄血之證諦也所以用桃核承氣湯乃攻下焦蓄血治少腹急結之藥實非通膀胱熱結之藥也桃核承氣湯方桃核去皮尖五十個桂枝三兩大黃四兩芒硝二兩甘草炙二兩上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿而小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也宜下之以抵當湯注太陽病六七日表證仍在者脈當浮大若脈微而沉則是外有太陽之表而內見少陰之脈乃麻黃附子細辛湯證也或邪入裏則為結胸藏結之證今既無太陽少陰兼病之證而又不作結胸藏結之病但其人發狂是知太陽隨經瘀熱不結於上焦之衛分而結於下焦之營分也故少腹當硬滿而小便自利者是血蓄於下焦也下血乃愈者言不自下者須當下之非抵當湯不足以逐血下瘀乃至當不易之法也集注喻昌曰蓄血而至於發狂則熱勢攻心桃核承氣不足以動其血桂枝不足以散其邪非用單刀直入之將必不能斬關取勝也故名其湯為抵當抵者至也乃至當不易之良法也張璐曰邪結於胸則用陷胸以滌飲邪結少腹則用抵當以逐血程知曰脈微而沉邪結於裏也表證仍在而反不結胸太陽隨經之邪不結上焦而結下焦小便自利血病而氣不病也程應旄曰熱結於氣分則為尿澀熱結於血分則為蓄血血既蓄而不行自非大下其血不愈抵當湯方水蛭熬三十個虻蟲熬去頭足三十個大黃去皮破六片三兩桃核去皮尖二十個上四味以水五升煮取三升去滓溫服一升不下者更服太陽病身黃脈沉結少腹硬滿小便不利者為無血也小便自利其人如狂者血證諦屬抵當湯注此承上條詳其脈證互發其義也太陽病無論中風傷寒但身黃脈大腹滿小便不利兼頭汗出者乃濕熱之黃非瘀血也今身黃脈沉結少腹硬小便自利其人如狂者則是血證非濕熱也故宜抵當湯以攻其血集注方有執曰諦審也言如此為血證審實無復可疑必須抵當湯勉人勿二之意程知曰身黃脈沉結少腹硬三者皆下焦蓄血之證然尚與胃熱發黃證相近故當以小便辨之其少腹滿而小便不利者則為無形之氣病屬茵陳證也其少腹硬而小便自利者則為有形之血證屬抵當無可疑矣汪琥曰按本文云小便不利者之下仲景不言治法成注云可與茵陳湯補亡論云與五苓散後條辨云屬茵陳五苓散此三方可選而用之傷寒有熱少腹滿應小便不利今反利者為有血也當下之宜抵當丸注此承上條而言證之輕者以互發其義而酌其治也傷寒榮病有熱不已伏於榮中其血不隨經妄行致衄則必隨經下蓄膀胱少腹者膀胱之室也故少腹滿若小便不利則為病在衛分有停水也今小便反利則為病在榮分有瘀血也法當下之宜以抵當湯小其制為丸緩緩下之不可過用抵當湯也集注方有執曰上條之方變湯而為丸名雖丸也而猶煮湯焉湯者蕩也丸者緩也變湯為丸而猶不離乎湯蓋取欲緩不緩不蕩而蕩之意也程應旄曰夫滿因熱入氣分而蓄及津液者應小便不利今反利者則知其所蓄非津液也乃血也血因熱而滿結故用抵當湯變易為丸煮而連滓服之使之直達血所以下舊熱蕩盡新瘀乃除根耳抵當丸方水蛭熬二十個虻蟲熬去翅足二十個桃核去皮尖二十五個大黃三兩上四味搗篩為四丸以水一升煮一丸取七合服之晬周歲時當下血若不下者更服集解柯琴曰膀胱為水府血本無所容蓄者也少腹者膀胱之室也熱結硬滿當小便不利而反利者是病不在膀胱之內而在少腹之內也其隨經之榮血因瘀熱結於少腹之裏而非膀胱之裏也所以小便雖利而硬滿急結如故是蓄血瘀於少腹也熱淫於內神魂不安故發狂血瘀不行則榮不運故脈微而沉榮不運則氣不宣故脈沉而結也榮氣不周於身則身黃消穀善飢者胃火熾盛也大便反易者血之濡也色黑者蓄血之化也善忘者血不榮智不明也此皆瘀血之徵非至峻之劑不足以抵其巢穴而當此重任故立抵當湯蛭蟲之善飲血者而利於水虻蟲之善吮血者而猛於陸並取水陸之善取血者以攻之同氣相求更佐以桃核之苦溫推陳致新大黃之苦寒蕩滌邪熱故名抵當也若熱雖盛而未狂少腹滿而未硬則宜小其制為丸以緩治之若外證已解少腹急結其人如狂者是又為轉屬陽明之證用調胃承氣加桃核桂枝之行血者於其中以微利之使胃和則愈矣此桃核承氣所以為治之緩也傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯注傷寒大下後復發汗先下後汗治失其序矣邪熱陷入心下痞結法當攻裏若惡寒者為表未盡也表既未盡則不可攻痞當先解表表解乃可攻痞解表宜桂枝湯者以其為已汗已下之表也攻痞以大黃黃連瀉心湯者以其為表解裏熱之痞也集注活人書云大抵結胸痞皆應下然表未解者不可攻也方有執曰表非初病之表乃下後復汗疏緩其表之表也解猶救也如解渴解急之類是也解表與發表不同傷寒初病之表當發故用麻黃湯此以汗後之表當解故曰宜桂枝湯張璐曰大下之後復發汗先裏後表顛倒差誤究竟已陷之邪痞結心下證兼惡寒表邪不為汗衰即不可更攻其痞當先行解肌之法以治外外解已後乃用大黃黃連攻其邪熱凝聚之痞方為合法大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服方解痞硬虛邪而用大黃黃連能不起後人之疑耶然仲景使人疑處正是使人解處蓋因後人未能細玩不得其法竟煎而服之大悖其指矣觀其以滾沸如麻之湯漬大黃黃連須臾絞去滓僅得其無形之氣不重其有形之味是取其氣味俱薄不大瀉下雖曰攻痞而用攻之妙不可思議也脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳注傷寒脈浮緊不汗而下之浮緊之脈變為沉緊是為寒邪內陷作痞之診也按之自濡者謂不硬不痛但氣痞不快耳此甘草瀉心湯證也集注程應旄曰誤下成痞既誤在證尤誤在脈則救之之法仍當兼憑夫脈與證而定治矣緊反入裏則浮緊變為沉緊表邪陷入而不散徒怫鬱於心下故作痞心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之按濡字上當有不字若按之濡乃虛痞也補之不暇豈有用大黃瀉之之理乎注此承上條以互明之也按之自濡者但氣痞耳若心下痞按之不濡此為可攻之熱痞也然其脈關上不沉緊而浮則是所結之熱亦淺未可峻攻也故以大黃黃連瀉心湯主之心下痞而復惡寒汗出者附子瀉心湯主之注心下硬痛結胸也硬而不痛心下痞也心下痞而復惡寒汗出者非表不解乃表陽虛也故以大黃黃連黃芩瀉痞之熱附子溫表之陽合外寒內熱而兼治之其妙尤在以麻沸湯漬三黃須臾絞去滓納附子別煮汁義在瀉痞之意輕扶陽之意重也集注方有執曰痞本陰邪內伏而虛熱上凝復惡寒汗出則表虛而陽不為護衛可知矣瀉心湯固所以為清熱傾痞之用加附子者蓋欲斂其汗而固其陽也黃芩因附子而更加表裏兩解具見矣李中梓曰以三黃之苦寒清中濟陰以附子之辛熱溫經固陽寒熱互用攻補並施而不悖此仲景之妙用入神也程應旄曰此條宜與傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯合看彼條用桂枝者緣發汗汗未出而初時之惡寒不罷故屬表未和此條加附子者緣汗已出惡寒已罷而復惡寒汗出故屬之表陽虛須於異同處細細參看附子瀉心湯方大黃二兩黃連一兩黃芩一兩附子炮去皮破別煮取汁一枚上四味切三味以麻沸湯二升漬之須臾絞去滓納附子汁分溫再服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心中痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之注毋論傷寒中風表未解總不當下醫反下之或成痞或作利今其人以誤下之故下利日數十行水穀不化腹中雷鳴是邪乘裏虛而利也心下痞硬而滿乾嘔心煩不得安是邪陷胸虛而上逆也似此痞利表裏兼病法當用桂枝加人參湯兩解之醫惟以心下痞謂病不盡復下之其痞益甚可見此痞非熱結亦非寒結乃乘誤下中虛而邪氣上逆陽陷陰凝之痞也故以甘草瀉心湯以緩其急而和其中也集注沈亮宸曰半夏瀉心甘草瀉心皆下後傷氣之過也生薑瀉心因於飲食大黃瀉心因於內熱附子瀉心因於外寒證既不同藥亦各異也喻昌曰下利完穀腹鳴嘔煩皆誤下而胃中空虛之故也設不知此義以為結熱而復下之其痞必益甚故復以胃中虛客氣上逆昭揭病因程應旄曰仲景結熱之疑難明故特揭出胃中空虛客氣上逆之故以明其非所以用辛溫以調其陽制住客氣使不得上逆用苦寒清肅徹去客熱使無阻留庶兩勿羈縻陰陽相和否轉為泰矣汪琥曰其人下利日數十行則胃中之物已盡何得而不虛況醫復下之而痞益甚愈可知其非實證矣若是實證當必曰硬而痛不曰硬而滿矣只此滿字而虛實之證了然魏荔彤曰前條因惡寒汗出陽隨汗而在表恐亡陽於外故用附子以回陽此條重在胃虛陽微於中故用甘草乾薑以益陽亦表裏分治之急務也而其固陽以為瀉邪之本則一意耳甘草瀉心湯方甘草炙四兩黃芩三兩黃連一兩乾薑三兩半夏洗半斤大棗擘十二枚上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服方解方以甘草命名者取和緩之意也用甘草大棗之甘補中之虛緩中之急半夏之辛降逆止嘔芩連之寒瀉陽陷之痞熱乾薑之熱散陰凝之痞寒緩中降逆瀉痞除煩寒熱並用也傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之注傷寒汗出表解之後餘邪轉屬陽明心下痞滿硬痛不大便者必其人胃素燥熱因而成實攻之可也今其人平素胃虛兼脅下有水氣即不誤下而餘熱亦乘虛入裏以致胃中不和穀氣不化故心下痞硬乾噫食臭也水氣不行故腹中雷鳴下利也主之以生薑瀉心湯者其意重在散水氣之虛痞耳集注喻昌曰篇中論結胸及痞之根源云胃中空虛此云胃中不和以其未經誤下而致空虛耳故但言不和也然不和已足成痞胃氣所關之巨固若此哉程知曰此為汗後未經誤下心中痞硬水飲摶聚者立治法也外邪雖解然必胃氣通和始得脫然無恙汗出解後胃中不和飲食摶結故心中痞硬中焦不能消穀故乾噫食臭土弱不能制水故脅下有水氣旁流腹中雷鳴者摶擊有聲下利而清濁不分也故於瀉心湯內君生薑以散之法用再煮取其熟而和胃也程應旄曰汗多亡陽人皆知之矣然人身之陽部分各有所主有衛外之陽為周身營衛之主此陽虛遂有汗漏不止惡寒身疼痛之證有腎中之陽為下焦真元之主此陽虛遂有發熱眩悸身瞤動欲劈地之證有膻中之陽為上焦心氣之主此陽虛遂有叉手冒心耳聾及奔豚之證有胃中之陽為中焦水穀化生之主此陽虛遂有腹脹滿胃中不和而成心下痞之證雖皆從發汗後所得然救誤者須觀其脈證知犯何逆以法治之不得以汗多亡陽一語混同漫及之也生薑瀉心湯方甘草炙三兩人參三兩乾薑一兩半夏洗半升黃芩三兩黃連一兩生薑切四兩大棗擘十二枚上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服方解名生薑瀉心湯者其義重在散水氣之痞也生薑半夏散脅下之水氣人參大棗補中州之土虛乾薑甘草以溫裏寒黃芩黃連以瀉痞熱備乎虛水寒熱之治胃中不和下利之痞焉有不愈者乎傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯注結胸兼陽明裏實者大陷胸湯證也兼陽明不成實者小陷胸湯證也痞硬兼少陽裏實證者大柴胡湯證也兼少陽裏不成實者半夏瀉心湯證也今傷寒五六日嘔而發熱者是邪傳少陽之病也既柴胡證具乃不以柴胡和之而以他藥下之誤矣若柴胡證仍在者此雖已下尚未成逆則當復與柴胡湯必蒸蒸而振戰然後發熱汗出而解矣蓋以下後虛中作解之狀皆如是也若下後心下滿而硬痛者此為結胸大陷胸湯固所宜也若但滿而不痛此為虛熱氣逆之痞即有嘔而發熱之少陽證柴胡湯亦不中與之法當治痞也宜半夏瀉心湯主之集注成無己曰若下後陽邪傳裏者則結於胸中為結胸以胸中為陽受氣之分也陰邪傳裏者則留於心下為痞以心下為陰受氣之分也程應旄曰瀉心雖同而證中具嘔則功專滌飲故以半夏名湯也曰瀉心者言滿在心下清陽之位熱邪挾飲尚未成實故清熱滌飲使心下之氣得通上下自無阻留陰陽自然交互矣然樞機全在於胃故復補胃家之虛以為之斡旋與實熱入胃而瀉其蓄滿者大相徑庭矣痞雖虛邪乃表氣入裏寒成熱矣寒雖成熱而熱非實故用苦寒以瀉其熱兼佐辛甘以補其虛不必攻痞而痞自散所以一方之中寒熱互用若陰痞不關陽鬱即鬱而亦未成熱瀉心之法概可用也汪琥曰少陽病誤下邪在半表半裏居陰陽之間故有痞結證夫人身膈以下屬陰膈以上屬陽少陽居清道而介乎膈之間亦為半表半裏此可徵少陽病誤下邪氣乘虛入裏而結胸痞氣所由分也半夏瀉心湯方半夏洗半升黃芩三兩乾薑三兩人參三兩黃連一兩甘草炙三兩大棗擘十二枚上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之注本以下之早故成心下痞如係結熱成實之痞則宜大黃黃連瀉心湯寒攻之法也如系外寒內熱之痞則宜附子瀉心湯溫攻之法也如系虛熱水氣之痞則宜生薑瀉心湯散飲之法也如系虛熱而嘔之痞則宜半夏瀉心湯折逆之法也如系虛熱益甚之痞則宜甘草瀉心湯緩急之法也今以諸瀉心湯審證與之而痞不解則當審其人若渴而口燥心煩小便不利者非辨證不明藥力之不及也蓋水飲內蓄津液不行故痞病不解耳宜五苓散外發內利汗出小便利則愈於此可類推矣集注方有執曰瀉心湯治痞而痞不解則非氣聚之痞可知渴而口燥煩小便不利者津液澀而不行伏飲凝結也五苓散利水生津津生而渴煩止水利而痞自除所以又為消痞滿之一法也程應旄曰瀉心諸方開結蕩熱益虛可謂備矣然其治法實在上中二焦亦有痞在上而治在下焦者斯又不同其法也若痞之來路雖同而其人口渴躁煩小便不利則知下後胃虛以致水飲內蓄津液不行痞無去路非結熱也以五苓散主之者使濁陰出下竊而清陽之在上焦者自無阻留矣況五苓散宣通氣化兼行表裏之邪使心邪不從心瀉而從膀胱瀉又一法也傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便注傷寒服湯藥下利不止心中痞硬者誤下之所致也下利痞硬乃虛痞也服瀉心湯已合法矣而痞不愈復以他藥下之痞雖去而利不止醫與理中湯溫之其利益甚不知理中者理中焦也此利在下焦屬滑脫也故用赤石脂禹餘糧湯澀滑固脫利可止也若止而復利則當審其小便之利與不利小便若利當佐以溫補之藥以收全功小便不利是水無去路固澀日久所以復利不止則又當利其小便使水道通而利自止矣集注鄭重光曰湯者蕩也即下藥也誤下利不止心下痞硬服瀉心湯為合法矣乃復以他藥下之誤而又誤用理中開痞止利原不為過而利益甚者以屢下傷腎下焦失守也故用石脂禹糧固腸虛而收滑脫利仍不止當利其小便蓋膀胱者腎之府也腎主二便開竅於二陰利小便者令藏府各司其事庶水穀分而下利自止也赤石脂禹餘糧湯方赤石脂碎一斤太乙禹餘糧碎一斤上二味以水六升煮取二升去滓分溫三服方解柯琴曰甘薑參朮可以補中宮元氣之虛而不足以固下焦脂膏之脫此利在下焦未可以理中之劑收功也然大腸之不固仍責在胃關門之不緊仍責在脾此二味皆土之精氣所結能實胃而澀腸蓋急以治下焦之標者實以培中宮之本也要之此證是土虛而非火虛故不宜於薑附若水不利而濕甚復利不止者則又當利其小便矣傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之注傷寒發汗若吐若下解後設表裏俱清自然胃和思食而愈今邪雖解而心下痞硬胃虛結也噫氣不除胃氣逆也然治痞之法無出諸瀉心湯故於生薑瀉心湯方中去芩連乾薑以病解無寒熱之邪也佐旋覆代赭石者所以補虛宣氣滌飲鎮逆也集注方有執曰解謂大邪己散也心下痞硬噫氣不除者正氣未復胃氣尚弱而伏飲為逆也故用旋覆代赭石湯以養正而散餘邪也喻昌曰大意重在噫氣不除上既心下痞硬更加噫氣不除則胃氣上逆全不下行有升無降所謂弦絶者其聲嘶土敗者其聲噦也故用代赭石領人參下行以鎮安其逆氣也汪琥曰此噫氣較前生薑瀉心湯之乾噫不同是雖噫而不至食臭故知其為中氣虛也沈明宗曰誤下成痞觀此之發汗解後亦可成痞蓋發汗吐下皆傷內氣然最虛之處便是容邪之處所以微邪從虛內陷濁陰上逆衝心則心下痞硬而噫氣不除也旋覆代赭石湯方旋覆花三兩人參二兩生薑切五兩代赭石一兩半夏洗半升甘草炙三兩大棗擘十二枚上七味以水一升煮取六升去滓再煎取三升溫服一升日三服方解羅天益曰汗吐下解後邪雖去而胃氣已虧矣胃氣既虧三焦因之失職清無所歸而不升濁無所納而不降是以邪氣留滯伏飲為逆故心下痞硬噫氣不除也方中以人參甘草養正補虛生薑大棗和脾養胃所以安定中州者至矣更以代赭石之重使之斂浮鎮逆旋覆花之辛用以宣氣滌飲佐人參以歸氣於下佐半夏以蠲飲於上濁降則痞硬可消清升則噫氣可除矣觀仲景治少陰水氣上凌用真武湯鎮之治下焦滑脫不守用赤石脂禹餘糧湯固之此胃虛氣失升降復用此法理之則胸中轉否為泰其為歸元固下之法各極其妙如此傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也注傷寒大吐大下之後津液極虛其人面赤表氣怫鬱渴欲引飲復與湯水以助發其汗因得噦所以然者大吐下已虛其中又發其汗陽從外亡故曰胃中虛冷故也宜以吳茱萸湯溫中降逆可也按胃主納下通地道若胃病失職則不下輸大小腸不納而反出也物出無聲謂之吐聲物並出謂之嘔聲出無物謂之乾嘔乾嘔者即噦也以其有噦噦之聲故名曰噦也論中以嘔為輕以噦為重蓋以胃中有物物與氣並逆所傷者輕胃中空虛惟氣上逆所傷者重故也噦與三陰證同見者為虛為寒與三陽證同見者為實為熱虛寒者四逆理中吳茱萸等湯實熱者調胃大小承氣等湯擇而用之勿謂噦者胃敗不可下也論中云傷寒噦而腹滿視其前後知何部不利利之則愈是也又世有謂噦為厄逆吃逆噫氣者皆非也蓋噦之聲氣自胃出於口而有噦噦之聲壯而迫急也厄逆之聲氣自臍下衝上出口而作格兒之聲散而不續也夫所謂厄逆者即論中平脈篇所謂䭇䭇者氣噎結有聲也觀厄逆之人與冷水即時作格噦則不然自可知也吃逆噫氣者即今之所謂噯氣也因飽食太急比時作噯而不食臭故名曰吃逆也因過食傷食過時作噯有食臭氣故名曰噫氣也噦䭇噯噫俱有聲無物雖均屬氣之上逆然不無虛實寒熱輕重新久之別也甚至以咳逆為厄逆者殊不知咳逆即今之喘嗽也茲乃與厄逆混而為一皆不考之過而得失利害系焉不可以不辨乾嘔即噦咳逆即喘嗽詳在金匱要略中集注程應旄曰噦之一證有虛有實虛自胃冷得之緣大吐大下後陰虛而陽無所附因見面赤以不能得汗而外氣怫鬱也醫以面赤為熱氣怫鬱復與水而發汗令大出殊不知陽從外泄而胃虛水從內摶而邪格胃氣虛弱矣安得不噦汪琥曰傷寒既大吐大下之後已極虛矣復極發其汗者何也以其人外氣怫鬱面上之氣恰如外來之邪怫鬱於表也此係陽明胃府虛極浮熱之氣上升於面醫人認以為邪熱胃燥過極不得汗復與之水以助其汗因而得噦
