body:
  text: 卷十二辨溫病脈證并治篇內經言熱病皆傷寒之類也非謂類乎傷寒乃謂與傷寒同乎一類之病也蓋傷寒因傷時令之寒而得名也溫病熱病亦隨時而易其名耳經曰冬傷於寒則為病熱此即時而病者也經曰冬傷於寒春必病溫此過時而病者也經曰凡病傷寒而成溫者先夏至為病溫後夏至為病暑暑即熱之謂也此隨時而病者也是則秋分以前皆得以熱病名之秋分以後皆得以傷寒名之矣此軒岐仲景立傷寒溫病熱病之名義也經又云藏於精者春不病溫此明過時不病之原也經曰冬不藏精春必病溫此明過時必病之故也於此可知傷寒為病不在精之藏與不藏而但有觸犯即得為病非若溫病熱病藏精則不病不藏精則必病也但能藏精者縱偶感於邪或溫或暑其病自輕不藏精者雖微感其邪或溫或暑其病必重差為稍異耳若專以冬不藏精毫無外感為少陰本病熱從內生則悖仲景溫病之旨矣仲景論中但言太陽初病發熱而渴不惡寒者為溫病辨其非傷寒非謂太陽之寒不由表入竟從少陰之熱內生為病也經又曰風溫為病脈陰陽俱浮是明指溫病之發因感春風輒動內熱而始發所以陰陽脈俱浮也蓋以溫病風溫與熱病論互發其義但熱病一論經已昭然若復立論未免贅疣非仲景詳於傷寒而略於溫證也今將伏氣溫病風溫合為一篇其溫熱治法同於六經讀者再細玩素問熱病論及刺熱評熱諸論與是論互相參考自有得焉師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利注四時令氣正氣也非時之氣邪氣也正氣之中人也淺感之甚者即病微者藏在肌膚不即為病壯實之人可以自已邪氣之中人也深感之雖微亦即為病甚則直入於藏不能自已虛者死焉此篇所謂伏氣之病即四時令氣正病非四時不正之邪與非常異氣之疫邪也所為伏氣者如感冬令之風寒其重者傷於榮衛即時而發者名為中風傷寒是也其感之輕者伏藏於肌膚過時而發名為溫病是也故時氣伏氣之為病二者不可不辨焉春三月名曰發陳是伏氣欲發之月也假令舊有伏氣之人乘冬不藏精之隙而病者當須以脈識之今月之內初病傷寒溫病者脈若微弱是少陰脈也若喉中痛是少陰證也然其痛必緩非若外感時氣之喉痹腫傷暴痛也今既云實咽中痛而脈又微弱故知為少陰伏氣內發之陰火也雖爾咽痛恐復欲下利不可以時氣外感陽火之喉痹治之也集注張錫駒曰此條言伏氣之病由內而出非若時行卒病由外而至也太陽病發熱而渴不惡寒者為溫病發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期注發熱不渴惡寒者太陽證也發熱而渴不惡寒者陽明證也今太陽病始得之不俟寒邪變熱轉屬陽明而即熱渴不惡寒者知非太陽傷寒乃太陽溫病也由於膏粱之人冬不藏精辛苦之人冬傷於寒內陰已虧外陽被鬱周身經絡早成溫化所以至春一遇外邪即從內應感寒邪者則無汗名曰溫病當以河間法用水解散審其表裏以解之水解散即天水六一散防風通聖之合劑也感風邪者則有汗名曰風溫當以水解散減麻黃加桂枝倍石膏令微似汗以和之若大發其汗則益助蘊熱必令身熱如火灼也蓋風溫為病乃風邪外盛於表故陰陽六脈俱浮熱邪內壅於胸故多眠睡鼻息鼾也風邪傷衛表氣不固故自汗出壯熱傷氣故身重倦聲微語難出也若被下者則愈奪陰液故水泉竭而小便不利也太陽府氣將絶故目直視也少陰藏氣不固故遺失溲也若被火者則以火益火而陽氣熏灼將欲發黃故微發黃也劇者熱極生風故如驚癇時瘈瘲也微黃病深色漸加黑故若火熏之也溫病熱病不惡寒者表熱也口渴引飲者裏熱也表熱無寒故不宜汗裏熱無實故不宜下表裏俱熱尤不宜火曰一逆者若汗若下若火也再逆者汗而復下下而復火也一逆已令陰竭尚可延引時日再逆則陰立亡故曰促命期也傷寒者傷冬月之正寒也溫病熱病者傷三時之暴寒也非時暴寒乃異氣也以其兼令氣而為病也故春兼風溫即以風溫名之夏兼暑熱即以暑熱名之世人通名曰傷寒又名曰時氣醫工見其傳變六經表裏情狀皆同故同乎一治也其溫病熱病無汗者宜大青龍湯時無汗時有汗者宜桂枝二越婢一湯有汗者宜桂枝合白虎湯內熱者防風通聖散表實者倍麻黃裏實者倍大黃量其病之輕重藥之多少而解之三日之前未有不愈者其有外感邪重內早傷陰已經汗下而不愈者則當審其表裏隨其傳變所見之證治之可也此法惟西北二方四時皆可行之無不隨手取效若江淮間地偏暖處冬月初春乃可用之若春末秋前即脈證允合當用麻桂青龍等湯者亦必輕而減之隨證消息適可即止慎不可過過則反致變逆經所謂同病異治者此之謂也集注程知曰溫病熱自內出故發熱而渴不惡寒風溫內外交熱加之自汗故有身重多眠諸證有輕重死生之分醫者當以有汗無汗為辨別之大要亦即以可汗不可汗為救治之微權又曰仲景之青龍白虎神矣得此意而推廣之可以應用於不窮蓋溫病宜於發散中重加清涼風溫不可於清涼中重加發散也程應旄曰太陽初得之一日即發熱而渴不惡寒者因邪氣早已內蓄其外感於太陽特其發端耳其內蓄之熱固非一朝一夕矣蓋自冬不藏精而傷於寒時腎陰已虧一交春陽發動即病未發而周身經絡已莫非陽盛陰虛之氣所布濩所云至春發為溫病者蓋自其胚胎受之也
