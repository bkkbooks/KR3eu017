body:
  text: 卷七辨少陰病脈證并治全篇少陰腎經水火之藏邪傷其經隨人虛實或從水化以為寒或從火化以為熱水化為陰寒之邪是其本也火化為陽熱之邪是其標也陰邪其脈沉細而微陽邪其脈沉細而數至其見證亦各有別陰邪但欲寐身無熱陽邪雖欲寐則多心煩陰邪背惡寒口中和陽邪背惡寒則口中燥陰邪咽痛不腫陽邪咽痛則腫陰邪腹痛下利清穀陽邪腹痛下利清水或便膿血也陰邪外熱面色赤裏寒大便利小便白陽邪外寒手足厥裏熱大便秘小便赤此少陰標本寒熱之脈證也凡從本之治均宜温寒回陽從標之治均宜攻熱救陰回陽救陰其機甚微總在臨證詳究辨別標本寒熱以急施其治庶克有濟稍緩則不及矣少陰之為病脈微細但欲寐也註少陰腎經陰盛之藏也少陰受邪則陽氣微故脈微細也衛氣行陽則寤行陰則寐少陰受邪則陰盛而行陰者多故但欲寐也此少陰病之提綱後凡稱少陰病者皆指此脈證而言也集註方有執曰少陰腎經也居於極下其脈起於小趾之下靈樞曰是主所生病者嗜臥但欲寐蓋人肖天地天地之氣行於陽則闢而曉行於陰則闔而夜故人之氣行於陽則動而寤行於陰則靜而寐凡病人但欲寐者邪客於陰故也張璐曰此言少陰之總脈總證也蓋少陰屬水主靜即使熱邪傳至其經在先之脈雖浮大此時亦必變為沉細在先之證雖煩熱不寧此時亦必變為昏沉嗜臥但須辨出脈細沉數口中燥為熱證脈沉微細口中和為寒證以此明辨萬無差誤矣程應旄曰凡陰脈皆沉異乎太陽之浮不必言矣陽明脈大微者大之反少陽脈弦細者弦之反沉兼微細陰證定矣少陰病始得之反發熱脈沉者麻黃附子細辛湯主之註少陰病謂但欲寐也脈沉者謂脈不微細而沉也今始得之當不發熱而反發熱者是為少陰之裏寒兼有太陽之表熱也故宜麻黃附子細辛湯温中發汗顧及其陽則兩感之寒邪均得而解之矣集註方有執曰發熱邪在表也脈沉少陰位北而居裏也以其居裏邪在表而發熱故曰反也以邪在表不在裏故用麻黃以發之以其本陰而標寒故用附子以温之細辛辛温通於少陰用之以佐主治者以其專經而為向導也程知曰三陰表法與三陽不同三陰必以温經之藥為表而少陰尤為緊關故用散邪温經之劑俾外邪之深入者可出而內陽亦不因之外越也程應旄曰一起病便發熱兼以陰經無汗世有計日按證者類能用麻黃而忌在附子不知脈沉者由其人腎經素寒裏陽不能協應故沉而不能浮也沉屬少陰不可發汗而始得病時即發熱則兼太陽又不得不發汗須以附子温經助陽託住其裏使陽不至隨汗而越其麻黃始可合細辛用耳麻黃附子細辛湯方麻黃去節二兩細辛二兩附子炮去皮破八片一枚上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓温服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也註此詳上條少陰病得之二三日仍脈沉發熱不解者宜麻黃附子甘草湯微發其汗也蓋謂二三日不見吐利裏寒之證知邪已衰然熱仍在外尚當汗之但不可過耳故不用細辛而用甘草蓋於温散之中有和意也此二證皆未曰無汗非仲景略之也以陰不得有汗不須言也集註張璐曰少陰無發汗之法汗之必至亡陽惟此一證其外有太陽發熱無汗其內不吐利躁煩嘔渴乃可温經散寒取其微似之汗也程應旄曰既云微發汗矣仍用以字故字推原之足見鄭重之意按此二條與太陽篇發熱頭痛脈沉用四逆者同一證彼以不差則期過三日可知病已入裏雖尚冒太陽頭痛直以少陰法律之此少陰病在初得二三日雖無頭痛證不容竟作少陰治之故仍兼太陽之法以律之一出一入不啻爰書假令前條得之二三日後二條過二三日不差則四逆之與麻黃易地皆然矣汪琥曰上條反發熱脈沉此亦反發熱脈沉但上言始得之為急此言得之二三日為緩病勢稍緩治法亦緩麻黃附子甘草湯方麻黃去節二兩附子炮去皮破八片一枚甘草炙二兩上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓温服一升日三服集解柯琴曰彼太陽病而脈反沉便用四逆以急救其裏是裏寒陰盛也此少陰脈而表反熱便於表劑中加附子以預固其陽是表熱陽衰也夫以發熱無汗太陽之表脈沉但欲寐少陰之裏設用麻黃開腠理細辛散浮熱而無附子以固元陽則太陽之微陽外亡惟附子與麻黃並用則寒邪散而陽不亡此裏病及表脈沉而當發汗者與病在表脈浮而發汗者徑庭也若表微熱則受寒亦輕故以甘草易細辛而微發其汗甘以緩之與辛以散之者又少間矣少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之註少陰病脈微雖有發熱亦為少陰裏寒外熱非太陽發熱者可比故不可發汗發汗則亡陽然陽已虛津液已涸即見少陰口燥咽乾可下之證若尺脈弱澀者復不可下之又恐亡陰也集註方有執曰微者陽氣不充故曰無陽無陽則化不行故汗不可發也尺以候陰弱澀者陰血不足也故謂復不可下其當亟行温補又可知矣程應旄曰少陰多自利證人固無肯輕下者但拈出尺脈弱澀字則少陰之有大承氣湯證其尺脈必强而滑已伏見於此處矣病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利註病人脈陰陽俱緊發熱無汗者太陽傷寒證也發熱汗出不止者太陽亡陽證也今脈緊無熱而反汗出此屬少陰然少陰證法當咽痛而復吐利也上條脈微無汗不可發汗者是以脈為主也此條有汗脈緊不可發汗者是以證為主也從脈從證不可不察集註程知曰陰陽俱緊傷寒之脈也法當無汗而反汗出太陽之陽外亡也若以少陰亡陽之證而認為太陽中風之證則誤矣少陰之寒上逼則咽痛而吐下逼則下利也少陰病脈緊至七八日自下利脈暴微手足反温脈緊反去者為欲解也雖煩下利必自愈註此承上條互發其義以別陰陽寒熱也少陰病脈沉微細寒邪脈也脈沉數細熱邪脈也若脈緊汗出是少陰寒虛證也今脈緊無汗乃少陰寒實證也因循至七八日之久而自下利若寒實解則脈必緊去而暴微其證必手足由冷而反温是知邪隨利去為欲解也故此時雖煩下利乃陰退陽回故知其必自愈也集註方有執曰緊寒邪也自下利脈暴微者陰寒內瀉也故謂手足為反温言陽回也陽回則陰退故謂緊反去為欲解也夫寒邪在陰而脈緊得自利脈暴微手足温緊去為欲解者猶之邪在陽脈數而熱得汗出脈和身涼數去為欲愈之意同陰陽勝復之機也程應旄曰脈於利後頓變緊而為微手足於利後變不温而為温則微非諸微亡陽之微乃緊去人安之微蓋以從前之寒已從下利而去故陽氣得回而欲解也雖煩下利必自愈少陰病得之一二日口中和其背惡寒者當灸之附子湯主之註背惡寒為陰陽俱有之證如陽明病無大熱口燥渴心煩背微惡寒者乃白虎加人參湯證也今少陰病但欲寐得之二三日口中不燥而和其背惡寒者乃少陰陽虛之背惡寒非陽明熱蒸之背惡寒也故當灸之更主以附子湯以助陽消陰也口燥口和誠二者之確征矣集註程知曰言初得之證口中和不渴不燥全無裏熱也內經曰背為陽背惡寒則陽虛陰盛寒深可知若風寒在表而惡寒則一身盡寒矣灸之以助陽消陰與附子湯以温經散寒論中云傷寒無大熱口燥渴心煩背微惡寒者白虎湯加人參主之彼是陽熱乘陰虛而內陷之惡寒與此之陰寒盛者不同陽入陰者則口燥心煩陰寒盛者則不能銷鑠津液故口中和張璐曰太陽表氣大虛邪氣得入犯少陰故得之一二日尚背惡寒不發熱此陰陽兩虧較之兩感更自不同兩感表裏皆屬熱邪猶堪發表攻裏此則內外皆屬虛寒無邪熱可以攻擊惟當温經補陽以温補其不足更灸關元以協助之雖其證似緩於發熱脈沉而危殆尤甚焉汪琥曰此條論仲景不言當灸何穴常器之云當灸膈俞關元穴背俞第三行郭雍云此有錯字當是灸膈俞關元穴也膈俞是背俞第二行穴按膈俞實系背俞部第二行穴然常器之所云第三行穴者當是膈關非膈俞也圖經云膈關二穴在第七椎下兩旁相去各三寸陷中正坐取之足太陽氣脈所發專治背惡寒脊强俯仰難可灸五壯蓋少陰中寒必由太陽而入故宜灸其穴又關元一穴在腹部中行臍下三寸足三陰任脈之會可灸百壯常器之所謂灸膈關者是温其表以散外邪灸關元者是温其裏以助其元氣也少陰病身體痛手足寒骨節痛脈沉者附子湯主之註此承上條詳舉其證互發其義以出其治也身體痛表裏俱有之證也如太陽病脈浮發熱惡寒身痛手足熱骨節痛是為表寒當主麻黃湯發表以散其寒今少陰病脈沉無熱惡寒身痛手足寒骨節痛乃是裏寒故主附子湯温裏以散寒也集註方有執曰少陰腎也腎主骨寒淫則痛程應旄曰身體痛手足寒骨節痛太陽傷寒同有此證也以脈沉辨之沉屬陰寒重著所致裏陰有餘表陽不足故以附子湯主之附子湯方附子去皮生破八片二枚茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓温服一升日三服方解少陰為寒水之藏故寒傷之重者多入少陰所以少陰一經最多死證方中君以附子二枚者取其力之銳且以重其任也生用者一以壯少火之陽一以散中外之寒則身痛自止惡寒自除手足自温矣以人參為臣者所以固生氣之原令五藏六府有本十二經脈有根脈自不沉骨節可和矣更佐白朮以培土芍藥以平木茯苓以伐水水伐火自旺旺則陰翳消木平土益安安則水有制制則生化此誠萬全之術也其有畏而不敢用以致因循有誤者不誠可惜哉少陰病脈沉者急温之宜四逆湯註少陰病但欲寐脈沉者若無發熱口燥之證則寒邪已入其藏不須遲疑急温之以四逆湯消陰助陽可也集註吳人駒曰脈沉須別虛實及得病新久若得之多日及沉而實者須從別論四逆湯方甘草炙二兩乾薑一兩半附子生用去皮破八片一枚上三味以水三升煮取一升二合去滓分温再服强人可大附子一枚乾薑三兩方解方名四逆者主治少陰中外皆寒四肢厥逆也君以甘草之甘温温養陽氣臣以薑附之辛温助陽勝寒甘草得薑附鼓腎陽温中寒有水中暖土之功薑附得甘草通關節走四肢有逐陰回陽之力腎陽鼓寒陰消則陽氣外達而脈自升手足自温矣集解汪琥曰少陰病本脈微細但欲寐今輕取之微脈不見重取之細脈幾亡伏匿而至於沉此寒邪深入於裏殆將入藏温之不容以不急也稍遲則惡寒身蜷吐利煩躁不得臥寐手足逆冷脈不至諸死證立至矣四逆湯之用可稍緩乎少陰病下利白通湯主之註少陰病但欲寐脈微細已屬陽為陰困矣更加以下利恐陰降極陽下脫也故君以蔥白大通其陽而上升佐以薑附急勝其陰而緩降則未脫之陽可復矣集註方有執曰少陰病而加下利者不獨在經而亦在藏寒甚而陰盛也治之以乾薑附子者勝其陰則寒自散也用蔥白而曰白通者通其陽則陰自消也程知曰此言下利宜通其陽也少陰病謂有脈微細欲寐證也少陰下利陰盛之極恐致格陽故用薑附以消陰蔥白以升陽通云者一以温之而令陽氣得入一以發之而令陰氣易散也汪琥曰腎虛無火不能主水故下利用白通湯者温裏以散寒也白通湯方蔥白四莖乾薑一兩附子生去皮破八片一枚上三味以水三升煮取一升去滓分温再服集解汪琥曰此方與四逆湯相類獨去甘草蓋驅寒欲其速辛烈之性取其驟發直達下焦故不欲甘以緩之也而猶重在蔥白少陰之陰天之寒氣亦為陰兩陰相合而偏於下利則與陽氣隔絕不能通薑附之力雖能益陽不能使真陽之氣必入於陰中惟蔥白味辛能通陽氣令陰得陽而利庶可愈矣蓋大辛大熱之藥不過藉以益人陽氣非有以通之令真陽和會而何以有濟也耶少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生註此承上條詳申其脈以明病進之義也少陰病下利脈微者與白通湯下利當止今利不止而轉見厥逆無脈更增乾嘔而煩者此陰寒盛極格陽欲脫之候也若專以熱藥治寒寒既甚必反格拒而不入故於前方中加人尿豬膽之陰以引陽藥入陰經曰逆者從之此之謂也無脈者言診之而欲絕也服湯後更診其脈若暴出者如燭燼焰高故主死若其脈徐徐微續而出則是真陽漸回故可生也故上條所以才見下利即用白通以治於未形誠善法也集註程知曰此言陰盛格陽用膽汁通陰法也以白通與之宜乎陽可救今乃利不止反至厥逆無脈則陰邪愈無忌矣乾嘔而煩則陽藥在膈而不入陰矣此非藥不勝病乃無鄉導之力也加人尿豬膽之陰寒則可引薑附之温入格拒之寒而調其逆此內經從治之法也程應旄曰脈暴出者死無根之陽驟迸諸外也微續者生陽氣漸交陰肯納也白通加豬膽汁湯方蔥白四莖乾薑一兩附子生去皮破八片一枚人尿五合豬膽汁一合以上三味以水三升煮服一升去滓納膽汁人尿和令相得分温再服若無膽亦可用方解是方即前白通湯加人尿豬膽汁也加尿膽者從其類也下咽之後冷體既消熱性便發情且不違而致大益則二氣之格拒可調上下之陰陽可通矣少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也註少陰病欲吐不吐心中煩但欲寐五六日自利而渴者此屬少陰傳邪寒熱俱有之證也若是少陰熱而燥干引水之渴小便必色赤乃少陰燥不能生津下焦有熱也今為少陰虛而引水自救之渴故小便則色白是少陰虛冷不能化液下焦有寒也於此可知少陰病形悉具而渴者有寒熱二端之別也集註成無己曰欲吐不吐心煩者表邪傳裏也若腹滿痛則屬太陰此但欲寐則知屬少陰五六日邪傳少陰之時若自利不渴寒在中焦屬太陰也此自利而渴為寒在下焦屬少陰也腎虛水燥故渴欲引水自救下焦虛寒故小便色白下利而渴小便色白非裏熱可知矣方有執曰此反復申明曉人勿認煩渴均為熱證以致誤之意程應旄曰煩證不盡屬少陰故指出但欲寐來渴證不盡屬少陰故指出小便白來結以下焦虛有寒教人上病治在下也蓋上虛而無陰以濟總由下虛而無陽以温也二虛字皆由寒字得來又曰吐利而渴與豬苓湯證同其別在但欲寐且豬苓證小便必不利而色赤飲水與白頭翁證同彼曰以有熱故也小便亦必不白林瀾曰欲吐不吐心煩陽虛格越於上但欲寐自利小便白裏之真寒已深要知此渴與口燥舌乾之渴不同若兼腹滿便閉譫語諸證自當作陽邪傳裏治之既裏虛自利小便白其為虛寒明甚特曰下焦者足見陰既盛於下陽必格於上豈可以煩渴而誤攻其熱哉汪琥曰以全文觀之大似熱證惟小便色白知為真寒之證此但欲寐與熱邪不同其寐必不昏濁其呼吸必促而細曰屬少陰者以別其非陽邪之渴乃內無津液引水自救之渴試以冷水飲之必不多也細察其小便若色白者此少陰虛寒之證悉具也非熱邪可知矣沈明宗曰此少陰虛寒似乎熱證之辨也世但知四肢厥逆為虛寒證詎知小便色白乃為的驗乎吳人駒曰陽明之欲吐則不得寐在少陰則但欲寐引此以為盛虛之別少陰病飲食入口則吐心中温温欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當温之宜四逆湯按温温當是嗢嗢嗢嗢者乃吐飲之狀也註此承上條欲吐不吐詳別脈證以明其治也飲食入口即吐且心中嗢嗢欲吐復不能吐惡心不已非少陰寒虛吐也乃胸中寒實吐也故始得之脈弦遲弦者飲也遲者寒也而手足寒者乃胸中陽氣為寒飲所阻不能通於四肢也寒實在胸當因而越之故不可下也若膈上有寒飲但乾嘔有聲而無物出此為少陰寒虛之飲非胸中寒實之飲也故不可吐惟急温之宜四逆湯或理中湯加丁香吳茱萸亦可也集註程知曰此言少陰飲吐為腎邪上逆當温不當吐也欲吐不吐陰邪上逆之證也若始得病時邪未深入其手足但寒而不厥脈但弦遲而不沉細則為邪實胸中寒尚在表屬於陽分當吐而不當下吐者有物嘔則無物兩者須辨若膈上有寒飲但見乾嘔而不能吐出則是陰寒上逆當温而不當吐也曰急温者明不温則見厥逆無脈諸變證也程應旄曰寒在胸中法不可下而屬實邪但從吐法一吐而陽氣得通吐法便是温法若膈上有寒飲乾嘔者虛寒從下而上阻留其飲於胸中究非胸中之病也直從四逆湯急温其下可矣少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死註此發明上條互詳脈證失於急温致變之義也脈微細沉但欲臥少陰寒也當無汗今反汗出不煩乃少陰亡陽也且自欲吐陰寒之邪上逆正當急温失此不治因循至五六日加之自利復煩躁不得臥寐者此少陰腎中真陽擾亂外越欲絕之死證此時即温之亦無及矣集註方有執曰脈微沉細但欲臥少陰本病也汗出而不作煩熱無陽也欲吐經中之邪不退也自利藏病進也更復煩躁不得臥寐者陽欲絕而擾亂不寧也程應旄曰今時論治者不至於惡寒蜷臥四肢逆冷等證疊見則不敢温不知證已到此温之何及況諸證有至死不一見者則盍於本論中之要旨一一申詳之少陰病脈必沉而微細論中首揭此蓋已示人以可温之脈矣少陰病但欲臥論中又已示人以可温之證矣汗出在陽經不可温在少陰宜急温論中又切示人以亡陽之故矣況復有不煩自欲吐陰邪上逆之證乎則真武四逆誠不啻三年之艾矣乃不知預為綢繆延緩至五六日前欲吐今且利矣前不煩今煩且躁矣前欲臥今不得臥矣陽虛擾亂陰盛轉加焉有不死者乎少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便不利或下利或嘔者真武湯主之註論中心下有水氣發熱有汗煩渴引飲小便不利者屬太陽中風五苓散證也發熱無汗乾嘔不渴小便不利者屬太陽傷寒小青龍湯證也今少陰病二三日不已至四五日腹痛下利陰寒深矣設小便利是純寒而無水乃附子湯證也今小便不利或咳或嘔此為陰寒兼有水氣之證故水寒之氣外攻於表則四肢沉重疼痛內盛於裏則腹痛自利也水氣停於上焦胸肺則咳喘而不能臥停於中焦胃府則嘔而或下利停於下焦膀胱則小便不利而或少腹滿種種諸證總不外乎陰寒之水而不用五苓者以非表熱之飲也不用小青龍者以非表寒之飲也故惟主以真武湯温寒以制水也集註喻昌曰太陽篇中厥逆筋惕肉瞤而亡陽用真武矣茲少陰之水濕上逆仍用真武以鎮攝之可見太陽膀胱與少陰腎一藏一府同為寒水府邪為陽邪藉用麻桂為青龍藏邪為陰邪藉用附子為真武真武湯方茯苓三兩芍藥三兩生薑切三兩白朮二兩附子炮去皮破八片一枚上五味以水八升煮取三升去滓温服七合日三服若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤方解小青龍湯治表不解有水氣中外皆寒實之病也真武湯治表已解有水氣中外皆寒虛之病也真武者北方司水之神也以之名湯者賴以鎮水之義也夫人一身制水者脾也主水者腎也腎為胃關聚水而從其類者倘腎中無陽則脾之樞機雖運而腎之關門不開水雖欲行孰為之主故水無主制泛溢妄行而有是證也用附子之辛熱壯腎之元陽而水有所主矣白朮之苦燥建立中土而水有所制矣生薑之辛散佐附子以補陽温中有散水之意茯苓之淡滲佐白朮以健土制水之中有利水之道焉而尤妙在芍藥之酸斂加於制水主水藥中一以瀉水使子盜母虛得免妄行之患一以斂陽使歸根於陰更無飛越之虞孰謂寒陰之品無益於陽乎而昧者不知承制之理論中誤服青龍發汗亡陽用此湯者亦此義也然下利減芍藥者以其陽不外散也加乾薑者以其温中勝寒也水寒傷肺則咳加細辛乾薑者散水寒也加五味子者收肺氣也小便利者去茯苓以其雖寒而水不能停也嘔者去附子倍生薑以其病非下焦水停於胃也所以不須温腎以行水只當温胃以散水佐生薑者功能止嘔也集解程知曰白通通脈真武皆為少陰下利而設白通四證附子皆生用惟真武一證熟用者蓋附子生用則温經散寒炮熟則温中去飲白通諸湯以通陽為重真武湯以益陽為先故用藥有輕重之殊乾薑能佐生附以温經生薑能資熟附以散飲也張璐曰按真武湯方本治少陰病水飲內結所以首推朮附兼茯苓生薑之運脾滲水為務此人所易明也至用芍藥之微旨非仲景不能蓋此證雖曰少陰本病而實緣水飲內蓄所以腹痛自利四肢疼重而小便反不利也若極虛極寒則小便必清白無禁矣安有反不利之理哉此證不但真陽不足真陰亦必素虧或陰中伏有陽邪所致若不用芍藥固護其陰豈能勝附子之雄烈乎病人身大熱反欲得衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也註身體為表藏府為裏此以內外分表裏也皮膚為表骨髓為裏六府為表五藏為裏此以身體之淺深藏府之陰陽分表裏也病人已病之人也身大熱謂通身內外皆熱三陽證也反欲得近衣者乃是假熱雖在皮膚之淺而真寒實在骨髓之深陰極似陽證也身大寒謂通身內外皆寒三陰證也反不欲近衣者乃是假寒雖在皮膚之淺而真熱實在骨髓之深陽極似陰證也按此以人之苦欲測其寒熱真假而定陰陽之證也當與少陰厥陰病論中表熱裏寒裏熱表寒脈滑而厥惡寒不欲近衣口燥咽乾等條參看集註成無己曰皮膚言淺骨髓言深皮膚言外骨髓言內身熱欲近衣表熱裏寒也身寒不欲近衣表寒裏熱也大抵表熱裏寒脈必沉遲裏熱表寒脈必滑數須當辨之鄭重光曰皮膚者骨髓之外浮淺之分也骨髓者皮膚之內沉深之分也欲得近衣借外以御內此真寒也體有著而成忤不在衣之濃薄此假寒也不察人之苦欲何以測其真寒真熱而定標本乎少陰病下利清穀裏寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之註少陰腎也腎象乎坎一陽陷於二陰之中二陰若盛則一陽必衰陰邪始得內侵孤陽因之而外越也下利清穀手足厥冷脈微欲絕裏陰盛極也身反不惡寒面色反赤其外反熱格陽於外也故雖有腹痛乾嘔咽痛等證亦當仿白通湯之法加蔥於四逆湯中以消其陰而復其陽可也集註程應旄曰熱因寒格無論腹痛乾嘔咽痛皆下利中格陽之證即使利止而脈仍前欲絕不出亦不得謂裏寒已退輒妄治其外熱也須循四逆湯例消陰翳於下部但加蔥白宣陽氣於下焦使陽氣通而脈亦出始為真愈林瀾曰格拒格也亦曰隔陽陰陽隔離也又曰戴陽浮於上如戴也夫真寒入裏陰氣未有不盛者然其劇不過陽愈微陰愈盛耳通脈四逆湯方甘草炙二兩乾薑三兩强人可四兩附子生用去皮破八片大者一枚上三味以水三升煮取一升二合去滓分温再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃服之方解論中扶陽抑陰之劑中寒陽微不能外達主以四逆中外俱寒陽氣虛甚主以附子陰盛於下格陽於上主以白通陰盛於內格陽於外主以通脈是則可知四逆營運陽氣者也附子温補陽氣者也白通宣通上下之陽者也通脈通達內外之陽者也今脈微欲絕裏寒外熱是腎中陰盛格陽於外故主之也倍乾薑加甘草佐附子易名通脈四逆湯者以其能大壯元陽主持中外共招外熱返之於內蓋此時生氣已離亡在俄頃若以柔緩之甘草為君何能疾呼外陽故易以乾薑然必加甘草與乾薑等分者恐渙漫之余薑附之猛不能安養元氣所謂有制之師也若面赤者加蔥以通格上之陽腹痛者加芍藥以和在裏之陰嘔逆者加生薑以止嘔咽痛者加桔梗以利咽利止脈不出氣少者俱倍人參以生元氣而復脈也少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯註少陰吐利法當逆冷今不逆冷反發熱者是陽未衰故曰不死若脈不至雖有外熱恐是假熱須防陽脫宜急灸少陰速通其陽則脈可復也集註程知曰前條通脈四逆湯是裏寒外熱手足逆冷而脈不至者也此條用灸法是裏寒外熱手足不逆冷而脈不至者也少陰動脈在足內踝喻昌曰前條背惡寒之證灸後用附子湯陰寒內凝非一灸所能勝也此條手足反熱只是陰內陽外故但灸本經引之內入不必更用温藥也汪琥曰經云腎之原出於太谿灸少陰七壯當灸太谿二穴在內踝後跟骨動脈陷中少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之註名曰少陰病主厥陰藥者以少陰厥陰多合病證同情異而治別也少陰有吐利厥陰亦有吐利少陰有厥逆厥陰亦有厥逆少陰有煩躁厥陰亦有煩躁此合病而證同者也少陰之厥有微甚厥陰之厥有寒熱少陰之煩躁則多躁厥陰之煩躁則多煩蓋少陰之病多陰盛格陽故主以四逆之薑附逐陰以回陽也厥陰之病多陰盛鬱陽故主以吳茱萸之辛烈迅散以通陽也此情異而治別者也今吐而不吐蚘手足厥冷故以少陰病名之也蓋厥冷不過肘膝多煩而躁欲死故屬厥陰病主治也所以不用四逆湯而用吳茱萸湯也集註程知曰吐利陰邪在裏上干脾胃也厥冷陽不温於四肢也煩而躁則陰盛之極至於陽氣暴露擾亂不寧也證至此幾瀕危矣非茱萸之辛温無以降陰氣之上逆非人參薑棗之甘温無以培中土而制腎邪也躁煩與煩躁亦有別躁者陰躁煩者陽煩躁煩者言自躁而煩是陰邪已外逼也煩躁者言自煩而躁是陽氣猶內爭也其輕重淺深之別學人宜詳審之程應旄曰温法原為陰寒而設故真寒類多假熱凡陰盛格陽陰證似陽等皆少陰蠱惑人耳目處須從假處勘出真來方不為之牽制如吐利而見厥冷是胃陽衰而腎陰並入也誰不知為寒者顧反見煩躁欲死之證以誑之是皆陽被陰拒而置身無地故有此象吳茱萸湯挾木力以益火勢則土得温而水寒却矣吳茱萸湯方吳茱萸一升人參三兩生薑一兩大棗十二枚上四味以水七升煮取二升温服七合日三服集解羅天益曰仲景之法於少陰則重固元陽於厥陰則重固生氣厥陰肝木雖為兩陰交盡而一陽之真氣實起其中此之生氣一虛則三陰濁氣直逼中上不惟本經諸證悉具將陽明之健運失職以致少陰之真陽浮露而吐利厥逆煩躁欲死食穀欲嘔種種叢生矣吳茱萸得東方震氣辛苦大熱能達木鬱直入厥陰降其陰盛之濁氣用以為君人參秉中和正氣甘温大補能接天真挽回性命升其垂絕之生氣用以為臣佐薑棗和胃而行四末斯則震坤合德木土不害一陽之妙用成而三陰之間無非生生之氣矣諸證有不退者乎方有執曰吐則傷陽利則損陰厥冷者陰損而逆也煩躁者陽傷而亂也茱萸辛温散寒暖胃而止嘔人參甘温益陽固本而補中大棗助胃益脾生薑嘔家聖藥故四物者為温中降逆之所須也少陰病吐利躁煩四逆者死註此承上條互明其義以別可治不可治也此條吐利煩躁厥逆皆與上條同一用吳茱萸湯治之一曰死不治者何也蓋以少陰煩躁多躁少煩躁者陰也厥陰煩躁多煩少躁煩者陽也厥陰手足厥冷不過肘膝微陽未絕故可治也少陰四肢逆冷不能回温獨陰不化故曰死也集註程應旄曰由吐利而躁煩陰陽離脫而擾亂可知加之四逆其陽絕矣不死何待使早知温中寧有此乎張璐曰此條與上條不殊何彼可治而此不可治耶必是已用温中不愈轉加躁煩故主死耳少陰病惡寒身蜷而利手足厥冷者不治註此互詳上條手足逆冷不治之義也惡寒身蜷而臥雖系少陰證而不至於死若下利不止手足逆冷不回是有陰無陽即不吐利躁煩亦不可治也集註喻昌曰陰盛無陽即用四逆等法回陽氣於無何有之鄉其不能回者多矣故曰不治少陰病四逆惡寒而身蜷脈不至不煩而躁者死註此總承上三條以明不治之死證也四逆謂四肢逆冷過肘膝而不回也表陽虛故惡寒也陰主屈故蜷臥不伸也脈不至則生氣已絕若有煩無躁是尚有可回之陽今不煩而躁則是有陰無陽故曰死也集註程應旄曰諸陰邪具見而脈又不至陽先絕矣不煩而躁孤陰無附將自盡也經曰陰氣者靜則神藏躁則消亡蓋躁則陰藏之神外亡也亡則死矣使早知復脈以通陽寧有此乎少陰病下利脈微澀嘔而汗出必數更衣反少者當温其上灸之註脈微陽虛也澀血少也必數更衣者下利勤也反少者欲下而反少也即今之陽虛血少裏急後重下利病也嘔而汗出者陰盛於內上逆而作嘔也陽虛失護故汗出也當温其上宜灸之集註程應旄曰少陰病下利陽微可知乃其脈微而且澀則不但陽微而陰且竭矣陽微故陰邪逆上而嘔陰竭故汗出而勤努責一法之中既欲助陽兼欲護陰則四逆附子輩俱難用矣惟灸頂上百會穴以温之既可代薑附輩之助陽而行上更可避薑附輩之辛竄而燥下故下利可止究於陰血無傷可見病在少陰不可以難用温者遂棄夫温也汪琥曰按此條論仲景不言當灸何穴脈經云灸厥陰俞常器之曰灸太衝皆誤郭雍曰灸太谿雖系少陰經穴亦誤仲景曰宜温其上方有執曰上謂頂百會穴是也圖經云一名三陽五會在前頂後一寸五分頂中央原治小兒脫肛久不差可灸七壯此條亦灸之者升舉其陽以調夫陰也少陰病下利止而頭眩時時自冒者死註少陰病利止若胃和能食神清氣爽是為欲愈也今利止頭眩時時昏冒不省是氣脫神去故下利雖止仍主死也集註方有執曰頭眩俗謂昏暈也諸陽在頭下利止而頭眩者陽無依附浮越於外神氣散亂故時時自冒也死可知矣張錫駒曰此條死證全在頭眩自冒上看出若利止而頭不眩不冒此中已和矣安能死乎張璐曰人身陰陽相為依附者也陰亡於下則諸陽之上聚於頭者紛然而動所以頭眩時時自冒陽脫於上而主死也可見陽回利止則生陰盡利止則死矣汪琥曰下利止則病當愈今者反為死候非陽回而利止乃陽脫而利盡也少陰病六七日息高者死註少陰病但欲寐息平氣和順也今息高氣促逆也凡病臥而息高氣促者多死集註喻昌曰六七日字辨證最細蓋經傳少陰而息高與二三日太陽作喘之表證迥殊也程知曰腎為生氣之源息高則真氣散走於胸中不能復歸於氣海故主死也程應旄曰夫肺主氣而腎為生氣之源蓋呼吸之門也關系人之死生者最巨息高者生氣已絕於下而不復納故游息僅呼於上而無所吸也死雖成於六七日之後而機自兆於六七日之前既值少陰受病何不預為固護預為堤防致令真陽渙散而無可復返乎凡條中首既諄諄禁汗繼即急急重温無非見及此耳魏荔彤曰七日之久息高氣逆者與時時自冒同一上脫也一眩冒而陽升不返一息高而氣根已鏟同一理而分見其證者也故仲景俱以死期之少陰病脈細沉數病為在裏不可發汗註少陰病但欲寐若脈細沉微是邪從寒化也今脈細沉數乃邪從熱化也即有發熱亦是將轉屬陽明非若前所言少陰病始得之反發熱脈沉不數宜麻黃附子細辛湯發汗者可比也故曰病為在裏不可發汗集註程知曰言熱邪在裏有發汗之禁也少陰之脈微細其常也乃沉而加之以數正為熱邪在裏之征發汗則動經而增燥熱有奪血之變矣鄭重光曰脈細沉而數裏有伏陽矣故曰病為在裏乃熱邪傳裏之證斷不可發汗發汗則動經氣而有亡血之變少陰發熱脈沉是病為在表以無裏證故可發汗若脈浮而遲表熱裏寒下利清穀是遲為無陽病為在裏又不得以浮為在表而發汗也要知陰中有陽沉亦可汗陽中有陰浮亦當温此條脈細沉數數則為熱沉為在裏此陽邪入裏故以發汗而示戒也少陰病但厥無汗而强發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治註此條申明强發少陰熱邪之汗則有動血之變也少陰病脈細沉數加之以厥亦為熱厥陰本無汗即使無汗亦不宜發汗若發其汗是為强發少陰熱邪之汗也不當發而强發之益助少陰之熱炎炎沸騰必動其本經之血或從口鼻或從目出是名下厥上竭下厥者少陰熱厥於下也上竭者少陰血竭於上也故為難治集註張璐曰强責少陰汗而動其血勢必逆行而上出陽竅以發汗皆陽藥故也程應旄曰五液皆主於腎强發少陰之汗周身之氣皆逆血隨奔氣之促逼而見故不知從何道而出也沈明宗曰少陰病但厥無汗其病在裏當以四逆散和陰散邪其病自退而厥自愈矣豈可强發其汗耶魏荔彤曰厥而有汗乃內寒迫陽外亡之象故為寒化陰邪無汗而厥則熱邪伏於裏而不外越邪熱內耗也斯可議為熱化陽邪無疑矣少陰病咳而下利譫語者被火氣劫故也小便必難以强責少陰汗也註少陰屬腎主水者也少陰受邪不能主水上攻則咳下攻則利邪從寒化真武湯證也邪從熱化豬苓湯證也今被火氣劫汗則從熱化而轉屬於胃故發譫語津液內竭故小便難是皆由强發少陰之汗故也欲救其陰白虎豬苓二湯擇而用之可耳集註方有執曰强責謂過求也小便與汗皆血液也少陰少血劫汗奪血則小便為之涸竭故難也少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之註凡少陰下利清穀咳嘔不渴屬寒飲也今少陰病六七日下利黏穢咳而嘔渴煩不得眠是少陰熱飲為病也飲熱相摶上攻則咳中攻則嘔下攻則利熱耗津液故渴熱擾於心故煩不得眠宜豬苓湯利水滋燥飲熱之證皆可愈矣集註趙嗣真曰少陰咳而下利嘔渴心煩不眠及厥陰下利欲飲水者是皆傳邪之熱脈必沉細數故以黃連滑石等清利之其少陰自利而渴欲吐不吐心中煩但欲寐小便色白者是本經陰邪之寒也脈必沉微故以附子乾薑温之汪琥曰下利咳而嘔渴心煩不得眠焉知非少陽陽明之病然少陽陽明若見此證為裏實脈必弦大而長此病脈必微細故知其為少陰之病無疑也林瀾曰下利則邪並於下矣其嘔而且咳何也蓋至六七日渴而心煩不眠則傳邪之上客者又盛渴則必恣飲多飲必停水是邪熱既不能解而水蓄之證復作也熱邪傳陷之下利非陰寒吐利並作之可比嘔而渴者蓋先嘔後渴為邪欲解先渴後嘔多為水停況又有水寒射肺為咳之可兼察乎以是知必有挾飲於內耳沈明宗曰黃連阿膠湯之心煩不得眠較此條頗同而治異何也蓋此條乃少陰風熱轉入陽明而致下利故以豬苓湯驅導水邪還從膀胱而去急救胃中津液為主彼條之心煩不得眠而無下利乃腎水枯少故用黃連阿膠湯滋陰清火急救腎陰為主也魏荔彤曰咳而咽不痛渴而口不干則知邪雖為傳經而入之熱惟其有水飲相混故熱勢不能甚肆其猛烈雖上衝為咳嘔而不致咽痛隔阻正津為口渴而不致干燥兼以心煩不得眠於少陰但欲寐陰證中見陽證豈非傳經之熱兼水濕者乎其所以不發黃者以少陰病原有下利濕不能留熱不能蓄故也由此觀之熱邪兼水飲昭然矣少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之註凡少陰四逆雖屬陰盛不能外温然亦有陽為陰鬱不得宣達而令四肢逆冷者故有或咳或悸或小便不利或腹中痛泄利下重諸證也今但四逆而無諸寒熱證是既無可温之寒又無可下之熱惟宜疏暢其陽故用四逆散主之集註李中梓曰按少陰用藥有陰陽之分如陰寒而四逆者非薑附不能療此證雖云四逆必不甚冷或指頭微温或脈不沉微乃陰中涵陽之證惟氣不宣通是以逆冷故以柴胡涼表芍藥清中此本肝膽之劑而少陰用之者為水木同源也以枳實利七沖之門以甘草和三焦之氣氣機宣通而四逆可痊矣程知曰蓋傷寒以陽為主四逆有陰進之象下之則陽益虧陷而不出故經謂諸熱邪傳經至於手足逆冷最難辨認謂為寒深於裏則無脈微欲絕之象謂為熱深於裏則無煩渴之證蓋只是熱邪入結於裏而陽氣不得順行四肢也此證當用和解不當用寒下故經中用劑之輕少者無如此方則其輕緩解散之義可見矣程應旄曰初得之四逆固非熱證亦非深寒咳悸而或小便不利既似乎水蓄腹痛泄利又似乎寒凝其中更兼下重一證得毋氣滯在趺陽而經絡失宣通也耶汪琥曰四逆散乃陽邪傳變而入陰經是解傳經之邪非治陰寒也凡陽熱之極六脈細弱語言輕微神色懶靜手足清温有似陰證而大便結小便數齒燥舌苔其熱已伏於內必發熱也若用熱藥則內熱愈熾用涼藥則熱被寒束而不得散法惟宜和表解肌疏通氣血而裏熱自除此仲景四逆散所由設也四逆散方甘草炙枳實破水漬炙干柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令折瀉利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕納湯中煮取一升半分温再服方解方名四逆散與四逆湯均治手足逆冷但四逆湯治陰邪寒厥此則治陽邪熱厥熱厥者三陽傳厥陰合病也太陽厥陰麻黃升麻湯甘草乾薑湯證也陽明厥陰白虎湯大承氣湯證也此則少陽厥陰故君柴胡以疏肝之陽臣芍藥以瀉肝之陰佐甘草以緩肝之氣使枳實以破肝之逆三物得柴胡能外走少陽之陽內走厥陰之陰則肝膽疏泄之性遂而厥可通也或咳或下利者邪飲上下為病加五味子乾薑温中以散飲也或悸者飲停侮心加桂枝通陽以益心也或小便不利者飲蓄膀胱加茯苓利水以導飲也或腹中痛者寒凝於裏加附子温中以定痛也或瀉利下重者寒熱鬱結加薤白開結以疏寒熱也集解方有執曰人之四肢温和為順故以不温和為逆但不温和而未至於厥冷則熱猶未深入也故用柴胡以解之枳實以瀉之芍藥以收之甘草以和之也少陰病下利若利自止惡寒而蜷臥手足温者可治註少陰病惡寒厥冷下利不止者陰寒盛也今下利能自止手足能自温雖見惡寒蜷臥乃陰退陽回之兆故曰可治集註程應旄曰少陰病下利而利自止則陰寒亦得下祛而又不致於脫雖有惡寒蜷臥不善之證但使手足温者陽氣有挽回之機故可温而救之也沈明宗曰手足温者乃真陽未離急用白通四逆之類温經散寒則邪退而真陽復矣故曰可治少陰病惡寒而蜷時自煩欲去衣被者可治註少陰病惡寒而蜷陰寒證也若時自煩欲去衣被者此陽回陰退之征故曰可治少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之註此承上條以出其治也少陰病得之二三日以上謂或四五日也言以二三日少陰之但欲寐至四五日反變為心中煩不得臥且無下利清穀咳而嘔之證知非寒也是以不用白通湯非飲也亦不用豬苓湯乃熱也故主以黃連阿膠湯使少陰不受燔灼自可愈也集註程知曰二三日邪在少陰四五日已轉屬陽明故無嘔利厥逆諸證而心煩不得臥者是陽明之熱內擾少陰故不欲寐也當以解熱滋陰為主治也黃連阿膠湯方黃連四兩黃芩二兩芍藥二兩雞子黃二枚阿膠三兩上五味以水六升先煮三物取二升去滓納膠烊盡小冷納雞子黃攪令相得温服七合日三服集解柯琴曰此少陰之瀉心湯也凡瀉心必藉連芩而導引有陰陽之別病在三陽胃中不和而心下痞硬者虛則加參甘補之實則加大黃下之病在少陰而心中煩不得臥者既不得用參甘以助陽亦不得用大黃以傷胃也故用芩連以直折心火用阿膠以補腎陰雞子黃佐芩連於瀉心中補心血芍藥佐阿膠於補陰中斂陰氣斯則心腎交合水升火降是以扶陰瀉陽之方而變為滋陰和陽之劑也是則少陰之火各歸其部心中之煩不得眠可除矣經曰陰平陽秘精神乃治斯方之謂歟少陰病下利咽痛胸滿心煩豬膚湯主之註身温腹滿下利太陰證也身寒欲寐下利少陰證也身熱不眠咽痛熱邪也身寒欲寐咽痛寒邪也今身寒欲寐下利咽痛與胸滿心煩之證並見是少陰熱邪也少陰之脈循喉嚨其支者從肺出絡心注胸中是以少陰之熱邪上逆則所過之處無不病也以豬膚湯主之解少陰上焦之熱兼止下焦之利也集解喻昌曰下利咽痛胸滿心煩此少陰熱邪充斥上下中間無所不到寒下之藥不可用矣故立豬膚湯一法也蓋陽微者用附子温經陰竭者用豬膚潤燥温經潤燥中同具散邪之義也豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得温分六服方解豬膚者乃革外之膚皮也其體輕其味鹹輕則能散咸則入腎故治少陰咽痛是於解熱中寓散之意也集解成無己曰豬水畜也其氣先入腎解少陰之客熱加蜜以潤燥除煩白粉以益氣斷利也少陰病二三日咽痛者可與甘草湯不差與桔梗湯註少陰病二三日咽痛無他證者乃少陰經客熱之微邪可與甘草湯緩瀉其少陰之熱也若不愈者與桔梗湯即甘草湯加桔梗以開鬱熱不用苦寒者恐其熱鬱於陰經也集註喻昌曰用甘草者和緩其勢用桔梗者開提其邪也此在二三日他證未具故可用之若五六日則少陰之下利嘔逆諸證皆起此法又未可用矣甘草湯方甘草二兩上一味以水三升煮取一升半去滓温服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升去滓温分再服少陰病咽中痛半夏散及湯主之註少陰病咽痛者謂或左或右一處痛也咽中痛者謂咽中皆痛也較之咽痛而有甚焉甚則涎纏於咽中故主以半夏散散風邪以逐涎也集註方有執曰此以風邪熱甚痰上壅而痹痛者言也故主之以桂枝祛風也佐之以半夏消痰也和之以甘草除熱也三物者是又為咽痛之一治法也半夏散及湯方半夏洗桂枝甘草炙各等分上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸納散兩方寸匕更煮三沸下火令小冷少少咽之半夏有毒似不當散服少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之註少陰病咽痛不愈若劇者咽中為痛所傷漸乃生瘡不能言語聲音不出所必然也以苦酒湯主之用半夏滌涎蛋清斂瘡苦酒消腫則咽清而聲出也集註程知曰咽痛忌汗忌寒下故甘草桔梗苦酒三方皆用和解之法惟半夏散及湯在前條為辛散温解之法也苦酒湯方半夏洗破如棗核大十四枚雞子去黃納上苦酒著雞子殼中一枚上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑集解李杲曰大抵少陰多咽傷咽痛之證古方用醋煮雞子主咽喉失音取其酸收固所宜也半夏辛燥何為用之蓋少陰多寒證取其辛能發散一發一斂遂有理咽之功也程知曰按卵白象天卵黃象地前黃連阿膠湯用雞子黃義取入腎滋陰此苦酒湯用雞子白義取入肺潤瘡也少陰病八九日一身手足盡熱者以熱在膀胱必便血也註邪傳少陰不從陰化而見寒證亦不從陽化而見熱證是其人腎氣素充所以藏雖受邪留連八九日仍復傳府外散也太陽主表故一身手足盡熱若熱還衛分非汗不解熱還營分非衄不解熱甚於上則頭痛目瞑衄血熱甚於下則腹痛尿難便血理必然也凡熱少血多瘀成血蓄熱多血少熱迫其血血不得蓄今為少陰邪熱復轉膀胱而傷營分迫走下竅故便血也集註程知曰前少陰病手足不逆冷反發熱者不死陽未全虧也此八九日一身及手足熱陰盛於裏也張璐曰少陰病難於得熱熱則陰盡陽復故少陰篇中謂手足不逆冷反發熱者不死然病至八九日陰邪內解之時反一身手足盡熱少陰必無此證當是藏邪轉府腎移熱於膀胱以膀胱主表故一身及手足盡熱也膀胱之血為少陰之熱所逼其趨必出陰竅以陰主降故也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之註少陰病二三日無陰邪之證至四五日始腹痛小便不利乃少陰陽邪攻裏也若腹痛口燥咽乾而從燥化則為可下之證矣今腹痛小便不利是熱瘀於裏水無出路勢必下迫大腸而作利也倘利久熱傷其營營為火化血腐為膿則為可清之證也今下利晝夜不止而便膿血則其熱已隨利減而下焦滑脫可知矣故以桃花湯主之益中以固脫也集註成無己曰要略云陽證內熱則溢出鮮血陰證內寒則下紫黑如豚肝也喻昌曰治下必先固中中氣不下墜則滑脫無源而自止註家見用乾薑謂是寒邪傷胃不知熱邪挾少陰之氣填塞胃中故少佐乾薑之辛以散之也程知曰此下利膿血之治法也腹痛小便不利少陰熱邪也而下利不止便膿血則證為傷血且有中氣下脫之虞矣故用桃花湯固腸止利也魏荔彤曰此證乃熱在下焦而熏蒸中焦使氣化因熱鬱而不行大便因熱盛而自利也久而下利不止將腸胃穢濁之物如膿帶血盡隨大便而下熱一日不消利一日不止也沈明宗曰此邪挾內濕凝滯血分則便膿血也桃花湯方赤石脂一半全用一半篩末一斤乾薑一兩糯米一升上三味以水七升煮米令熟去滓温服七合納赤石脂末方寸匕日三服若一服愈余勿服方解少陰寒邪多利清穀少陰熱邪多便膿血日久不止關門不固下焦滑脫矣此方君以體膏性澀之石脂養腸以固脫佐以味甘多液之糯米益氣以滋中則雖下利日久中虛液枯未有不愈者也其妙尤在用乾薑少許其意不在温而在散火鬱借此以開膿血無由而化也若一服愈余勿服以其黏澀之性甚也少陰病下利便膿血者桃花湯主之註少陰病諸下利用温者以其證屬虛寒也此少陰下利便膿血者是熱傷營也而不徑用苦寒者蓋以日久熱隨血去腎受其邪關門不固也故以桃花湯主之少陰病下利便膿血者可刺註少陰病下利便膿血用桃花湯不止者熱瘀於陰分也則可刺本經之穴以泄其熱熱去則膿血自止矣集註張璐曰先下利日久而後便膿血則用桃花湯若不先下利而下利便膿血則可刺經穴若刺經穴不愈則當從事白頭翁湯設更咽乾心煩不得眠則又須黃連阿膠湯為合法也林瀾曰刺者瀉其經氣而宣通之也下利便膿血既主桃花湯矣此復云可刺者如痞證利不止復利其小便與五苓散以救石脂禹余糧之窮故此一刺亦以輔桃花湯之所不逮也少陰病得之二三日口燥咽乾者急下之宜大承氣湯註邪至少陰二三日即口燥咽乾者必其人胃火素盛腎水素虧當以大承氣湯急瀉胃火以救腎水若復遷延時日腎水告竭其陰必亡雖下無及矣集註成無己曰與大承氣湯急下之以全腎何也經云三陰經受病已入於府者可下而已則是上條少陰病乃入府證也少陰邪熱已轉屬於府胃府實熱消灼腎水故口燥咽乾用大承氣以瀉府而實熱自除且少陰之藏本腎屬水胃府屬土瀉土所以救水也方有執曰口燥咽乾者少陰之脈循喉嚨挾舌本邪熱客於其經而腎水為之枯竭也然水干則土燥土燥則水愈干所以急於下也張璐曰按少陰急下三證一屬傳經熱邪亢極一屬熱邪轉入胃府一屬温熱發自少陰皆刻不容緩之證故當急救欲絕之腎水與陽明急下三法同源異派汪琥曰少陰病得之二三日者非才得病二三日即口燥咽乾謂少陰口燥咽乾之病已得之二三日也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯註少陰病自利清水謂下利無糟粕也色純青謂所下者皆汚水也下無糟粕純是汚水此屬少陰實熱所以心下必痛口燥咽乾其為少陰急下之證無疑矣故當急下之宜大承氣湯集註程知曰陽邪熱結口必干燥設系陰邪口中和而不燥矣故宜急下之以救陰也沈明宗曰邪傳陽明必俟大便堅硬而攻下者乃未傷胃中津液之謂此利清水因少陰邪熱熾盛乘逼胃中津液頃刻勢已瀕危不得不以通因通用急奪而救胃腎將絕之陰也少陰病六七日腹脹不大便者急下之宜大承氣湯註少陰病六七日腹脹不大便者蓋因其人陽氣素盛胃有宿食故也所以傳邪已入少陰復轉屬陽明而成胃實故宜大承氣湯急下之也集註張璐曰少陰之證自利者最多虛寒則下利清穀虛熱則下利膿血故多用温補傳經陽邪內結則自利純青水温熱病則自利煩渴並宜下奪清熱此以六七日不大便而腹脹可見邪熱轉歸陽明而為胃實之證所以宜急下也少陰中風脈陽微陰浮者為欲愈註少陰中風脈若見陽浮陰弱乃風邪傳入少陰則是其勢方盛未易言愈今陽脈反微陰脈反浮陽微則外邪散而表氣和陰浮則裏氣勝而邪外出故為欲愈也少陰病欲解時從子至寅上註子丑寅陽生漸長之候也病在少陰而解於陽生之際所謂陽進則陰退陰得陽而邪自解也少陰所重在真陽從可見矣
