body:
  text: 卷四辨陽明病脈證并治全篇陽明主裏內候胃中外候肌肉故有病經病府之分如論中身熱煩渴目痛鼻乾不得眠不惡寒反惡熱者此陽明經病也潮熱譫語手足腋下濈然汗出腹滿痛大便硬者此陽明府病也而其候各有三經病則有邪已傳陽明而太陽之表未罷兼見頭痛惡寒無汗之太陽證者有太陽之邪已罷悉傳陽明但見壯熱有汗心煩不眠口渴引飲之陽明證者有陽明之邪未已復轉少陽兼見胸脅痛寒熱往來口苦而嘔目眩耳聾之少陽證者府病則有太陽陽明謂太陽病或發汗或吐或下或利小便亡其津液胃中乾燥太陽之邪乘胃燥而轉屬陽明致小便反數大便硬者所為脾約是也有正陽陽明謂陽氣素盛或有宿食太陽之邪一傳陽明遂入胃府致大便不通者所為胃家實是也有少陽陽明謂病已到少陽法當和解而反發汗利小便亡其津液胃中燥熱復轉屬陽明致大便結燥者所為大便難者是也其治陽明經病則以葛根湯或桂枝加葛根湯發之或以白虎湯清之或以柴胡白虎湯和之隨其證而施之可也其治陽明府病雖均為可下然不無輕重之分故或以三承氣湯下之或麻仁丸通之或蜜煎膽汁導之量其病而治之可也此陽明病之大略也茲以在經在府二者詳疏於篇俾讀者易為分別則臨證施治自不紊矣陽明之為病胃家實是也註陽明經內以候胃外以候肌言陽明之為病由太陽之邪傳於其經則為陽明病外證由太陽之邪傳入胃府則為胃家實也集註方有執曰陽明經也胃府也實者大便結為硬滿而不得也雖則遲早不同而非日數所可拘也傷寒三日陽明脈大註傷寒一日太陽二日陽明三日少陽乃內經言傳經之次第非必以日數拘也此云三日陽明脈大者謂不兼太陽陽明之浮大亦不兼少陽陽明之弦大而正見正陽陽明之大脈也蓋由去表傳裏邪熱入胃而成內實之診故其脈象有如此者集註方有執曰傷寒三日該中風而大約言也脈大者陽明氣血俱多也沈明宗曰此正陽明之正脈也仲景謂三日陽明脈大因陽明乃多氣多血之府風寒傳入邪盛於中故脈顯大是為陽明邪實之正脈但病陽明務具此脈方可下奪或兼太陽之浮緊少陽之弦細或遲疾滑澀虛弱乃屬氣血陰陽之虛雖見大實大滿亦當詳審顧慮或以小承氣湯試之或用蜜煎導法不得直施攻下也本太陽初得病時發其汗汗先出不徹因轉屬陽明也註陽明之病本自太陽初得病時發其汗汗先出而不透徹乃為汗不如法故未盡之邪因而轉屬陽明也邪在經則為外證邪入府則為胃家實矣集註方有執曰此言由發太陽汗不如法致病入胃之大意陽明病若能食名中風不能食名中寒註太陽之邪傳陽明病有自中風傳來者有自傷寒傳來者當於食之能否辨之若能食名中風是自中風傳來者以風乃陽邪陽能化穀故能食也不能食名中寒是自傷寒傳來者以寒乃陰邪不能化穀故不能食也集註方有執曰此以食之能否驗風寒之辨蓋陽明主水穀風能食陽能化穀也寒不能食陰不殺穀也名猶言為也中寒即傷寒之互詞大意推原風寒自太陽傳來其辨驗有如此者非謂陽明自中而然也汪琥曰仲景云中寒與傷寒同義非真寒證也若系真中寒是胃家虛冷藥宜理中湯之類今不能食是胃氣實但邪未入府不作鬱熱耳因名中寒實與傷寒無異問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也註陽明病有外證有內證潮熱自汗不大便內證也身熱汗自出不惡寒反惡熱外證也今汗自出是從中風傳來故與中風之外證同而身熱不惡寒反惡熱則知為陽明外證故不與中風外證同也然陽明之熱發於肌肉必蒸蒸而熱又不似太陽之陣陣發熱可知矣集註方有執曰此以太陽中風傳入陽明之外證言魏荔彤曰病有太陽中風不解傳入陽明者何以辨之故設問曰陽明未知其裏之何時傳來必先驗其外之何所見證答曰太陽病有身熱汗自出而惡風者此太陽中風之本證也若身熱汗自出竟不惡風寒而反惡熱則病已去太陽而入陽明矣此陽明病由太陽中風而傳入者也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也註太陽病當惡寒陽明病當惡熱今陽明病有初得之一日不發熱而惡寒者是太陽去表之邪未盡故仍惡寒也然去表未盡之邪欲傳陽明不能久持故惡寒必將自罷即日當自汗出而惡熱矣集註方有執曰此以太陽傷寒傳入陽明之外證言程應旄曰陽明惡寒終時帶表至於府病則惡熱矣表之罷否須於此驗之鄭重光曰此辨陽明傷寒之外證不發熱而惡寒起自傷寒也惡寒將自罷邪過表也即自汗出邪熱鬱於肌肉腠理開汗外泄也魏荔彤曰太陽傷寒亦有傳入陽明者又何以辨之故設問曰病有得之一日起初之時不見發熱而但見惡寒者何病也答曰得之一日惡寒雖為太陽傷寒之證而惡寒亦將自罷即自汗出而惡熱此是陽明病由太陽傷寒而傳入者也可知太陽中風則發熱惡風汗自出為正病太陽傷寒則惡寒無汗為正病若傳入陽明則必以汗出惡熱為正病也問曰惡寒何故自罷答曰陽明居中主土也萬物所歸無所復傳始雖惡寒二日即止此為陽明病也註此釋上條陽明惡寒自罷之義陽明屬胃居中土也土為萬物所歸故邪熱歸胃則無所復傳亦萬物歸土之義陽明初病一日雖仍惡寒是太陽之表未罷也至二日惡寒自止則是太陽之邪已悉歸併陽明此為陽明病也集註方有執曰惡寒二日自止者熱入裏而將惡熱此以正陽陽明言也程應旄曰六經雖分陰陽而宰之者胃五藏六府皆朝宗而稟令焉一有燥熱無論三陽傳來之邪從而化熱即三陰傳來之邪亦轉屬而變熱陰陽之邪皆歸胃土故曰萬物所歸無所復傳也問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也註問曰何緣得陽明胃實之病答曰由邪在太陽時發汗若下若利小便皆為去邪而設治之誠當則邪解而愈矣如其不當徒亡津液致令胃中乾燥則未盡之表邪乘其燥熱因而轉屬陽明為胃實之病者有三曰不更衣即太陽陽明脾約是也曰內實即正陽陽明胃家實是也曰大便難即少陽陽明大便難是也三者雖均為可下之證然不無輕重之別脾約自輕於大便難大便難自輕於胃家實蓋病脾約大便難者每因其人津液素虧或因汗下利小便施治失宜所致若胃實者則其人陽氣素盛胃有宿食即未經汗下而亦入胃成實也故已經汗下者為奪血致燥之陽明以滋燥為主未經汗下者為熱盛致燥之陽明以攻熱為急此三承氣湯脾約丸及蜜煎土瓜根豬膽汁導法之所由分也集註方有執曰古人大便必更衣不更衣言不大便也程應旄曰轉屬層次不止有表罷不罷之分而表罷入裏復有燥實燥不實之辨所以有不更衣之陽明病有內實之陽明病有大便難之陽明病也其中有屬表屬裏所以下法有禁有宜受氣有裏實裏燥所以下法有應大應小汪琥曰或問太陽病若下矣則胃中之物已去縱亡津液胃中乾燥未必復成內實答云方其太陽初病時下之不當徒亡津液胃中之物去之不盡邪傳陽明而成燥糞故有內實之證問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也註陽明可下之證不止於胃家實也其綱有三故又設問答以明之也太陽之邪乘胃燥熱傳入陽明謂之太陽陽明不更衣無所苦名脾約者是也太陽之邪乘胃宿食與燥熱結謂之正陽陽明不大便內實滿痛名胃家實者是也太陽之邪已到少陽法當和解而反發汗利小便傷其津液少陽之邪復乘胃燥轉屬陽明謂之少陽陽明大便澀而難出名大便難者是也集註程知曰言三陽皆有入胃府之證也陽明為水穀之海中土為萬物所歸故三陽經皆能入其府邪自太陽傳入胃府者謂之太陽陽明即經所謂太陽病若吐若下若發汗後微煩小便數大便因硬者是也由脾之斂約故用小承氣微下以和之邪自陽明經傳入胃府者謂之正陽陽明即經所謂發熱汗出胃中燥硬譫語者是也乃胃中邪實故用大承氣以攻下之邪自少陽轉屬胃府者謂之少陽陽明即經所謂少陽不可發汗發汗則譫語此屬胃者是也系津液內竭故用麻仁丸潤下以和其津液也若三陽外證未除則陽明正治之法又不可用矣陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出按自汗是陽明證盜汗是少陽證盜汗當是自汗文義始屬註陽明病在經脈當浮長入府脈當實大今脈浮而緊潮熱有時者是陽明病而見太陽傷寒脈也則知是從傷寒傳來太陽傷寒之邪未罷必無汗故雖見陽明潮熱發作有時之證仍當從太陽陽明傷寒治之宜麻黃加葛根湯汗之若見潮熱發作有時之證而脈但浮不緊是陽明病而見太陽中風脈也則知是從中風傳來太陽中風之邪未罷必自汗出當從太陽陽明中風治之宜桂枝加葛根湯解之集註沈明宗曰此陽明證而見太陽脈也脈浮而緊太陽表寒未罷之脈潮熱發作有時則陽明裏證已具但浮者太陽風傷衛脈故必汗出也陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯按汗出多之下當有發熱二字若無此二字脈遲汗出多微惡寒乃是表陽虛桂枝附子湯證也豈有用桂枝湯發汗之理乎必是傳寫之遺註陽明病脈當數大今脈遲汗出多設不發熱惡寒是太陽表邪已解矣今發熱微惡寒是表猶未盡解也故宜桂枝湯解肌以發其汗使初入陽明之表邪仍還表而出也集註程知曰此言中風傳陽明表邪未解仍宜用桂枝湯以解肌也汪琥曰此太陽病初傳陽明經中有風邪也脈遲者太陽中風緩脈之所變傳至陽明邪將入裏故脈變遲汗出多者陽明熱而肌腠疏也微惡寒者在表風邪未盡也故仍從太陽中風例治之又曰雖從太陽例治但既云陽明病仲景法還宜用桂枝加葛根湯為是陽明病脈浮無汗而喘者發汗則愈宜麻黃湯註陽明病脈應浮大證應汗出今脈但浮表病脈也無汗而喘表實證也是太陽之邪未悉入陽明猶在表也當仍從太陽傷寒治之發汗則愈宜麻黃湯集註張璐曰陽明榮衛難辨辨之全藉於脈證風邪之脈傳至陽明自汗已多則緩去而遲在寒邪之脈傳至陽明發熱已甚則緊去而浮在此皆邪氣在經之徵若入府則遲者必數浮者必實矣設不數不實非胃實也必不勝攻下矣汪琥曰無汗而喘但浮不緊何以定其為陽明病必其人目痛鼻乾身熱不得眠故云陽明病也魏荔彤曰此太陽陽明之證入陽明未深故令其邪仍自表出不至歸於胃而無所復傳也陽脈微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過者為陽絕於裏亡津液大便因硬也註此承上條互詳其脈以出其證也脈陽微謂脈浮無力而微也陽脈實謂脈浮有力而盛也凡中風傷寒脈陽微則熱微微熱蒸表作汗若汗出少者為自和欲解汗出多者為太過不解也陽脈實則熱盛因熱盛而發其汗出多者亦為太過汗出太過則陽極於裏亡津液大便因硬而成內實之證矣勢不得不用下法故欲發其汗者不可不早慮及此也集註喻昌曰陽微者中風之脈陽微緩也陽實者傷寒之脈陽緊實也陽絕即亡津液之互辭仲景每於亡津液者悉名無陽玩本文陽絕於裏亡津液大便因硬甚明傷寒發太陽膀胱經之汗即當顧慮陽氣以膀胱主氣化故也發陽明胃經之汗即當顧慮陰津以胃中藏津液故也所以陽明多有熱越之證謂胃中津液隨熱而盡越於外汗出不止耳然則陽明病不論中風傷寒脈微脈實汗出少而邪將自解汗出多則陰津易致竭絕也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也註陽明病法當汗多反無汗其身如蟲行皮中狀者以其人胃氣久虛邪鬱於太陽之表陽明肌腠不能宣發作汗故也宜葛根湯小劑微汗和其肌表自可愈也集註汪琥曰按此條論仲景無治法常器之云可用桂枝加黃耆湯郭雍云宜用桂枝麻黃各半湯不知上二湯皆太陽經藥今系陽明無汗證仍宜用葛根湯主之魏荔彤曰陽明病法應多汗今反無汗但見身如蟲行皮中狀者此邪熱欲出表作汗而正氣衰弱不能達之也陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈註陽明病初欲食知其從中風熱邪傳來也陽明受邪當小便數大便硬今小便反不利大便自調知津未傷而胃自和不成裏實也既不成實則在經之邪本輕可自愈也若其人骨節疼翕翕如有熱狀是太陽之表未除也奄忽也忽然發狂濈然汗出而解者蓋以太陽傳來之邪本輕陽明所受之邪自淺津未傷而胃自和仍當還表作解也然必待發狂而解者此胃中水氣不勝初欲食之穀氣穀氣長陽化熱水不勝熱釀汗共並而出所以發狂作解也凡將汗解脈必先浮今言脈緊則愈者亦邪還於表欲解應見之脈也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也註傷寒發熱無汗嘔不能食為太陽之邪欲傳也若無汗為太陽陽明之表尚在汗之可也今反汗出濈濈然者是邪已轉屬陽明之府可下不可汗也集註成無己曰傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者是太陽之邪轉屬陽明也故經曰陽明病法多汗方有執曰嘔不能食熱入胃也反汗出者肌肉著熱膚腠反開也程應旄曰太陽本證現在而反汗出濈濈然者雖表證未罷已是轉屬陽明也濈濈連綿之意即俗云汗一身不了又一身是也傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證者白虎加人參湯主之註傷寒之邪傳入陽明脈浮發熱無汗其表不解者雖有燥渴乃大青龍湯證不可與白虎湯即有陽明渴欲飲水熱證應與白虎者亦必審其無太陽表證始可與也加人參者以其脈浮不滑非有餘也且欲於大解熱中速生其津液也集註鄭重光曰此申明用白虎湯之法以白虎但能解熱而不解表若稍帶外感有無汗惡寒身痛頭疼之表證慎不可用也白虎加人參湯方於白虎湯方內加人參三兩餘依白虎湯方傷寒脈浮滑此以表有熱裏有寒白虎湯主之按王三陽云經文寒字當邪字解亦熱也其說甚是若是寒字非白虎湯證矣註此言傷寒太陽證罷邪傳陽明表裏俱熱而未成胃實之病也脈浮滑者浮為表有熱之脈陽明表有熱當發熱汗出滑為裏有熱之脈陽明裏有熱當煩渴引飲故曰表有熱裏有熱也此為陽明表裏俱熱之證白虎乃解陽明表裏俱熱之藥故主之也不加人參者以其未經汗吐下不虛故也集註程知曰滑則裏熱云浮滑則表裏俱熱矣大熱之氣得辛涼而解猶之暑暍之令得金風而爽故清涼之劑以白虎名之又曰厥陰條中有傷寒脈滑而厥者裏有熱也白虎湯主之可證此條之非裏有寒矣魏荔彤曰此裏尚為經絡之裏非藏府之裏亦如衛為表營為裏非指藏府而言也白虎湯方知母六兩石膏碎一斤甘草炙二兩粳米六合上四味以水一斗煮米熟湯成去滓温服一升日三服集解柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗出熱爍胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖內外大熱而未實終非苦寒之味所宜也石膏辛寒辛能解肌熱寒能勝胃火寒能沉內辛能走外此味兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故用為臣甘草粳米調和於中宮且能土中瀉火稼穡作甘寒劑得之緩其寒苦劑得之平其苦使二味為佐庶大寒大苦之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自解方中有更加人參者亦補中益氣而生津也用以協和甘草粳米之補承制石膏知母之寒瀉火而土不傷乃操萬全之術者也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯註病人謂病太陽經中風傷寒之人也太陽病煩熱汗出則應解矣今又寒熱如瘧狀每至日晡所即發潮熱日晡者乃申酉陽明旺時故曰屬陽明也證雖如此當審其果盡歸陽明耶抑或尚兼太陽也故又當以脈辨之若脈實者邪已入裏則汗出潮熱為陽明下證宜與大承氣湯下之若脈浮虛者邪尚在表則寒熱如瘧仍屬太陽當汗之證也宜與桂枝湯汗之集註程知曰病人得汗後煩熱解太陽之邪將盡未盡其人復如瘧狀日晡時發熱則邪入陽明審矣然雖已入陽明尚恐未離太陽故必重辨其脈脈實者可下若脈浮虛者仍是陽明兼太陽便宜汗而不宜下也太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈註太陽病若吐若下若發汗後不解入裏微煩者乃梔子豉湯證也今小便數大便因硬是津液下奪也當與小承氣湯和之以其結熱未甚入裏未深也集註喻昌曰微煩小便數大便因硬皆是邪漸入裏之機故用小承氣湯和之程應旄曰吐下汗後而見煩證徵之於大便硬固非虛煩者比然煩既微而小便數當由胃家失潤燥氣客之使然胃雖實非大實也以小承氣湯取其和也非大攻也小承氣湯方大黃四兩厚朴去皮炙二兩枳實大者炙三枚以上三味以水四升煮取一升二合去滓分温二服初服湯當更衣不爾者盡飲之若更衣者勿服之趺陽脈浮而澀浮則胃氣强澀則小便數浮澀相搏大便則硬其脾為約麻仁丸主之註趺陽胃經脈也趺陽脈浮而澀陽浮則胃氣强陰澀則小便數陰陽相搏則熱盛而液竭矣故大便則硬也其名為約者謂脾為邪所約束不能為胃行其津液故名脾約也以麻仁丸主之養液潤燥清熱通幽其不敢恣行承氣者以脈澀故也集註程知曰言胃脈浮澀不可大攻宜用麻仁丸潤法也趺陽胃脈也在足跗上動脈應手浮則陽熱盛而胃强澀則陰津少而小便數脾主為胃行其津液者也胃陽强則脾陰弱不能為胃行其津液故約其食物如一二彈丸也此不當下而當潤之程應旄曰麻仁丸潤燥通幽傷寒不可恣行大承氣可知矣所以然者以其為太陽陽明非正陽陽明胃家實者比也推之少陽陽明其不可以正陽明胃家實之法治之更可知矣汪琥曰以胃强脾弱為脾約作解蓋以胃中之邪熱盛為陽强故脈浮脾家之津液少為陰弱故脈澀用麻仁丸者以瀉胃中之陽而扶脾之陰也麻仁丸方麻仁二升芍藥半斤枳實半斤大黃去皮一斤厚朴去皮一斤杏仁去皮尖熬別作脂一升上六味蜜合丸如桐子大飲服十丸日三服漸加以和為度集解方有執曰麻子杏仁能潤乾燥之堅枳實厚朴能導固結之滯芍藥斂液以輔潤大黃推陳以致新脾雖為約此能疏之傷寒吐後腹脹滿者與調胃承氣湯註傷寒吐後胸不脹滿而腹脹滿者是表邪已盡胃中壅熱故也宜與調胃承氣湯下其熱而和之以無硬痛故不用大小承氣也集註程知曰言吐後腹脹滿宜調胃也熱在上焦則吐吐後腹脹滿則邪不在胸其為裏實可知然脹滿而不硬痛自不宜用急下之法但與調胃承氣和其胃熱可耳內經云諸脹腹大皆屬於熱也程應旄曰吐傷津液燥氣不能下達遂成土鬱是以腹脹滿用調胃承氣一奪其鬱可耳調胃承氣湯方大黃去皮酒浸四兩甘草炙二兩芒硝半升上三味以水三升煮取一升去滓納芒硝更煮兩沸少少温服之方解方名調胃承氣者有調和承順胃氣之義非若大小承氣專攻下也經曰熱淫於內治以鹹寒火淫於內治以苦寒君大黃之苦寒臣芒硝之鹹寒二味並舉攻熱瀉火之力備矣恐其速下故佐甘草之緩又恐其過下故少少温服之其意在不峻而和也陽明病不吐不下心煩者可與調胃承氣湯註陽明病謂已傳陽明不吐不下心煩者謂未經吐下而心煩也其為熱盛實煩可知故與調胃承氣湯瀉熱而煩自除也集註成無己曰吐後心煩謂之內煩下後心煩謂之虛煩今陽明病不吐不下心煩則是胃有鬱熱也與調胃承氣湯以下其鬱熱喻昌曰胃氣及津液既不由吐下而傷則心煩明系胃中熱熾故可與調胃承氣湯陽明發熱汗多者急下之宜大承氣湯註陽明病不大便發熱汗多不止者雖無內實亦當急下之蓋因陽氣大蒸於內恐致陰液暴亡於外故以全津液為急務也宜大承氣湯下之集註喻昌曰汗多則津液外滲加以發熱則津液盡隨熱勢蒸蒸騰達於外更無他法以止其汗惟有急下一法引熱勢從大腸而出庶津液不致盡越於外耳程應旄曰此等之下皆為救陰而設不在奪實奪實之下可緩救陰之下不可緩沈明宗曰陽明裏實以潮熱微汗為正茲見發熱汗多乃裏熱熾盛之極蒸騰胃中津液盡越於外非亟奪其邪以救津液不可故宜大承氣湯急下也大承氣湯方大黃酒洗四兩厚朴炙去皮半斤枳實炙五枚芒硝三合上四味以水一斗先煮二物取五升去滓納大黃更煮取二升去滓納芒硝更上微火一兩沸分温再服得下余勿服方解諸積熱結於裏而成滿痞燥實者均以大承氣湯下之也滿者腹脅滿急䐜脹故用厚朴以消氣壅痞者心下痞塞硬堅故用枳實以破氣結燥者腸中燥屎乾結故用芒硝潤燥軟堅實者腹痛大便不通故用大黃攻積瀉熱然必審四證之輕重四藥之多少適其宜始可與也若邪重劑輕則邪氣不服邪輕劑重則正氣轉傷不可不慎也集解柯琴曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黃是氣藥為君名大承氣大黃倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大瀉下也因名曰大味寡性緩制小其服欲微和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮朴枳取五升去滓納大黃再煮取二升納芒硝何哉蓋生者氣銳而先行熟者氣純而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見仲景微和之意也程知曰調胃承氣大黃用酒浸大承氣大黃用酒洗皆為芒硝之鹹寒而以酒製之若小承氣不用芒硝則亦不事酒浸洗矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯註陽明病下之後心中懊憹而煩者若腹大滿不大便小便數知胃中未盡之燥屎復硬也乃可攻之若腹微滿不可攻也誤攻必變脹滿不能食飲水則噦等逆矣若果有燥屎宜下者以大承氣湯下之集註方有執曰可攻以上以轉矢氣言懊憹悔憹痛恨之意蓋藥力不足以勝病燥硬欲行而不能故曰可攻言當更服湯以促之也腹微滿以下以不轉矢氣言頭硬後溏裏熱輕也故曰不可攻之言當止湯勿服也程知曰言有燥屎即可大攻下也下後心中懊憹而煩者虛煩也當與梔子豉湯若胃有燥屎則非虛煩故可攻腹不甚滿則無必攻之法有燥屎則非先硬後溏者也故可攻又曰便硬與燥屎不同便硬者大便實滿而硬燥屎者胃中宿食因胃熱而結為燥丸之屎也故便硬猶有用小承氣者若燥屎則無不用芒硝之鹹寒也程應旄曰未句乃申可攻句以決治法得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯註得病二三日無太陽少陽證煩躁心下硬至四五日不大便若脈大屬正陽陽明胃實之證也下之無疑今脈弱雖胃和能食不可輕下只可與小承氣湯少少與而微和之令其小安次日仍不大便繼與小承氣湯促之若六七日竟不大便而小便少者即不能食亦屬胃中尚未乾燥屎未定硬如大攻之初見硬復必溏也須待小便利知屎定硬乃可攻之宜大承氣湯集註方有執曰太陽不言藥以有桂枝麻黃之同也少陽言藥以專主柴胡也凡以此為文者皆互發也以無太少二經證故知此屬陽明以脈弱故宜微和至六日以下乃歴敘可攻不可攻之節度也程應旄曰能食以結在腸間而胃火自盛也先以小承氣湯少少與之和胃中之火令少安後以前藥增至一升去腸中之結既用小承氣矣而又減去分數接續投之以脈弱之胃其稟素虛而為日又未久也張璐曰此段之能食不能食全與辨風寒强弱無涉言能食者不可以為胃强而輕下不能食者不可以為胃中有燥屎而輕下也陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下註陽明病脈遲雖汗出不惡寒外證欲解而脈不實尚未可攻也若其人身重熱困於體也短氣而喘熱壅於上也腹滿潮熱熱聚於中也手足濈然汗出大便已硬熱結於下也斯為外邪已解內實已成始可攻之主以大承氣湯可也若汗出微發熱惡寒者則外猶未解也其熱不潮者裏猶未實也不可與承氣湯即有裏急腹大滿不通等證亦只宜與小承氣湯微和胃氣勿令大泄下蓋以脈遲故也集註方有執曰潮熱陽明旺於申酉戌故熱作於此時如潮之有信也手足濈然而汗出者脾主四肢而胃為之合胃中燥實而蒸蒸騰達於四肢故曰大便已硬也林瀾曰此節辨脈遲內結之或宜大承氣攻之或但可以小承氣微和之也陽明病脈遲證兼汗出不惡寒身重短氣腹滿而喘似屬可攻然必有潮熱者為外證已解裏證已具手足濈然汗出者為大便已硬主以大承氣湯攻之奚疑若汗出雖多猶見發熱惡寒則表尚在也其熱不潮汗亦非手足濈然之汗安可與承氣以攻之乎即腹大滿不通亦只可與小承氣微和勿令大泄下此何以故脈遲便非必下之脈雖內結亦豈大承氣所宜哉陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎也乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉矢氣者慎不可攻也註陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之也若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢穢氣則為有燥屎乃可攻之若不轉矢穢氣此但初頭硬後必溏是尚未成硬也不可攻之攻之必寒氣乘虛上逆脹滿不能食也欲飲水者得水則噦亦由虛寒之氣上逆不能化水而下輸也若其後所發潮熱不退必是大便再硬但已經下後所硬者無多只以小承氣湯和之可也故凡服承氣湯不轉矢氣者慎不可攻也此蓋仲景戒人不可輕下之意集註方有執曰此以潮熱轉矢氣次第而詳言之以決當下之候也轉矢氣反屁出也脹滿藥寒之過也噦亦寒傷胃也復硬而少者重下故也末句重致叮嚀之意喻昌曰若腹中氣仍不轉則不但用大承氣大差即小承氣亦差矣程知曰上條曰外欲解可攻裏曰外未解未可與承氣曰可與小承氣微和胃氣勿令大泄下此條曰可與曰不可與曰乃可攻之不可攻之曰少與小承氣曰以小承氣和之慎不可攻多少商量慎重之意故惟手足濈然汗出大便燥硬者始主之以大承氣若小承氣猶是微和胃氣之法也汪琥曰轉矢氣則知其人大便已硬腸胃中燥熱之甚故其氣不外宣時轉而下不轉矢氣則腸胃中雖有熱而滲孔未至於燥此但初頭硬後必溏也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉矢氣者勿更與之明日又不大便脈反微澀者裏虛也為難治不可更與承氣湯也註陽明病譫語潮熱脈滑而疾者是可攻之證脈也然無濈濈然之汗出與小便數大便硬燥實等證則不可驟然攻之宜先與小承氣湯一升試之若腹中轉矢穢氣則知腸中燥屎已硬以藥少未能遽下所轉下者但屎之氣耳可更服一升促之自可下也若不轉矢氣則勿更與服俟明日仍不大便診其脈仍滑疾則更服之今脈反見微澀則是裏虛無氣不能承送故為難治所以不可更與承氣湯也集註方有執曰滑以候食故為大便硬之診疾者屬裏熱也微者陽氣不充無以運行澀者陰血不足無以潤送故曰陽微不可下無血不可下此之謂也張璐曰此條脈滑而疾有譫語潮熱而無硬滿實證只宜以小承氣湯下之下之而脈反微澀證變裏虛故為難治傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利則止後服按趙嗣真曰活人書云弦者陽也澀者陰也陽病見陽脈者生在仲景脈法中弦澀屬陰不屬陽得無疑乎今觀本文內脈弦者生之弦字當是滑字若是弦字弦為陰負之脈豈有必生之理惟滑脈為陽始有生理滑者通澀者塞凡物理皆以通為生塞為死玩上條脈滑而疾者小承氣主之脈微澀者裏虛為難治益見其誤註傷寒若吐若下後津液已亡而表不解邪因入裏不大便五六日上至十餘日仍不大便日晡所發潮熱不惡寒者此乃表邪悉罷裏熱漸深也仍宜大承湯蕩盡餘邪以存陰液自可愈也若因循失下以致獨語如見鬼狀病勢劇者則不識人循衣摸床驚惕不安微喘直視見一切陽亢陰微孤陽無依神明擾亂之象當此之際惟診其脈滑者為實堪下則生澀者為虛難下則死若病勢微者但見潮熱譫語不大便之證而無前神昏等劇者宜以大承氣湯下之若一服利即止後服蓋恐其過也按循衣摸床危惡之候也一以陰氣未竭為可治如太陽中風火劫變逆捻衣摸床小便利者生不利者死是也一以陽熱之極為可攻如陽明裏熱成實循衣摸床脈滑者生澀者死是也大抵此證多生於汗吐下後陽氣大虛精神失守經曰四肢者諸陽之本也陽虛故四肢擾亂失所倚也以獨參湯救之汗多者以參耆湯厥冷者以參附湯治之愈者不少不可概謂陽極陰竭也集註喻昌曰此條舉譫語之勢重者為言而勢重之中復分二等劇者主死微者主生故以大承氣湯下之程知曰婁全善治循衣摸床每以補益得愈亦因其脈證之不足也劉守真每以承氣治熱病法雖祖於仲景而辨證其未能如此詳悉故開後人鹵莽之端又曰喘則氣欲上脫微喘者邪實於內而又不能大喘也不識人循衣摸床心欲絕也動惕不安肝欲絕也微喘肺欲絕也直視腎欲絕也內經所謂三陰三陽五藏六府皆受病榮衛不行藏府不通故脈澀者死也汪琥曰日晡所發潮熱者府實燥甚故當其經氣王時發潮熱也獨語者即譫語也病人自言為譫獨語如見鬼狀乃陽明府實而妄見妄聞劇者甚也成註云熱甚昏冒正氣故不識人循衣摸床者陽熱偏勝而躁動於手也惕而不安者胃熱沖膈心神為之不寧也又胃熱甚而氣上逆則喘直視則邪干藏矣故其生死之機須於脈候決之陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也註陽明病本應自汗出醫誤以為風邪更重發汗病已差尚微煩不了了者此大便必硬故也然無或滿或痛之苦者以重汗亡津胃中乾燥故大便硬本無宿食也則當問其小便日幾行若本一日三四行今日只再行可知大便不久則出蓋小便數少則津液當還胃中故知不久必大便自出不須藥也集註方有執曰水穀入胃其精者為津液粗者成渣滓水精滲出腸胃之外清者為津液濁者外而為汗下而為小便故汗與小便過多者皆能奪乎津液所以渣滓之為大便者乾燥結硬而難出也然二便者水穀分行之道路此通則彼塞此塞則彼通小便出少則津液還停胃中必大便潤而自出也陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導註此承上條詳其義以明其治也陽明病自汗出或發汗小便自利者此為津液內竭雖大便硬而無滿痛之苦不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則用蜜煎潤竅滋燥導而利之或土瓜根宣氣通燥或豬膽汁清熱潤燥皆可為引導法擇而用之可也集註成無己曰津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以潤藥外治而導引之張璐曰凡系多汗傷津及屢經汗下不解或尺中脈遲弱元氣素虛之人當攻而不可攻者並宜導法程應旄曰小便自利者津液未還入胃中津液內竭而硬故自欲大便但苦不能出耳須有此光景時方可從外導法漬潤其腸腸潤則水流就濕津液自歸還於胃故不但大便通而小便亦從內轉矣蜜煎導方蜜七合一味納銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸並手捻作挺子令頭銳大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之內臺方用蜜五合煎凝時加皂角末五錢蘸捻作挺以豬膽汁或油潤穀道納之豬膽汁方大豬膽一枚瀉汁和法醋少許以灌穀道內如一食頃當大便出宿食惡物甚效內臺方不用醋以小竹管插入膽口留一頭用油潤納入穀道中以手將膽捻之其汁自入內此方用之甚便土瓜根方缺按土瓜即俗名赤雹也肘後方治大便不通採根搗汁用筒吹入肛門內此與上豬膽汁方同義內臺方用土瓜根削如挺納入穀道中誤矣蓋蜜挺入穀道能烊化而潤大便土瓜根不能烊化如削挺用之恐失仲景製方之義傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯註少陰病得之二三日口燥咽乾急下之宜大承氣湯者乃因熱勢甚速消灼腎水津液不能到咽故不必待其有可下之證而急下之是下其熱以救將絕之水緩則腎水乾竭陽必無依躁冒自焚而死也目中不了了而睛和者陰證也睛不和者陽證也今傷寒六七日目中不了了睛不和者是腎水為胃陽所竭水既不能制火則火上熏於目而眸子朦朧為之不了了也此熱結神昏之漸危惡之候也雖外無陽證惟身微熱內無滿痛只大便難亦為熱實故曰此為實也急以大承氣湯下之瀉陽救陰以全未竭之水可也睛不和者謂睛不活動也集註方有執曰了了猶瞭瞭也素問曰陽明主肉其脈俠鼻絡於目靈樞曰足陽明之正上循咽出於口還系目系合於陽明也又曰足陽明之筋其支者上頸上俠口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱所以目中不了了睛不和知胃實也急下者任脈循面入目督脈上系兩目中央諸脈皆屬於目而人之精神注焉是以宜急下也喻昌曰少陰有急下三法以救腎水一本經水竭一木邪涌水一土邪凌水陽明亦有急下三法以救津液一汗多津越於外一腹滿津結於內一目睛不慧津枯於中合兩經下法以觀病情生理如身在冰壺腹飲上池矣張錫駒曰陽火亢極陰水欲枯故使目中不了了而睛不和急下之所以抑亢極之陽火而救垂絕之陰水也魏荔彤曰陽明燥屎應下胃實應下俱詳考其脈證矣乃有表裏無他證獨於陽明胃脈所發見端倪處體認其證如傷寒六七日太陽已罷陽明已成其目昏暗朦昧若隔雲霧而不了了明白者此證名為睛不和也陽明熱盛循經絡而發其昏朦之象以致睛失其光此內熱盛而為實其機已兆兼以大便硬而難身有微熱者則胃實已真故曰此為實也急下之宜大承氣湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯註陽明病之人小便自利大便當硬小便不利大便不硬是知硬不硬不在熱不熱而在液之竭與不竭也今小便不利而大便乍難乍易者蓋熱將欲作結而液未竭也有時微熱者熱入裏也喘者熱乘肺也冒者熱乘心也不能臥者熱並陽也此皆一派熱結便硬之徵神昏譫狂之漸雖無滿痛亦必有燥屎宜大承氣湯下之自愈也集註王三陽曰此證不宜妄動必以手按之臍腹有硬塊喘冒不能臥方可攻之何也乍難乍易故也林瀾曰既微熱時作喘冒不能臥則有燥屎已的自宜下逐裏實為急安可復以小便利屎定硬始可攻之常法拘哉汪琥曰此條病未經下而有燥屎乃醫人不易識之證成無己云小便利則大便硬此有燥屎乃理之常今病人小便不利大便乍難乍易何以知其有燥屎耶蓋大實大滿之證則前後便皆不通大便為燥屎壅塞其未堅結者或有時而並出故乍易其極堅結者終著於大腸之中故乍難燥屎結積於下濁氣攻衝於上以故時有微熱微熱者熱伏於內不得發泄也後條辨云濁氣乘於心肺故既冒且喘也不得臥者胃有燥屎所擾即胃不和則臥不安也凡此者皆是有燥屎之徵故云宜大承氣湯病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也註病人不大便五六日繞臍痛者是腸胃中燥屎結無去路故繞臍痛也煩躁發作有時者是燥屎穢熱上攻則煩躁不攻則不煩躁故發作有時也不須以小承氣湯試之直以大承氣湯下其燥屎大便利自可愈也集註方有執曰病人謂凡有病之人而證犯如此者則皆當如此治之此示人辨凡百胃實之大旨也程應旄曰攻法必待有燥屎方不為誤攻所以驗燥屎之法不可不備無恃轉矢氣之一端也病人雖不大便五六日屎之燥與不燥未可知也但繞臍痛則知腸胃干屎無去路滯澀在一處而作痛煩躁發作有時者因屎氣攻動則煩躁發作又有時伏而不動亦不煩躁而有繞臍痛者斷其不大便當無差矣何大承氣湯之不可攻耶大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯註此承上條以明其治也下之未盡仍當下之乃大下之後六七日後不大便煩亦不解腹仍滿痛者此有燥屎下之未盡也所以然者本有宿食故也宜大承氣湯復下之自愈也集註程知曰大下之後宜乎病解矣乃復六七日不大便煩不解面腹滿痛此必有燥屎未盡而然蓋宿食因熱復為之結硬也陽明病下之其外有熱手足温不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之註陽明經病下之身熱未除手足温不結胸者是所陷之邪淺也心中懊憹飢不能食但頭汗出者是陽邪蒸鬱於胸膈間也宜梔子豉湯涌其熱也集註程知曰其外有熱者經邪未解也手足温者熱入未深也程應旄曰懊憹擾胃故飢不能食熱鬱氣蒸故但頭汗出魏荔彤曰表邪未全入裏乃即以為胃實而遽下之則其外仍有熱究不能隨下藥而蕩滌也於是雖熱而不潮手足雖温而無濈然之汗出則是在表者仍在表而下之徒傷其裏耳即不至於全在太陽者誤下成結胸而心下懊憹飢不能食但頭汗出其陽明蒸蒸之熱為陰寒之藥所鬱俱凝塞於胸膈之上其證已昭然矣但病仍帶表既不可再下且已入裏又不可復發汗惟有主以梔子豉湯仍從太陽治也傷寒嘔多雖有陽明證不可攻之註傷寒三陽多有嘔證以其風寒之表未除胸中陽氣為寒所鬱故皆不可攻下也其乾嘔而惡寒發熱者屬太陽也喜嘔而寒熱往來者屬少陽也今雖只有惡熱不惡寒大便硬之陽明證而嘔多亦不可攻之其氣逆在上而未斂為實也集註沈明宗曰惡寒發熱之嘔屬太陽寒熱往來之嘔屬少陽但惡熱不惡寒之嘔屬陽明然嘔多則氣已上逆邪氣偏侵上脘或帶少陽故雖有陽明證慎不可攻也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也註陽明謂陽明裏證中風謂太陽表證也口苦咽乾少陽熱證也腹滿陽明熱證也微喘發熱惡寒太陽傷寒證也脈浮而緊傷寒脈也此為風寒兼傷表裏同病之證當審表裏施治太陽陽明病多則以桂枝加大黃湯兩解之少陽陽明病多則以大柴胡湯和而下之若惟從裏治而遽以腹滿一證為熱入陽明而下之則表邪乘虛復陷故腹更滿也裏熱愈竭其液故小便難也集註程知曰此言陽明兼有太陽少陽表邪即不可攻也陽明中風熱邪也腹滿而喘熱入裏矣然喘而微則未全入裏也發熱惡寒脈浮而緊皆太陽未除之證口苦咽乾為有少陽之半表半裏若誤下之則表邪乘虛內陷而腹益滿矣兼以重亡津液故小便難也程應旄曰此條與太陽大青龍證同太陽以風寒持其營衛故有煩躁證而無腹滿證此以風寒持住陽明故有腹滿證而無煩躁證然口苦咽乾實與煩躁同其機兆也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加温鍼必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也註此承前條互發其義以明其治也前條表證居多戒不可誤下此條表裏混淆脈證錯雜不但不可誤下亦不可誤汗也若以脈浮而緊誤發其汗則奪液傷陰或加燒鍼必益助陽邪故譫語煩躁怵惕憒亂不眠也或以證之腹滿惡熱而誤下之則胃中空虛客氣邪熱擾動胸膈心中懊憹舌上生苔是皆誤下之過宜以梔子豉湯一涌而可安也若脈浮不緊證無懊憹惟發熱渴欲飲水口乾舌燥者為太陽表邪已衰陽明燥熱正甚宜白虎加人參湯滋液以生津若發熱渴欲飲水小便不利者是陽明飲熱並盛宜豬苓湯利水以滋干然陽明病法當多汗因汗出多致小便少而渴者不可與豬苓湯蓋以汗多胃燥無水不能下行乃水涸之小便少非水蓄之小便不利也恐豬苓湯更利其小便則益竭津液而助燥矣按太陽病煩熱無汗而渴小便利者大青龍湯證也小便不利者小青龍湯去半夏加花粉茯苓證也太陽病煩熱有汗而渴小便利者桂枝合白虎湯證也小便不利者五苓散證陽明病煩熱無汗而渴小便利者宜葛根湯加石膏主之小便不利者以五苓散加石膏寒水石滑石主之陽明病煩熱有汗而渴小便利者宜白虎湯小便不利者以豬苓湯少陽病寒熱無汗而渴小便利者當以小柴胡湯去半夏加花粉小便不利者當以小柴胡湯加茯苓太陰無渴少陰陽邪煩嘔小便赤而渴者以豬苓湯少陰陰邪下利小便白而渴者以真武湯厥陰陽邪消渴者白虎加人參湯厥陰陰邪轉屬陽明渴欲飲水者少少與之則愈證既不同法亦各異當詳審而明辨之集註喻昌曰發熱以上與前條同而汗出不惡寒反惡熱身重四者皆陽明之見證所以汗下燒鍼俱不可用舌上苔則膈熱甚故湧以梔子豉而徹去其膈熱斯治太陽而無礙陽明矣若前證更加口乾舌燥則宜用白虎湯以解熱生津更加小便不利則宜以豬苓湯以導熱滋干也其汗多而渴不可與豬苓湯者以熱邪傳入陽明必先耗其津液加以汗多復奪之於外又利小便更奪之於下則津液有立亡之患故示戒也程應旄曰熱在上焦故用梔子豉湯熱在中焦故用白虎加人參湯熱在下焦故用豬苓湯豬苓湯方豬苓去皮茯苓阿膠澤瀉滑石碎各一兩上五味以水四升先煮四味取二升去滓納阿膠烊消温服七合日三服集解趙羽皇曰仲景制豬苓一湯以行陽明少陰二經水熱然其旨全在益陰不專利水蓋傷寒表虛最忌亡陽而裏虛又患亡陰亡陰者亡腎中之陰與胃家之津液也故陰虛之人不但大便不可輕動即小水亦忌下通倘陰虛過於滲利則津液反致耗竭方中阿膠質膏養陰而滋燥滑石性滑去熱而利水佐以二苓之滲瀉既疏濁熱而不留其壅瘀亦潤真陰而不苦其枯燥是利水而不傷陰之善劑也故利水之法於太陽用五苓者以太陽職司寒水故加桂以温之是暖腎以行水也於陽明少陰用豬苓者以二經兩關津液特用阿膠滑石以潤之是滋養無形以行有形也利水雖同寒温迥別惟明者知之脈浮而大心下反硬有熱屬藏者攻之不令發汗屬府者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻註屬藏謂屬裏也屬府謂屬表也溲謂小便也脈浮而大太陽陽明脈也浮屬表大屬裏今太陽脈浮之表未解而心下反硬陽明之裏又急權乎汗下可也設裏有熱實攻之無疑不須先汗以解外也如無熱實而有脈浮之表不但不令攻之即小便不利亦不令利小便仍當解外也蓋恐溲數汗多亡其津液致大便硬則熱愈實也若汗少脈遲即有便硬裏尚未實亦未可攻也集註王肯堂曰論言脈浮大反發汗反下之為逆此以心下硬有熱知傳邪入裏故舍脈而從證也大便則許攻之小便則不許利何也曰攻大便則內熱除利小便則津液傷也林瀾曰心下硬與腹硬滿不同腹硬邪已結聚成實此但在心下自與非下不可者異矣府與藏對舉而言見一為入裏一猶屬表之義也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也註陽明病不更衣已食如飢食輒腹滿脈數者則為胃熱可下證也今脈遲遲為中寒中寒不能化穀所以雖飢欲食食難用飽飽則煩悶是健運失度也清者阻於上升故頭眩濁者阻於下降故小便難食鬱濕瘀此欲作穀疸之徵非陽明熱濕腹滿發黃者比雖下之腹滿暫減頃復如故所以然者脈遲中寒故也集註方有執曰遲為寒不化穀故食難用飽濕鬱而蒸氣逆而不下行故微煩頭眩小便難也疸黃病也穀疸水穀之濕蒸發而身黃也張璐曰下之腹滿如故蓋腹滿已是邪隱脈遲則胃不實徒下其糟粕病既不除而反害之耳夫陽明證本當下陽明而至腹痛尤當急下獨此一證下之腹滿必如故者緣脈遲則胃氣空虛津液不充其滿不過虛熱內壅非結熱當下之比也可見脈遲胃虛不但下之無益即發汗利小便之法亦不可用惟當用和法如甘草乾薑湯先温其中然後少與調胃微和胃氣可也程應旄曰熱蓄成黃之腹滿下之可去此則穀氣不得宣泄屬胃氣虛寒使然下之益虛其虛矣故腹滿如故陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也註陽明病內熱則不大便能食小便利手足濈然汗出是可下之證也今中寒不能食小便不利雖手足濈然汗出不可下也此為中寒欲作固瘕何以知之以大便必初硬而後溏也所以然者胃中虛冷水穀不分故小便不利而大便必溏也按不能食與上條食難用飽同一不能腐熟水穀也小便不利與上條小便難同一不能下輸膀胱也惟手足濈然汗出與上條飽則微煩頭眩不同彼欲作穀疸此欲作固瘕皆胃中寒冷一以微煩頭眩陽在中上故不病瀉而病疸一以手足汗出陽在四肢故不病疸而病瀉也再上條中寒食難用飽無汗小便難欲作穀疸以其尚能少食微煩猶有陽氣故也此條中寒不能食手足冷汗小便不利欲作固瘕則是寒濕不化純陰故也固瘕者大瘕瀉也俗謂之溏瀉固者久而不止之謂也按人之汗以天地之雨名之陰陽和而後有雨陽亢則熱而雨少陰盛則寒而雨多人之汗亦若是也四肢手足屬土土主脾胃若脈大其汗蒸蒸而熱則為陽盛可下之證也若脈遲其汗漐漐而寒則為陰盛可温之證也集註程應旄曰水穀不別屬濕熱偏滲者多此點出胃中冷欲人知病本於寒宜從寒治不在小便也太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散按但以法救之五字當是若小便不利方與上文小便數下文渴者之義相合此條病勢不急救之之文殊覺無謂必有遺誤王三陽亦云此處五苓散難用不然經文渴者之下當有闕文也註太陽病脈浮緩而弱中風脈也發熱汗出惡寒中風證也不嘔則裏氣和緣何而有心下痞證此必以醫下之故也如其不經醫下邪熱自傳於裏病人不惡寒而渴者此邪去太陽已轉屬陽明也若小便數者大便必硬然使不更衣十餘日而無或滿或痛之苦是仍屬虛燥不實之硬不可議下俟之可也如或渴欲飲水必是胃中乾燥當少少與之以滋其胃可耳其或小便不利而渴者是又為水停不化宜五苓散以導其所停之水矣蓋病在膀胱故仍治太陽而不治陽明也集註張兼善曰十日不更衣而不用攻伐何也曰此非結熱雖不大便而無潮熱譫語可下之證當須審慎勿以日數久而輒為攻下也喻昌曰寸緩關浮尺弱發熱汗出惡寒純是太陽中風未罷之證設非誤下何得心下痞結耶如不誤下而太陽證必漸傳經乃至不惡寒而渴邪入陽明審矣然陽明津液既偏滲於小便則大腸失其潤而大便硬與腸中熱結自是不同所以旬日不更衣無所苦也汪琥曰小便數大便硬仲景論中何以無治法耶蓋此正是仲景不須用藥處俟其陰陽自和則小便漸少大便必自出也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈註此申上條痞硬不更衣十日無所苦誤攻之變也陽明病非胃家實而心下硬滿者不可攻之若攻之其人利不止者則正脫而死其人利自止者邪退則猶可愈也集註汪琥曰或問結胸證同是心下硬滿又屬可下何也蓋結胸證心下硬滿而痛者為胃中實故可下此證不痛當是虛硬虛滿與半夏瀉心湯之心下痞硬略同故云不可攻也諸虛者不可下下之則大渴求水者易愈惡水者劇註虛者下之是為重虛陰津消亡自然大渴其求水者陽氣猶存故易愈若惡水者陽氣已絕則難愈矣集註程應旄曰諸虛者陽津陰液必有所亡故下之則大渴求水者亡陰惡水者亡陽故有愈劇之分觀此知仲景慮誤下之助陰甚於慮誤下之亡陰矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈註大下之後復發其汗重亡津液小便當少以水液內竭故也勿治之言勿利其小便也須俟津液回而小便利必自愈矣集註程知曰言下後復發汗有俟津液自回之法若强責其小便則膀胱之氣化不行有增硬滿喘脹者矣故宜以不治治之陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈註婦人病傷寒經血適至則有熱入血室之證宜刺期門男子病傷寒有下血譫語者亦為熱入血室也若熱隨血去必通身汗出而解矣若血已止其熱不去蓄於陽明不得外越而上蒸但頭汗出而不解者亦當刺期門隨其實而瀉之則亦必通身濈然汗出而愈也集註方有執曰血室頭汗期門註皆見太陽篇中陽明之脈其直者從缺盆下乳內廉下俠臍入氣街中血室之脈起於氣街上行至胸中而散所以婦人經來熱入血室則似結胸而譫語從陽明裏也男子下血熱入血室但頭汗出亦譫語從陽明外也故並宜刺期門程應旄曰下血則經脈空虛熱得乘虛而入血室譫語以血室雖衝脈所屬而心經實血室之主室被熱擾故心神不清也但頭汗出者血下奪則無汗熱上擾則汗蒸也刺期門者熱入陰分實在陰隨其實而瀉之則榮氣和而心氣下通故濈然汗出而解陽明病口燥但欲漱水不欲咽者此必衄註陽明屬胃開竅於口陽明有熱故口燥也但欲漱水不欲咽者雖燥而不渴知熱在經而不在府在血而不在氣也熱在經血迫血妄行必致衄也集註喻昌曰口中乾燥與渴異漱水不欲咽知不渴也陽明病口燥但漱水不欲咽知邪入血分陽明之脈起於鼻故知血得熱而妄行必由鼻而出也沈明宗曰陽明病口燥漱水而不欲咽乃邪鬱於經未入於府也脈浮發熱口乾鼻燥能食者則衄註此承上條詳出脈證以互發其義也陽明病脈浮發熱口鼻乾燥熱在經也若其人能食則為胃和胃和則邪當還表作解也然還表作解不解於衛則解於營汗出而解者從衛解也衄血而解者從營解也今既能食衄血則知欲從營解也集註張錫駒曰此論陽明經脈燥熱也夫熱在經脈故脈浮發熱熱循陽明經脈而上故口乾鼻燥不傷胃氣故能食能食者則衄言病不在胃府非因能食而致衄也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜抵當湯下之註經曰血並於下亂而喜忘喜忘者好忘前言往事也今陽明病其人喜忘者本有久瘀之血與熱上並於心故令喜忘也蓄血之屎雖硬然大便反易其色必黑蓋以血與糟粕共並故反易而色黑也不用桃仁承氣湯而用抵當湯大下之者以其人本有久瘀之血故也集註張志聰曰太陽蓄血在膀胱故驗其小便之利與不利陽明蓄血在腸胃故驗其大便之黑與不黑張璐曰大便色黑雖曰瘀血而燥結亦黑但瘀血則黏如漆燥結則晦如煤此為明辨也鄭重光曰太陽熱結膀胱證輕者如狂重者發狂如狂者血自下故用桃仁承氣湯因勢而利導之發狂者血不下須用抵當湯此條喜忘差減於狂乃用發狂之重劑何也蓋太陽經少血陽明經多血所以宜用抵當湯峻攻太陽云主之乃確然不易之法此云宜用則證有輕重在於臨時酌量耳病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱便膿血也註此承上條言蓄血喜忘熱結而無表裏證者當下之義也病人無表裏證是無太陽表陽明裏證也但發熱而無惡寒七八日雖脈浮數不可汗也若屎硬可下之假令已下脈不浮而數不解是表熱去裏熱未去也至六七日又不大便若不能消穀善飢是胃實熱也以大承氣湯下之今既能消穀善飢是胃和合熱非胃邪合熱故屎雖硬色必黑乃有瘀血熱結之不大便也宜有抵當湯下之若脈數不解不大便硬而下利不止必有久瘀協熱腐化而便膿血也則不宜用抵當湯下之矣集註張璐曰病雖七八日尚發熱脈浮數仍屬太陽表證因誤下引邪內入所以脈數不解內外合邪而見消穀善飢穀入既多反至六七日不大便且不煩渴是知其證非熱結在胃乃熱結在血以其表證誤下尚兼太陽隨經之熱未盡故以抵當為至當也若脈數不解而下利不止又當隨其下血與不下血而異治之倘血分之熱邪不除必協熱而便膿血也傷寒發汗已身目為黃所以然者以寒濕在裏不解故也以為不可下也於寒濕中求之註傷寒發汗已身目為黃所以然者以表有寒裏有濕未解也夫表寒裏濕鬱而發黃自非熱濕內瘀鬱而成黃者比故不可下惟當於表寒裏濕中求其治法宜發其表寒利其裏濕可也集註喻昌曰傷寒發汗已熱邪解矣何由反蒸身目為黃所以然者寒濕摶聚適在軀殼之裏故爾發黃也裏者在內之通稱非謂寒濕深入在裏蓋身目正屬軀殼與藏府無關也於寒濕中求之求其寒濕中之治法也程應旄曰其人素有濕邪在裏表寒雖經發汗而其為裏濕所持者終在裏而無從解散也發汗後之寒與濕鬱蒸為熱非實熱也故不可下仍當於寒濕中責其或淺或深而治之可也傷寒瘀熱在裏身必發黃麻黃連軺赤小豆湯主之註傷寒表邪未解適遇其人陽明素有濕邪熱入裏而與濕合濕熱蒸瘀外薄肌表身必發黃也若其人頭有汗小便不利大便硬則或清或下或利小便自可愈也今乃無汗小便利是裏之瘀熱未深表之鬱遏猶甚故用麻黃連軺赤小豆湯外發其表內逐其濕也集註喻昌曰傷寒之邪得濕而不行所以熱瘀身中而發黃設泥裏字豈有邪在裏而反治其表之理哉程應旄曰凡傷寒瘀熱在裏者由濕蒸而來故身必發黃此之瘀熱未深只從表一邊開其鬱滯而散除濕熱麻黃連軺赤小豆湯是其主也林瀾曰麻黃連軺一證雖曰在裏必因邪氣在表之時有失解散今雖發黃猶宜兼汗解以治之也汪琥曰夫寒邪自外而來若挾內濕瘀於經絡之中則鬱而變熱故令其人身目發黃也此條乃是太陽經傳來者太陽傷寒理宜用麻黃湯只因邪傳陽明熱瘀於裏裏非胃府以陽明經居太陽之裏即尚論篇所云軀殼之裏是也惟其裏有熱所以方中用麻黃湯而去桂枝之辛熱更加赤小豆薑棗之甘辛以祛散在表之寒濕復加連軺生梓白皮之苦寒以清解肌裏之瘀熱也麻黃連軺赤小豆湯方麻黃去節二兩赤小豆一升杏仁去皮尖四十枚生薑切二兩大棗擘十二枚甘草炙二兩生梓白皮切一升連軺二兩以上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分温三服半日則盡方解濕熱發黃無表裏證熱盛者清之小便不利者利之裏實者下之表實者汗之皆無非為病求去路也用麻黃湯以開其表使黃從外而散去桂枝者避其熱也佐薑棗者和其營衛也加連軺梓皮以瀉其熱赤小豆以利其濕共成治表實發黃之效也連軺即連翹根無梓皮以茵陳代之集解周揚俊曰此亦兩解表裏法也故用外汗之藥必兼滲濕之味傷寒發黃者必其人太陰素有濕熱更兼寒邪未散兩邪相合因而蒸鬱為黃也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之註身黃濕熱之為病也濕盛於熱則黃色晦熱盛於濕則黃色明如橘子色者謂黃色明也傷寒七八日身黃色明小便不利其腹微滿此裏熱深也故以茵陳蒿治疸病者為君佐以大黃使以梔子令濕熱從大小二便瀉出則身黃腹滿自可除矣集註唐不岩曰熏黃陰黃也橘子黃陽黃也程知曰此驅濕除熱法也傷寒七八日可下之時小便不利腹微滿可下之證兼以黃色鮮明則為三陽入裏之邪無疑故以茵陳除濕梔子清熱用大黃以助其驅除此證之可下者猶必以除濕為主而不專取乎攻下有如此者茵陳蒿湯方茵陳蒿六兩梔子擘十四枚大黃去皮二兩上三味以水一斗二升先煮茵陳減六升納二味煮取三升去滓分三服小便當利尿如皂莢汁狀色正赤一宿腹減黃從小便出也傷寒身黃發熱梔子蘖皮湯主之註傷寒身黃發熱者設有無汗之表宜用麻黃連軺赤小豆汗之可也若有成實之裏宜用茵陳蒿湯下之亦可也今外無可汗之表證內無可下之裏證惟宜以梔子蘖皮湯清之也集註林瀾曰傷寒身黃胃有瘀熱須當下之此以發熱而熱未實故宜梔子蘖皮湯解之汪琥曰身黃兼發熱者乃黃證中之發熱而非麻黃桂枝證之發熱也熱既鬱而發黃雖表而非純乎表證但當清其鬱以退其黃則發熱自愈魏荔彤曰此三條雖皆外寒挾濕之邪瘀而成熱之證然在表在裏濕勝熱勝尤當加意也豈可概以為裏證而混下耶梔子蘖皮湯方梔子擘十五枚甘草炙一兩黃蘖二兩上三味以水四升煮取一升半去滓分温再服按此方之甘草當是茵陳蒿必傳寫之誤也陽明病被火額上微汗出而小便不利者必發黃註陽明病無汗不以葛根湯發其汗而以火劫取汗致熱盛津干引飲水停為熱上蒸故額上微汗出而周身反不得汗也若小便利則從燥化必煩渴宜白虎湯小便不利則從濕化必發黃宜茵陳蒿湯集註喻昌曰陽明病濕停熱鬱而煩渴有加勢必發黃然汗出熱從外越則黃可免小便多熱從下泄則黃可免若誤攻之其熱邪愈陷津液愈傷而汗與小便愈不可得矣誤火之則熱邪愈熾津液上奔額雖微汗而周身之汗與小便愈不可得矣發黃之變安能免乎程知曰太陽發黃由寒鬱濕濕不得解陽明發黃由濕瘀熱熱不得越故宜分經論治陽明病無汗小便不利心中懊憹者身必發黃註陽明病無汗以熱無從外越也小便不利濕不能下泄也心中懊憹濕瘀熱鬱於裏也故身必發黃宜麻黃連軺赤小豆湯外發內利可也若經汗吐下後或小便利而心中懊憹者乃熱鬱也非濕瘀也便硬者宜調胃承氣湯下之便軟者宜梔子豉湯涌之可也集註方有執曰無汗小便不利則濕停懊憹濕停熱鬱所以知必發黃也張璐曰外不得汗下不得尿而濕熱鬱於胸中不得泄勢必蒸身為黃也陽明病面合色赤不可攻之必發熱色黃小便不利也註陽明經病面合當色赤是熱邪猶怫鬱在經尚未入裏而成實也故雖不大便不可攻之若攻之則怫鬱在經之邪不解必令發熱色黃若其人裏燥小便利則同燥化當不發黃而必大便硬矣集註方有執曰合應也赤熱色也胃熱上行面應赤色攻則亡津液故發熱色黃因小便不利也程知曰言熱在陽明之經不可攻也熱在於經陽氣怫鬱在表也攻之則經中之熱未得表散必發熱色黃因小便不利也程應旄曰熱阻於肌膚之間故發熱而小便為之不利鬱而成黃也陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黃茵陳蒿湯主之註陽明病發熱汗出者此為熱越小便若利大便因硬不能發黃也但頭汗出身無汗是陽明之熱不得外越而上蒸也小便不利濕蓄膀胱也渴飲水漿熱灼胃府也此為濕熱瘀蓄在裏外薄肌膚故身必發黃也茵陳蒿湯主之者通利大小二便使濕熱從下竅而出也集註方有執曰越散也頭汗瘀熱發黃註皆見太陽篇中茵陳逐濕瘀之黃桅子除胃家之熱大黃推壅塞之瘀三物者苦以泄熱泄熱則黃散矣程應旄曰頭汗出身無汗劑頸而還足徵陽熱之氣鬱結於內而不得越故但上蒸於頭頭為諸陽之首故也氣不下達故小便不利府氣過燥故渴飲水漿瘀熱在裏指無汗言無汗而小便利者屬寒無汗而小便不利者屬濕熱兩邪交鬱不能宣泄故盫而發黃解熱除濕無如茵陳梔子清上大黃滌下通身之熱得泄又何黃之不散耶傷寒脈浮而緩手足自温者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也註此太陰轉屬陽明證也傷寒脈浮緩手足熱者太陽也今手足自温非太陽證是為系在太陰也然太陰脈當沉緩今脈浮緩乃太陽脈也證太陰而脈太陽是邪由太陽傳太陰也故曰系在太陰也若小便自利者則不從太陰濕化而發黃至七八日大便硬者則是從燥化此為陽明也集註程應旄曰陽明為病本於胃家實胃家之實不特三陽受邪能致其轉屬陽明即三陰受邪亦能致轉屬陽明聊舉太陰一經例之脈浮而緩是為表脈然無發熱頭痛惡寒等外證而手足只温是邪不在表而在裏但入裏有陰陽之分須以小便別之小便不利濕蒸熱瘀而發黃以其人胃中原無燥氣也小便自利者胃干便硬而成實以其胃中本有燥氣也病雖成於七八日而其始證却脈浮而緩手足自温實是太陰轉屬而來也即太陰陽明推之少陰三大承氣證厥陰一小承氣證何非轉屬陽明之病哉魏荔彤曰病在太陽熱為濕鬱團聚於裏必有歸著既不能發黃小便自利則邪何歸乎不得不歸之於萬物所歸之胃至於七八日小便自多大便自硬而為陽明病矣傷寒轉系陽明者其人濈然微汗出也註凡傷寒無論三陰三陽若轉系陽明其人必有濈濈然微汗出之證始為轉屬陽明也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也註太陽病吐之表解者當不惡寒裏解者亦不惡熱今反不惡寒不欲近衣者是惡熱也此由吐之後表解裏不解內生煩熱也蓋無汗煩熱熱在表大青龍證也有汗煩熱熱在裏白虎湯證也吐下後心中懊憹無汗煩熱大便雖硬熱猶在內梔子豉湯證也有汗煩熱大便已硬熱悉入府調胃承氣湯證也今因吐後內生煩熱是為氣液已傷之虛煩非未經汗下之實煩也以上之法皆不可施惟宜用竹葉石膏湯於益氣生津中清熱寧煩可也集註張璐曰此以吐而傷胃中之液故內煩不欲近衣雖顯虛煩之證較關上脈細數而成虛熱脾胃兩傷者稍輕雖不致逆亦誤吐之過也太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆按欲食冷食之下當有五六日吐之者六字若無此一句則不喜糜粥欲食冷食與朝食暮吐之文不相聯屬且以上文一二日三四日之文細玩之則可知必有五六日吐之一句由淺及深之謂也註太陽病不解當惡寒發熱今自汗出不惡寒發熱是表已解也關上脈細數胃不和也細者胃氣虛數者胃氣熱證脈不和詢其故知以醫吐之過也一二日病在太陽正氣未衰吐之者傷胃未深故腹中知飢口不能食也三四日病在陽明胃中已熱吐之者復傷津液故不喜糜粥欲食冷食也五六日病將轉入陰經正氣已衰吐之者胃中虛冷故朝食暮吐也此皆醫吐之所致尚在可治故曰此為小逆也集註程知曰本太陽病醫吐之則表邪乘虛傳入陽明傷動胃氣而關脈細數矣程應旄曰陽明之氣下行為順上行為逆以醫吐之所致則非脾胃本來之病此為小逆更勿誤治使小逆變成大逆也食穀欲嘔屬陽明也吳茱萸湯主之得湯反劇者屬上焦也註食穀欲嘔屬陽明者以胃主受納也今胃中寒不能納穀故欲嘔也以吳茱萸湯温中降逆而止其嘔可也若得湯反劇者此必非中焦陽明之裏寒乃上焦太陽之表熱也吳茱萸氣味俱熱藥病不合故反劇也法當從太陽陽明合病不下利但嘔之例治之宜葛根加半夏湯集註方有執曰食穀欲嘔胃寒也故曰屬陽明言與惡寒嘔逆不同也上焦以膈言也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也註病人脈數數為有熱則當消穀引食今食而反吐者蓋以身熱脈數誤為表熱而發其汗因使其人陽氣微膈氣虛也不知此脈之數乃外邪客熱之數非胃中實熱之數也其不能消穀食而反吐者乃胃中本虛冷故耳集註程知曰此言汗後脈數吐食當責胃之陽虛也陽受氣於胸中發汗過多令陽氣微膈氣虛客熱外越故脈數也客熱不能消穀而吐者當責其胃之虛冷若因其數而投以清胃之藥則左矣程應旄曰見數脈而反吐者數為熱脈無力則為虛脈隔虛陽客於上不能下温故令胃中虛冷熱為客熱寒為真寒究其根由只由發汗令陽氣微然則陽氣之珍重何如而可誤汗乎陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛攻其熱必噦註陽明病不能食者為中寒即有脈數客熱上條既戒以不可汗此又言亦不可攻若攻其熱則寒其胃陽亦必作噦矣所以然者客熱雖除胃亦虛冷故也以其人本來胃虛故攻其熱必噦噦即乾嘔也集註方有執曰攻熱皆寒藥故知必噦胃中虛以不能食言此亦戒謹之意林瀾曰陽明譫語潮熱不能食者可攻由燥屎在內也乃亦有胃中虛冷不能食者須詳別之未可便以不能食為實證也若誤攻之熱去噦作矣然則安得以陽明概為宜下哉若胃中虛冷不能食者飲水則噦註此承上條不攻亦噦之義也若其人胃中虛冷不能食者雖不攻其熱飲水則噦蓋以胃既虛冷復得水寒故噦也宜理中湯加丁香吳茱萸温而降之可也集註喻昌曰表熱裏寒法當先救其裏太陽經中亦用四逆湯其在陽明更可知矣此條比前條虛寒更甚故不但攻其熱必噦即飲水亦噦也汪琥曰若胃中虛冷不能食飲水則水寒相摶氣逆而亦為噦矣法當大温趺陽脈浮浮則為虛浮虛相摶故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄血也註誤攻飲冷皆可致䭇固矣今趺陽胃脈浮而不大無力而虛則是胃虛與邪相摶即不誤下飲冷亦令䭇也若趺陽胃脈滑則為噦者乃熱氣擁鬱之䭇非胃氣虛竭之䭇醫何可取實責虛以自取其咎耶若趺陽胃脈浮而鼻中燥者此熱據營分營熱迫血妄行必作衄也世有以噦為呃逆者不知噦即乾嘔也以其有噦噦之聲故又名噦也觀今病呃逆之人與飲冷水則氣自臍下衝上出口而作格兒格兒之聲聲長時止者為實可治聲短不已者為虛難治集註方有執曰此又出趺陽脈而以噦與衄言皆逼汗而不得汗之所致也咎過愆也責虛言求病於虛取實言反以虛為實而攻取之也血屬陰而為內守故曰守空迫血言劫汗也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相摶則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相摶其人必䭇按令汗大出四字當是衍文註寸口脈浮大指六脈皆浮大也六脈皆浮大則非陽明按之大脈乃太陽不按之大脈也醫反下之此為大逆則從前浮脈變而為無血之虛大脈變而為胃冷之遲虛寒相摶則為腸鳴醫乃不知而反與飲冷水其人得水寒之氣冷與虛相摶於胃中故必䭇也䭇者氣饐結有聲即今之呃逆也集註程知曰言邪氣在表妄下之變也寸口浮大而無硬滿藏熱之證法應發汗若反下之此為大逆既經妄下則所謂浮者至於內空而無血所謂大者變為裏虛而有寒虛寒相摶則為腸鳴醫見脈大以為有熱飲以冷水欲以水寒勝熱而作汗裏先虛寒又得冷水與之相摶則冷結上焦必至咽噎塞而氣逆矣傷寒噦而腹滿視其前後知何部不利利之則愈註傷寒噦而不腹滿者為正氣虛吳茱萸湯證也噦而腹滿者為邪氣實視其二便何部不利利之則愈也集註成無己曰噦而腹滿氣上而不下也視其前後有不利者即利之以降其氣前部小便也後部大便也程知曰前部不利後人治以五苓後部不利後人治以承氣是也沈明宗曰邪傳於胃胃氣壅遏兩氣相摶氣逆上衝則為噦矣張錫駒曰傷寒至噦非胃氣敗即胃中寒然亦有裏實不通氣不得下泄反上逆而為噦者當詳辨之夫實則譫語虛則鄭聲鄭聲者重語也註譫語一證有虛有實實則譫語陽明熱甚上乘於心亂言無次其聲高朗邪氣實也虛則鄭聲精神衰乏不能自主語言重複其聲微短正氣虛也集註戴元禮曰譫語屬陽鄭聲屬陰經曰實則譫語虛則鄭聲譫語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻煩語雖謬而諄諄不已老年人遇事則誶語不休以陽氣虛不精明也此譫語鄭聲虛實之所以不同也二者本不難辨但陽盛裏實與陰盛格陽皆能錯語須以他證別之隨證施治可也婁全善曰余用參耆歸朮等劑治譫語得愈者甚多豈可不分虛實一概用黃連解毒大小承氣等湯以治之乎按其所云亦鄭聲也張錫駒曰實則譫語者陽明燥熱甚而神昏氣亂故不避親疏妄言罵詈也虛則鄭聲者神氣虛而不能自主故聲音不正而語言重複也傷寒四五日脈沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則譫語註傷寒四五日入裏之時也脈沉而喘滿乃為在裏之喘滿而反發其汗津液越出則表虛也汗出胃干大便為難則裏實也久則胃熱熾盛必發譫語也集註方有執曰越出謂枉道而出也張璐曰傷寒四五日正邪熱傳裏之時況見脈沉在裏之喘滿而反汗之必致燥結譫語矣蓋燥結譫語頗似大承氣證此以過汗傷津而不致大實大滿腹痛只宜小承氣為允當耳陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止者更莫復服註此詳上條以明其治也陽明病其人多汗以津液外出胃中乾燥大便必硬久則譫語宜以小承氣湯主之若一服利譫語止慎不可更服也集註張璐曰多汗譫語下證急矣以其人汗出既多津液外耗故不宜大下但當略與小承氣湯和其胃氣譫語自止若過服反傷津液也沈明宗曰此汗多胃燥非同實治也汗出譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈宜大承氣湯註病自汗出而譫語者以素有燥屎在胃中此為太陽風邪之所傳也須當下之然必須太陽之邪已過陽明之經而入陽明之府乃可下之若下之早則裏熱未結不但熱去不盡且虛其中熱乘虛而上干於心語言必亂此表虛汗出裏實譫語所以必待過經入府而後下之則愈宜大承氣湯集註方有執曰過經謂寧遲遲非謂必待十三日後也程知曰此言譫語不當下早也既出汗矣而譫語則必有燥屎在胃此當屬風風為陽邪陽邪入裏故譫語然須六七日乃可下之下之早則風邪未解於表盡入於裏裏邪燥實語言更亂也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之按宜大承氣湯下之句應在必有燥屎五六枚之下始合當用大承氣湯下之之義若但便硬而用大承氣湯下之殊失仲景顧慮誤下慎下之旨註陽明病譫語有潮熱反不能食者知胃中必有燥屎已結實也宜大承氣湯下之若能食者知胃將和但大便硬耳當導之不可下也集註張璐曰此以能食不能食辨燥結之微甚也潮熱譫語皆胃中熱甚所致胃熱則能消穀今反不能食此必熱傷胃中津液氣化不能下行燥屎逆攻於胃之故宜大承氣湯急祛亢極之陽以救垂絕之陰若能食者胃中氣化自行熱邪不盛津液不致大傷大便雖硬不久自行不必用藥反傷其氣也下利譫語者有燥屎也宜小承氣湯註下利裏虛譫語裏實若脈滑大證兼裏急知其中必有宿食也其下利之物又必稠黏臭穢知熱與宿食合而為之也此可決其有燥屎也宜以小承氣湯下之於此推之可知燥屎不在大便硬與不硬而在裏之急與不急便之臭與不臭也集註汪琥曰下利者腸胃之疾也若譫語則胃家實與厥陰無與乃腸中有燥屎不得下也治宜小承氣湯者此半利半結只須緩以攻之也又曰或問既下利矣則熱氣得以下泄何由而致譫語有燥屎也答曰此係陽明府實大熱之證胃中糟粕為邪所壅留著於內其未成硬者或時得下其已成硬者終不得出則燥屎為下利之根燥屎不得出則邪熱上乘於心所以譫語要之此證須以手按臍腹當必堅痛方為有燥屎之徵直視譫語喘滿者死下利者亦死註上條下利譫語為可治此條下利譫語者死要知譫語不死於下利而死於直視也直視者精不注乎目也譫語者神不守乎心也已屬惡候加之喘滿陽上脫也故曰死下利陰下脫也故曰亦死也集註方有執曰直視精不榮於目也譫語神不主乎心也喘則陽爭於上利則陰爭於下胃中土也陰陽爭奪於上下而中氣不守故無法可治而皆主死也發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死註太陽病發汗過多不解又復重發其汗以致氣液兩亡熱邪乘燥傳入陽明而生譫語譫語者胃熱陽也脈短者氣衰陰也陽病見陰脈為陰勝於陽故死也若脈不短為陰陽自和故不死也集註喻昌曰方註以此為太陽經脫簡不知太陽經無譫語之例必日久而兼陽明少陽方有譫語故此言太陽經得病時發汗過多及傳陽明時重發其汗因有亡陽而譫語之一證也亡陽之人所存者陰氣耳故神魂不定而妄見妄聞與熱邪乘心之候不同脈短則陰陽不附脈和則陰陽未離其生死但從脈定耳汪琥曰譫語者脈當大實或洪滑為自和自和者言脈與病不相背也病雖甚不死若譫語脈短為邪熱盛正氣衰乃陽證見陰脈也無法可施發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈註此又承上條以出其治也譫語者屬陽明熱實可下之證也若發汗過多大亡氣液而發譫語者乃津枯致燥之譫語非熱甚內實之譫語不可下也裏有熱宜白虎加人參湯表不解與柴胡桂枝湯和其營衛以通津液後自愈也按發汗過多亡陽譫語以無大便硬滿痛故不可下以無身寒汗出惡寒故不可温於此可知發太陽汗出過多致譫語者必無發熱汗出惡寒也發陽明汗出過多致譫語者必有潮熱惡熱不大便也此則發少陽汗多致譫語者即論中少陽不可發汗發汗則譫語是也然舍小柴胡湯別無治法若只用柴胡又恐升散非亡陽所宜故合桂枝和其營衛通其津液自可愈也陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治按續浮之浮字當是弦字始與文義相屬則可與小柴胡湯若俱是浮字則上之浮既宜用小柴胡湯下之浮又如何用麻黃湯耶註中風傳陽明病太陽未罷脈當浮緩今脈弦浮大弦少陽脈也浮太陽脈也大陽明脈也脈既兼見證亦如之腹滿太陽陽明證也脅下及心痛久按之不通快少陽證也鼻乾陽明證也不得汗太陽證也嗜臥少陰證也面目悉黃太陰證也小便難太陽府證也潮熱陽明裏證也噦逆胃敗證也耳前後腫少陽證也短氣氣衰證也凡仲景立法無方之條皆是此等陰陽錯雜表裏混淆之證但教人俟其病勢所向乘機而施治也故用刺法待其小差若外病不解已成危候如過十日脈續弦不浮者則邪機已向少陽可與小柴胡湯和之使陽明之邪從少陽而解若脈但浮不大而無餘證者則邪機已向太陽當與麻黃湯汗之使陽明之邪從太陽而解若已過十餘日病勢不減又不歸於胃而成實更加不尿腹滿噦甚等逆即有一二可下之證胃氣已敗不可治也集註程知曰此條全是表證未解而無汗出燥渴之證故不可用白虎雖有潮熱而無硬滿譫語濈濈汗出之證故不可用承氣不如俟氣之自回猶可漸引其邪從外出也程應旄曰此條證以不得汗三字為主故酌量於柴胡麻黃二湯間以通其久閉總是要得汗耳脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絕註脈浮而芤浮為陽盛芤為陰虛陽盛則發熱陰虛則汗出二者相搏則胃氣生熱愈盛胃中津液立亡其陽則絕者言陽亡津液絕也集註方有執曰浮為氣上行故曰陽芤為血內損故曰陽胃中生熱者陰不足以和陽津液干而成枯燥也張璐曰此言脾約當下不下則浮澀轉為浮芤津液竭而難下矣其陽則絕即陽絕於裏亡津液之互辭也趙良曰胃中陽熱亢甚脾無陰氣以和之孤陽無偶不至燔灼竭絕不止耳沈明宗曰此辨陽明津竭之脈也浮為邪氣强芤為陰血虛陽邪盛而陰血虛為浮芤相搏胃氣生熱故曰其陽則絕即亡津液之互詞也若見此脈當養津液不可便攻也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛註陽明病法多汗反無汗而小便利是寒氣內攻也至二三日嘔而咳寒邪上逆也手足厥者寒氣見於四肢也氣上逆則咳而苦頭痛矣若不咳不嘔不厥則頭不痛此證之頭痛者標也咳逆手足厥者本也集註程知曰無汗小便利嘔咳肢厥頭痛曷不謂太陽病蓋初起無頭痛諸表證也此頭痛是二三日後嘔咳而厥所致非因頭痛致嘔咳而厥也嘔咳二證太陽少陽俱有之其表證未解則屬太陽病其寒熱往來者則謂之少陽病也厥則厥陰有之但無嘔與咳也張璐曰陽明無汗嘔咳手足厥者得之榮衛俱傷而邪入深也然小便利則邪不在內而在外不在下而在上故知必苦頭痛仍宜小青龍主之若不嘔不咳不厥而小便利者邪必順水道而出豈有逆攻巔頂之理哉林瀾曰須識陽明亦有手足厥證胃主四肢中虛氣寒所致也然頭苦痛而咳自與陰寒但厥者異矣此類數條最為難解吳人駒曰嘔咳手足厥頭痛皆由反無汗之故也陽明病但頭眩不惡寒故能食而咳其人咽必痛若不咳者咽不痛註陽明病當惡熱不惡寒若從傷寒傳來則不能食今從中風傳來故能食也傷寒挾寒邪則有頭痛證今中風挾風邪則有頭眩證理固然也寒邪屬陰若兼飲則咳而嘔今不嘔而咽痛則以風屬陽邪風病則兼火故咳而咽痛以類相從也集註方有執曰眩風旋而目運也風故不惡寒能食咳逆氣也咽門胃之系也胃熱而氣逆攻咽則咳而咽傷也程知曰陰邪下行故無汗而小便利陽邪上行故不惡寒而頭眩寒則嘔不能食風則能食寒則頭痛風則咽痛是風寒入胃之辨也程應旄曰陽明以下行為順逆則上行故中寒則有頭痛證中風則有頭眩證以不惡寒而能食知其鬱熱在裏也寒上攻能令咳其咳兼嘔故不能食而手足厥熱上攻亦令咳其咳不嘔故能食而咽痛以胃氣上通於肺而咽為胃府之門也夫咽痛惟少陰有之今以咳傷致痛若不咳則咽不痛況更有頭眩不惡寒之證益可辨其為陽明之鬱熱也病人有寒復發汗胃中冷必吐蚘註病人有寒謂胃中寒也復發汗謂汗而復汗也胃寒復汗陽氣愈微胃中冷甚蚘不能安故必吐蚘也宜理中湯送烏梅丸可也集註程應旄曰汗生於穀精胃中陽氣所釀也有寒復發汗知胃陽不復存於內矣蚘何能安發汗後水藥不得入口為逆若更發汗必吐下不止按必吐下不止之下字當是衍文註此承上條誤而又誤必變而成逆也胃中虛冷本因誤汗水藥不得入口入口即吐而為逆也若更發其汗則胃逆益甚不能司納不特水藥入口方吐且必無時而不吐逆也集註成無己曰汗後水藥不得入口為之吐逆發汗亡陽胃中虛冷也若更發汗則愈損陽氣胃氣大虛故吐不止程應旄曰發汗後見此者由未汗之先其人已是中虛而寒故一誤不堪再誤也脈浮而遲表熱裏寒下利清穀者四逆湯主之註陽明病脈浮而遲浮主表熱遲主裏寒今其證下利清穀則為裏寒太甚法當温之宜四逆湯主之集註汪琥曰陽明經病脈當從長今脈但浮此在表之熱凝也府病脈當從數今脈過遲此在裏之寒甚也故見下利清穀其所利之穀食色不變氣不臭即完穀不化也此裏寒已極故與四逆湯也陽明病欲解時從申至戌上註凡陽明病無論在經在府必乘其旺時而解申酉戌陽明旺時也經氣旺則邪氣自退故解也集註張志聰曰經云日西而陽氣衰陽明之所主也從申至戌上乃陽明主氣之時表裏之邪欲出必隨旺時而解
