body:
  text: 卷八辨厥陰病脈證并治全篇厥陰者陰盡陽生之藏與少陽為表裏者也故其為病陰陽錯雜寒熱混淆邪至其經從化各異若其人素偏於熱則邪從陽化故消渴氣上撞心心中疼熱蛔厥口爛咽痛喉痹癰膿便血等陽證見矣若其人素偏於寒則邪從陰化故手足厥冷脈微欲絶膚冷藏厥下利除中等陰證見矣所以少陽不解傳變厥陰而病危厥陰病衰轉屬少陽為欲愈陰陽消長大伏危機茲以陰陽從化厥熱勝復之微旨詳發於篇中俾臨證者診治有要道焉厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止注此條總言厥陰為病之大綱也厥陰者為陰盡陽生之藏邪至其經從陰化寒從陽化熱故其為病陰陽錯雜寒熱混淆也消渴者飲水多而小便少乃厥陰熱化而耗水也厥陰之脈起足大指循股內入陰中環陰器抵少腹貫心膈其注肺熱邪循經上逆膈中故氣上撞心心中疼熱也飢而不欲食者非不食也因食則動蛔而吐故雖飢而不欲食食則吐蛔也夫消渴多飲飢不能食則胃中所有者但水與熱耳若更以厥陰熱氣挾蛔撞疼誤認為轉屬陽明之實痛而下之則胃愈虛必下利不止矣集注成無己曰邪自太陽傳至太陰則腹滿而嗌干未成渴也至少陰則口燥舌乾而渴未成消也至厥陰則成消渴者以勢甚能消水故也又張卿子云嘗見厥陰消渴數證舌盡紅赤厥冷脈微渴甚服白虎黃連等湯皆不能救蓋厥陰消渴皆寒熱錯雜之邪非純陽亢熱之證可比也魏荔彤曰此申解厥陰傳經熱邪為患歷舉其證以禁誤下也傷寒之邪傳入少陰為裏中之裏及自少陰傳厥陰又為三陰之極盡處矣陰盡處受邪無所復傳却同少陽為升降之出路少陽無下法厥陰陰邪亦無下法下之為誤可知矣首標消渴二字凡熱必渴而寒濕隔阻正氣亦有渴者然其渴雖欲飲水必不能多未有渴而飲飲而仍渴隨飲隨消隨渴若是者則消渴為傳經之熱邪傳入厥陰無疑也厥陰病渴欲飲水者少少與之愈注厥陰病渴欲飲水者乃陽回欲和求水自滋作解之兆當少少與之以和其胃胃和汗出自可愈也若多與之則水反停漬入胃必致厥利矣集注張璐曰陽氣將復故欲飲水而少少與之者蓋陰邪方欲解散陽氣尚未歸復若恣飲不消反有停蓄之患矣汪琥曰厥陰有消渴一證不言自愈者蓋熱甚而津液消爍雖飲水不能勝其燥烈乃邪氣深入未愈之徵也而此條之渴欲飲水與之愈者蓋其熱非消渴之比乃邪氣向外欲解之機也兩者自是不同傷寒厥而心下悸宜先治水當服茯苓甘草湯却治其厥不爾水漬入胃必作利也按厥而心下悸者之下當有以飲水多四字若無此四字乃陰盛之厥悸非停水之厥悸矣何以即知是水而曰宜先治水耶注傷寒厥而心下悸者不渴引飲乃陰盛之厥悸也若以飲水多乃停水之厥悸也故宜先治水却治其厥當與茯苓甘草湯即桂枝甘草湯加茯苓生薑也桂枝甘草補陽虛也佐生薑外散寒邪則厥可回矣君茯苓內輸水道則悸可安矣此先水後厥之治也蓋停水者必小便不利若不如是治之則所停之水漬入胃中必作利也按傷寒太陽篇汗出表未和小便不利此條傷寒表未解厥而心下悸二證皆用茯苓甘草湯者蓋因二者見證雖不同而裏無熱表未和停水則同也故一用之諧和榮衛以利水一用之解表通陽以利水無不可也此證雖不曰小便不利而小便不利之意自在若小便利則水不停而厥悸屬陰寒矣豈宜發表利水耶集注方有執曰金匱云水停心下甚則悸者是悸為水甚而厥則寒甚也寒無象而水有形水去則寒消而厥亦愈入胃者水能滲土也喻昌曰太陽篇中飲水多者心下必悸故此厥而心下悸者明系飲水所致所以乘其水未漬胃先用茯苓甘草湯治水以清下利之源後乃治厥庶不致厥與利相因耳程應旄曰寒因水停而作厥者其證以心下悸為驗厥陰有此多因消渴得之水其本也寒其標也不先水而先厥且防水漬入胃敢下之乎汪琥曰厥而心下悸者明系飲水多寒飲留於心下胸中之陽不能四布故見厥此非外來之寒比也故法宜先治水須與茯苓甘草湯而治厥之法即在其中矣蓋水去則厥自除也不爾者謂不治其水則水漬下入於胃必作利也吳人駒曰氣脈流行不循常道是為悖逆名之曰厥但厥有痰實寒熱氣水之不同此因於水者也水氣不循故道則水之寒氣上乘於心而為悸故治水即所以去悸而厥亦回設或不然則水之甚者其土沮洳因為之利矣傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利按此為藏寒之此字當是非字若是此字即是藏厥與辨蛔厥之義不屬注首條總論厥陰陽邪化熱此條詳辨厥陰陰邪化寒以明藏厥蛔厥之不同而出其治也傷寒脈微而厥厥陰脈證也至七八日不回手足厥冷而更通身膚冷躁無暫安之時者此為厥陰陽虛陰盛之藏厥非陰陽錯雜之蛔厥也若蛔厥者其人當吐蛔今病者靜而復時煩不似藏厥之躁無暫安時知非藏寒之躁乃蛔上膈之上也故其煩須臾復止也得食而吐又煩者是蛔聞食臭而出故又煩也得食蛔動而嘔蛔因嘔吐而出故曰其人當自吐蛔也蛔厥主以烏梅丸又主久利者以此藥性味酸苦辛溫寒熱並用能解陰陽錯雜寒熱混淆之邪也藏厥者宜吳茱萸湯兼少陰者宜四逆通脈附子等湯臨證者酌而用之可也集注方有執曰脈微而厥統言之也膚冷言不獨手足以見陽氣內陷也藏厥言非在經也喻昌曰脈微而厥而陽氣衰微可知然未定其為藏厥蛔厥也惟膚冷而躁無暫安時乃為藏厥藏厥用四逆及灸法其厥不回者死若蛔厥則時厥時煩未為死候但因此而馴至胃中無陽則死矣程知曰言厥有藏與蛔之別也藏厥者腎藏之陽不行也蛔厥者手足冷而吐蛔胃府之陽不行也蛔厥者蛔動則煩而有靜時非若藏厥之躁無暫安時也此胃陽病而無關於腎陽故厥雖同而證則異也程應旄曰脈微而厥純陰之象徵於脈矣七八日膚冷無陽之象徵於形矣陰極則發躁無暫安時此自是少陰藏厥為不治之證厥陰中無此也至於吐蛔為厥陰本證則蛔厥可與陰陽不相順接者連類而明之也用烏梅丸名曰安蛔實是安胃並主久利見陰陽不相順接厥而下利之證皆可以此方括之也林瀾曰陽煩陰躁煩輕躁重於藏厥言躁於蛔厥言煩已具安危之異矣藏厥者陽氣將脫藏氣欲絶而爭故藏厥為死證若蛔厥者藏氣虛寒而未至於絶藏氣寒則蛔不安其宮而動藏氣虛則蛔求食而出是以其證必吐蛔烏梅丸方烏梅三百枚細辛六兩乾薑十兩黃連十六兩當歸四兩附子去皮炮六兩蜀椒出汗四兩桂枝六兩人參六兩黃蘖六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等集解柯琴曰六經惟厥陰為難治其本陰其標熱其體木其用火必伏其所主而先其所因或收或散或逆或從隨所利而行之調其中氣使之和平是治厥陰之法也厥陰當兩陰交盡又名陰之絶陽宜無熱矣第其合晦朔之理陰之初盡即陽之初生所以厥陰病熱是少陽使然也火旺則水虧故消渴氣上撞心心中疼熱氣有餘便是火也木盛則生風蟲為風化飢則胃中空虛蛔聞食臭而出故吐蛔雖飢不欲食也仲景立方皆以辛甘苦味為君不用酸收之品而此用之者以厥陰主肝木耳洪範曰木曰曲直作酸內經曰木生酸酸入肝君烏梅之大酸是伏其所主也配黃連瀉心而除疼佐黃蘖滋腎以除渴先其所因也連蘖治厥陰陽邪則有餘不足以治陰邪也椒附辛薑大辛之品並舉不但治厥陰陰邪且肝欲散以辛散之也又加桂枝當歸是肝藏血求其所屬也寒熱雜用則氣味不和佐以人參調其中氣以苦酒漬烏梅同氣相求蒸之米下資其穀氣加蜜為丸少與而漸加之緩則治其本也蛔昆蟲也生冷之物與濕熱之氣相成故藥亦寒熱互用且胸中煩而吐蛔則連蘖是寒因熱用也蛔得酸則靜得辛則伏得苦則下信為治蟲佳劑久利則虛調其寒熱酸以收之下利自止傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死注此詳申厥陰藏厥之重證也傷寒六七日脈微手足厥冷煩躁者是厥陰陰邪之重病也若不圖之於早為陰消陽長之計必至於陰氣寢寢而盛厥冷日深煩躁日甚雖用茱萸附子四逆等湯恐緩不及事惟當灸厥陰以通其陽如手足厥冷過時不還是陽已亡也故死集注方有執曰灸所以通陽陽不回故主死也程知曰六七日為邪傳厥陰之時脈微而厥未是危證危在煩躁為微陽外露耳程應旄曰脈微厥冷而煩躁是即前條中所引藏厥之證六七日前無是也汪琥曰煩躁者陽虛而爭乃藏中之真陽欲脫而神氣為之浮越故作煩躁可灸太衝穴以太衝二穴為足厥陰脈之所注穴在足大指下後二寸或一寸半陷中可灸三壯手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯注此詳申厥陰藏厥之輕證也手足厥寒脈細欲絶者厥陰陰邪寒化之脈證也然不通身膚冷亦不躁無暫安時者則非陽虛陰盛之比故不用薑附等輩而用當歸四逆湯和厥陰以散寒邪調營衛以通陽氣也若其人內有久寒者宜當歸四逆湯加吳茱萸生薑以直走厥陰溫而散之也集注程知曰不用薑附者以證無下利不屬純陰也蓋脈細欲絶之人薑附亦足以劫其陰故不惟不輕用下且亦不輕用溫也鄭重光曰手足厥冷脈細欲絶是厥陰傷寒之外證當歸四逆是厥陰傷寒之表藥也當歸四逆湯方當歸三兩桂枝三兩芍藥三兩細辛三兩通草二兩甘草炙二兩大棗擘二十五枚上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯方於前方內加吳茱萸半升生薑三兩上九味以水六升清酒六升和煮取五升去滓溫分五服一方水酒各四升方解凡厥陰病必脈細而厥以厥陰為三陰之盡陰盡陽生若受邪則陰陽之氣不相順接故脈細而厥也然相火寄居於厥陰之藏經雖寒而藏不寒故先厥者後必發熱也故傷寒初起見手足厥冷脈細欲絶者皆不得遽認為虛寒而用薑附也此方取桂枝湯君以當歸者厥陰主肝為血室也佐細辛味極辛能達三陰外溫經而內溫藏通草性極通能利關節內通竅而外通營倍加大棗即建中加飴用甘之法減去生薑恐辛過甚而迅散也肝之志苦急肝之神欲散甘辛並舉則志遂而神悅未有厥陰神志遂悅而脈細不出手足不溫者也不須參苓之補不用薑附之峻者厥陰厥逆與太陰少陰不同治也若其人內有久寒非辛溫甘緩之品所能兼治則加吳茱萸生薑之辛熱非辛溫甘緩之品所能兼治則加吳茱萸生薑之辛熱更用酒煎佐細辛直通厥陰之藏迅散內外之寒是又救厥陰內外兩傷於寒之法也病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也注此申上條詳出其證也經曰六日厥陰受之厥陰循陰器絡於肝故煩滿而囊縮邪傳厥陰其人本自有熱必從陽化則煩渴少腹滿而囊縮乃四逆散承氣湯證也若其人本自有寒必從陰化則手足厥冷少腹滿而囊縮乃當歸四逆加吳茱萸湯證也今病者手足厥冷言我不結胸是謂大腹不滿而惟小腹滿按之痛也論中有少腹滿按之痛小便自利者是血結膀胱證小便不利者是水結膀胱證手足熱小便赤澀者是熱結膀胱證此則手足冷小便數而白知是冷結膀胱證也集注成無己曰手足厥不結胸者無熱也小腹滿按之痛下焦冷結也程知曰陽邪結於上陰邪結於下手足厥冷小腹滿按之痛其為陰邪下結可知此當用溫用灸關元穴名在臍下三寸為極陰之位足三陰任脈之會膀胱所居也程應旄曰發厥雖不結胸而小腹滿實作痛結則似乎可下然下焦之結多冷不比上焦之結多熱也況手足厥上焦不結惟結膀胱關元之處故曰冷結也凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也諸四逆厥者不可下之虛家亦然注此詳諸條致厥之由慎不可下也蓋厥雖陰經俱有然所屬者厥陰也故厥陰一病不問寒熱皆有厥若無厥則非厥陰也太陰寒微故手足溫而無厥冷少陰寒甚故有寒厥而無熱厥厥陰陰極生陽故寒厥熱厥均有之也凡厥者謂陰陽寒熱之厥也陰陽不相順接者謂陰陽之氣不相順接交通也不相順接交通則陽自陽而為熱陰自陰而為寒即為厥病也厥者之證手足逆冷是也諸四逆厥者謂諸病四逆厥冷者也然厥病陰陽已不相順接交通慎不可下虛家見厥尤不可下故曰虛家亦然也集注成無己曰手之三陰三陽相接於手之十指足之三陰三陽相接於足之十指陽氣內陷不與陰相順接故手足為之厥冷也喻昌曰厥陰證仲景總不欲下無非欲邪還於表使陰從陽解也此但舉最不可下之二端以嚴其戒傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死按結胸二字當是大便二字不結胸腹濡脈虛復厥皆無可下之理而曰不可下何所謂耶注此承上條詳申不可下之義也傷寒五六日邪至厥陰之時不大便似可下也若腹濡脈虛復厥者此為亡血虛躁更不可下也下之則蹈虛虛之戒而死矣大病汗後産婦亡血之家多有此證集注張璐曰傷寒五六日邪入厥陰其熱深矣今脈虛而復厥則非熱深當下之可比以其亡血傷津大便枯澀恐人誤認五六日熱入陽明之燥結故有不可下之之戒蓋脈虛腹濡知內外無熱厥則陰氣用事即當同亡血例治若其人陰血更虧於陽或陰中稍挾陽邪不能勝辛熱者又屬當歸四逆證矣傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈注傷寒邪傳厥陰陰陽錯雜為病若陽交於陰是陰中有陽則不厥冷陰交於陽是陽中有陰則不發熱惟陰盛不交於陽陰自為陰則厥冷也陽亢不交於陰陽自為陽則發熱也蓋厥熱相勝則逆逆則病進厥熱相平則順順則病愈今厥與熱日相等氣自平故知陰陽和而病自愈也集注方有執曰厥五日熱亦五日陰陽勝復無偏也當復厥不厥陽氣勝也陽主生故自愈可知也張璐曰此云厥終不過五日言厥之常後云厥反九日而利言厥之變蓋常則易治變則難復也林瀾曰三陰經傷寒太陰為始則手足溫少陰則手足冷厥陰則手足厥逆然病至厥陰陰之極也反有發熱之理蓋陽極而生陰故陽病有厥冷之證陰極而生陽故厥逆有發熱之條傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血注傷寒熱少厥微所以手足不冷而但指頭寒寒邪淺也默默陰也煩躁陽也不欲食胃不和也此厥陰陰陽錯雜之輕病即論中熱微厥亦微之證也若數日小便利其色白者此邪熱已去也欲得食其胃已和也熱去胃和陰陽自平所以其病為愈也若小便不利而色赤厥不微而甚不惟默默而且煩不但不欲食更嘔而胸脅滿此熱未除而且深也即論中厥深熱亦深之證也熱深不除久持陰分後必便血也所謂數日者猶曰連日也集注王肯堂曰設未欲食宜乾薑甘草湯嘔而胸脅煩滿者少陽證也少陽與厥陰為表裏邪干其府故嘔而胸脅煩滿肝主血故後必便血方有執曰熱少厥微邪淺也所以手足不冷而但指頭寒默默謂無言也不欲食厥陰之脈挾胃也煩躁則內熱故以小便辨之欲食邪退而胃回也厥而嘔胸脅煩滿者厥陰脈挾胃貫膈布脅肋也便血陰邪必走下竅也林瀾曰於熱厥言指頭寒於寒厥微者言手足寒甚者言四逆厥逆輕重淺深當細味之汪琥曰按此條論仲景無治法郭雍云熱不除而便血可用犀角地黃湯傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤注傷寒一二日即厥四五日仍厥不已者是陰盛陽衰之寒厥也寒厥者即藏厥也若一二日厥至四五日而熱或一二日熱至四五日而厥前厥後熱前熱後厥是陰陽互為勝復之熱厥也熱厥者即陽厥也厥深者熱亦深厥微者熱亦微此厥乃應下之熱厥非當溫散之寒厥也若誤為寒厥而反溫散之則助其熱上攻必口傷爛赤也集注成無已曰經云諸四逆者不可下之至此又云應下最宜詳審先賢謂熱厥手足雖厥冷而或有溫時手足雖逆冷而手足掌心必暖戴元禮又以指甲之暖冷紅青別厥證之寒熱皆慎之至也汪琥曰此條乃傳經邪熱陽極似陰之證傷寒一二日至四五日而厥者言傷寒在一二日之時本發熱至四五日後而厥者乃邪傳厥陰之候也必發熱者言病人四肢及肌表雖厥而軀殼以內必發熱也前熱者後必厥乃申明一二日為前四五日為後以見熱極必發厥也陽邪深伏應須以苦寒之藥下去其熱使陰氣得伸則陰陽平四肢和順而不厥矣粗工見厥認以為寒而反用辛溫之藥辛溫皆升引熱上行必口傷爛赤以厥陰之脈循頰裏環脣內故也病人手足厥冷脈乍緊徑邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散注病人手足厥冷其脈微而細是寒虛也寒虛者可溫可補今脈乍緊徑是寒實也寒實者宜溫宜吐也時煩吐蛔飢不能食乃病在胃中也今心中煩滿飢不能食是病在胸中也寒飲實邪壅塞胸中則胸中陽氣為邪所遏不能外達四肢是以手足厥冷胸滿而煩飢不能食也當吐之宜瓜蒂散涌其在上之邪則滿可消而厥可回矣集注喻昌曰此與太陽之結胸迥殊其脈乍緊其邪亦必乍結故用瓜蒂散涌載其邪而出斯陽邪仍從陽解耳程應旄曰手足厥冷邪氣內阻脈乍緊緊而不常往來中倏忽一見也傷寒脈滑而厥者裏有熱白虎湯主之注傷寒脈微細身無熱小便清白而厥者是寒虛厥也當溫之脈乍緊身無熱胸滿而煩厥者是寒實厥也當吐之脈實大小便閉腹滿硬痛而厥者熱實厥也當下之今脈滑而厥滑為陽脈裏熱可知是熱厥也然內無腹滿痛不大便之證是雖有熱而裏未實不可下而可清故以白虎湯主之集注程應旄曰脈滑而厥乃陽實拒陰之厥白虎湯涼能清裏而辛可解表故當舍證而從脈也林瀾曰熱厥亦有不同如傳邪入府祕結不通燥矢在內非下不可者以承氣治之之證是也若火極似水裏有大熱而大便不閉無燥糞可除者滑則裏熱已深厥則邪陷已極非以白虎滌其極熱則亢甚之陽何以清耶吳人駒曰厥因陽氣不相順接其脈當見陰象脈滑為氣有餘是陽盛於內格陰於外內則實熱外而假寒者也白虎以清解實熱則厥自解矣辨之之法冷必不甚浮而近之則冷按之肌骨之下則反熱矣傷寒脈促手足厥逆可灸之注傷寒陰證見陽脈者雖困無害無寧俟之也今傷寒脈促手足厥逆而曰可灸之者蓋以欲溫則有陽脈之疑欲清則有陰厥之礙也夫證脈無寒熱之確據設以促之一陽脈清之惟恐有誤於脈或以厥之一陰證溫之又恐有誤於證故設兩可之灸法斯通陽而不助熱回厥而不傷陰也集注喻昌曰傷寒脈促則陽氣局蹐可知更加手足厥逆其陽必為陰所格拒而不能返故宜灸以通陽也張璐曰手足厥逆本當用四逆湯以其脈促知為陽氣內阻而非陽虛故但用灸以通其陽不用溫經以助陽也傷寒發熱四日厥反三日復熱四日厥少熱多者其病當愈四日至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也注傷寒邪在厥陰陽邪則發熱陰邪則厥寒陰陽錯雜互相勝復故或厥或熱也傷寒發熱四日厥亦四日是相勝也今厥反三日復熱四日是熱多厥少陽勝陰退故其病當愈也當愈不愈熱仍不止則熱鬱於陰其後必便膿血也若厥四日熱反三日則厥多熱少陰勝陽退故為病進也集注程知曰此即厥熱往復之機知陰陽進退之義明厥證所重在陽則厥陰之大旨昭然矣張璐曰太陽以惡寒發熱為病進恐其邪氣傳裏也厥陰以厥少熱多為病退喜其陰盡陽復也程應旄曰厥陰少陽一藏一府少陽在三陽為盡陽盡則陰生故有寒熱之往來厥陰在三陰為盡陰盡則陽生故有厥熱之勝復凡遇此證不必論其來自三陽起自三陰只論厥與熱之多少熱多厥少知為陽勝陽勝病當愈厥多熱少知為陰勝陰勝病日進熱在後而不退則為陽過勝過勝而陰不能復遂有便血諸熱證厥在後而不退則為陰過勝過勝而陽不能復遂有亡陽諸死證所以調停二者治法須合乎陰陽進退之機陽勝宜下陰勝宜溫若不圖之於早坐令陰竭陽亡其死必矣吳人駒曰內經言人之傷於寒也則為病熱熱雖甚不死是傷寒以熱為貴也然熱不及者病太過者亦病故此二節論寒熱之多少以明不可太過與不及也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也按不發熱者之不字當是若字若是不字即是除中何以下接恐暴熱來出而復去之文也注熱而不厥為陽厥而不熱為陰傷寒始發熱六日厥亦六日至七日仍發熱而不厥者是陽來復當自愈也今厥九日較熱多三日是陰勝陽故下利也凡厥利者中必寒當不能食今反能食恐是陰邪除去胃中陽氣而為除中之病也恐者疑而未定之辭也故以索餅試之食後不發熱則為除中若發熱知胃氣尚在則非除中可必愈也若食後雖暴發熱恐熱暫出而復去仍是除中故必俟之三日其熱續在不去與厥相應始可期之旦日夜半愈也若俟之三日後雖熱不罷而亦不愈且脈猶數者此為熱氣有餘留連營衛必發癰膿也集注方有執曰食飼也索常也謂以素常所食之餅飼之也一說無肉曰索謂不令犯食禁也旦日明日平旦朝而陽長之時也夜半陰盡陽生之時也數以候熱癰膿者厥陰主血血熱持久則壅瘀壅瘀則腐化故可必也吳人駒曰除者去也中者中氣也乃中氣除去欲引外食以自救也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死按傷寒脈遲六七日之下當有厥而下利四字若無此四字則非除中證矣有此四字始與下文反與黃芩湯之義相屬注傷寒脈數六七日厥而下利熱厥下利也當與黃芩湯徹其熱今傷寒脈遲六七日厥而下利寒厥下利也當與理中湯溫其寒而反與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中乃胃氣將絶求食以救終無補於胃也故曰必死集注方有執曰反者言不順於道也黃芩湯寒藥也徹亦除也應亦當也反能食者胃欲絶引食以自救也中以胃言死謂萬物無土不生也程知曰言脈遲為寒不宜更用寒藥以致有除中之變也中氣為陰寒革除則胃中無根之陽氣將欲盡除而求救於食故為死證傷寒先厥後發熱而利者必自止見厥復利注厥逆陰也發熱陽也先厥後發熱而利必自止者是陰退而陽進也見厥復利者是陽退而陰進也熱多厥少病雖甚者亦可愈厥多熱少病雖微者亦轉甚可知厥熱乃陰陽進退生死之機也集注汪琥曰厥陰者陰之盡厥陰之經陽氣甚微故不論陰陽二證寒熱之邪但至其經無有不發厥者蓋厥即為逆起於手足今曰先厥者此初起便厥厥即下利發熱者則陽氣復而利必自止也傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹注此承上條而詳辨之以出其證也先厥後發熱下利必自止厥回利止其熱若退為欲愈也若厥回利止其熱不退而反汗出者是厥陰病從陽化熱其邪上循本經之脈故咽喉痛痹也若厥回發熱無汗利不止者是厥陰邪熱因利下迫傷及脈中之血故必便膿血也便膿血者其喉不痹謂熱邪下利而不復上病咽痛也可知下利止其喉為痹者謂熱邪已上病咽痛即不復病下利也集注喻昌曰先厥後熱下利止其病為欲愈矣乃反汗出咽中痛是熱邪有餘上攻咽喉而為痹也既發熱雖無汗為其陽已回所以利亦必自止若不止則無汗明系邪不外出熱鬱在裏必主便膿血也便膿血者其喉不痹見熱邪在裏即不復在表在下即不復在上也汪琥曰咽中痛者此熱傷上焦氣分也痹者閉也咽中痛甚其喉必閉而不通以厥陰經循喉嚨之後上入頏顙故也無汗利不止便膿血者此熱傷下焦血分也熱邪注下則不干上故曰其喉不痹下利脈數有微熱汗出令自愈設復緊為未解注厥陰下利脈數熱利也若熱微汗出知邪微欲解下利必自止故令自愈也設脈復緊為表邪猶盛未能解也集注成無己曰下利陰病也脈數陽脈也陰病見陽脈者生微熱汗出陽氣得通也利必自愈諸緊為寒設復脈緊寒邪猶盛故云未解沈明宗曰數條乃指厥而下利便膿血者或見實大浮數微弱沉澀弦緊洪長諸脈當分虛實寒熱即知欲愈未愈真為察病之微旨也下利有微熱而渴脈弱者令自愈注厥陰下利有大熱而渴脈强者乃邪熱俱盛也今下利有微熱而渴脈弱者是邪熱衰也邪熱既衰故可令自愈也集注方有執曰微熱陽漸回也渴內燥未復也脈弱邪退也令自愈言不須治也程知曰下利以陽復邪微為愈微熱而渴證已轉陽脈弱則邪氣已退故不治自愈若下利大熱脈盛又是逆候矣下利脈數而渴者令自愈設不差必圊膿血以有熱故也注此承上條互言以詳其變也下利脈數而渴者是內有熱也若身無熱其邪已衰亦可令自愈也設下利脈數而渴日久不差雖無身熱必圊膿血以內熱傷陰故也集注方有執曰脈數與上文微熱互相發明程應旄曰脈數而渴陽勝陰矣故亦令自愈若不差則陰虛熱入經所云脈數不解而下利不止必協熱而便膿血是也下利寸脈反浮數尺中自澀者必圊膿血注厥陰熱利寸脈當沉數今寸脈反浮數是熱在外而不在內也尺中自澀者是在外之熱不解乘下利入裏傷及其陰熱與血瘀必圊膿血也集注喻昌曰脈見浮數若是邪還於表則尺脈自和今尺中自澀乃熱邪摶結於陰分雖寸口得陽脈究竟陰邪必走下竅而便膿血也汪琥曰此條乃下利變膿血之候也熱利而得數脈非反也得浮脈則為反矣此條論無治法宜以仲景黃芩湯代之下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死注此詳申上條下利圊膿血之證脈也脈沉主裏脈弦主急下重後重也下利脈沉弦故裏急後重也凡下利之證發熱脈大者是邪盛為未止也脈微弱數者是邪衰為欲自止雖發熱不死也由此可知滯下脈大身熱者必死也集注喻昌曰下利而脈沉弦主裏急後重成滯下之證即今所稱痢證也脈大者即沉弦中之大脈微弱數者即沉弦中之微弱數也下利欲飲水者以有熱故也白頭翁湯主之熱利下重者白頭翁湯主之注此承上條以出其治也下利欲飲水者熱利下奪津液求水以濟干也熱利下重者熱傷氣滯裏急後重便膿血也二者皆以白頭翁湯主之者以其大苦大寒寒能勝熱苦能燥濕也集注程知曰按少陰自利而渴亦有虛而引水自救者猶當以小便之赤白脈之遲數辨之此言熱邪內結者也熱邪內結而致下重故純用苦寒以勝熱而厚腸也白頭翁湯方白頭翁三兩黃連去須三兩黃蘖去皮三兩秦皮三兩上四味以水七升煮取三升去滓溫服一升不愈更服一升方解三陰俱有下利證自利不渴者屬太陰也自利而渴者屬少陰也惟厥陰下利屬於寒者厥而不渴下利清穀屬於熱者消渴下利下重便膿血也此熱利下重乃火鬱濕蒸穢氣奔逼廣腸魄門重滯而難出即內經所云暴注下迫者是也君白頭翁寒而苦辛臣秦皮寒而苦澀寒能勝熱苦能燥濕辛以散火之鬱澀以收下重之利也佐黃連清上焦之火則渴可止使黃蘖瀉下焦之熱則利自除也治厥陰熱利有二初利用此方之苦以瀉火以苦燥之以辛散之以澀固之是謂以寒治熱之法久利則用烏梅丸之酸以收火佐以苦寒雜以溫補是謂逆之從之隨所利而行之調其氣使之平也傷寒下利日十餘行脈反實者死注傷寒下利日十餘利正氣虛也其脈當虛今反實者邪氣盛也正虛邪盛故主死也集注成無己曰下利裏虛也脈當微弱反實者病勝藏也故死脈不應病此之謂也鄭重光曰脈實則胃氣失和緩之狀而真藏之脈獨見邪盛正脫矣傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也注傷寒六七日邪傳厥陰之時也厥而不利是陰邪未盛若便發熱尚在不死今六七日不利忽而下利發熱汗出不止者是陰盛於中而陽亡於外故為有陰無陽也其死可知矣集注方有執曰發熱而利裏陰內盛也故曰有陰汗出不止表陽外絶也故曰無陽程知曰言暴下利汗出為亡陽死證也六七日不利忽發熱而利下至於汗出不止渾是外陽內陰真陽頃刻無存矣汪琥曰寒中厥陰至六七日當亦厥六七日矣不言厥者省文也厥則當利不利者陽氣未敗猶能與邪相支吾也若至發熱即利者亦當止今則發熱與利驟然並至加之汗出不止則知其熱非陽回而熱乃陽脫而熱故兼下利而汗出不止也張令韶曰厥陰病發熱不死發熱亦死者有三證一在躁不得臥一在厥不止一在汗出不止發熱而厥七日下利者為難治注此詳申上條發熱而厥之義也發熱而厥至七日若厥回利止則可以自解矣今發熱而厥至七日下利不止者為難治也蓋上條有陰無陽故主死此條陰盛而陽不復故為難治也集注方有執曰厥七日而下利陰盛而陽不復也張璐曰厥利與熱不兩存之勢也發熱而厥七日是熱者自熱厥利者自厥利陰陽兩造其偏漫無相協之期故雖未見煩躁已為難治蓋治其熱則愈厥愈利治其厥利則愈熱不至陰陽兩絶不止耳下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也注脈沉而遲下利清穀是裏有陰寒也若其人面有少赤色身有微熱又屬表有陽熱也夫內有裏陰之寒外有表陽之熱則陰得陽化而解者有之但其未解之先病人必鬱冒汗出而後解所以然者面戴之虛陽與下利之虛陰兩相和順故作解也此非在下之陰格在上之陽所以病人雖冒而厥必微必不似不解之冒厥而甚也集注喻昌曰下利脈沉遲裏寒也面少赤有微熱是仍兼外邪必從汗解但戴陽之證必見微厥此中大伏危機其用法當迥異常法矣六經皆有下利之證惟少陰厥陰為難治蓋邪氣入裏利深則必致厥厥深亦必致利故下利一證經於少陰厥陰皆詳言之蓋以傷寒下利則無論少陰厥陰其治法皆可會通也汪琥曰鬱冒者頭目之際鬱然昏冒乃陽氣能勝寒邪裏陽回而表和順故解汗出而解是陽回裏寒散而營衛和故汗出非攻表而使之汗出也下利清穀裏寒外熱汗出而厥者通脈四逆湯主之注此承上條互詳其義以出其治也下利清穀裏寒也身有微熱外熱也上條有無汗怫鬱面赤之表尚可期其冒汗而解此條汗出而厥則已露亡陽之變矣故主以通脈四逆湯救陽以勝陰也集注方有執曰下利故曰裏寒陰不守也外熱故汗出陽不固也通脈四逆救表裏通血氣而復陰陽者也喻昌曰上條辨證此條用藥互相發明然不但此也少陰病下利清穀面色赤者已用此法矣吳人駒曰有協熱下利者亦完穀不化乃邪熱不殺穀其別在脈之陰陽虛實之不同大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之注通身大汗出熱當去矣熱仍不去而無他證則為邪未盡而不解也今大汗出熱不去而更見拘急肢疼且下利厥逆而惡寒是陽亡於表寒盛於裏也故主四逆湯溫經以勝寒回陽而斂汗也集注方有執曰大汗出陽虛而表不固也熱不去言邪不除也內拘急四肢疼者亡津液而骨氣不利也下利厥逆惡寒亡陽而陰寒內甚也程知曰言大汗後下利厥逆急宜回陽也大汗出而熱不去正恐真陽飛越若內拘急四肢痛更加下利厥逆惡寒則在裏純是陰寒矣程應旄曰此證大汗出熱不去何為不在亡陽死證之列不知亡陽由於汗不止而陽亡此證內拘急四肢疼是汗已止陽未亡而惡寒故可行溫法也大汗若大下利而厥冷者四逆湯主之注大汗出汗不收者桂枝加附子湯證也大下利利不止者理中加附子湯證也今大汗出又大下利不止而更見厥冷乃陽亡於外寒盛於中非桂枝理中之所能治矣當與四逆湯急回其陽以勝其陰使汗利止而厥冷還則猶可生也以上三條皆厥陰少陰同病因少陰寒甚故俱從少陰主治也集注喻昌曰此證無外熱相錯其為陰寒易明然既云大汗大下則陰津亦亡但此際不得不以救陽為急陽回方可徐救其陰也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死注下利手足厥冷無脈者有陰無陽也雖用附子四逆輩恐陽不能急回宜急灸厥陰以通其陽若脈還手足溫者生脈不還手足不溫反微喘者乃無氣以續之喘是陽氣上脫也故主死集注方有執曰其喘必息短而聲不續乃陽氣衰絶也程知曰少陰下利厥逆無脈服白通湯脈暴出者死微續者生厥陰下利厥逆脈絶用灸法晬時脈還者生不還者死可見求陽氣者非泛然求之於無何有之鄉也必兩腎之中有幾微可續然後可借溫灸為鸞膠耳傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死注傷寒發熱下利而厥反煩躁不得臥者乃寒盛於中孤陽擾亂也或發熱下利至甚厥逆不止即不煩躁亦為表陽外散裏陽內脫故均死也集注成無己曰傷寒發熱邪在表也下利厥逆陽氣虛也躁不臥病勝藏也故死金匱要略云六府氣絶於外者手足寒五藏氣絶於內者下利不禁傷寒發熱為邪獨甚下利至甚厥不止為府藏氣絶故死程知曰厥陰病但發熱即不死以發熱則邪出於表而裏證自除若外發熱而內厥逆下利不止且至煩躁不解則發熱又為陽氣外散之候而主死矣張璐曰躁不得臥腎中陽氣越絶之象也大抵下利而手足厥冷者皆為危候以四肢為諸陽之本故也加以發熱躁不得臥不但虛陽發露而真陰亦已消盡無餘矣安得不死乎嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之注厥陰嘔而脈弱大便多利今小便復利雖身有微熱而又見厥冷是邪既上逆而下焦虛寒不固為陰進陽退之象故為難治以四逆湯主之者急壯其陽也陽回則可望生矣集注方有執曰脈弱雖似邪衰而小便復利則是裏屬虛寒也故曰見厥者難治以身之有微熱故雖厥猶可以四逆湯救其陽使之復也程知曰言嘔而厥者宜溫其下也嘔者邪氣上逆也脈弱小便利虛寒見於下也身有微熱當為陽邪在表然見厥逆則為陰盛於裏而微陽有不能自存之憂也汪琥曰按諸條厥利證皆大便利此條以嘔為主病獨小便利而見厥前後不能關鎖用四逆湯以附子散寒下逆氣助命門之火上以除嘔下以止小便外以回厥逆也乾嘔吐涎沫頭痛者吳茱萸湯主之注太陰有吐食而無嘔也少陰有欲吐不吐咳而嘔也厥陰之厥而嘔嘔而吐蛔也今乾嘔者有聲無物之謂也吐涎沫者清涎冷沫隨嘔而出也此由厥陰之寒上干於胃也三陽有頭痛必兼身熱至於太陰少陰二經皆無頭痛惟厥陰與督脈會於巔故有頭痛而無身熱也此少陽不解傳入厥陰陰邪上逆故嘔而頭痛也以吳茱萸湯主之從厥陰本治也集注程知曰此言嘔而頭痛者宜溫中而降逆也張錫駒曰嘔者有聲有物者也吐者吐出其物也故有乾嘔而無干吐今乾嘔吐涎沫者涎沫隨嘔而吐出也嘔家有癰膿者不可治嘔膿盡自愈注心煩而嘔者內熱之嘔也渴而飲水嘔者停水之嘔也今嘔而有膿者此必內有癰膿故曰不可治但俟嘔膿盡自愈也蓋癰膿腐穢欲去而嘔故不當治若治其嘔反逆其機熱邪內壅阻其出路使無所泄必致他變故不可治嘔膿盡則熱隨膿去而嘔自止矣集注汪琥曰肺胃成癰由風寒蘊於經絡邪鬱於肺或入胃府變而為熱熱甚則氣瘀血積而為癰癰者壅也言熱毒壅聚而成膿也鄭重光曰邪熱上逆結為內癰肺胃之癰是也厥陰中風脈微浮為欲愈不浮為未愈注厥陰中風該傷寒而言也脈微厥陰脈也浮表陽脈也厥陰之病既得陽浮之脈是其邪已還於表故為欲愈也不浮則沉沉裏陰脈也是其邪仍在於裏故為未愈也集注成無己曰脈浮為邪氣還表作汗之兆故云欲愈不浮則邪氣深入正多變證故云未愈方有執曰風脈當浮以厥陰本微緩不浮故微浮則邪見還表為欲愈也厥陰病欲解時從丑至卯上注丑寅卯三時厥陰風木乘旺之時也正氣得其旺則邪自退故病解集注方有執曰厥陰之解自寅卯而終少陽之解自寅卯而始蓋寅為陽初動陰尚强卯為天地闢陰陽分所以二經同旺其病之解由此而終始也
