body:
  text: 卷十一辨壞病脈證并治篇壞病者謂不當汗而汗不當吐而吐不當下而下即當汗吐下而過甚或當汗吐下而失時皆為施治失宜所以成壞病也凡三陰三陽若汗若吐若下若溫針火熏火尉火灸火劫等法致諸壞病者有汗後亡陽眩冒振惕魄汗不收有下後虛中結胸痞硬下利不止有吐後煩亂腹滿有溫針失血驚狂甚至陽毒斑狂陰躁欲死神昏譫語循衣摸床之類是也其論散見諸篇今合為一集以便後學其中或有挂漏是在能三反者太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之注太陽病三日邪在三陽時也若已經發汗若吐若下若溫針其法備施病仍不解者此為壞病由施治失宜也此時即有表證桂枝亦不中與當觀其脈證知所誤犯者何逆而隨證治之不可以成法拘也集注方有執曰既不可定以正名則亦難以出其正治故但示人以隨機應變之微旨一以貫之斯言盡之矣程知曰病在太陽治之不當即成壞病故初治不可不慎桂枝不可與以桂枝證罷也若桂枝證仍在則不謂之壞病矣程應旄曰如汗後亡陽動經渴躁譫語下後虛煩結胸痞氣吐後內煩腹脹滿溫針後吐衄驚狂之類紛紜錯出者俱是為前治所壞後人切不得執成法以救逆所以前證雖屬桂枝若壞則桂枝亦不中與也觀其脈證知犯何逆隨證治之蓋欲反逆為順也非從望聞問切上探出前後根因無從隨證用法非頭痛醫頭之為隨證治之也吳人駒曰不得拘三日為表病而與桂枝當依現在之變壞者而為救治本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之按脈沉緊當是脈沉弦若是沉緊是寒實在胸當吐之診也惟脈沉弦始與上文之義相屬故可與小柴胡湯注本太陽病不解而見脅下硬滿乾嘔不能食往來寒熱等證脈沉弦是邪轉入少陽也若未經吐下者當與小柴胡湯解其半表半裏之邪可也其已經吐下發汗溫針者則表裏俱虛更加譫語柴胡證罷此為壞病即小柴胡湯亦不中與也當審其所犯何逆隨證以法治之可也集注成無己曰轉入少陽柴胡證也若已吐下發汗溫針不惟犯少陽三禁更加溫針以迫劫之損耗津液胃中乾燥必發譫語柴胡證罷者謂無脅下硬滿乾嘔不能食往來寒熱等證也此為壞病沈明宗曰太陽不解而傳少陽當與小柴胡和解乃為定法反以吐下發汗溫針以犯少陽之戒而邪熱陷入陽明故發譫語已為壞證要知譫語乃陽明受病即當知犯陽明之逆而治之若無譫語而見他經壞證須憑證憑脈另以活法治之也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治注太陽病中風不以桂枝湯汗之而以火劫發汗故致生諸逆也風屬陽邪被火益熱故血氣流溢失其常度也以風火俱陽故曰兩陽熏灼熱蒸血瘀達於肌表故其身發黃也血為熱迫故上逆欲衄陰虛液竭故小便難陰陽虛竭故身體枯燥陽熱熏灼陰液上越故頭汗出劑頸而還也熱傳太陰故腹滿口燥熱傳少陰故口乾咽爛熱壅於胸故肺燥微喘熱結於胃故不大便愈久則熱益深故噦逆譫語神明昏亂手足躁擾捻衣摸床之證見矣凡此諸壞證推求其源皆由邪火逆亂真陰立亡多不可治然或小便利者則陰氣尚在故猶為可治也可不慎之於始哉集注成無己曰內經云諸脹腹大皆屬於熱腹滿微喘者熱氣內鬱也經云火氣內發上為口乾咽爛者火熱上熏也熱氣上而不下則大便不硬若熱氣下入胃中消耗津液則大便硬故云或不大便久則胃中燥熱必發譫語經云病深者其聲噦火氣太甚正氣逆亂故噦經云四肢者諸陽之本也陽盛則動故手足躁擾捻衣摸床也小便利者是陰未竭猶可治也喻昌曰此證陽邪挾火擾亂陰分而亡其陰與前二條亡陽證天淵懸絶觀陽盛欲衄身體枯燥諸句則知此證宜急驅其陽以存一線之陰不得泥陰陽俱虛竭一語而補其陽劫其陰也且頭汗為陽邪上壅不下通於陰所以劑頸以下不能得汗設見衄血則邪從衄解頭間且無汗矣設有汗則邪從汗解又不衄矣後條火邪深入必圊血亦身體枯燥而不得汗設有汗便不圊血矣讀古人書全要會意豈有得汗仍衄血圊血之理哉又曰仲景以小便利一端辨真陰之亡與未亡最細蓋水出高源小便利則津液不枯肺氣不絶可知也腎以膀胱為府小便利則膀胱之氣化行腎水未絶可知也程應旄曰以上諸證莫非邪火逆亂真陰立亡之象推求其原一皆血氣流溢失其常度至於如此邪風被火熱之害可勝言哉此際欲治風而火勢沸騰欲治火而風邪壅遏何從治之惟利小便一法如豬苓湯類可以導熱滋干使小便得利則太陽之邪亦從膀胱為去路尚可治也倘利之而不利火無從出危矣太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈注太陽表病醫過發汗已虛其表因復下之又虛其裏雖有未盡之表邪陷裏成痞但表裏俱虛陰陽並竭已成壞證矣況無陽則陰不生陰獨則陽不化而復加燒針火氣內攻陰陽皆病故胸滿而煩面色青黃肌膚瞤動也見證如此錯雜故為難治若面色微黃不青手足不厥而溫則為陰陽之氣未竭故曰易治也集注方有執曰表以誤汗言裏以誤下言故曰俱虛陰指裏陽指表無陽謂陽竭也陰獨謂痞也青黃脾受克賊之色微黃土見回生之色手足溫陽氣回於四末也言既經反復之誤又見克賊之色肌膚瞤動而不寧則脾家之真陰敗為難治也今則土見回生之色四末得溫胃家之陽復故為易愈也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之注傷寒脈浮自汗出中風證也小便數心煩裏無熱之虛煩也微惡寒者表陽虛不能御也腳攣急者表寒收引拘急也是當與桂枝增桂加附子湯以溫經止汗今反與桂枝湯攻發其表此大誤也服後便厥者陽因汗亡也咽乾者陰因汗竭也煩躁者陽失藏也吐逆者陰拒格也故作甘草乾薑湯與之以緩其陰而復其陽若厥愈足溫則是陽已復宜更作芍藥甘草湯與之以調其陰而和其陽則腳即伸也若胃不和而譫語知為邪已轉屬陽明當少少與調胃承氣湯令其微溏胃和自可愈也若重發汗者謂不止誤服桂枝湯而更誤服麻黃湯也或復加燒針劫取其汗以致亡陽證具則又非甘草乾薑湯所能治故又當與四逆湯以急救其陽也集注程應旄曰脈浮自汗雖似桂枝證而頭項不痛知陽神自歉於上部惡寒腳攣急知陰邪更襲於下焦陽虛陰盛而裏氣上逆故有心煩證裏陰攻及表陽差訛只在煩字上觀結句若重發汗復加燒針者四逆湯主之可見陰證不必真直中也治之一誤寒即中於治法中矣問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈注此設問答申明上條之義也桂枝證當用桂枝值時令溫熱或其人有熱用陽旦湯即桂枝湯加黃芩也值時令寒冷或其人有寒用陰旦湯即桂枝湯加乾薑也證象陽旦謂心煩似乎有熱也按法治之謂按法用陽旦湯也蓋心煩小便數咽中干似乎陽旦而不審腳攣急微惡寒之證是陰寒也即以陽旦湯攻其表誤也所以增劇厥逆咽中干兩脛拘急譫語等壞證作也師言夜半手足當溫兩腳當伸如其言者何也答曰診脈浮大則為風虛非寒虛也故此知用桂枝不足以治其寒而加附子溫經即有陽明內結譫語煩亂等證渾不為意且更與甘草乾薑湯至夜半陽回足熱脛尚微拘急即與芍藥甘草湯以和其陰爾乃脛伸繼以承氣治其陽明內結故微溏而譫語止其病可愈矣是皆由於救之得法耳陽旦湯方補桂枝三錢芍藥酒焙二錢甘草炙二錢黃芩酒炒三錢生薑三片大棗擘二枚上水煎去滓溫服無時日二三服本方加乾薑名陰旦湯甘草乾薑湯方甘草炙四兩乾薑炮二兩上二味以水三升煮取一升五合去滓分溫再服芍藥甘草湯方芍藥四兩甘草炙四兩上二味以水三升煮取一升五合去滓分溫再服傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿按八九日心下痞硬脅下痛氣上衝咽喉三句與上下文義不屬必是錯簡注家因此三句皆蔓衍支離牽強注釋不知此證總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始可愈也注傷寒吐下後復發其汗治失其宜矣故令陽氣陰液兩虛也陰液虛故虛煩陽氣虛故脈微陽氣微而不升故目眩冒陰液虛而不濡故經脈動惕也陽氣陰液虧損久則百體失所滋養故力乏筋軟而成痿矣傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之注傷寒六七日邪傳厥陰厥熱勝復之時醫不詳審陰陽而大下之致變中寒下竭之壞證中寒故寸脈沉遲手足厥逆下竭故尺脈不至泄利不止也蓋未下之前陽經尚伏表熱大下之後則其熱乘虛下陷內犯厥陰厥陰經循喉嚨貫膈注肺故咽喉不利唾膿血也此為陰陽錯雜表裏混淆之證若溫其下恐助上熱欲清其上愈益中寒仲景故以此湯主之正示人以陰陽錯雜為難治當於表裏上下求治法也蓋下寒上熱固為難溫裏寒無汗還宜解表故裏麻黃升麻湯以解表和裏清上溫下隨證治之也集注程知曰言厥逆有因於誤下致變者也凡傷寒熱熾者其陰必虛六七日雖當傳裏之時設表證仍在而大下之則陰傷而陽亦陷寸脈沉遲手足厥冷下利不止傷其陽而氣內陷也下部脈不至咽喉不利吐膿血傷其陰而熱內逼也一下之誤既傷其陽復傷其陰故難治與麻黃升麻湯以升陽調下清熱滋陰蓋傳經熱邪從外入於內者仍當從內出於外也故曰汗出愈喻昌曰寸脈沉而遲明是陽去入陰之故非陽氣衰微可擬故雖手足厥冷下部脈不至泄利不止其不得為純陰無陽可知況咽喉不利唾膿血又陽邪搏陰上逆之徵驗所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解矣麻黃升麻湯方麻黃去節二兩半升麻一兩一分當歸一兩一分知母十八銖黃芩十八銖葳蕤十八銖石膏碎綿裹六銖白朮六銖乾薑六銖芍藥六銖天冬去心六銖桂枝六銖茯苓六銖甘草炙六銖上十四味以水一斗先煮麻黃一二沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三升米頃令盡汗出愈方解下寒上熱若無表證當以黃連湯為法今有表證故復立此方以示隨證消息之治也升麻萎蕤黃芩石膏知母天冬乃升舉走上清熱之品用以避下寒且以滋上也麻黃桂枝乾薑當歸白芍白朮茯苓甘草乃辛甘走外溫散之品用以遠上熱且以和內也分溫三服令盡汗出愈其意在緩而正不傷徹邪而盡除也脈雖寸脈沉遲尺脈不至證雖手足厥逆下利不止究之原非純陰寒邪故兼咽喉痛唾膿血之證是寒熱混淆陰陽錯雜之病皆因大下奪中所變故仲景用此湯以去邪為主邪去而正自安也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之注傷寒八九日邪不解表不盡不可下也若下之其邪乘虛內陷在上者輕則胸滿重則結胸胸滿者熱入於胸氣壅塞也在中者輕則煩驚重則昏狂煩驚譫語者熱乘於心神不寧也在下者輕則小便不利重則少腹滿痛小便不利者熱客下焦水道阻也邪壅三焦則榮衛不行水無去路則外滲肌體故一身盡重不可轉側也以柴胡加龍骨牡蠣湯主之其大意在和解鎮固攻補兼施也按此條乃陽經濕熱之身重若以為津亡血澀陽氣不能宣布陰經濕寒之身重則誤矣寒濕身重用真武湯桂枝附子湯以不渴裏無熱也熱濕身重用白虎湯柴胡加龍骨牡蠣湯以譫煩胃有熱也其風濕風溫身重亦不外乎兼寒兼熱故此湯中用苓半大黃為佐也集注方有執曰胸滿者下後裏虛外熱入裏挾飲上搏於膈所以煩也驚傷心心藏神而居膈正虛邪勝所以不寧一身盡重不可轉側者傷寒本一身疼痛亡津液而血澀不利故變為沉滯而重甚也程知曰下而心煩腹滿治以梔朴為邪入腹也下而胸滿煩驚治以龍牡為邪入心也因火劫而致煩驚治以桂枝龍牡挽心陽之外越也因下而致煩驚治以柴胡龍骨牡蠣解心陽之內塞也大小陷胸以高下緩急別之諸瀉心湯以寒熱虛實辨之半苓治痰芩連降逆梔豉湧虛煩參附回陽虛下後大法備於斯矣喻昌曰八九日過經乃下之可謂慎矣孰知外邪未盡乘虛而陷邪方在表裏其患已及於神明於此而補天浴日豈復易易張璐曰此係少陽之裏證諸家注作心經病誤也蓋少陽有三禁不可妄犯雖八九日過經下之尚且邪氣內犯胃土受傷膽木失榮痰聚膈上有如是之變故主以小柴胡和解內外逐飲通津加龍骨牡蠣以鎮肝膽之驚也柴胡加龍骨牡蠣湯方柴胡四兩半夏洗二合趙本二合半龍骨一兩半人參一兩半大黃二兩牡蠣一兩半茯苓一兩半鉛丹一兩半桂枝一兩半生薑一兩半大棗擘二枚上十一味以水八升煮取四升納大黃切如棋子更煮一二沸去滓溫服一升方解是證也為陰陽錯雜之邪是方也亦攻補錯雜之藥柴桂解未盡之表邪大黃攻已陷之裏熱人參薑棗補虛而和胃茯苓半夏利水而降逆龍骨牡蠣鉛丹之澀重鎮驚收心而安神明斯為以錯雜之藥而治錯雜之病也汗家重發汗必恍惚心亂小便已陰痛與禹餘糧丸按禹餘糧丸為澀痢之藥與此證不合與禹餘糧丸五字衍文也注汗家謂平素好出汗之人也重發汗謂大發汗也心主血汗乃心之液重發其汗血液大傷心失所恃故神情恍惚心志不寧也液竭於下宗筋失養故小便已陰莖疼也集注方有執曰心主血而藏神汗多則血虛而舍空恍惚心亂者以舍空神紛散也陰宗筋也痛者液竭而失其所榮養也程應旄曰心主血汗者心之液平素多汗之家心虛血少可知重發其汗遂至心失所養神恍惚而多忡憧之象此之謂亂小腸與心為表裏心液虛而小腸之水亦竭故小便已而陰疼也衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠注衄家者該吐血而言也謂凡衄血吐血之人陰氣暴亡若再發其汗汗出液竭諸脈失養則額角上陷中之脈為熱所灼故緊且急也目直視目瞪不轉睛也不能眴目睫不合也亦皆由熱灼其脈引縮使然不得眠者陽氣不能行於陰也凡此所見之病皆陽盛陰微之危證誰謂衄家可輕發其汗耶集注喻昌曰目得血而能視汗為血液衄血之人清陽之氣素傷更發其汗則額上必陷乃上焦枯竭之應也諸脈皆屬於目筋脈緊急則目上瞪而不能合目不合則不得眠也傷寒發煩目瞑者必衄宜麻黃湯發其汗此言素常失血之人戒發其汗以重虛其虛故也亡血家不可發汗發汗則寒栗而振注凡失血之後血氣未復為亡血虛家皆不可發汗也蓋失血之初固屬陽熱然亡血之後熱隨血去熱固消矣而氣隨血亡陽亦危矣若再發汗則陽氣衰微力不能支故身寒噤栗振振聳動所必然也蓋發陰虛之汗汗出則亡陰即發暴吐衄血之汗也故見不能眴不得眠亡陰等病也發陽虛之汗汗出則亡陽即發亡血虛家之汗也故見寒栗而振亡陽等病也集注方有執曰亡血陰已虛矣發汗復亡其陽故寒栗而振也程應旄曰亡血陰虛陽已失依若發其汗陽從外脫故寒粟而振是為陰陽兩竭凡遇當汗證便當顧慮陰經之榮血有如此者魏荔彤曰與其汗出亡陽方救陽何如汗未出先救陰以維陽不令汗出亡陽之為愈也咽喉乾燥者不可發汗注咽喉乾燥津液不足也更發其汗則津液益枯故戒人雖有可汗之證亦不可發汗也集注方有執曰咽喉乾燥津液素虧本於腎水不足蓋少陰之脈循喉嚨也發汗則津液愈亡程應旄曰凡遇可汗之證必當顧慮上焦之津液又有如此者張璐曰此條與咽中閉塞似同實異此戒發汗以奪陽明之津彼戒發汗以奪少陰之血也淋家不可發汗發汗則便血注淋家者濕熱蓄於膀胱水道澀痛之病也若發其汗濕隨汗去熱必獨留水府告匱迫其本經之血從小便而出矣集注程知曰膀胱裏熱則淋更發其汗則膀胱愈燥而小便血矣瘡家雖身疼痛不可發汗發汗則痙注瘡家初起毒熱未成法當汗散已經潰後血氣被傷雖有身痛應汗表證亦不可發汗恐汗出榮衛愈虛外風乘襲即不受外風筋失液養亦必致項強反張而成痙病也集注喻昌曰身疼痛為寒傷榮之證本當發汗瘡瘍之人肌表素虛榮血暗耗更發其汗則外風襲虛內血不榮必致頸項強身反張而成痙痙亦膀胱之病也太陽傷寒者加溫針必驚也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者先灸核上各一壯與桂枝加桂湯更加桂注太陽傷寒加溫針必驚者謂病傷寒之人卒然加以溫針其心畏而必驚也非溫針之後必生驚病也燒針即溫針也燒針取汗亦是汗法但針處宜當避寒若不謹慎外被寒襲火鬱脈中血不流行必結腫核赤起矣且溫針之火發為赤核又被寒侵故不但不解反召陰邪蓋加針之時心既被驚所以腎陰乘心之虛上凌心陽而發奔豚也奔豚者腎陰邪也其狀氣從少腹上衝於心也先灸核上各一壯者外去寒邪繼與桂枝加桂湯更加桂者內伐腎邪也桂枝加桂湯方於桂枝湯方內更加桂二兩成五兩餘依桂枝湯法集解徐彬曰此乃太陽風邪因燒針令汗復感於寒邪從太陽之府膀胱襲入相合之腎藏而作奔豚故仍從太陽之例用桂枝全方倍加桂者以內瀉陰氣兼驅外邪也太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪注火熏古劫汗法也即今火炕溫覆取汗之法太陽病以火熏之不得汗其人必內熱躁甚陰液愈傷陽不得陰無從化汗故反致不解也其火襲入陰中傷其陰絡迫血下行故必圊血也命名火邪示人以當治火邪不必治圊血也集注方有執曰躁手足疾動也到猶言反也謂徒躁擾而反不得解也汗為血之液血得熱則行火性大熱既不得汗則血必橫溢所以必圊血也程應旄曰太陽病以火熏之取汗竟不得汗其液之素少可知蓋陽不得陰則無從化汗也陰虛被火熱無從出故其人躁擾不寧也脈浮熱甚反灸之此為實實以虛治因火而動故咽燥而吐血注脈浮熱甚實熱在表也無灸之之理而反灸之此為實實謂其誤以實為虛也故熱因火動其勢炎炎致咽燥而吐血必矣蓋上條火傷陰分迫血下行故令圊血此條火傷陽分迫血上行故吐血也集注程應旄曰表實有熱誤認虛寒而用灸法熱無從泄因火而動自然內攻邪束於外火攻於內肺金被傷故咽燥而吐血汪琥曰表有風熱而反灸是以實作虛治也微數之脈甚不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也注微數之脈乃陰虛血少之診斷不可灸若誤灸之艾火內攻為煩為逆煩者陰為陽擾也逆者追虛逐實也陰本虛而加以火則愈虛是為追虛陽本實而加以火則愈實是為逐實然血已耗散脈中艾火之氣雖微而內攻有力矣故致焦骨傷筋血難復也集注喻昌曰脈微而數陰虛多熱之徵也此而灸之則虛者愈虛熱者愈熱不致傷殘不止矣程應旄曰若血少陰虛之人脈見微數尤不可灸以血主濡之主潤筋骨也若失其所濡則火之所至其骨必焦其筋必損內傷其陰未有不流散於經脈者也榮氣微者加燒針則血留不行更發熱而躁煩也注榮氣微者榮血虛微也榮血既已虛微若誤加燒針則榮血涸留而無所行也豈止焦骨傷筋而已哉所以更發熱而躁煩也集注程知曰言榮微忌燒針也陰虛則內熱若加燒針以助陽則兩熱相合而榮血不行必更外發熱而內煩躁也唐不岩曰其始也雖微流燒針以逼之也其既也留而不行燒針以竭之也張璐曰火為陽邪必傷陰血治此者當以救陰為主脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也注脈浮表邪宜以汗解誤用火灸傷其血液不能作汗反令表邪無所從出以致邪因火盛外不焦骨傷筋內不吐衄圊血而病腰以下重痹者必其人素有濕邪在下故從濕化也重者著也重著不移也然不以痹名者以非風寒濕之痹乃因火逆不相交通故名火逆也集注方有執曰痹濕病也因火逆治火邪夾陽邪而上逆陽不下通陰不用事化不行而水不得泄故濕著下體而重痹也程應旄曰脈浮在表汗解為宜矣因火灸之不能得汗則邪無出路因火而盛即不焦骨傷筋而火阻其邪陰氣漸竭下焦乃榮血所治榮氣竭而不運必重著而為痹名曰火逆示人欲治其痹宜先治其火也形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈按三弱字當俱是數字若是弱字熱從何有不但文義不屬且論中並無此説注形作傷寒者言其病形作傷寒之狀也但其脈不弦緊而數數者熱也脈浮數熱在表太陽證也沉數熱在裏陽明證也數脈為熱熱入陽明故必口渴若被火劫其熱更甚故必譫語脈數之病雖皆發熱然其施治不無別焉若脈浮數發熱解之當以汗汗出可愈宜大青龍湯脈沉數發熱解之當以下下之可愈宜調胃承氣湯若脈數無表裏證惟發熱而渴譫語者不可汗下宜白虎湯黃連解毒湯清之可也傷寒脈浮醫以火逼劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之注傷寒脈浮醫不用麻桂之藥而以火劫取汗汗過亡陽故見驚狂起臥不安之證蓋由火劫之誤熱氣從心且大脫津液神明失倚也然不用附子四逆輩者以其為火劫亡陽也宜以桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯主之去芍藥者恐其陰性遲滯兼制桂枝不能迅走其外反失救急之旨況既加龍蠣之固脫亦不須芍藥之酸收也蜀漆氣寒味苦寒能勝熱苦能降逆火邪錯逆在所必需也集注喻昌曰篇中誤服大青龍湯厥逆筋惕肉瞤而亡陽者乃汗多所致故用真武湯救之此以火迫劫而亡陽者乃方寸元陽之神被火迫劫而飛騰散亂故驚狂起臥不安有如此者少緩須臾神丹莫挽矣故以此湯救之蓋陽神散亂當求之於陽桂枝湯陽藥也然必去芍藥之陰斂始得疾趨以達於陽位更加蜀漆者緣蜀漆之性最急又加龍骨牡蠣有形之骨屬為之舟楫以載神而返其宅也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩甘草炙二兩生薑切三兩牡蠣熬五兩龍骨四兩大棗擘十二枚蜀漆洗去腳三兩上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之注火逆者謂凡火劫取汗致逆者也此火逆因火針之燒針劫汗而復下之火逆之邪雖因下減而煩躁一證獨不除者蓋因汗下大傷津液而然也故用桂枝甘草以救表龍骨牡蠣以固中不治煩躁而煩躁自愈也集注喻昌曰此證誤而又誤雖無驚狂等變然煩躁則外邪未盡之候亦真陽欲亡之機也程應旄曰火逆下之裏氣虛矣不治其虛更加燒針自致亡陽但見煩躁證而不盡如前條之驚狂起臥不安者由熱勢之緩急有殊故前方之加減稍異總不容煩躁之以假亂真也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草炙二兩龍骨二兩牡蠣熬二兩上四味為末以水五升煮取二升半去滓溫服八合日三服集解汪琥曰此方即桂枝去芍藥加蜀漆龍骨牡蠣救逆湯制小其劑而用之也火邪迫內則生煩躁雖煩躁似帶表邪不宜散以桂枝之辛熱而火逆既經下之則陰血受傷較之救逆湯似當增芍藥也
