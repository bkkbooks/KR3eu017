body:
  text: 卷三辨太陽病脈證并治下篇太陽中風者風傷於衛也傷寒者寒傷於榮也其說已詳上中二篇茲以風寒兩傷榮衛俱病者疏為下篇蓋風寒二氣多相因而少相離有寒時不皆無風有風時不皆無寒風寒並發邪中於人則榮衛兼病惟其證均無汗皆謂之實邪故立大青龍湯兩解之法發其寒邪外閉風邪內鬱不汗出而煩躁之汗也然必審其人脈不微弱無少陰證者乃可與之若誤施之則大汗淋漓厥逆筋惕肉瞤必致亡陽之變故又立真武一湯以救青龍之誤夫表寒裏熱者大青龍固所宜也若表裏俱熱則又非大青龍之所勝任爰立白虎一湯以輔青龍之不逮至於寒熱輕微者則更出桂枝二越婢一湯麻黃桂枝各半湯桂枝二麻黃一湯皆兩解榮衛法也合上中二篇而熟讀之則三法了然以之施治庶不紊耳太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也注太陽中風脈當浮緩今脈浮緊是中風之病而兼傷寒之脈也中風當身不痛汗自出今身疼痛不汗出是中風之病而兼傷寒之證也不汗出而煩躁者太陽鬱蒸之所致也風陽邪也寒陰邪也陰寒鬱於外則無汗陽熱蒸於內則煩躁此風寒兩傷營衛同病故合麻桂二湯中石膏製為大青龍湯用以解榮衛同病之實邪也若脈微弱汗出惡風者即有煩躁乃少陰之煩躁非太陽之煩躁也禁不可服服之則厥逆筋惕肉瞤之患生而速其亡陽之變矣故曰此為逆也集注成無己曰風並於衛者為榮弱衛强寒並於榮者為榮强衛弱今風寒兩傷故為榮衛俱實所以宜大青龍湯主之也喻昌曰大青龍湯為太陽無汗而設與麻黃湯證何異因有煩躁一證兼見則非此法不解程應旄曰此湯非為煩躁設為不汗出之煩躁設若脈微弱汗出惡風者雖有煩躁證乃少陰亡陽之象全非汗不出而鬱蒸者比也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之注傷寒脈當浮緊今脈浮緩是傷寒之病兼中風之脈也傷寒當身疼今身不疼是傷寒之病而兼中風之證也身輕邪在陽也身重邪在陰也乍有輕時謂身重而有時輕也若但欲寐身重無輕時是少陰證也今無但欲寐身雖重乍有輕時則非少陰證乃榮衛兼病之太陽證也脈雖浮緩證則無汗屬實邪也故亦以大青龍湯發之前條以脈微汗出示禁此條以無少陰證發明蓋詳審慎重之至也此二條承上篇首條次條中篇首條次條再揭太陽風寒兩傷以為下篇榮衛兼病之提綱後凡稱太陽中風傷寒涉於榮衛同病者皆指此二條而言也集注方有執曰大青龍湯一則曰主之一則曰發之何也主之者以煩躁之急疾屬動而言發之者以但重之沉默屬靜而言也喻昌曰無少陰證但重乍有輕時六字早已指明言但身重而無少陰之欲寐其為寒因可審況乍有輕時不似少陰之晝夜俱重又兼風因可審所以力驅其在表之風寒而無疑也若脈微弱身重欲寐則內顧少陰且不遑矣敢發之乎又曰細玩二條文義傷風脈本浮緩反見浮緊傷寒脈本浮緊反見浮緩是為傷風見寒傷寒見風兩無疑矣又當辨無少陰證相雜則用青龍萬舉萬當矣故脈見微弱即不可用大青龍以少陰病脈必微細也方氏注泥弱字牽入中風之脈陽浮陰弱為解不思中風之脈以及誤汗等證太陽上篇已悉此處但歸重分別少陰以太陽膀胱經與少陰腎經合為表裏其在陰虛之人表邪不俟傳經早從膀胱襲入腎藏者有之況兩感夾陰等證臨病猶當細察設少陰不虧表邪安能飛渡而見身重欲寐等證耶故有少陰證者不得已而行表散自有溫經散邪兩相綰照之法豈可徑用青龍之猛劑立鏟孤陽之根乎魏荔彤曰身重一證必須辨明但欲寐而常重則屬少陰誤發其汗變上厥下竭者少陰熱也變筋惕肉瞤者少陰寒也其犯誤汗之忌一也大青龍湯方麻黃去節六兩桂枝二兩甘草炙二兩杏仁去皮尖四十枚生薑切三兩大棗擘十二枚石膏碎綿裹如雞子大上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服若復服汗多亡陽遂虛惡風煩躁不得眠也方解名大青龍者取龍興雲雨之義也治風不外乎桂枝治寒不外乎麻黃合桂枝麻黃二湯以成劑故為兼風寒中傷者之主劑也二證俱無汗故減芍藥不欲其收也二證俱煩躁故加石膏以解其熱也設無煩躁則又當從事於麻黃桂枝各半湯矣仲景於表劑中加大寒辛甘之品則知麻黃證之發熱熱全在表大青龍證之煩躁熱兼肌裏矣初病太陽即用石膏者以其辛能解肌熱寒能清胃火甘能生津液是預保陽明存津液之先著也粗工疑而畏之當用不用必致熱結陽明斑黃狂冒紛然變出矣觀此則可知石膏乃中風傷寒之要藥故得麻桂而有青龍之名得知草而有白虎之號也服後取微汗汗出多者溫粉撲之一服得汗停其後服蓋戒人即當汗之證亦不可過汗也所以仲景桂枝湯中不用麻黃者是欲其不大發汗也麻黃湯中用桂枝者恐其過汗無制也若不慎守其法汗多亡陽變生諸逆表遂空虛而不任風陰盛格陽而更煩躁不得眠也集解許叔微曰仲景治傷寒一則桂枝二則麻黃三則青龍桂枝治風麻黃治寒青龍兼治風寒不拘時候施與脈證相對者無不應手而愈今人皆能言之而未曉前人處方用藥之意多不敢用無足怪也吳綬曰大青龍湯治傷寒發熱惡寒不得汗出煩躁不安脈浮緊或浮數者急用此湯發汗則愈乃仲景之妙法也譬若亢熱已極一雨而涼其理可見也若不曉此理見其躁熱投以寒涼之藥其害可勝言哉若脈微弱汗出惡風者不可用也如誤用之其害亦不淺所以脈證不明者多不敢用也脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗而不可下也注此發明風寒兩傷榮衛俱病之義也浮風邪脈也風陽也衛陽也緊寒邪脈也寒陰也榮陰也各從其類而傷之榮衛俱病骨節煩疼是大青龍發汗之脈證雖發熱煩躁其熱在肌而不在胃不可下也太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之注此申首條示人以救逆之法也首條言誤汗此條言過汗互文以明其義也蓋二證皆屬亡陽故均當以真武湯主之扶陽抑陰以救其逆也大汗出仍熱不解者陽亡於上也心下悸築築然動陽虛不能內守也頭眩者頭暈眼黑陽微氣不能升也身瞤動者蠕蠕然瞤動陽虛液涸失養於經也振聳動也振振欲劈地者聳動不已不能興起欲墮於地陽虛氣力不能支也集注張璐曰此為誤用大青龍因而致變者立法也汗出雖多而熱不退則邪未盡而正已大傷況裏虛為悸上虛為眩經虛為瞤身振振搖無往而非亡陽之象所以用真武把關坐鎮之法也汪琥曰或問治不在表何以方中尚用生薑蓋病自過汗而來雖無鬱熱可發其內外寒邪猶在用生薑者乃溫中有發也真武湯方見少陰篇太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也注太陽病中風傷寒二日不躁今反躁者是不得汗出而躁大青龍湯證也不以青龍湯發汗反以火劫尉背逼汗大出火邪入胃胃熱水竭則煩躁譫語所必發也十有餘日邪正相持持久必爭爭必振栗作解然解非汗出及下利邪無從解也若自下利此為欲從裏解也若自汗出此為欲從表解也今十餘日不自下利而有欲小便不得反嘔欲失溲者是裏不解也不自汗出而下身無汗足下惡風者是表不解也裏不解者大便必硬小便當數而反不數則知水留胃中久必腸潤其久積之大便自應多下而解也及多大便已雖小便不得諸病不解其頭卓然而痛是裏解表未悉解也表未悉解者是因火逼汗出而從腰以下不得汗乃上解而下未解也故有小便不得諸在下之病今雖裏解而其人頭卓然而痛者是表之餘邪上逆也足心必熱者裏之餘熱下流也穀氣者即胃氣也言胃中熱氣隨大便而下流也此病皆由妄行火劫致變難以拘定成規當診犯何逆隨證治之可也服桂枝湯大汗出脈洪大者與桂枝湯如前法若形似瘧一日再發者汗出必解宜桂枝二麻黃一湯注服桂枝湯大汗出病不解脈洪大若煩渴者則為表邪已入陽明是白虎湯證也今脈雖洪大而不煩渴則為表邪仍在太陽當更與桂枝湯如前法也服湯不解若形如瘧日再發者雖屬輕邪然終是為風寒所持非汗出必不得解故宜桂枝二麻黃一湯小發榮衛之汗其不用麻黃桂枝各半湯者蓋因大汗已出也集注方有執曰服桂枝湯證轉大汗出脈轉洪大者乃風多寒少風邪欲散而以微寒持之兩者皆不得解而寒熱如瘧也桂枝二麻黃一湯者重解風而輕於散寒也桂枝二麻黃一湯方桂枝一兩十七株芍藥一兩六銖麻黃去節十六銖甘草一兩二銖杏仁去皮尖十六枚生薑切一兩六銖大棗擘五枚上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服集解張璐曰詳此方藥品與各半不殊惟銖分稍異而證治攸分可見仲景於差多差少之間分毫不苟也太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯注太陽榮衛兩傷風多寒少之病得之八九日有如瘧狀之寒熱熱多寒少其人不嘔小便清白者此裏和不受邪雖為欲愈然必審其人如瘧狀之寒熱一日二三度輕輕而發診其脈微且緩則知邪已衰正欲復表裏將和始為欲愈也若脈微不緩是正猶未復惡寒是邪猶未衰尚不能自愈但已為前之汗吐下虛其表裏不可更發汗更下更吐也脈微惡寒表裏俱虛則面色當白今色反赤猶有餘邪怫鬱於表不能得小汗出宣發陽氣故面赤身癢未欲解也宜桂枝麻黃各半湯小小汗之以和榮衛自可愈也集注吳人駒曰此不專事桂枝而兼合乎麻黃者謂其面熱身癢邪在輕虛浮淺之處惟麻黃能達也桂枝麻黃各半湯方桂枝一兩十六銖芍藥一兩生薑一兩甘草炙一兩麻黃去節一兩大棗擘四枚杏仁去皮尖二十四枚上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必癢也注此承上條發明面赤身癢之義也表陽氣虛故脈浮遲邪氣怫鬱故面熱赤正虛邪盛相爭故戰惕也至六七日則邪當衰應汗出而解若反發熱是邪未衰故差遲也遲者正不勝邪也陽微怫鬱其身必癢以無陽氣不能宣發作汗故也集注程知曰此言陽虛不能作汗之脈也浮則邪在肌表遲則陽虛氣怫鬱而不得越則面熱赤正與邪爭而不得出則身戰惕至六七日傳經盡當汗解之時乃不得汗反發熱者其差必遲蓋陽虛不能領汗外出其熱邪浮於肌膚必作身癢也太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯注太陽病發熱惡寒熱多寒少此為榮衛兼病風邪多而寒邪少也若脈浮緊或脈浮數是表有陽邪鬱蒸則為無汗熱多之實邪以大青龍湯汗之可也今脈陽微陰弱乃為虛邪之診即有無汗熱多之實邪亦不可用大青龍湯更汗也蓋以脈微弱是無太陽表脈也故不可更大汗也然既有無汗熱多寒少之表證麻黃桂枝石膏之藥終不可無故只宜桂枝二越婢一湯之輕劑令微微似汗以解肌表而和榮衛也集注喻昌曰此亦風多寒少之證無陽二字仲景言之不一無陽乃無表無津液之通稱也故以不可更汗為戒然非汗則風寒終不能解惟取桂枝之二以治風越婢之一以治寒乃為合法耳汪琥曰不可更汗四字當是不可更大發汗意因其人脈微弱無陽也此方比上小發汗之方更輕吳人駒曰微乃微甚之微非微細之微但不過强耳既曰熱多脈安得微無陽者謂表之陽邪微故不可更大汗熱多者謂肌之熱邪甚故佐以石膏越婢者發越之力如婢子之職狹小其制不似大青龍之張大也桂枝二越婢一湯方桂枝十八銖芍藥十八銖甘草炙十八銖石膏碎綿裹二十四銖麻黃去節十八銖大棗擘四枚生薑一兩二銖上七味以水五升煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合之飲一升今合為一方乃桂枝湯二分越婢湯一分方解此方即大青龍湯以芍藥易杏仁也名雖越婢輔桂枝實則大青龍湯之變制也去杏仁惡其從陽而辛散用芍藥以其走陰而酸收以此易彼裁而用之則主治不同矣以桂枝二主之則不發汗可知越婢一者乃麻黃石膏二物不過取其辛涼之性佐桂枝二以和表而清肌熱則是寓微汗於不發之中亦可識也非若大青龍湯以石膏佐麻黃而為發汗驅肌熱之重劑也按桂枝二麻黃一湯治形如瘧日再發者汗出必解而無熱多寒少故不用石膏之涼也桂枝麻黃各半湯治如瘧狀熱多寒少而不用石膏更倍麻黃者以其面有怫鬱熱色身有皮膚作癢是知熱不向裏而向表令得小汗以順其勢故亦不用石膏之涼裏也桂枝二越婢一湯治發熱惡寒熱多寒少而用石膏者以其表邪寒少肌裏熱多故用石膏之涼佐麻桂以和榮衛非發榮衛也今人一見麻桂不問輕重亦不問溫覆與不溫覆取汗與不取汗總不敢用皆因未究仲景之旨麻黃桂枝只是榮衛之藥若重劑溫覆取汗則為發榮衛之藥輕劑不溫覆取汗則為和榮衛之方也集解吳人駒曰發散表邪皆以石膏同用者蓋石膏其性寒寒能勝熱其味薄薄能走表非苦芩連之輩性寒味苦而厚不能升達也傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之注傷寒身無大熱不煩不渴口中和背惡寒附子湯主之者屬少陰病也今傷寒身無大熱知熱漸去表入裏也口燥渴心煩知熱已入陽明也雖有背微惡寒一證似乎少陰但少陰證口中和今口燥渴是口中不和也背惡寒非陽虛惡寒乃陽明內熱熏蒸於背汗出肌疏故微惡之也主白虎湯以直走陽明大清其熱加人參者蓋有意以顧肌疏也集注喻昌曰此條辨證最細脈必滑而帶浮渾身無大熱又不惡寒但背間微覺惡寒是表邪已將罷其人口燥渴心煩是裏熱已大熾更不可姑待而當急為清解恐遲則熱深津竭無濟於事矣傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之注傷寒表不解謂脈浮緊頭痛身痛發熱無汗惡寒之證仍在也心下有水氣謂乾嘔而咳也然水之為病不一故曰或渴或利或噎或小便不利少腹滿或喘者皆有水氣之證故均以小青龍湯如法加減主之也經曰三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣太陽受邪若無水氣病自在經若有水氣病必犯府病府則膀胱之氣化不行三焦之水氣失道停上焦則或咳或喘或噎停中焦則或渴或乾嘔或滿停下焦則或小便不利少腹滿或下利凡水所行之處皆得而病之也小青龍湯外發太陽之表實內散三焦之寒飲亦汗法中之峻劑與大青龍湯並得其名一以治太陽表實之熱躁一以治太陽表實之寒飲也集注程知曰此明傷寒表證未解水積心下散寒滌飲法也汪琥曰明理論云青龍主風寒兩傷之疾固已傷寒表不解則麻黃可以發中風表不解則桂枝可以散惟其表不解而又加之心下有水氣則非二湯所能發散必以小青龍湯始可祛除表裏之邪氣爾小青龍湯方麻黃去節三兩芍藥三兩五味子半升乾薑二兩甘草炙三兩半夏洗半升桂枝三兩細辛三兩上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升加減法若渴去半夏加栝蔞根三兩若噎者去麻黃加附子一枚炮若小便不利少腹滿去麻黃加茯苓四兩若喘去麻黃加杏仁半升去皮尖若微利去麻黃加蕘花如一雞子熬令赤色按加蕘花如雞子大熬令赤色此必傳寫之誤蓋本草蕘花即芫花類也用之攻水其力甚峻五分可令人下行數十次豈有治停飲之微利而用雞子大之蕘花者乎似當改加茯苓四兩方解太陽停飲有二一中風有汗為表虛五苓散證也一傷寒無汗為表實小青龍湯證也表實無汗故合麻桂二方以解外去大棗者以其性滯也去杏仁者以其無喘也有喘者仍加之去生薑者以有乾薑也若嘔者仍用之佐乾薑細辛極溫極散使寒與水俱得從汗而解佐半夏逐痰飲以清不盡之飲佐五味收肺氣以斂耗傷之氣若渴者去半夏加花粉避燥以生津也若微利與噎小便不利少腹滿俱去麻黃遠表而就裏也加附子以散寒則噎可止加茯苓以利水則微利止少腹滿可除矣此方與越婢湯同治水飲溢於表而為腹脹水腫宜發汗外解者無不隨手而消越婢治有熱者故方中君以石膏以散陽水也小青龍治有寒者故方中佐以薑桂以散陰水也集解柯琴曰兩青龍俱治有表裏證皆用兩解法大青龍是裏熱小青龍是裏寒故發表之藥相同而治裏之藥則殊也此與五苓同為治表不解而心下有水氣然五苓治水之蓄而不行故專滲瀉以利水而微發其汗使水從下而去也此方治水之動而不居故備舉辛溫以散水而大發其汗使水從外而出也仲景發表利水諸法精義入神矣趙良曰溢飲之證金匱云當發其汗小青龍湯治之蓋水飲溢出於表榮衛盡為之不利必仿傷寒榮衛兩傷之法發汗以散其水而後榮衛行經脈通則周身之水可消必以小青龍湯為第一義於此可類推矣傷寒心中有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之按小青龍湯主之六字當在發熱不渴之下始與服湯已渴者之文義相屬豈有寒去欲解而更服小青龍湯之理乎注傷寒心下有水氣咳而微喘發熱不渴此為外傷寒邪內停寒飲宜以小青龍湯兩解之服湯汗解已後渴者乃已汗寒去內燥之渴非未汗飲停不化之渴故曰寒去欲解也當少少與水飲之以滋其燥令胃和自可愈也集注成無己曰咳而微喘者水寒射肺也發熱不渴者表證未罷也與小青龍湯發表散水服湯已渴者裏氣溫水氣散為欲解也方有執曰發熱不渴寒勝也故以服湯已而渴為寒去欲解大意與上條相仿故治亦同程知曰此明水寒未解治宜小青龍也心下有水氣寒在膈上也故喘咳發熱不渴服湯已而渴則水寒解矣此解水氣之法當用小青龍非謂解後仍用小青龍也張璐曰風寒挾水飲為病在表者故不渴服湯後而渴者是為寒去津傷欲解之徵所以雖渴而不必服藥但當靜俟津回可也咳而微喘為水飲上逆今水去而渴與水逆而渴不同世本小青龍湯主之在寒去欲解也之下錯簡也汪琥曰上條云渴是未服湯而渴乃水停津液不化而渴此條云渴是服湯已而渴乃汗後津液既亡而渴渴既不同豈可仍用上藥小青龍主之當在服湯已之上可知下之後復發汗必振寒脈微細所以然者以內外俱虛故也注發汗當於未下之先今下之後復發汗必振寒脈微細者表裏皆虛也所以然者以下之失宜則內守之陽虛故脈微細也以汗之失宜則外固之陽衰故振寒也集注鄭重光曰治傷寒先汗後下此定法也若下後外邪不盡不得已而復汗之邪雖去而內外俱虛是以脈細振寒所傷滋大矣下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之注此承上條互詳脈證以出其治也既下之以虛其裏復發汗以虛其表陰陽兩虛陽無所附夜而安靜不嘔不渴是內無陽證也無表證身無大熱脈沉微是外無陽證也表裏無陽內外俱陰惟有晝日煩躁不得眠一假陽證則是獨陰自治於陰分孤陽自擾於陽分非相勝乃相離也故以乾薑附子湯助陽以配陰蓋以陰雖盛而未相格陽氣微而自不依附也集注喻昌曰上條但言振寒及微細之脈未定所主之病以虛證不一也然振寒脈微細陽虛已見一班設晝日煩躁不得眠其為虛陽擾亂可知夜反安靜不嘔不渴則虛陽擾亂不兼外邪可知脈沉微身無大熱則煩躁為亡陽之診乾薑附子在所必需由此而推日中安靜夜而煩躁則為陰病而陽不病又可知矣程應旄曰下之後復發汗晝日煩躁不得眠虛陽擾亂外見假熱也夜安靜不嘔不渴無表證脈沉微身無大熱陰氣獨治內系真寒也宜乾薑附子湯直從陰中回陽不當於晝日煩躁一假熱證狐疑也乾薑附子湯方乾薑一兩附子去皮生用破八片一枚上二味以水三升煮取一升去滓頓服發汗若下之病仍不解煩躁者茯苓四逆湯主之注此又承上條言先汗後下於法不逆病應解而仍不解反煩躁者以別其治也蓋汗下俱過表裏兩虛陰盛格陽故晝夜見此擾亂之象也當以四逆湯壯陽勝陰更加茯苓以抑陰邪佐人參以扶正氣庶陽長陰消正回邪退病自解而煩躁安矣大青龍證不汗出之煩躁乃未經汗下之煩躁屬實此條病不解之煩躁乃汗下後之煩躁屬虛然脈之浮緊沉微自當別之恐其誤人故諄諄言之也集注汪琥曰傷寒汗下則煩躁止而病解矣若陰盛之煩躁强發其汗則表疏亡陽復下之則裏虛亡陰衛陽失護營陰內空邪仍不解更生煩躁此亦虛煩虛躁乃假熱之象也只宜溫補不當散邪故以茯苓四逆湯主之茯苓四逆湯方茯苓六兩人參一兩甘草炙二兩乾薑一兩半附子生用去皮破八片一枚上五味以水五升煮取三升去滓溫服七合日三服方解表裏之病治不如法先過汗後復過下或下後復汗誤而又誤變成壞病若其人陽盛而從熱化則轉屬三陽陽衰而從寒化則系在三陰此二條煩躁皆壞病也煩躁雖六經俱有而多見於太陽少陰者太陽為真陰之標少陰為真陽之本也未經汗下而煩躁多屬陽其脈實大其證熱渴是煩為陽盛躁為陰虛已經汗下而煩躁多屬陰其脈沉微其證汗厥是煩為陽虛躁為陰盛也夫先下後汗於法為逆外無大熱內不嘔渴似乎陰陽自和而實陽虛陰盛所以虛陽擾亂於陽分故晝日煩躁不得眠盛陰獨治於陰分故夜而安靜脈沉微是真陽將脫而煩躁也用乾薑附子壯陽以配陰薑附者陽中陽也生用則力更鋭不加甘草則勢更猛比之四逆為更峻救其相離故當急也先汗後下於法為順病仍不解遽增晝夜煩躁亦是陰盛格陽之煩躁也用茯苓四逆抑陰以回陽茯苓感太和之氣化伐水邪而不傷陽故以為君人參生氣於烏有之鄉通血脈於欲絶之際故以為佐人參得薑附補氣兼以益火薑附得茯苓補陽兼以瀉陰調以甘草比之四逆為稍緩和其相格故宜緩也一去甘草一加參苓而緩急自別仲景用方之妙如此太陽病先下而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得裏未和然後復下之注太陽表病當汗不汗先下之而不愈因復發其汗以此表裏俱虛因虛其人致冒理必然也冒家者謂凡因病而昏冒者也然冒家或有汗出自愈其所以然者非表裏俱虛乃邪正皆衰表裏自和故也得汗出而自愈者和於表也得下利而自愈者和於裏也得裏未和然後下之宜調胃承氣湯和之由此推之得表未和然後汗之當以桂枝湯和之自在言外矣集注程知曰冒者神識不清如有物為之冒蒙也得汗出表和而邪解矣得表和而裏未和然後下之明不得以其冒而認為入裏之邪遂致妄下亦不得以其冒而認為表之未解復妄用汗也汪琥曰得裏未和裏字諸注指二便言竊思經文中既云然後下之此專指大便而言若利小便則不言下矣其義可不辨而自明凡病若發汗若吐若下若亡血若亡津液陰陽自和者必自愈注凡病謂不論中風傷寒一切病也若發汗若吐若下若亡血若亡津液施治得宜自然愈矣即或治未得宜雖不見愈亦不至變諸壞逆則其邪正皆衰可不必施治惟當靜以俟之診其陰陽自和必能自愈也集注方有執曰陰陽以脈言而二便在其中兩者和則血氣無相勝負故可必自愈程知曰脈以左右三部勻停為無病故汗吐下後陰陽和者必自愈不須過治也問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗出而解者何也答曰其脈自微此以曾發汁若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也注脈浮而緊邪實也按之反芤正虛也正虛邪實邪與正爭故發戰汗出而解也脈浮而數邪未實也按之不芤正不虛也正不虛邪未實邪不能與正爭故不戰汗出而解也脈不芤知不發戰也脈不浮知不汗出也脈自微知曾經發汗若吐若下若亡血也因內無津液邪正俱衰陰陽自和故不發戰不汗出而解也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也注脈浮而數按之無力當發戰汗出而解以其人本虛故也脈浮而數按之有力當不發戰但汗出而解以其人本不虛故也脈自微曾經發汗若吐若下若亡血不發戰不汗出而解以其人邪正皆衰陰陽自和故也傷寒三日未經汗吐下亡血也脈浮數而微病人熱減身和此謂欲解解以夜半者陽病至陰時則和也蓋浮數微三脈雖均為可解之脈然解之徵則不無別也如脈浮濈然汗出則邪還於表而解脈數能食則胃和而解脈微必大汗出而解者以其未經汗吐下其人未虛故均不發戰津液未傷故汗大出而解也集注方有執曰三日言遍三陽也浮數不傳陰也微邪氣衰也夜半陰盡陽生之時也濈然和而汗出貌能食胃氣回也太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯注太陽病未解當見未解之脈今不見未解之脈而陰陽脈俱停三部沉伏不見既三部沉伏不見則當見可死之證而又不見可死之證是欲作解之兆也作解之兆必先見振栗汗出而始解者乃邪正交爭作汗故也但作解之脈不能久停脈之將出必有其先先者何先於三部上下陰陽沉伏不見處求之也若從寸脈陽部微微而見者則知病勢向外必先汗出而解若從尺脈陰部微微而見者則知病勢向內必自下利而解如不自下利若欲下之以和裏宜調胃承氣湯主之由此推之則可知如不自汗出若欲汗之以和表宜麻桂各半湯主之也觀若欲下之宜調胃承氣湯意甚輕活無取於大下俱在言外矣集注程應旄曰振栗汗解單指脈停者言下邊兩解不必有戰汗是指其脈漸出而言也傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門注傷寒脈浮緊太陽表寒證也腹滿譫語太陰陽明裏熱也欲從太陽而發汗則有太陰陽明之裏欲從太陰陽明而下之又有太陽之表主治誠為兩難故不藥而用刺法也雖然太陰論中太陽表不解太陰腹滿痛而且桂枝加大黃湯亦可法也此肝乘脾名曰縱刺期門與上文義不屬似有遺誤傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門注傷寒發熱嗇嗇惡寒無汗之表也大渴欲飲水其腹必滿停飲之滿也若自汗出表可自解小便利滿可自除故曰其病欲解也若不汗出小便閉以小青龍湯先解其外外解已其滿不除十棗湯下之亦可愈也此肝乘肺名曰橫刺期門亦與上文義不屬似有遺誤太陽病欲解時從巳至未上注凡病欲解時必於其經氣之旺太陽盛陽也日中陽氣盛故從巳午未之旺時而病解
